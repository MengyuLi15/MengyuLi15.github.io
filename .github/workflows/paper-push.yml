name: Daily Paper Push

on:
  schedule:
    # GitHub cron is UTC. These two runs cover about 06:17 in Europe/Rome
    # across daylight-saving changes. Avoid minute 0 because scheduled runs
    # can be delayed or dropped during GitHub's top-of-hour load peaks.
    - cron: "17 4 * * *"
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many days back to search"
        required: false
        default: "120"
      max_papers:
        description: "Maximum papers to publish"
        required: false
        default: "50"
      focused_team_author_rows:
        description: "Rows per focused-team author query"
        required: false
        default: "8"
      focused_team_author_workers:
        description: "Concurrent focused-team author queries"
        required: false
        default: "1"
      focused_team_author_limit:
        description: "Maximum focused-team authors to query per run"
        required: false
        default: "60"

permissions:
  contents: write

jobs:
  paper-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-paper-push.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-paper-push.txt

      - name: Generate daily paper push
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '120' }}
          MAX_PAPERS: ${{ github.event.inputs.max_papers || '50' }}
          FOCUSED_TEAM_AUTHOR_ROWS: ${{ github.event.inputs.focused_team_author_rows || '8' }}
          FOCUSED_TEAM_AUTHOR_WORKERS: ${{ github.event.inputs.focused_team_author_workers || '1' }}
          FOCUSED_TEAM_AUTHOR_LIMIT: ${{ github.event.inputs.focused_team_author_limit || '60' }}
        run: |
          python scripts/generate_paper_push.py \
            --lookback-days "$LOOKBACK_DAYS" \
            --max-papers "$MAX_PAPERS"

      - name: Validate DOI metadata
        run: python scripts/validate_paper_push_dois.py

      - name: Commit and push changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No new paper push changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add paper push for $(date -u +%F)"
          git pull --rebase origin "${GITHUB_REF_NAME:-master}"
          git push
