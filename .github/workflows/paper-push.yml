name: Daily Paper Push

on:
  schedule:
    # GitHub cron is UTC. These two runs cover 08:00 in Europe/Berlin
    # across daylight-saving changes; DOI/history de-duplication prevents
    # duplicate posts if both runs find the same papers.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many days back to search"
        required: false
        default: "14"
      max_papers:
        description: "Maximum papers to publish"
        required: false
        default: "50"

permissions:
  contents: write

jobs:
  paper-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-paper-push.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-paper-push.txt

      - name: Generate daily paper push
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '14' }}
          MAX_PAPERS: ${{ github.event.inputs.max_papers || '50' }}
        run: |
          python scripts/generate_paper_push.py \
            --lookback-days "$LOOKBACK_DAYS" \
            --max-papers "$MAX_PAPERS"

      - name: Validate DOI metadata
        run: python scripts/validate_paper_push_dois.py

      - name: Commit and push changes
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No new paper push changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add paper push for $(date -u +%F)"
          git push
