      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：近年来，南海台风活动加剧，台风与中尺度涡相互作用深刻调控区域海洋环境和海气能量交换。为了系统地研究台风强迫的位置和极性相关的涡响应，我们开发了台风-涡空间匹配算法，并结合中国气象局（CMA）最佳路径台风记录分析了全球中尺度涡数据集（2006-2020）。采用综合和相关分析研究台风通过前后7天窗口内涡流表面可用势能（SAPE）和海面温度（SST）的变化，并使用台风功率耗散指数（PDI）来量化风暴强度。 综合结果揭示了明显的双不对称响应：（1）能量上，台风路径左侧涡流整体减弱，其中反气旋涡流（ACE）表现出更明显的能量衰减；相反，右侧涡流明显增强，并且气旋涡流（CE）比 ACE 表现出更强的增强。 (2) 从热学角度来看，所有涡流类型在台风通过后都会经历净冷却，右侧涡流比左侧涡流表现出更强的海温降低，CE 比 ACE 表现出更强的冷却。时间尺度相关性分析进一步表明，左侧CE、右侧CE和右侧ACE的涡能量变化率（EECR）与PDI呈正相关，而左侧ACE则不存在显着相关性。 对于海温变化率（SSTCR），所有类型的涡旋事件都与PDI表现出显着的负相关性，其中CE的相关性较弱，ACE的相关性较强。这项研究表明，热带气旋的路径相对位置和预先存在的中尺度涡旋的极性对观测到的南海热带气旋强迫的涡旋响应具有系统的控制作用。这些结果提供了对热带气旋引起的不对称海洋响应的观测限制，并为边缘海台风与海洋相互作用诊断的解释提供了见解。"
      summary_zh: "摘要：近年来，南海台风活动加剧，台风与中尺度涡相互作用深刻调控区域海洋环境和海气能量交换。为了系统地研究台风强迫的位置和极性相关的涡响应，我们开发了台风-涡空间匹配算法，并结合中国气象局（CMA）最佳路径台风记录分析了全球中尺度涡数据集（2006-2020）。采用综合和相关分析研究台风通过前后7天窗口内涡流表面可用势能（SAPE）和海面温度（SST）的变化，并使用台风功率耗散指数（PDI）来量化风暴强度。 综合结果揭示了明显的双不对称响应：（1）能量上，台风路径左侧涡流整体减弱，其中反气旋涡流（ACE）表现出更明显的能量衰减；相反，右侧涡流明显增强，并且气旋涡流（CE）比 ACE 表现出更强的增强。 (2) 从热学角度来看，所有涡流类型在台风通过后都会经历净冷却，右侧涡流比左侧涡流表现出更强的海温降低，CE 比 ACE 表现出更强的冷却。时间尺度相关性分析进一步表明，左侧CE、右侧CE和右侧ACE的涡能量变化率（EECR）与PDI呈正相关，而左侧ACE则不存在显着相关性。 对于海温变化率（SSTCR），所有类型的涡旋事件都与PDI表现出显着的负相关性，其中CE的相关性较弱，ACE的相关性较强。这项研究表明，热带气旋的路径相对位置和预先存在的中尺度涡旋的极性对观测到的南海热带气旋强迫的涡旋响应具有系统的控制作用。这些结果提供了对热带气旋引起的不对称海洋响应的观测限制，并为边缘海台风与海洋相互作用诊断的解释提供了见解。"
      summary_en: "Abstract: In recent years, typhoon activity over the South China Sea (SCS) has intensified, and interactions between typhoons and mesoscale eddies profoundly regulate the regional oceanic environment and air–sea energy exchange. To systematically investigate the position- and polarity-dependent eddy responses to typhoon forcing, we developed a typhoon–eddy spatial matching algorithm and analyzed the global mesoscale eddy dataset (2006–2020) combined with China Meteorological Administration (CMA) best-track typhoon records. Composite and correlation analyses were employed to examine variations in the eddy surface available potential energy (SAPE) and sea-surface temperature (SST) within a 7-day window before and after typhoon passage, with the typhoon power dissipation index (PDI) used to quantify storm intensity. Composite results reveal distinct dual-asymmetric responses: (1) Energetically, eddies on the left side of typhoon tracks exhibit overall weakening, with anticyclonic eddies (ACEs) showing more pronounced energy decay; in contrast, right-side eddies undergo significant intensification, and cyclonic eddies (CEs) display stronger enhancement than ACEs. (2) Thermally, all eddy types experience net cooling after typhoon passage, with right-side eddies showing stronger SST reductions than left-side ones, and CEs exhibiting more intense cooling than ACEs. Time-scale correlation analyses further demonstrate that the eddy energy change rate (EECR) of left-side CEs, right-side CEs, and right-side ACEs is positively correlated with PDI, whereas left-side ACEs show no significant correlation. For the SST change rate (SSTCR), all types of eddy events exhibit significant negative correlations with PDI, with weaker correlations for CEs and stronger correlations for ACEs. This study demonstrates that the track-relative position of tropical cyclones and the polarity of pre-existing mesoscale eddies exert a systematic control on the observed eddy responses to tropical cyclone forcing in the SCS. These results provide observational constraints on the asymmetric oceanic responses induced by tropical cyclones and offer insights into the interpretation of typhoon–ocean interaction diagnostics in marginal seas."
    - title: "Marine heatwaves shape size‐dependent thermal exposure, habitat use and marine residency in Arctic char ( Salvelinus alpinus )"
      authors: "Jessica E. Desforges; David Côté; Joey Angnatok; J. Brian Dempson; Travis E. Van Leeuwen"
      journal: "Journal of Fish Biology"
      published: "2026-06-23"
