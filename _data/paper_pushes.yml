    - title: "Modeling Variability in Vertical Profiles of Particulate Organic Carbon Flux"
      authors: "Katherine Taylor; Raffaele Ferrari; B. B. Cael"
      journal: "Geophysical Research Letters"
      published: "2026-03-28"
      published_month: "2026-03"
      published_month_zh: "2026-03"
      doi: "10.1029/2026gl121728"
      url: "https://doi.org/10.1029/2026gl121728"
      group: "重点期刊：按影响力和相关性排序"
