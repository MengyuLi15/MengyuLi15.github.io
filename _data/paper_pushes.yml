      published_month: "2026-03"
      published_month_zh: "2026-03"
      doi: "10.1088/1742-6596/3178/1/012067"
      url: "https://doi.org/10.1088/1742-6596/3178/1/012067"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：本研究探讨了北极涛动（AO）和太平洋年代际涛动（PDO）如何影响通过弗拉姆海峡的海冰面积和出口量。连续小波功率谱揭示了海冰面积和出口量的显着年度周期。交叉小波变换的结果表明，海冰面积和体积输出在大约一年的周期内与AO同步，并且PDO指数在2002-2009年的十年周期内领先海冰面积输出。这些结果展示了 AO/PDO 对通过弗拉姆海峡海冰输出的关系。"
      summary_zh: "摘要：本研究探讨了北极涛动（AO）和太平洋年代际涛动（PDO）如何影响通过弗拉姆海峡的海冰面积和出口量。连续小波功率谱揭示了海冰面积和出口量的显着年度周期。交叉小波变换的结果表明，海冰面积和体积输出在大约一年的周期内与AO同步，并且PDO指数在2002-2009年的十年周期内领先海冰面积输出。这些结果展示了 AO/PDO 对通过弗拉姆海峡海冰输出的关系。"
      summary_en: "Abstract: This study examines how the Arctic Oscillation (AO) and Pacific Decadal Oscillation (PDO) influence sea ice area and volume export through the Fram Strait. The continuous wavelet power spectrum reveals a significant annual cycle in sea ice area and volume export. The results from the cross wavelet transform indicate that sea ice area and volume export were in-phase with the AO on a roughly one-year period, and the PDO index leading sea ice area export from 2002-2009 on a decadal period. These results exhibit the relationship of AO/PDO on sea ice export through the Fram Strait."
