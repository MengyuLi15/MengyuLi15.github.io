    - title: "Spatiotemporal Variations of Phytoplankton Groups and Their Relationships with Mesoscale Eddies in the Northwest Pacific"
      authors: "Jian Wen; Pengchao Jin; Lichuan Zhang; Xinjun Chen; Yang Zhang; Wei Yu"
      journal: "Journal of Marine Science and Engineering"
      published: "2026-04-25"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.3390/jmse14090789"
      url: "https://doi.org/10.3390/jmse14090789"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "BGC-Argo; phytoplankton"
      tags_zh: "BGC-Argo; phytoplankton"
      tags_en: "BGC-Argo; phytoplankton"
      summary: "摘要：西北太平洋公海渔场复杂的海洋动态塑造了浮游植物群落，这是商业性中上层物种的基础。本研究通过分析 2014 年至 2023 年八种浮游植物功能类型 (PFT) 的时空演化，研究中尺度涡流如何调节浮游植物群的结构。利用高分辨率人工智能驱动模型数据 (AIGD-PFT) 和归一化径向距离网格 (0–2 R)，我们量化了气旋 (CE) 和反气旋 (AE) 涡旋内的 PFT 浓度，通过生物地球化学 Argo (BGC-Argo) 和原位测量进行验证。结果表明，该区浮游植物以硅藻和甲藻为主，分别占浮游植物的88. 7%，春季和秋季季节高峰明显。 CE 显着提高硅藻和甲藻浓度，特别是在 0. 4 R-1。 2 R动态环，而AE则有利于中低纬度原绿球藻等超微型浮游植物的聚集。相关分析表明，硅藻丰度与溶解氧密切相关，与海面高度呈负相关。我们得出的结论是，中尺度涡流通过改变当地的物理和营养条件来驱动浮游植物群落的空间重塑。这些发现为评估北太平洋不同营养级渔业的生境分布和可持续管理提供了重要的生态背景。"
      summary_zh: "摘要：西北太平洋公海渔场复杂的海洋动态塑造了浮游植物群落，这是商业性中上层物种的基础。本研究通过分析 2014 年至 2023 年八种浮游植物功能类型 (PFT) 的时空演化，研究中尺度涡流如何调节浮游植物群的结构。利用高分辨率人工智能驱动模型数据 (AIGD-PFT) 和归一化径向距离网格 (0–2 R)，我们量化了气旋 (CE) 和反气旋 (AE) 涡旋内的 PFT 浓度，通过生物地球化学 Argo (BGC-Argo) 和原位测量进行验证。结果表明，该区浮游植物以硅藻和甲藻为主，分别占浮游植物的88. 7%，春季和秋季季节高峰明显。 CE 显着提高硅藻和甲藻浓度，特别是在 0. 4 R-1。 2 R动态环，而AE则有利于中低纬度原绿球藻等超微型浮游植物的聚集。相关分析表明，硅藻丰度与溶解氧密切相关，与海面高度呈负相关。我们得出的结论是，中尺度涡流通过改变当地的物理和营养条件来驱动浮游植物群落的空间重塑。这些发现为评估北太平洋不同营养级渔业的生境分布和可持续管理提供了重要的生态背景。"
      summary_en: "Abstract: The complex ocean dynamics in the Northwest Pacific high-seas fishing grounds shape phytoplankton communities, which serve as the foundation for commercially pelagic species. This study investigates how mesoscale eddies modulate phytoplankton groups’ structures by analyzing the spatiotemporal evolution of eight phytoplankton functional types (PFTs) from 2014 to 2023. Utilizing high-resolution AI-driven model data (AIGD-PFT) and a normalized radial distance grid (0–2 R), we quantified PFTs concentrations within cyclonic (CE) and anticyclonic (AE) eddies, validated by Biogeochemical Argo (BGC-Argo) and in situ measurements. Results reveal that diatoms and dinoflagellates dominate the region, accounting for 88.7% of phytoplankton with distinct seasonal peaks in spring and autumn, respectively. CE significantly enhance diatom and dinoflagellate concentration, particularly within the 0.4 R–1.2 R dynamic ring, while AE favor the aggregation of picophytoplankton, such as Prochlorococcus, in mid-to-low latitudes. Correlation analysis indicates that diatom abundance is strongly linked to dissolved oxygen and negatively correlated with sea surface height. We conclude that mesoscale eddies drive the spatial remodeling of phytoplankton communities by altering local physical and nutrient conditions. These findings provide a critical ecological context for assessing the habitat distribution and sustainable management of North Pacific fisheries across different trophic levels."
