    - title: "Global Drivers of Phytoplankton Phenology Trends"
      authors: "Joe K. Guest; Marie‐Fanny Racault; Corinne Le Quéré"
      journal: "Global Change Biology"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1111/gcb.70955"
      url: "https://doi.org/10.1111/gcb.70955"
      group: "重点期刊：按影响力和相关性排序"
