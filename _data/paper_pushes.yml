      tags: "ocean colour; phytoplankton community structure; remote sensing"
      tags_zh: "ocean colour; phytoplankton community structure; remote sensing"
      tags_en: "ocean colour; phytoplankton community structure; remote sensing"
      summary: "这项研究尝试用较少的预测变量反演全球表层浮游植物群落结构。它利用海色遥感相关变量，避免模型过度依赖复杂输入或难以获得的参数。研究把表层光学信号转化为群落组成信息，使海色产品从总叶绿素向功能群结构延伸。结果表明，简洁的预测变量组合也可以支持全球尺度群落结构估计。它对海色长期监测、生态模型约束和表层-剖面群落比较很有帮助。"
      summary_zh: "这项研究尝试用较少的预测变量反演全球表层浮游植物群落结构。它利用海色遥感相关变量，避免模型过度依赖复杂输入或难以获得的参数。研究把表层光学信号转化为群落组成信息，使海色产品从总叶绿素向功能群结构延伸。结果表明，简洁的预测变量组合也可以支持全球尺度群落结构估计。它对海色长期监测、生态模型约束和表层-剖面群落比较很有帮助。"
      summary_en: "This study retrieves global surface phytoplankton community structure using a minimal set of predictors. It relies on ocean-colour-related variables, reducing dependence on complex inputs or hard-to-obtain parameters. The analysis translates surface optical signals into community-composition information, extending ocean-colour products beyond bulk chlorophyll. The results show that a compact predictor set can support global-scale estimates of phytoplankton community structure. It is useful for long-term ocean-colour monitoring, ecosystem-model constraints, and comparisons between surface and profile-based community patterns."
    - title: "Accuracy of SeaHawk-HawkEye Ocean color CubeSat remote sensing reflectance products in globally distributed aquatic sites"
      authors: "Srinivas Kolluru; Sara Rivero-Calle; Philip J. Bresnahan; Susanne Kratzer; Timothy S. Moore; Thomas Schroeder; Sean Bailey; Alan Holmes; et al."
