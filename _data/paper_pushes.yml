      summary: "摘要：土耳其的西部和南部地区在夏季受到地中海热力的强烈影响，长期的夏季干旱是地中海气候的决定性特征之一。在过去十年中，干旱和极端高温事件的频率和强度都有所增加。特别是，2025 年夏季比长期气候正常情况更加干燥。与此同时，气候变化的影响日益加大，加剧了气候过渡区内复合极端气候的发生频率和严重程度，大大增加了野火风险。在这些异常炎热和干燥的大气条件下，环境条件变得非常有利于野火点燃和迅速蔓延，因此即使是轻微的物理或人为干扰也足以引发野火。本研究调查了复合极端气候与萨卡里亚 2025 年大规模野火之间的关系。利用长期每日温度、相对湿度、风速和降水进行气象分析。使用 HWN、HWDx 和 HWMn 指数评估热浪特征，而使用 SPI 评估干旱特征。此外，利用Sentinel-2图像和GEE平台，通过dNDVI、dNDMI和dNBR指数评估火后植被损害和烧伤严重程度。研究结果表明，火灾日与复合极端条件密切相关，其特征是最高温度高于阈值和相对湿度较低。火灾前期间观察到的长期干旱进一步加剧了燃料干燥和野火的易发性。 遥感分析表明，烧毁地区的植被密度、水分含量和生态系统功能大幅下降。总之，基于卫星的 dNBR 分析表明，大约 20,000 公顷土地受到 2025 年萨卡里亚野火的影响。研究结果表明，这些野火事件不仅与单一气象因素有关，而且与热浪、长期干旱和复合干热大气过程的相互作用有关。这些结果清楚地表明，气候变化已成为野火发生和蔓延的一个日益重要的因素，特别是在气候过渡地区。该研究为完善野火预警系统、加强区域气候适应政策、制定未来气候变化情景下可持续野火管理策略提供了重要的科学依据。"
      summary_zh: "摘要：土耳其的西部和南部地区在夏季受到地中海热力的强烈影响，长期的夏季干旱是地中海气候的决定性特征之一。在过去十年中，干旱和极端高温事件的频率和强度都有所增加。特别是，2025 年夏季比长期气候正常情况更加干燥。与此同时，气候变化的影响日益加大，加剧了气候过渡区内复合极端气候的发生频率和严重程度，大大增加了野火风险。在这些异常炎热和干燥的大气条件下，环境条件变得非常有利于野火点燃和迅速蔓延，因此即使是轻微的物理或人为干扰也足以引发野火。本研究调查了复合极端气候与萨卡里亚 2025 年大规模野火之间的关系。利用长期每日温度、相对湿度、风速和降水进行气象分析。使用 HWN、HWDx 和 HWMn 指数评估热浪特征，而使用 SPI 评估干旱特征。此外，利用Sentinel-2图像和GEE平台，通过dNDVI、dNDMI和dNBR指数评估火后植被损害和烧伤严重程度。研究结果表明，火灾日与复合极端条件密切相关，其特征是最高温度高于阈值和相对湿度较低。火灾前期间观察到的长期干旱进一步加剧了燃料干燥和野火的易发性。 遥感分析表明，烧毁地区的植被密度、水分含量和生态系统功能大幅下降。总之，基于卫星的 dNBR 分析表明，大约 20,000 公顷土地受到 2025 年萨卡里亚野火的影响。研究结果表明，这些野火事件不仅与单一气象因素有关，而且与热浪、长期干旱和复合干热大气过程的相互作用有关。这些结果清楚地表明，气候变化已成为野火发生和蔓延的一个日益重要的因素，特别是在气候过渡地区。该研究为完善野火预警系统、加强区域气候适应政策、制定未来气候变化情景下可持续野火管理策略提供了重要的科学依据。"
      summary_en: "Abstract: The western and southern regions of Türkiye are strongly influenced by the Mediterranean thermal regime during the summer season, with prolonged summer drought representing one of the defining characteristics of the Mediterranean climate. Over the last decade, both the frequency and intensity of drought and extreme heat events have increased. In particular, the summer of 2025 was drier than long-term climatological normals. At the same time, increasing influence of climate change has intensified the frequency and severity of compound climatic extremes, substantially increasing wildfire risk, within climate transition zones. Under these exceptionally hot and dry atmospheric conditions, environmental settings became highly favorable for wildfire ignition and rapid-fire spread, such that even minor physical or anthropogenic disturbances were sufficient to trigger wildfire. This study investigates the relationship between compound climatic extremes and large-scale 2025 wildfires in Sakarya. Meteorological analyses were conducted using long-term daily temperature, relative humidity, wind speed, and precipitation. Heatwave characteristics were evaluated using the HWN, HWDx, and HWMn indices, while drought were assessed using the SPI. In addition, Sentinel-2 images and GEE platform were employed to evaluate post-fire vegetation damage and burn severity through dNDVI, dNDMI, and dNBR indices. The findings reveal that fire days were strongly associated with compound extreme conditions characterized by above-threshold maximum temperatures and low relative humidity. Prolonged drought observed during pre-fire period further intensified fuel dryness and wildfire susceptibility. Remote sensing analyses indicate that substantial reductions in vegetation density, moisture content, and ecosystem functionality within burned areas. In conclusion, satellite-based dNBR analyses indicate that approximately 20,000 hectares of land were affected by the 2025 wildfires in Sakarya. The findings demonstrate that these wildfire events were associated not with a single meteorological factor alone, but rather with the interaction of heatwaves, prolonged drought and compound hot–dry atmospheric processes. These results clearly indicate that climate change has become an increasingly important factor in the occurrence and spread of wildfires, particularly within climate transition zones. The study provides important scientific evidence for improving wildfire early warning systems, strengthening regional climate adaptation policies, and developing sustainable wildfire management strategies under future climate change scenarios."
    - title: "Emergent capabilities for remote coastline and flood mapping with ultra-high-resolution SAR: A case study in American Samoa"
      authors: "Stacey A Huang; Minjeong Jo; Jeanne Sauber; Kelley Anderson Tagarino; Carla Baizeau"
      journal: "Environmental Research Communications"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1088/2515-7620/ae7aff"
      url: "https://doi.org/10.1088/2515-7620/ae7aff"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean colour; bio-optics"
      tags_zh: "ocean colour; bio-optics"
      tags_en: "ocean colour; bio-optics"
      summary: "摘要：新一代超高分辨率合成孔径雷达 (SAR) 卫星展示了以跟踪海岸线变化和改进洪水预报工具以及填补其他 SAR 卫星覆盖范围所需的分辨率所需的分辨率监测海岸线和高潮洪水的能力。我们展示了美属萨摩亚的 Umbra 图像的结果，这些太平洋岛屿面临着由于沉降和海平面上升而导致的洪水和海岸线变化的广泛挑战。美属萨摩亚全年都有浓密的云层，这大大减少了光学图像和高度测量等多种来源的可用遥感数据，凸显了可用 SAR 图像的重要性。在这里，我们展示了来自 Umbra 的有针对性的、可任务的数据如何在潮汐周期的不同点上描绘海岸线，建立海岸线管理基线，以补充其他卫星的图像。此外，Umbra 数据捕获了两个高潮洪水模式的例子，将其与美属萨摩亚海平面上升观测器的预测直接进行比较，结果显示，在一个例子中，预测和观测到的洪水是一致的，而在另一种例子中，两者之间存在差异，这可能与土地覆盖的差异有关。这些结果将用于改进预测工具。数据的缺点包括地理编码准确性方面的几个问题，这些问题限制了某些数据的实用性，并且由于观测的可用性有限，难以定时数据采集以实现快速响应。这些问题可能会随着未来数据的迭代和容量的增加而得到改善，同时也指出了数据潜在的基本局限性。 尽管存在这些缺点，我们在遥感模式传统上具有挑战性的环境中取得的可操作结果表明，超高分辨率 SAR 数据的出现是对当前全球 SAR 图像目录的重要补充，能够填补观测需求的空白。"
      summary_zh: "摘要：新一代超高分辨率合成孔径雷达 (SAR) 卫星展示了以跟踪海岸线变化和改进洪水预报工具以及填补其他 SAR 卫星覆盖范围所需的分辨率所需的分辨率监测海岸线和高潮洪水的能力。我们展示了美属萨摩亚的 Umbra 图像的结果，这些太平洋岛屿面临着由于沉降和海平面上升而导致的洪水和海岸线变化的广泛挑战。美属萨摩亚全年都有浓密的云层，这大大减少了光学图像和高度测量等多种来源的可用遥感数据，凸显了可用 SAR 图像的重要性。在这里，我们展示了来自 Umbra 的有针对性的、可任务的数据如何在潮汐周期的不同点上描绘海岸线，建立海岸线管理基线，以补充其他卫星的图像。此外，Umbra 数据捕获了两个高潮洪水模式的例子，将其与美属萨摩亚海平面上升观测器的预测直接进行比较，结果显示，在一个例子中，预测和观测到的洪水是一致的，而在另一种例子中，两者之间存在差异，这可能与土地覆盖的差异有关。这些结果将用于改进预测工具。数据的缺点包括地理编码准确性方面的几个问题，这些问题限制了某些数据的实用性，并且由于观测的可用性有限，难以定时数据采集以实现快速响应。这些问题可能会随着未来数据的迭代和容量的增加而得到改善，同时也指出了数据潜在的基本局限性。 尽管存在这些缺点，我们在遥感模式传统上具有挑战性的环境中取得的可操作结果表明，超高分辨率 SAR 数据的出现是对当前全球 SAR 图像目录的重要补充，能够填补观测需求的空白。"
      summary_en: "Abstract: A new generation of ultra-high-resolution synthetic aperture radar (SAR) satellites demonstrates the ability to monitor coastlines and high-tide flooding at a resolution needed to track changing shorelines and improve flood forecasting tools as well as fill existing gaps in coverage from other SAR satellites. We showcase results from Umbra imagery in American Samoa, a set of Pacific Islands that confronts extensive challenges in flooding and coastline change due to subsidence and sea level rise. American Samoa has dense cloud cover year-round that significantly reduces usable remote sensing data from many sources such as optical imagery and altimetry measurements, underscoring the importance of usable SAR imagery. Here, we show how targeted, taskable data from Umbra can delineate coastlines at various points in the tidal cycle, establishing a baseline for shoreline management that complements imagery from other satellites. Furthermore, Umbra data captured two examples of high-tide flooding patterns, which were directly compared with forecasts from the American Samoa Sea Level Rise Viewer to show consistent predicted and observed flooding in one case and a divergence between the two in the other, potentially related to differences in land cover. These results will be used to improve forecasting tools. Drawbacks of the data include several issues in geocoding accuracy that limited the utility of some data and difficulty in timing data acquisitions for rapid-response given the limited availability of observations. These issues may improve with future iterations of data and increased capacity over time, and also point to potential fundamental limitations of the data. Despite these drawbacks, our actionable results in a traditionally challenging environment for remote sensing modalities indicate that the advent of ultra-high-resolution SAR data is a crucial addition to the current global catalog of SAR imagery, capable of filling a gap in observation needs."

