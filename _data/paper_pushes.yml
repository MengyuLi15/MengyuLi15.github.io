      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "ocean colour; NPP; climate trend"
      tags_zh: "ocean colour; NPP; climate trend"
      tags_en: "ocean colour; NPP; climate trend"
      summary: "这项研究利用海色时代的长期卫星记录评估全球海洋净初级生产变化。它关注的不是单个区域事件，而是多年尺度上海洋生产力是否出现系统性下降。研究把海色观测中的叶绿素和生产力信号与气候背景联系起来，分析低频趋势和空间差异。结果指向全球海洋净初级生产在海色观测时代存在下降信号。它对评估变暖背景下浮游植物生产力、碳吸收和海洋生态系统变化很重要。"
      summary_zh: "这项研究利用海色时代的长期卫星记录评估全球海洋净初级生产变化。它关注的不是单个区域事件，而是多年尺度上海洋生产力是否出现系统性下降。研究把海色观测中的叶绿素和生产力信号与气候背景联系起来，分析低频趋势和空间差异。结果指向全球海洋净初级生产在海色观测时代存在下降信号。它对评估变暖背景下浮游植物生产力、碳吸收和海洋生态系统变化很重要。"
      summary_en: "This study uses long-term satellite records from the ocean-colour era to evaluate changes in global marine net primary production. It is concerned with multi-year, basin-to-global change rather than a single regional event. The analysis links chlorophyll and productivity signals from ocean colour with climate context, separating broad trends from spatial variability. The results point to a decline in ocean net primary production during the satellite ocean-colour era. It is important for assessing phytoplankton productivity, carbon uptake, and ecosystem change under warming."
    - title: "Marine heatwaves modulate food webs and carbon transport processes"
      authors: "Mariana B. Bif; Colleen T. E. Kellogg; Yibin Huang; Julia Anstett; Sachia Traving; M. Angelica Peña; Steven J. Hallam; Kenneth S. Johnson"
      journal: "Nature Communications"
      published: "2025-10-06"
