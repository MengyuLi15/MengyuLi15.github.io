      tags: "phytoplankton"
      tags_zh: "phytoplankton"
      tags_en: "phytoplankton"
      summary: "摘要：巴厘岛罗威那的海豚已成为重要的海洋旅游景点；然而，旅游活动和不断变化的环境条件给当地居民带来了相当大的压力。本研究旨在利用层次分析法（AHP）、栖息地适宜性指数（HSI）、多变量分析以及均方误差（MSE）和均方根误差（RMSE）评估模型精度评估影响海豚运动路径的环境因素。采用层次分析法为海洋变量分配权重，将海面温度和盐度确定为主导因素。随后使用 HSI 模型根据这些加权变量绘制栖息地适宜性图。多元回归分析得出 R² 值为 0。 872，表明叶绿素-a 浓度、海面温度和洋流显着影响海豚的运动。 HSI 回归模型产生的 MSE 为 4. 74 × 10-5，RMSE 为 0. 0069，表明预测精度良好，但建议进一步细化。这些发现强调了海水温度变化和旅游活动对海豚分布的重大影响。未来的研究应纳入更广泛的空间和时间数据集，包括卫星标记或声学调查等现场数据。此外，建议应用随机森林等非线性统计模型来提高预测准确性。"
      summary_zh: "摘要：巴厘岛罗威那的海豚已成为重要的海洋旅游景点；然而，旅游活动和不断变化的环境条件给当地居民带来了相当大的压力。本研究旨在利用层次分析法（AHP）、栖息地适宜性指数（HSI）、多变量分析以及均方误差（MSE）和均方根误差（RMSE）评估模型精度评估影响海豚运动路径的环境因素。采用层次分析法为海洋变量分配权重，将海面温度和盐度确定为主导因素。随后使用 HSI 模型根据这些加权变量绘制栖息地适宜性图。多元回归分析得出 R² 值为 0。 872，表明叶绿素-a 浓度、海面温度和洋流显着影响海豚的运动。 HSI 回归模型产生的 MSE 为 4. 74 × 10-5，RMSE 为 0. 0069，表明预测精度良好，但建议进一步细化。这些发现强调了海水温度变化和旅游活动对海豚分布的重大影响。未来的研究应纳入更广泛的空间和时间数据集，包括卫星标记或声学调查等现场数据。此外，建议应用随机森林等非线性统计模型来提高预测准确性。"
      summary_en: "Abstract: Dolphins in Lovina, Bali have become a significant marine tourism attraction; however, tourism activities and changing environmental conditions exert considerable pressure on their populations. This study aims to evaluate environmental factors influencing dolphin movement pathways using the Analytic Hierarchy Process (AHP), Habitat Suitability Index (HSI), multivariate analysis, and model accuracy assessment using Mean Squared Error (MSE) and Root Mean Squared Error (RMSE). AHP was employed to assign weights to oceanographic variables, identifying sea surface temperature and salinity as dominant factors. The HSI model was subsequently used to map habitat suitability based on these weighted variables. Multiple regression analysis yielded an R² value of 0.872, indicating that Chlorophyll-a concentration, sea surface temperature, and ocean currents significantly influence dolphin movements. The HSI-regression model produced an MSE of 4.74 × 10-5 and an RMSE of 0.0069, indicating good predictive accuracy, although further refinement is recommended. These findings highlight the substantial influence of sea temperature variability and tourism activities on dolphin distribution. Future research should incorporate broader spatial and temporal datasets, including in situ data such as satellite tagging or acoustic surveys. Additionally, the application of non-linear statistical models such as Random Forest is suggested to enhance predictive accuracy."
    - title: "Physicochemical Characteristics, Photosynthetic Pigmentations and Phytoplankton and Zooplankton Species of Iyagbe, Lagos and Epe Interconnected Lagoons in Lagos State, Nigeria"
