    - title: "The dynamic mesoscale sink and source niches for eukaryotic phytoplankton in a subtropical gyre"
      authors: "Alexandra E. Jones-Kellett; Jesse C. McNichol; Yubin Raut; Jed A. Fuhrman; Michael J. Follows"
      journal: "Proceedings of the National Academy of Sciences"
      published: "2026-06-23"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1073/pnas.2608700123"
      url: "https://doi.org/10.1073/pnas.2608700123"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton; ocean colour; vertical structure"
      tags_zh: "phytoplankton; ocean colour; vertical structure"
      tags_en: "phytoplankton; ocean colour; vertical structure"
      summary: "摘要：通过跟踪遗传样本的水团历史，我们研究了在营养耗尽的亚热带环流中塑造真核浮游植物种群的生物物理动力学，其中蓝细菌具有竞争优势。沿着 2,382 公里的北太平洋横断面，每 46 公里过滤一式三份海水样品，加入基因组内标，并用三结构域引物组进行扩增，以获得绝对 16S 和 18S rRNA 体积基因丰度。每个样本的输运历史是通过卫星遥感速度场中平流中尺度拉格朗日粒子云来模拟的。与之前的实地研究一致，真核浮游植物在涡流内和涡流边缘异常丰富，垂直环流在涡流边缘重新分配营养物质。 在漩涡之外，我们发现真核生物在统计上显着下降，这是横向相干性的函数：最近从多个来源混合的水域支持与漩涡类似的真核生物异常，而真核生物种群则因在连续三个月或更长时间的水域中的隔离而受到抑制。在这些连贯的外部涡流水团中，我们估计依赖于分类群的真核生物种群半衰期为 8 至 17 个月。鉴于采样期间超过 90% 的整个环流由涡流和最近混合的水域组成，这种物理条件相对罕见。 这些来自经验观察的结果证实了这样的理论，即由于蓝藻的竞争压力，真核浮游植物将在大约几年的时间尺度上面临亚热带的排斥，但通过促进机会性生长和扩散的定期干扰而维持少量数量。"
      summary_zh: "摘要：通过跟踪遗传样本的水团历史，我们研究了在营养耗尽的亚热带环流中塑造真核浮游植物种群的生物物理动力学，其中蓝细菌具有竞争优势。沿着 2,382 公里的北太平洋横断面，每 46 公里过滤一式三份海水样品，加入基因组内标，并用三结构域引物组进行扩增，以获得绝对 16S 和 18S rRNA 体积基因丰度。每个样本的输运历史是通过卫星遥感速度场中平流中尺度拉格朗日粒子云来模拟的。与之前的实地研究一致，真核浮游植物在涡流内和涡流边缘异常丰富，垂直环流在涡流边缘重新分配营养物质。 在漩涡之外，我们发现真核生物在统计上显着下降，这是横向相干性的函数：最近从多个来源混合的水域支持与漩涡类似的真核生物异常，而真核生物种群则因在连续三个月或更长时间的水域中的隔离而受到抑制。在这些连贯的外部涡流水团中，我们估计依赖于分类群的真核生物种群半衰期为 8 至 17 个月。鉴于采样期间超过 90% 的整个环流由涡流和最近混合的水域组成，这种物理条件相对罕见。 这些来自经验观察的结果证实了这样的理论，即由于蓝藻的竞争压力，真核浮游植物将在大约几年的时间尺度上面临亚热带的排斥，但通过促进机会性生长和扩散的定期干扰而维持少量数量。"
      summary_en: "Abstract: By tracking the water mass histories of genetic samples, we investigated the biophysical dynamics shaping eukaryotic phytoplankton populations in a nutrient-deplete subtropical gyre, where cyanobacteria have a competitive advantage. Triplicate seawater samples were filtered every ∼ 46 km along a 2,382 km North Pacific transect, spiked with genomic internal standards, and amplified with a three-domain primer set to obtain absolute 16S and 18S rRNA volumetric gene abundances. The transport histories of each sample were simulated by advecting mesoscale Lagrangian particle clouds in satellite remote sensing velocity fields. Consistent with previous field studies, eukaryotic phytoplankton were anomalously abundant within eddies and along eddy-edges, where vertical circulations redistribute nutrients. Outside of eddies, we found a statistically significant decline in eukaryotes as a function of lateral coherence: Waters that recently mixed from multiple origins supported eukaryote anomalies resembling those of eddies, whereas eukaryotic populations were depressed from isolation in waters that were coherent for three or more months. In these coherent outside-eddy water masses, we estimate taxon-dependent eukaryote population half-lives range from 8 to 17 mo. Such physical conditions are relatively rare, given that > 90% of the entire gyre during the sampling campaign was composed of eddies and recently mixed waters. These results derived from empirical observations substantiate the theory that eukaryotic phytoplankton would face exclusion in the subtropics on timescales of ∼ years due to competitive pressure from cyanobacteria, yet are sustained in small numbers by regular disturbances promoting opportunistic growth and dispersal."
    - title: "Global Patterns of Oceanic Nitrogen Fixation Over the Past Two Decades"
      authors: "Deyong Sun; Wenbin Huang; Zixu Ye; Shengqiang Wang; Hailong Zhang"
      journal: "Global Biogeochemical Cycles"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1029/2026gb009279"
      url: "https://doi.org/10.1029/2026gb009279"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：海洋固氮是生物可利用氮的主要外部来源，维持海洋初级生产并调节全球碳循环。然而，由于观测很少，其长期变异性和气候驱动机制仍然受到很少的限制。在这里，我们通过利用原位测量和其他多源数据建立集成机器学习模型，开发了海洋 N 2 固定率的全球高分辨率（0. 25° × 0. 25°）长期（1997-2024）数据集。重建的数据集揭示了明显的空间异质性，升高的速率集中在贫营养的热带和亚热带海洋（30°S–30°N），特别是在北印度洋和西太平洋海洋大陆地区，这些区域的速率经常超过160 μmol N m −2 d −1 。在全球范围内，N 2 固定量显示出微弱但持续的增长趋势（∼2. 8 × 10 -2 μmol N m -2 d -1 个月 -1 )，背景变化微弱，叠加局部热点的增加和减少。盆地尺度分析揭示了异质性趋势，赤道大西洋和北大西洋的增长最为强劲，而北印度洋和南大西洋的下降较弱。气候模式归因表明区域异质性控制，西半球暖池 (WHWP)、北太平洋指数 (NP) 和厄尔尼诺 3. 4 指数 (Niño 3. 4) 成为主要海洋次区域的主要驱动因素。 WHWP 主导大部分北半球盆地和赤道大西洋，Niño 3. 4 主导赤道太平洋，NP 主导南太平洋和南大西洋。 这项研究提供了长期的全球N 2 固定数据集及其对主要气候模式敏感性的定量证据，提高了对气候驱动的海洋氮循环调节的理解。"
      summary_zh: "摘要：海洋固氮是生物可利用氮的主要外部来源，维持海洋初级生产并调节全球碳循环。然而，由于观测很少，其长期变异性和气候驱动机制仍然受到很少的限制。在这里，我们通过利用原位测量和其他多源数据建立集成机器学习模型，开发了海洋 N 2 固定率的全球高分辨率（0. 25° × 0. 25°）长期（1997-2024）数据集。重建的数据集揭示了明显的空间异质性，升高的速率集中在贫营养的热带和亚热带海洋（30°S–30°N），特别是在北印度洋和西太平洋海洋大陆地区，这些区域的速率经常超过160 μmol N m −2 d −1 。在全球范围内，N 2 固定量显示出微弱但持续的增长趋势（∼2. 8 × 10 -2 μmol N m -2 d -1 个月 -1 )，背景变化微弱，叠加局部热点的增加和减少。盆地尺度分析揭示了异质性趋势，赤道大西洋和北大西洋的增长最为强劲，而北印度洋和南大西洋的下降较弱。气候模式归因表明区域异质性控制，西半球暖池 (WHWP)、北太平洋指数 (NP) 和厄尔尼诺 3. 4 指数 (Niño 3. 4) 成为主要海洋次区域的主要驱动因素。 WHWP 主导大部分北半球盆地和赤道大西洋，Niño 3. 4 主导赤道太平洋，NP 主导南太平洋和南大西洋。 这项研究提供了长期的全球N 2 固定数据集及其对主要气候模式敏感性的定量证据，提高了对气候驱动的海洋氮循环调节的理解。"
      summary_en: "Abstract: Oceanic nitrogen fixation is a major external source of bioavailable nitrogen, sustaining marine primary production and regulating the global carbon cycle. However, its long‐term variability and climate‐driven mechanisms remain poorly constrained because observations are sparse. Here, we develop a global, high‐resolution (0.25° × 0.25°), long‐term (1997–2024) data set of marine N 2 fixation rates by establishing an ensemble machine‐learning model with in situ measurements and other multi‐source data. The reconstructed data set reveals pronounced spatial heterogeneity, with elevated rates concentrated in oligotrophic tropical and subtropical oceans (30°S–30°N), particularly in the northern Indian Ocean and the western Pacific‐Maritime Continent region, where rates frequently exceed 160 μmol N m −2 d −1 . Globally, N 2 fixation shows a weak but persistent increasing trend (∼2.8 × 10 −2 μmol N m −2 d −1 month −1 ), with weak background changes superimposed by localized hotspots of increases and decreases. Basin‐scale analysis reveals heterogeneous trends, with the strongest increases in the equatorial Atlantic and North Atlantic, and weak declines in the northern Indian Ocean and South Atlantic. Climate‐mode attribution indicates regionally heterogeneous controls, with Western Hemisphere Warm Pool (WHWP), North Pacific Index (NP), and Niño 3.4 Index (Niño 3.4) emerging as dominant drivers across major oceanic subregions. WHWP dominates most Northern Hemisphere basins and the equatorial Atlantic, Niño 3.4 dominates the equatorial Pacific, and NP dominates the South Pacific and South Atlantic. This study provides a long‐term global N 2 fixation data set and quantitative evidence for its sensitivity to major climate modes, improving understanding of climate‐driven regulation of the oceanic nitrogen cycle."
    - title: "Dissecting mesopelagic particulate organic carbon budgets in the North Atlantic: A mechanistic diagnosis and evaluation of PISCESv2_RC"
      authors: "M. Andrea Orihuela-García; Yohan Ruprich-Robert; Vladimir Lapin; Saskia Loosveldt Tomas; Raffaele Bernardello; Margarida Samsó-Cabré; Pierre-Antoine Bretonnière; Miguel Castrillo; et al."
      journal: "Biogeosciences"
      published: "2026-06-22"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/bg-23-4083-2026"
      url: "https://doi.org/10.5194/bg-23-4083-2026"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "carbon pump; vertical structure"
      tags_zh: "carbon pump; vertical structure"
      tags_en: "carbon pump; vertical structure"
      summary: "摘要：中深层的生物地球化学和物理过程调节海洋内部的长期碳储存。然而，颗粒有机碳（POC）预算的不确定性限制了对生物碳泵及其模型表示的定量理解。在这里，我们分析了 NEMO4–PISCESv2_RC 模型在北大西洋上层 1000 米气候季节周期模拟的 POC 预算，评估模型性能并诊断调节 POC 输出和转移效率的机制。与卫星、Argo 浮标、船载和沉积物收集器数据的比较表明，POC 储量和通量大体上是真实的。 然而，该模型存在系统性偏差，包括（i）中高纬度硅藻过度占优势，（ii）亚热带初级生产过低和上层过度出口之间的补偿，以及（iii）中低纬度中层中层POC库存低估。在模型中，由重力输出和大量碎屑驱动的中层 POC 供应量向极地方向增加，而冬春季混合供应量在副极地地区增加了 37%。高达 60% 的中层 POC 供应被浮游动物拦截，但大部分通过破碎和营养加工被回收为碎屑。这种碎屑环调节颗粒大小、下沉速度和降解路径，并在中高纬度地区季节性增强。导出的 POC 的不稳定性随着纬度的增加而增加，而温度驱动的衰减率则随着纬度的增加而降低。 这些相反的梯度导致中纬度地区中层 POC 通量衰减最大，与峰值生产力一致。小碎屑在模型中起着核心作用，占中层 POC 衰变的 55%，并驱动 1000 m 高度垂直通量的 33%–50%。这些大型模型贡献反映了大量的生物供应和不稳定性的显着垂直下降，共同有利于小型 POC 的中层转移。我们建议将 POC 预算分析作为一种机制框架，用于识别结构偏差并限制生物颗粒碳泵预测中的模型间传播。"
      summary_zh: "摘要：中深层的生物地球化学和物理过程调节海洋内部的长期碳储存。然而，颗粒有机碳（POC）预算的不确定性限制了对生物碳泵及其模型表示的定量理解。在这里，我们分析了 NEMO4–PISCESv2_RC 模型在北大西洋上层 1000 米气候季节周期模拟的 POC 预算，评估模型性能并诊断调节 POC 输出和转移效率的机制。与卫星、Argo 浮标、船载和沉积物收集器数据的比较表明，POC 储量和通量大体上是真实的。 然而，该模型存在系统性偏差，包括（i）中高纬度硅藻过度占优势，（ii）亚热带初级生产过低和上层过度出口之间的补偿，以及（iii）中低纬度中层中层POC库存低估。在模型中，由重力输出和大量碎屑驱动的中层 POC 供应量向极地方向增加，而冬春季混合供应量在副极地地区增加了 37%。高达 60% 的中层 POC 供应被浮游动物拦截，但大部分通过破碎和营养加工被回收为碎屑。这种碎屑环调节颗粒大小、下沉速度和降解路径，并在中高纬度地区季节性增强。导出的 POC 的不稳定性随着纬度的增加而增加，而温度驱动的衰减率则随着纬度的增加而降低。 这些相反的梯度导致中纬度地区中层 POC 通量衰减最大，与峰值生产力一致。小碎屑在模型中起着核心作用，占中层 POC 衰变的 55%，并驱动 1000 m 高度垂直通量的 33%–50%。这些大型模型贡献反映了大量的生物供应和不稳定性的显着垂直下降，共同有利于小型 POC 的中层转移。我们建议将 POC 预算分析作为一种机制框架，用于识别结构偏差并限制生物颗粒碳泵预测中的模型间传播。"
      summary_en: "Abstract: Biogeochemical and physical processes in the mesopelagic layer regulate long-term carbon storage in the ocean interior. However, uncertainties in particulate organic carbon (POC) budgets limit quantitative understanding of the biological carbon pump and its representation in models. Here we analyse POC budgets simulated by the NEMO4–PISCESv2_RC model in the upper 1000 m of the North Atlantic over a climatological seasonal cycle, evaluating model performance and diagnosing the mechanisms that regulate POC export and transfer efficiency. Comparison with satellite, Argo-float, shipboard, and sediment-trap data indicates generally realistic POC stocks and fluxes. However, the model exhibits systematic biases, including (i) excessive diatom dominance at mid–high latitudes, (ii) compensation between too-low primary production and excessive epipelagic export in the subtropics, and (iii) underestimated mesopelagic POC stocks at mid and low latitudes. In the model, the mesopelagic POC supply driven by gravitational export and large detritus increases poleward, while winter–spring mixing supplies an additional 37 % in the subpolar region. Up to 60 % of mesopelagic POC supply is intercepted by zooplankton, yet most is recycled to detritus through fragmentation and trophic processing. This detrital loop modulates particle size, sinking speed, and degradation pathways, and is seasonally reinforced at mid–high latitudes. The lability of exported POC increases with latitude, whereas temperature-driven decay rates decrease with latitude. These opposing gradients result in maximal mesopelagic POC flux attenuation at midlatitudes, coincident with peak productivity. Small detritus plays a central role in the model, accounting for ∼ 55 % of mesopelagic POC decay and driving 33 %–50 % of vertical flux at 1000 m. These large modelled contributions reflect substantial biological supply and a pronounced vertical decline in lability, together favouring mesopelagic transfer of small POC. We propose POC budget analysis as a mechanistic framework for identifying structural biases and constraining inter-model spread in projections of the biological particulate carbon pump."
    - title: "Multi-Indicator Remote Sensing of Water Quality Dynamics Across Contrasting Freshwater Systems in Türkiye: A Sentinel-2 and Landsat-Based Change Detection Framework"
      authors: "Venkataraman Lakshmi; Alperen Kir; Bin Fang"
      journal: "Remote Sensing"
      published: "2026-06-21"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/rs18122048"
      url: "https://doi.org/10.3390/rs18122048"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton; ocean colour; bio-optics"
      tags_zh: "phytoplankton; ocean colour; bio-optics"
      tags_en: "phytoplankton; ocean colour; bio-optics"
      summary: "摘要：本研究提出了一个多指标遥感框架，用于评估基线（2015-2018年）和近期（2023-2025年）期间土耳其埃吉尔迪尔湖、萨潘贾湖、加泰罗尼亚大坝和尤瓦吉克大坝的四个淡水系统的卫星来源的水质相关和营养状态相关的动态。该研究不是提供基于监管或特定用途的水质相关指标的卫星评估，而是评估来自 Sentinel-2 MSI 和 Google Earth Engine 处理的 Landsat 8/9 图像的光学和热可检测地表水指标。使用归一化叶绿素指数 (NDCI)、归一化差值浊度指数 (NDTI) 和地表温度 (LST，应用于水面) 通过周期平均差图 (Δ-mask) 和年际时间序列分析来检测变化模式。 结果揭示了不同的空间和时间动态，与气候、水文和人为驱动因素的相互作用大致一致。在地中海南部系统中，沿岸和流入区的 ΔNDCI 正异常与夏季 LST 的增加有关，埃吉尔迪尔湖表现出统计上显着的 +0 变暖趋势。 170 °C yr−1 (Mann–Kendall τ = 0. 53, p = 0. 029)，谨慎地解释为与区域气候趋势一致的物理上合理的信号，表明热介导的富营养化相关光学风险升高。在马尔马拉系统北部，卫星观测到的模式与人为养分负荷和形态限制密切相关，尽管热条件相对稳定，但与浊度相关的光学增加集中在西部和边缘地区。 由于无法进行并发原位测量，因此采用跨传感器一致性检查和基于文献的基准测试作为替代验证策略。在所有四个系统中，ΔNDCI 正异常系统地集中在浅水边缘和流入区，而 ΔNDTI 模式因系统而异，强调了沿岸动态作为光学可检测水质恶化和营养状态相关变化的早期指标的作用。拟议的框架为数据稀缺环境中的淡水质量监测提供了一种可扩展、具有成本效益的方法，并为土耳其国家水计划（2026-2036）下的综合水资源管理提供直接支持。"
      summary_zh: "摘要：本研究提出了一个多指标遥感框架，用于评估基线（2015-2018年）和近期（2023-2025年）期间土耳其埃吉尔迪尔湖、萨潘贾湖、加泰罗尼亚大坝和尤瓦吉克大坝的四个淡水系统的卫星来源的水质相关和营养状态相关的动态。该研究不是提供基于监管或特定用途的水质相关指标的卫星评估，而是评估来自 Sentinel-2 MSI 和 Google Earth Engine 处理的 Landsat 8/9 图像的光学和热可检测地表水指标。使用归一化叶绿素指数 (NDCI)、归一化差值浊度指数 (NDTI) 和地表温度 (LST，应用于水面) 通过周期平均差图 (Δ-mask) 和年际时间序列分析来检测变化模式。 结果揭示了不同的空间和时间动态，与气候、水文和人为驱动因素的相互作用大致一致。在地中海南部系统中，沿岸和流入区的 ΔNDCI 正异常与夏季 LST 的增加有关，埃吉尔迪尔湖表现出统计上显着的 +0 变暖趋势。 170 °C yr−1 (Mann–Kendall τ = 0. 53, p = 0. 029)，谨慎地解释为与区域气候趋势一致的物理上合理的信号，表明热介导的富营养化相关光学风险升高。在马尔马拉系统北部，卫星观测到的模式与人为养分负荷和形态限制密切相关，尽管热条件相对稳定，但与浊度相关的光学增加集中在西部和边缘地区。 由于无法进行并发原位测量，因此采用跨传感器一致性检查和基于文献的基准测试作为替代验证策略。在所有四个系统中，ΔNDCI 正异常系统地集中在浅水边缘和流入区，而 ΔNDTI 模式因系统而异，强调了沿岸动态作为光学可检测水质恶化和营养状态相关变化的早期指标的作用。拟议的框架为数据稀缺环境中的淡水质量监测提供了一种可扩展、具有成本效益的方法，并为土耳其国家水计划（2026-2036）下的综合水资源管理提供直接支持。"
      summary_en: "Abstract: This study presents a multi-indicator remote sensing framework for assessing satellite-derived water-quality-related and trophic-state-related dynamics across four freshwater systems in Türkiye Egirdir Lake, Sapanca Lake, Catalan Dam, and Yuvacik Dam between the baseline (2015–2018) and recent (2023–2025) periods. Rather than providing a regulatory or use-specific satellite-based assessment of water-quality-related indicators, the study evaluates optically and thermally detectable surface water indicators derived from Sentinel-2 MSI and Landsat 8/9 imagery processed in Google Earth Engine. The Normalized Difference Chlorophyll Index (NDCI), the Normalized Difference Turbidity Index (NDTI), and land surface temperature (LST, applied to water surfaces) were used to detect change patterns through period-mean difference mapping (Δ-mask) and interannual time series analysis. Results reveal distinct spatial and temporal dynamics broadly consistent with the interplay of climatic, hydrological, and anthropogenic drivers. In the southern Mediterranean systems, positive ΔNDCI anomalies in littoral and inflow zones were associated with increasing summer LST, with Egirdir Lake exhibiting a statistically significant warming trend of +0.170 °C yr−1 (Mann–Kendall τ = 0.53, p = 0.029), interpreted cautiously as a physically plausible signal consistent with regional climate trends, suggesting elevated thermally mediated eutrophication-related optical risk. In the northern Marmara systems, satellite-observed patterns were more strongly associated with anthropogenic nutrient loading and morphological constraints, with turbidity-related optical increases concentrated in western and marginal zones despite relatively stable thermal conditions. As concurrent in situ measurements were unavailable, cross-sensor consistency checks and literature-based benchmarking were applied as alternative validation strategies. Across all four systems, positive ΔNDCI anomalies were systematically concentrated in shallow marginal and inflow zones, while ΔNDTI patterns varied by system, underscoring the role of littoral dynamics as early indicators of optically detectable water-quality deterioration and trophic-state-related change. The proposed framework offers a scalable, cost-effective approach for freshwater quality surveillance in data-scarce environments and provides direct support for integrated water resource management under Türkiye’s National Water Plan (2026–2036)."
    - title: "A SMAP-Anchored Sentinel-1 Change Detection Method for 100 m Surface Soil Moisture Mapping with Vegetation-Conditioned Constraints"
      authors: "Yunjia Wang; Hao Sun; Haoyu Pei; Jinhua Gao; Zhenheng Xu; Yuxin Wang; Dan Wu"
      journal: "Remote Sensing"
      published: "2026-06-20"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/rs18122045"
      url: "https://doi.org/10.3390/rs18122045"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "backscattering"
      tags_zh: "backscattering"
      tags_en: "backscattering"
      summary: "摘要：当地水文和农业应用需要高分辨率的表面土壤湿度 (SM)，但 100 m 处的可靠检索仍然具有挑战性。在这个更广泛的方法论背景下，辐射计约束的 SAR 变化检测仍然是高分辨率土壤水分反演的实用且可解释的选择。它使用 SAR 导出的时间变化来描述精细尺度的润湿和干燥过程，而被动微波观测则提供体积湿度参考。本研究提出了一种改进的 SMAP 锚定 Sentinel-1 变化检测框架 (ISSF)，用于 100 m SM 测绘。 ISSF 通过使用非线性二次函数拟合 NDVI 分档的上包络样本以标准化植被相关的反向散射变化范围，并使用多年 SMAP 干/湿分位数将标准化相对湿度缩放为体积 SM 来解决这些限制。 ISSF 使用现场测量、近乎并发的机载参考、基于 SMAP 的产品以及直接传输到 OzNet 进行评估。在山甸河流域，ISSF 在点尺度上实现了 R = 0. 549 和 ubRMSE = 0. 062 m3 m−3。相对于三种基准变化检测方法，ISSF 将 R 提高了 11-53%，并将 ubRMSE 降低了 7-15%。对于机载参考事件，ISSF 显示 R = 0. 635 且 ubRMSE = 0. 027 m3 m−3。在直接转移到 OzNet 的情况下，ISSF 实现了平均 R = 0. 55 和平均 ubRMSE = 0. 05 m3 m−3。 这些结果表明，ISSF 为植被稀疏至中等的半干旱地区 100 m 土壤湿度测绘提供了实用且可解释的方法。"
      summary_zh: "摘要：当地水文和农业应用需要高分辨率的表面土壤湿度 (SM)，但 100 m 处的可靠检索仍然具有挑战性。在这个更广泛的方法论背景下，辐射计约束的 SAR 变化检测仍然是高分辨率土壤水分反演的实用且可解释的选择。它使用 SAR 导出的时间变化来描述精细尺度的润湿和干燥过程，而被动微波观测则提供体积湿度参考。本研究提出了一种改进的 SMAP 锚定 Sentinel-1 变化检测框架 (ISSF)，用于 100 m SM 测绘。 ISSF 通过使用非线性二次函数拟合 NDVI 分档的上包络样本以标准化植被相关的反向散射变化范围，并使用多年 SMAP 干/湿分位数将标准化相对湿度缩放为体积 SM 来解决这些限制。 ISSF 使用现场测量、近乎并发的机载参考、基于 SMAP 的产品以及直接传输到 OzNet 进行评估。在山甸河流域，ISSF 在点尺度上实现了 R = 0. 549 和 ubRMSE = 0. 062 m3 m−3。相对于三种基准变化检测方法，ISSF 将 R 提高了 11-53%，并将 ubRMSE 降低了 7-15%。对于机载参考事件，ISSF 显示 R = 0. 635 且 ubRMSE = 0. 027 m3 m−3。在直接转移到 OzNet 的情况下，ISSF 实现了平均 R = 0. 55 和平均 ubRMSE = 0. 05 m3 m−3。 这些结果表明，ISSF 为植被稀疏至中等的半干旱地区 100 m 土壤湿度测绘提供了实用且可解释的方法。"
      summary_en: "Abstract: High-resolution surface soil moisture (SM) is needed for local hydrological and agricultural applications, but reliable retrieval at 100 m remains challenging. Within this broader methodological context, radiometer-constrained SAR change detection remains a practical and interpretable option for high-resolution soil moisture retrieval. It uses SAR-derived temporal changes to describe fine-scale wetting and drying processes, while passive microwave observations provide volumetric moisture references. This study proposes an improved SMAP-anchored Sentinel-1 change-detection framework (ISSF) for 100 m SM mapping. ISSF addresses these limitations by fitting NDVI-binned upper-envelope samples with a nonlinear quadratic function to normalize the vegetation-dependent backscatter-change range and by using multi-year SMAP dry/wet quantiles to scale the normalized relative wetness into volumetric SM. ISSF was evaluated using in situ measurements, a near-concurrent airborne reference, SMAP-based products, and direct transfer to OzNet. In the Shandian River Basin, ISSF achieved R = 0.549 and ubRMSE = 0.062 m3 m−3 at the point scale. Relative to three benchmark change-detection methods, ISSF increased R by 11–53% and reduced ubRMSE by 7–15%. For the airborne-referenced event, ISSF showed R = 0.635 and ubRMSE = 0.027 m3 m−3. Under direct transfer to OzNet, ISSF achieved mean R = 0.55 and mean ubRMSE = 0.05 m3 m−3. These results indicate that ISSF provides a practical and interpretable approach for 100 m soil moisture mapping in semi-arid regions with sparse to moderate vegetation."
    - title: "Investigating the predictability of marine heatwaves at subseasonal to seasonal timescales in New Caledonia, South Pacific"
      authors: "Inès Mangolte; Sophie Cravatte; Alexandre Ganachaud; Christophe Menkes"
      journal: "Ocean Science"
      published: "2026-06-23"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/os-22-1937-2026"
      url: "https://doi.org/10.5194/os-22-1937-2026"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "marine heatwaves"
      tags_zh: "marine heatwaves"
      tags_en: "marine heatwaves"
      summary: "摘要：海洋热浪 (MHW) 已成为海洋生态系统最重要的威胁之一，造成珊瑚白化、鱼类大量死亡和流动动物群流离失所等影响。在气候变化的背景下，迫切需要制定次季节到季节性预测等战略，以帮助人类社会适应和应对这些事件日益频繁、持续时间和强度的情况。在这里，我们使用动态耦合海洋大气模型的集合预报，评估了南太平洋岛国新喀里多尼亚规模的MHW的可预测性。我们证明，采用从集合中的分散中提取信息的概率方法比仅计算集合平均值的确定性方法具有更高的技能。 我们发现，较长、较强烈和较宽的 MHW 比较弱、较弱和较短的 MHW 更容易预测。我们还发现，最长、最宽的 MHW 发生在寒冷季节（6 月至 10 月）强烈的拉尼娜事件期间，并且可以提前 7 个月成功预测。相比之下，在暖季发生的 MHW 提前几周的可预测性较差或无法预测。我们讨论如何在预测的有用性和可用性方面将这些信息有效地传递给海洋利益相关者。我们建议未来的研究应侧重于确定不同类型 MHW 的驱动因素，以了解其可预测性的来源。"
      summary_zh: "摘要：海洋热浪 (MHW) 已成为海洋生态系统最重要的威胁之一，造成珊瑚白化、鱼类大量死亡和流动动物群流离失所等影响。在气候变化的背景下，迫切需要制定次季节到季节性预测等战略，以帮助人类社会适应和应对这些事件日益频繁、持续时间和强度的情况。在这里，我们使用动态耦合海洋大气模型的集合预报，评估了南太平洋岛国新喀里多尼亚规模的MHW的可预测性。我们证明，采用从集合中的分散中提取信息的概率方法比仅计算集合平均值的确定性方法具有更高的技能。 我们发现，较长、较强烈和较宽的 MHW 比较弱、较弱和较短的 MHW 更容易预测。我们还发现，最长、最宽的 MHW 发生在寒冷季节（6 月至 10 月）强烈的拉尼娜事件期间，并且可以提前 7 个月成功预测。相比之下，在暖季发生的 MHW 提前几周的可预测性较差或无法预测。我们讨论如何在预测的有用性和可用性方面将这些信息有效地传递给海洋利益相关者。我们建议未来的研究应侧重于确定不同类型 MHW 的驱动因素，以了解其可预测性的来源。"
      summary_en: "Abstract: Marine Heatwaves (MHWs) have emerged as one of the most important threat for marine ecosystems, with impacts such as coral bleaching, massive fish mortality and displacement of mobile fauna. In the context of climate change, it is urgent to develop strategies such as subseasonal to seasonal forecasting to help human societies adapt and react to the increasing frequency, duration and intensity of these events. Here we evaluate the predictability of MHWs at the scale of a South Pacific island country, New Caledonia, using ensemble forecasts from a dynamical coupled ocean-atmosphere model. We show that implementing a probabilistic approach where we extract information from the dispersion in the ensemble results in a higher skill than a deterministic approach where we simply compute the ensemble average. We find that longer, more intense, and wider MHWs, are more predictable than weaker, less intense, and shorter MHWs. We also find that the longest and widest MHWs occur in the cold season (June–October) during strong La Niña episodes, and that they can successfully be predicted up to 7 months in advance. In contrast, MHWs occurring during the warm season have poor or no predictability of more than a few weeks in advance. We discuss how this information can be efficiently transferred to marine stakeholders in terms of the usefulness and useability of the forecast. We recommend that future research should focus on identifying the drivers of different types of MHWs in order to understand their sources of predictability."
    - title: "Vertical Distribution of Chl-a in Relation to Environmental Factors and Water Column Stratification in the Downstream Section of the Air Bengkulu River"
