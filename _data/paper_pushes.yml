    - title: "Six Decades (1965–2025) of Phytoplankton Absorption Research: A Bibliometric and Systematic Review with Insights from the Past Decade"
      authors: "Mohammad Ashphaq; Shovonlal Roy"
      journal: "Remote Sensing"
      published: "2026-06-22"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/rs18122059"
      url: "https://doi.org/10.3390/rs18122059"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
