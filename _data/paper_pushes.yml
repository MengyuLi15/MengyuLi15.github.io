      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "marine heatwaves; phytoplankton communities; Southern Ocean"
      tags_zh: "marine heatwaves; phytoplankton communities; Southern Ocean"
      tags_en: "marine heatwaves; phytoplankton communities; Southern Ocean"
      summary: "这项研究分析 2020 年夏季海洋热浪开始时 Drake Passage 和南极半岛浮游植物群落的响应。它利用现场群落和环境资料，把热浪物理异常与浮游植物组成变化联系起来。研究关注不同类群在热浪初期是否出现替代、增强或衰退。结果显示，群落结构会在热浪发展早期发生可检测变化。它对理解南大洋热浪生态效应、群落功能变化和区域碳循环响应很有帮助。"
      summary_zh: "这项研究分析 2020 年夏季海洋热浪开始时 Drake Passage 和南极半岛浮游植物群落的响应。它利用现场群落和环境资料，把热浪物理异常与浮游植物组成变化联系起来。研究关注不同类群在热浪初期是否出现替代、增强或衰退。结果显示，群落结构会在热浪发展早期发生可检测变化。它对理解南大洋热浪生态效应、群落功能变化和区域碳循环响应很有帮助。"
      summary_en: "This study analyses phytoplankton community responses at the onset of the 2020 summer marine heatwave in the Drake Passage and Antarctic Peninsula. It uses field community and environmental information to connect physical heatwave anomalies with changes in phytoplankton composition. The work asks whether different groups are replaced, enhanced, or reduced during the early stage of the event. The results show detectable community-structure shifts as the heatwave develops. It is useful for understanding Southern Ocean heatwave ecology, functional community change, and regional carbon-cycle responses."
    - title: "Lifting the lid on Marine Heatwaves"
      authors: "Neil Malan; Alex Sen Gupta; Amandine Schaeffer; Shujing Zhang; Martina A. Doblin; Gabriela Semolini Pilo; Andrew E. Kiss; Jason D. Everett; et al."
      journal: "Progress in Oceanography"
      published: "2025"
      published_month: "2025-12"
      published_month_zh: "2025-12"
      doi: "10.1016/j.pocean.2025.103539"
      url: "https://doi.org/10.1016/j.pocean.2025.103539"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "marine heatwaves; subsurface warming; vertical structure"
      tags_zh: "marine heatwaves; subsurface warming; vertical structure"
      tags_en: "marine heatwaves; subsurface warming; vertical structure"
      summary: "这篇综述强调海洋热浪并不只是表层温度事件。它整合关于次表层升温、垂向结构和生态响应的研究，提醒热浪影响可能延伸到观测较少的深度层。文章关注热异常如何在水柱中传播，并影响营养盐、浮游植物和食物网过程。结果是一个更立体的海洋热浪理解框架。它对设计 BGC-Argo 观测、评估生态风险和解释垂向生物地球化学响应很有帮助。"
      summary_zh: "这篇综述强调海洋热浪并不只是表层温度事件。它整合关于次表层升温、垂向结构和生态响应的研究，提醒热浪影响可能延伸到观测较少的深度层。文章关注热异常如何在水柱中传播，并影响营养盐、浮游植物和食物网过程。结果是一个更立体的海洋热浪理解框架。它对设计 BGC-Argo 观测、评估生态风险和解释垂向生物地球化学响应很有帮助。"
      summary_en: "This review emphasizes that marine heatwaves are not only surface temperature events. It synthesizes work on subsurface warming, vertical structure, and ecological responses, showing that heatwave impacts can extend into under-observed depth layers. The paper focuses on how heat anomalies propagate through the water column and affect nutrients, phytoplankton, and food-web processes. The result is a more three-dimensional framework for understanding marine heatwaves. It is useful for designing BGC-Argo observations, assessing ecological risk, and interpreting vertical biogeochemical responses."
    - title: "Climate variability induces changes in phytoplankton phenology across Spanish marine ecoregions"
      authors: "Manuel Fernández-Barba; Pablo Almaraz; I. Emma Huertas; Gabriel Navarro"
      journal: "Progress in Oceanography"
