      summary_en: "This paper uses a cellular allocation model to assess how warming changes phytoplankton protein, carbohydrate and lipid composition. It suggests lower protein fractions in high-latitude and polar systems and changing organic matter quality, which matters for food webs and carbon-export stoichiometry."
