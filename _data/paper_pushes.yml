      tags_zh: "phytoplankton; ocean colour; ocean optics; absorption; bio-optics"
      tags_en: "phytoplankton; ocean colour; ocean optics; absorption; bio-optics"
      summary: "摘要：浮游植物是水生生态系统中的初级生产者，其色素、细胞大小和生理状态影响它们吸收光和固定碳的方式。可见光谱中的浮游植物吸收系数 (ɑph(λ)) 是决定海洋环境中浮游植物与光相互作用的基本细胞光学特性。这一特性将生物过程与海洋颜色遥感反射率 (Rrs) 联系起来，从而能够使用海洋颜色卫星评估海洋中的环境和生物地球化学条件。本研究对 ɑph(λ) 研究的 6 个十年（1965 年至 2025 年）进行了多阶段系统回顾，重点综合了过去十年的进展。文献计量分析实证检验了该领域的研究发展及其六十年来的主题趋同与方法论分歧。 聚类分析用于汇编有影响力的研究主题以及新兴趋势，以确定系统评价的范围和设计。对过去十年（2015-2025）的研究进行了重点系统回顾，以确定概念和理论进展、主要观测和算法改进以及持续的挑战。数据分析强调了各种研究所达到的准确性、算法应用的复杂性以及以产品为中心的开发。所确定的持续挑战包括解决光学简并性、垂直结构采集和操作使用的缩放方法。本综述总结了 ɑph(λ) 作为下一代海洋颜色科学、生物地球化学建模和气候相关生态系统监测的关键参数的中心地位。"
      summary_zh: "摘要：浮游植物是水生生态系统中的初级生产者，其色素、细胞大小和生理状态影响它们吸收光和固定碳的方式。可见光谱中的浮游植物吸收系数 (ɑph(λ)) 是决定海洋环境中浮游植物与光相互作用的基本细胞光学特性。这一特性将生物过程与海洋颜色遥感反射率 (Rrs) 联系起来，从而能够使用海洋颜色卫星评估海洋中的环境和生物地球化学条件。本研究对 ɑph(λ) 研究的 6 个十年（1965 年至 2025 年）进行了多阶段系统回顾，重点综合了过去十年的进展。文献计量分析实证检验了该领域的研究发展及其六十年来的主题趋同与方法论分歧。 聚类分析用于汇编有影响力的研究主题以及新兴趋势，以确定系统评价的范围和设计。对过去十年（2015-2025）的研究进行了重点系统回顾，以确定概念和理论进展、主要观测和算法改进以及持续的挑战。数据分析强调了各种研究所达到的准确性、算法应用的复杂性以及以产品为中心的开发。所确定的持续挑战包括解决光学简并性、垂直结构采集和操作使用的缩放方法。本综述总结了 ɑph(λ) 作为下一代海洋颜色科学、生物地球化学建模和气候相关生态系统监测的关键参数的中心地位。"
      summary_en: "Abstract: Phytoplankton are primary producers in the aquatic ecosystems whose pigments, cell size, and physiological state affect how they absorb light and fix carbon. The phytoplankton absorption coefficient (ɑph(λ)) in the visible spectrum is a fundamental cellular optical property that determines phytoplankton–light interactions in the marine environment. This property links biological processes to ocean color remote sensing reflectance (Rrs), enabling an assessment of environmental and biogeochemical conditions in the ocean using ocean color satellites. This study presents a multi-stage systematic review of six decades (1965–2025) of ɑph(λ) research, with a focused synthesis of developments in the past decade. A bibliometric analysis empirically examines the research growth of the field and its thematic convergence into methodological divergence across six decades. Cluster analysis was used to compile influential research topics as well as emerging trends, to determine the scope and design of the systematic review. A focused systematic review of studies in the past decade (2015–2025) has been carried out to identify conceptual and theoretical advances, major observational and algorithmic improvements, and ongoing challenges. The data analyses highlight the accuracy achieved by various studies, the complexity of applications of algorithms, and product-focused developments. The ongoing challenges identified include resolving optical degeneracy, vertical structure acquisition, and scaling methods for operational use. This review concludes the centrality of ɑph(λ) as a key parameter to next-generation ocean color science, biogeochemical modeling, and climate-related ecosystem monitoring."
