      summary: "摘要：海洋和大气环境变量的准确预测对于气候适应、生态系统管理和运营决策非常重要，但从业者仍然缺乏关于哪些机器学习模型在异构环境任务中可靠的明确指导。因此，我们针对九个数据集制定了统一的泄漏感知基准，其中七个数据集通过了建模质量检查，涵盖叶绿素-a、风速、水文观测、生物毒素和测深，并在通用评估框架下比较了代表性的线性模型、基于树的模型和序列模型。结果显示任务和模型类别之间存在很强的异质性：树集成是表格问题的稳健基线，当时间结构为中心时，基于 LSTM 的循环序列建模最有用，预测技能更多地依赖于目标结构和协变量质量，而不是仅仅依赖于模型复杂性。在该基准所代表的观测环境中（主要是中国沿海/河口和区域海洋数据集，加上一项大气再分析风任务和一项全球铸件档案），质量控制的叶绿素-a 相对可预测，而事件驱动的生物毒素和测深反演在当前预测因素下仍然很困难。这些发现为在类似数据体系中工作的研究人员和环境监测从业人员提供了实用指导，但不应假设它们会在未经进一步验证的情况下自动转移到未经测试的地区，例如北大西洋、地中海或热带公海系统。"
      summary_zh: "摘要：海洋和大气环境变量的准确预测对于气候适应、生态系统管理和运营决策非常重要，但从业者仍然缺乏关于哪些机器学习模型在异构环境任务中可靠的明确指导。因此，我们针对九个数据集制定了统一的泄漏感知基准，其中七个数据集通过了建模质量检查，涵盖叶绿素-a、风速、水文观测、生物毒素和测深，并在通用评估框架下比较了代表性的线性模型、基于树的模型和序列模型。结果显示任务和模型类别之间存在很强的异质性：树集成是表格问题的稳健基线，当时间结构为中心时，基于 LSTM 的循环序列建模最有用，预测技能更多地依赖于目标结构和协变量质量，而不是仅仅依赖于模型复杂性。在该基准所代表的观测环境中（主要是中国沿海/河口和区域海洋数据集，加上一项大气再分析风任务和一项全球铸件档案），质量控制的叶绿素-a 相对可预测，而事件驱动的生物毒素和测深反演在当前预测因素下仍然很困难。这些发现为在类似数据体系中工作的研究人员和环境监测从业人员提供了实用指导，但不应假设它们会在未经进一步验证的情况下自动转移到未经测试的地区，例如北大西洋、地中海或热带公海系统。"
      summary_en: "Abstract: Accurate prediction of marine and atmospheric environmental variables is important for climate adaptation, ecosystem management, and operational decision-making, yet practitioners still lack clear guidance on which machine-learning models are reliable across heterogeneous environmental tasks. We therefore developed a unified, leakage-aware benchmark across nine datasets, of which seven passed quality checks for modeling, spanning chlorophyll-a, wind speed, hydrographic observations, biotoxins, and bathymetry, and compared representative linear, tree-based, and sequence models under a common evaluation framework. Results show strong heterogeneity across tasks and model classes: tree ensembles are robust baselines for tabular problems, LSTM-based recurrent sequence modeling is most useful when temporal structure is central, and predictive skill depends more on target structure and covariate quality than on model complexity alone. Within the observational settings represented in this benchmark—predominantly Chinese coastal/estuarine and regional marine datasets, plus one atmospheric reanalysis wind task and one global cast archive—quality-controlled chlorophyll-a is comparatively predictable, whereas event-driven biotoxins and bathymetry inversion remain difficult under the current predictors. These findings provide practical guidance for researchers and environmental monitoring practitioners working in similar data regimes, but they should not be assumed to transfer automatically to untested regions such as the North Atlantic, the Mediterranean, or tropical open-ocean systems without further validation."
    - title: "ZJU–SCATT–V1.0: A Comprehensive Single–Scattering Database of Non–spherical Aerosol and Cloud Particles"
