      tags: "BGC-Argo; data system; sensors; methods"
      tags_zh: "BGC-Argo; data system; sensors; methods"
      tags_en: "BGC-Argo; data system; sensors; methods"
      summary: "这篇数据论文介绍 BGC-Argo+ 全球生物地球化学浮标数据产品。它在原始浮标观测基础上加入二级质量控制和衍生参数，使不同区域和不同传感器之间的数据更可比。研究重点是提供更可靠的氧气、硝酸盐、叶绿素、颗粒和相关变量集合。结果是一个可直接用于分析和模型验证的全球 BGC-Argo 数据系统。它对长期趋势分析、算法开发和跨平台数据融合很重要。"
      summary_zh: "这篇数据论文介绍 BGC-Argo+ 全球生物地球化学浮标数据产品。它在原始浮标观测基础上加入二级质量控制和衍生参数，使不同区域和不同传感器之间的数据更可比。研究重点是提供更可靠的氧气、硝酸盐、叶绿素、颗粒和相关变量集合。结果是一个可直接用于分析和模型验证的全球 BGC-Argo 数据系统。它对长期趋势分析、算法开发和跨平台数据融合很重要。"
      summary_en: "This data paper presents BGC-Argo+, a global biogeochemical Argo float data product. It adds secondary quality control and derived parameters to raw float observations, improving comparability across regions and sensors. The work provides a more reliable collection of variables such as oxygen, nitrate, chlorophyll, particles, and related diagnostics. The result is a global BGC-Argo data system that can be used directly for analysis and model validation. It is important for long-term trend studies, algorithm development, and cross-platform data integration."
    - title: "Decadal and spatially complete global surface chlorophyll-a data record from satellite and BGC-Argo observations"
      authors: "Daniel J. Ford; Gemma Kulk; Shubha Sathyendranath; Jamie D. Shutler"
