      summary: "摘要：准确的辐射校准对于海洋颜色卫星传感器的各种应用至关重要。然而，在卫星进入轨道后使用地面源跟踪传感器的辐射性能以及有效评估星载校准系统的准确性具有挑战性。本研究尝试使用气溶胶机器人网络 (AERONET-OC) 数据的海洋颜色组件来执行海洋颜色卫星传感器的替代校准 (VC)。通过对现场 AERONET-OC 数据的严格分析，满足预定义稳定性阈值的几个现场测量被确定为具有用于 VC 的潜力。然后，通过机器学习模型将现场多光谱数据转换为高光谱数据，并用于中分辨率成像光谱辐射计（MODIS）-Aqua和中国海洋颜色和温度扫描仪（COCTS）-海洋（HY）-1D的VC。这些结果与各自的机载校准进行了比较。对于 MODIS-Aqua，结果被分为单独的 6 个月周期，并显示 2020 年至 2022 年的 6 个周期内不同 AERONET-OC 站点平均有 38 个有效匹配。此外，以 412 nm 为例，使用 AERONET-OC 测量估计的大气层顶部 (TOA) 辐射率落在 4–12 mW/cm 2 /μm/sr 的范围内，这显示与全球水域的范围存在广泛重叠（3）。研究结果证实，当使用来自不同地区的多个 AERONET-OC 站点的数据进行海洋颜色卫星传感器的 VC 时，可以产生一致的结果，并能够在广泛的动态范围内准确表征传感器的性能。这为在发射的早期阶段评估传感器性能提供了可靠的基础。"
      summary_zh: "摘要：准确的辐射校准对于海洋颜色卫星传感器的各种应用至关重要。然而，在卫星进入轨道后使用地面源跟踪传感器的辐射性能以及有效评估星载校准系统的准确性具有挑战性。本研究尝试使用气溶胶机器人网络 (AERONET-OC) 数据的海洋颜色组件来执行海洋颜色卫星传感器的替代校准 (VC)。通过对现场 AERONET-OC 数据的严格分析，满足预定义稳定性阈值的几个现场测量被确定为具有用于 VC 的潜力。然后，通过机器学习模型将现场多光谱数据转换为高光谱数据，并用于中分辨率成像光谱辐射计（MODIS）-Aqua和中国海洋颜色和温度扫描仪（COCTS）-海洋（HY）-1D的VC。这些结果与各自的机载校准进行了比较。对于 MODIS-Aqua，结果被分为单独的 6 个月周期，并显示 2020 年至 2022 年的 6 个周期内不同 AERONET-OC 站点平均有 38 个有效匹配。此外，以 412 nm 为例，使用 AERONET-OC 测量估计的大气层顶部 (TOA) 辐射率落在 4–12 mW/cm 2 /μm/sr 的范围内，这显示与全球水域的范围存在广泛重叠（3）。研究结果证实，当使用来自不同地区的多个 AERONET-OC 站点的数据进行海洋颜色卫星传感器的 VC 时，可以产生一致的结果，并能够在广泛的动态范围内准确表征传感器的性能。这为在发射的早期阶段评估传感器性能提供了可靠的基础。"
      summary_en: "Abstract: Accurate radiometric calibration is crucial for various applications of ocean color satellite sensors. However, tracking the radiometric performance of sensors after satellites enter orbit using ground-based sources is challenging, as well as effectively evaluating the accuracy of onboard calibration systems. This study attempted to use the Ocean Color component of the Aerosol Robotic Network (AERONET-OC) data to perform vicarious calibration (VC) of ocean color satellite sensors. Through rigorous analysis of in situ AERONET-OC data, several field measurements that meet the predefined stability thresholds were identified as having the potential to be used for VC. Then, the field multispectral data are converted into hyperspectral data by machine learning models and employed for VC of the Moderate Resolution Imaging Spectroradiometer (MODIS)-Aqua and the Chinese Ocean Color and Temperature Scanner (COCTS) -HaiYang (HY)-1D. These results were compared with their respective onboard calibration. For MODIS-Aqua, the results were grouped into separate 6-month cycles and showed an average of 38 valid matchups for different AERONET-OC sites over six cycles from 2020 to 2022. Additionally, taking 412 nm as an example, the top-of-atmosphere (TOA) radiances estimated using AERONET-OC measurements, fell within the range of 4–12 mW/cm 2 /μm/sr, which shows a wide overlap with the range for global waters (3.5–14 mW/cm 2 /μm/sr). The findings confirm that VC of ocean color satellite sensors, when conducted using data from multiple AERONET-OC sites across different regions, yields consistent results and enables accurate characterization of sensor performance across a wide dynamic range. This offers a reliable basis for assessing sensor performance in the early stages of launch."
    - title: "Impact Study of Assimilating Fengyun-3 GNSS-R Ocean Surface Winds in the Weather Research and Forecasting Model: Sensitivity Analysis on Observation Error Specifications"
