    - title: "Biochemical remodelling of phytoplankton cell composition under climate change"
      authors: "Shlomit Sharoni; Keisuke Inomura; Stephanie Dutkiewicz; Oliver Jahn; Zoe V. Finkel; Andrew Irwin; Mohammad M. Amirian; Erwan Monier; et al."
      journal: "Nature Climate Change"
