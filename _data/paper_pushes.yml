      tags: "carbon pump; phytoplankton; ocean colour; ocean optics; backscattering"
      tags_zh: "carbon pump; phytoplankton; ocean colour; ocean optics; backscattering"
      tags_en: "carbon pump; phytoplankton; ocean colour; ocean optics; backscattering"
      summary: "摘要：卫星海洋颜色观测提供了两个代理来估计浮游植物碳浓度 Cphyto，然后用作量化生长率和初级生产力模型的输入，即浮游植物叶绿素 a 浓度 Chl a 和颗粒后向散射系数 bbp。浮游植物群落组成、生理状态、色素组合和非藻类物质的贡献的变化都在这些代理和 Cphyto 之间的关系中相互作用，因此它们之间不存在普遍存在的关系。因此，尚不清楚 Chl a 或 bbp 中哪一个最适合量化 Cphyto，或者它们是否都适合，但各自处于特定的营养条件下，特别是对于低生产率的寡营养水域。 在这里，我们使用来自东印度洋的数据集，其中包括浮游植物色素和细胞计数、颗粒有机碳 (POC) 和固有光学特性 (IOP)，对源自叶绿素 a 或 bbp 或细胞计数与异速生长关系相结合的 Cphyto 进行比较评估。当包括所有深度至 150 m 的样本时，我们发现三个 Cphyto 估计值与 IOP、Chl a 或 POC 之间存在显着相关性 (r2>∼0.5–0.6)。当仅包括顶部 25 m 时（适合海洋颜色遥感），除了细胞计数法衍生的 Cphyto 与 Chl 和 POC 之间之外，没有发现显着的关系。 bbp 测量范围太窄，无法最终评估在这种寡营养环境中从 bbp 衍生 Cphyto 的性能。 这些结果凸显了每种方法的局限性，并强调在将其应用于卫星海洋颜色观测之前需要仔细审查。"
      summary_zh: "摘要：卫星海洋颜色观测提供了两个代理来估计浮游植物碳浓度 Cphyto，然后用作量化生长率和初级生产力模型的输入，即浮游植物叶绿素 a 浓度 Chl a 和颗粒后向散射系数 bbp。浮游植物群落组成、生理状态、色素组合和非藻类物质的贡献的变化都在这些代理和 Cphyto 之间的关系中相互作用，因此它们之间不存在普遍存在的关系。因此，尚不清楚 Chl a 或 bbp 中哪一个最适合量化 Cphyto，或者它们是否都适合，但各自处于特定的营养条件下，特别是对于低生产率的寡营养水域。 在这里，我们使用来自东印度洋的数据集，其中包括浮游植物色素和细胞计数、颗粒有机碳 (POC) 和固有光学特性 (IOP)，对源自叶绿素 a 或 bbp 或细胞计数与异速生长关系相结合的 Cphyto 进行比较评估。当包括所有深度至 150 m 的样本时，我们发现三个 Cphyto 估计值与 IOP、Chl a 或 POC 之间存在显着相关性 (r2>∼0.5–0.6)。当仅包括顶部 25 m 时（适合海洋颜色遥感），除了细胞计数法衍生的 Cphyto 与 Chl 和 POC 之间之外，没有发现显着的关系。 bbp 测量范围太窄，无法最终评估在这种寡营养环境中从 bbp 衍生 Cphyto 的性能。 这些结果凸显了每种方法的局限性，并强调在将其应用于卫星海洋颜色观测之前需要仔细审查。"
      summary_en: "Abstract: Satellite ocean color observations provide two proxies to estimate the phytoplankton carbon concentration, Cphyto, then used as input to models quantifying growth rates and primary production, namely the phytoplankton chlorophyll a concentration, Chl a, and the particulate backscattering coefficient, bbp. Variability in phytoplankton community composition, physiological status, pigment assemblages and contribution of non-algal material all interplay in the relation between these proxies and Cphyto, so that no ubiquitous relationship exists between them. It is accordingly still unclear which of Chl a or bbp is best suited to quantify Cphyto or whether they both are, yet each in specific trophic conditions, especially for low-productivity oligotrophic waters. Here we use a dataset from the eastern Indian Ocean that includes phytoplankton pigments and cell counts, particulate organic carbon (POC) and inherent optical properties (IOPs) to perform a comparative assessment of Cphyto derived from either Chl a or bbp or cell counts combined with allometric relationships. We found significant correlations (r2>∼0.5–0.6) between the three Cphyto estimates and IOPs, Chl a or POC when samples from all depths down to 150 m are included. When only the top 25 m are included (amenable to ocean color remote sensing), no significant relationships were found, except between the cytometry-derived Cphyto and both Chl and POC. The range of bbp measurements was too narrow to conclusively assess the performance of deriving Cphyto from bbp in such an oligotrophic environment. These results highlight the limitations of each method and emphasize the need for careful review before applying them to satellite ocean color observations."
    - title: "Eddy-induced chlorophyll variability in the Norwegian Sea revealed by Bio-Argo observations"
      authors: "Nikita Sandalyuk; Eduard Khachatrian"
      journal: "Frontiers in Marine Science"
      published: "2026-04-23"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.3389/fmars.2026.1677822"
      url: "https://doi.org/10.3389/fmars.2026.1677822"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton; vertical structure"
      tags_zh: "phytoplankton; vertical structure"
      tags_en: "phytoplankton; vertical structure"
      summary: "摘要：中尺度涡流在塑造海洋生物地球化学过程中发挥着至关重要的作用，特别是影响海洋系统中叶绿素（Chl）的分布。了解涡流如何影响叶绿素分布对于评估区域生产力至关重要。本研究重点关注挪威海地区，该地区具有高强度的中尺度涡流活动和复杂的动力过程。为了研究涡流对感兴趣区域叶绿素分布的影响，我们采用了一种将测高数据与 Bio-Argo 剖面相结合的共定位方法，使我们能够推导出气旋 (CE) 和反气旋 (AE) 涡流的复合叶绿素结构。 我们的研究提供了对涡流引起的叶绿素分布的地下 2D 和 3D 模式的见解，表明 CE 和 AE 都可以提高挪威海的叶绿素浓度，而 AE 会在夏季推动更大的叶绿素升高。我们的分析表明，两种涡流类型都与地下叶绿素正异常相关，达到 0. 5–0. 7 mg/m³，最强信号局限于上部 50 m。虽然 CE 在 25 m 深度附近表现出峰值异常，但 AE 显示出更复杂的偶极子结构，最大值位于 20-50 m 深度层内的核心和外围。获得的结果还表明罗弗敦涡内叶绿素的浓度非常高。鉴于该地区中尺度涡流的普遍存在，这些发现表明它们在挪威海的生物地球化学动力学中发挥着至关重要的作用。"
      summary_zh: "摘要：中尺度涡流在塑造海洋生物地球化学过程中发挥着至关重要的作用，特别是影响海洋系统中叶绿素（Chl）的分布。了解涡流如何影响叶绿素分布对于评估区域生产力至关重要。本研究重点关注挪威海地区，该地区具有高强度的中尺度涡流活动和复杂的动力过程。为了研究涡流对感兴趣区域叶绿素分布的影响，我们采用了一种将测高数据与 Bio-Argo 剖面相结合的共定位方法，使我们能够推导出气旋 (CE) 和反气旋 (AE) 涡流的复合叶绿素结构。 我们的研究提供了对涡流引起的叶绿素分布的地下 2D 和 3D 模式的见解，表明 CE 和 AE 都可以提高挪威海的叶绿素浓度，而 AE 会在夏季推动更大的叶绿素升高。我们的分析表明，两种涡流类型都与地下叶绿素正异常相关，达到 0. 5–0. 7 mg/m³，最强信号局限于上部 50 m。虽然 CE 在 25 m 深度附近表现出峰值异常，但 AE 显示出更复杂的偶极子结构，最大值位于 20-50 m 深度层内的核心和外围。获得的结果还表明罗弗敦涡内叶绿素的浓度非常高。鉴于该地区中尺度涡流的普遍存在，这些发现表明它们在挪威海的生物地球化学动力学中发挥着至关重要的作用。"
      summary_en: "Abstract: Mesoscale eddies play a vital role in shaping marine biogeochemical processes, particularly influencing chlorophyll (Chl) distribution in oceanic systems. Understanding how eddies affect Chl distribution is critical for assessing regional productivity. The presented study focuses on the Norwegian Sea region, which is characterized by the high intensity of mesoscale eddy activity and complex dynamical processes. To study the eddy impact on the Chl distribution in the region of interest, we employed a colocalization method that combines altimetry data with Bio-Argo profiles, allowing us to derive composite Chl structures for both cyclonic (CEs) and anticyclonic (AEs) eddies. Our study provides insights into the subsurface 2D and 3D patterns of eddy-induced Chl distribution, showing that both CEs and AEs can enhance Chl concentration in the Norwegian Sea, with AEs driving greater Chl elevation during the summer months. Our analysis reveals that both eddy types are associated with positive subsurface Chl anomalies, reaching up to 0.5–0.7 mg/m³, with the strongest signals confined to the upper 50 m. While CEs exhibit peak anomalies near 25 m depth, AEs show a more complex dipole-like structure with maxima located both in the core and at the periphery within a depth layer of ∼20–50 m. The obtained results also demonstrated remarkably high concentration of Chl within the Lofoten Vortex. Given the prevalence of mesoscale eddies in the region, these findings suggest their crucial role in the biogeochemical dynamics of the Norwegian Sea."
    - title: "Biophysical Dynamics of Mesoscale Eddies: Coincident Observations from SWOT and PACE"
