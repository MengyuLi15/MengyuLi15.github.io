      tags_en: "carbon pump"
      summary: "摘要：北极加速变暖正在促进沿海大型藻类栖息地的扩张；然而它们对远洋有机碳循环的影响仍未得到解决。本研究调查了 2023 年夏末，斯瓦尔巴群岛 Kongsfjorden 大型藻床对表面颗粒有机物 (POM) 生化成分的影响。在四个大型藻占主导地位的地点 (MDS) 以及 500 米和 1500 米外的邻近水域 (Adj-W) 对地表水进行了采样。采用整合元素组成、稳定同位素、生物聚合组分、单糖和氨基酸的多代理方法来追踪大型藻类的贡献及其横向重新分布。 MDS 中的颗粒有机碳、氮、碳水化合物和蛋白质的浓度始终高于 Adj-W，表明大型藻类栖息地内生化不稳定有机物的局部富集。分子分析进一步揭示了巨藻相关糖（葡萄糖、半乳糖、岩藻糖、甘露糖醛酸）和不稳定氨基酸（Asp、Glu、Gly、Ser、Ala）浓度升高，增强了巨藻衍生对表面 POM 的贡献。虽然 δ13CPOC 显示出最小的空间变化（−26. 8 ‰ 至 -29. 1 ‰），但生化和分子特征表明巨藻对 Adj-W 的贡献不断减少，同时发生内部重组，表明巨藻衍生的 POM 具有选择性早期转化的横向运输。 总的来说，这些发现表明北极大型藻床是动态的沿海生物地球化学热点，将有机碳重新分配和转化到其栖息地之外。"
      summary_zh: "摘要：北极加速变暖正在促进沿海大型藻类栖息地的扩张；然而它们对远洋有机碳循环的影响仍未得到解决。本研究调查了 2023 年夏末，斯瓦尔巴群岛 Kongsfjorden 大型藻床对表面颗粒有机物 (POM) 生化成分的影响。在四个大型藻占主导地位的地点 (MDS) 以及 500 米和 1500 米外的邻近水域 (Adj-W) 对地表水进行了采样。采用整合元素组成、稳定同位素、生物聚合组分、单糖和氨基酸的多代理方法来追踪大型藻类的贡献及其横向重新分布。 MDS 中的颗粒有机碳、氮、碳水化合物和蛋白质的浓度始终高于 Adj-W，表明大型藻类栖息地内生化不稳定有机物的局部富集。分子分析进一步揭示了巨藻相关糖（葡萄糖、半乳糖、岩藻糖、甘露糖醛酸）和不稳定氨基酸（Asp、Glu、Gly、Ser、Ala）浓度升高，增强了巨藻衍生对表面 POM 的贡献。虽然 δ13CPOC 显示出最小的空间变化（−26. 8 ‰ 至 -29. 1 ‰），但生化和分子特征表明巨藻对 Adj-W 的贡献不断减少，同时发生内部重组，表明巨藻衍生的 POM 具有选择性早期转化的横向运输。 总的来说，这些发现表明北极大型藻床是动态的沿海生物地球化学热点，将有机碳重新分配和转化到其栖息地之外。"
      summary_en: "Abstract: Accelerated Arctic warming is promoting the expansion of coastal macroalgal habitats; yet their influence on pelagic organic carbon cycling remains unresolved. This study investigates the influence of macroalgal beds on the biochemical composition of surface particulate organic matter (POM) in Kongsfjorden, Svalbard, during late summer 2023. Surface waters were sampled at four macroalgal-dominated sites (MDS) and from adjacent waters (Adj-W) located 500 and 1500 m away. A multi-proxy approach integrating elemental composition, stable isotopes, biopolymeric fractions, monosaccharides, and amino acids was used to trace macroalgal contributions and their lateral redistribution. Concentrations of particulate organic carbon, nitrogen, carbohydrates, and proteins were consistently higher at MDS than in Adj-W, indicating localized enrichment of biochemically labile organic matter within macroalgal habitats. Molecular analyses further revealed elevated concentrations of macroalgal-associated sugars (glucose, galactose, fucose, mannuronic acid) and labile amino acids (Asp, Glu, Gly, Ser, Ala) reinforcing macroalgal-derived contributions to surface POM. While δ13CPOC showed minimal spatial variation (−26.8 ‰ to −29.1 ‰), the biochemical and molecular signatures indicated a decreasing macroalgal contribution towards Adj-W, along with internal reorganization, suggesting lateral transport of macroalgal-derived POM with selective early-stage transformation. Overall, these findings indicate that Arctic macroalgal beds act as dynamic coastal biogeochemical hotspots, redistributing and transforming organic carbon beyond their habitat."
    - title: "From green tide disaster to green resource: a multidisciplinary review of research progress and future prospects on Ulva prolifera"
      authors: "Zhongwei Chen; Zhongzhen Chen; Chengjuan Cao; Binbin Wang; Haibo Feng; Yuehao Ge; Bo Yang"
      journal: "Frontiers in Marine Science"
      published: "2026-06-26"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3389/fmars.2026.1871260"
      url: "https://doi.org/10.3389/fmars.2026.1871260"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean colour; microbial carbon"
      tags_zh: "ocean colour; microbial carbon"
      tags_en: "ocean colour; microbial carbon"
      summary: "摘要：浒苔是黄海大规模绿潮的主要致病物种，对海洋生态系统和沿海经济构成反复威胁。近年来，研究经历了从灾害控制到资源利用的根本转变。这项多学科审查综合了整个绿潮管理链的进展，重点关注监测和预测方面的进展。其中包括具有深度学习的多源卫星遥感、用于水华预测的耦合水动力生态模型、基于 eDNA 的微繁殖体早期检测，以及对生态和生理机制的深入了解，例如化感竞争、营养驱动的快速生长和支撑水华优势的胁迫适应特征。 此外，我们还重点介绍了种质和栽培方面的突破，特别是基于天然原生质体的克隆繁殖和利用合成生物学进行遗传改良的潜力，以及通过提取生物活性多糖实现高价值资源利用、发现用于高效酶处理的耐热绿藻硫化多糖酶，以及探索用于功能性食品、药品、生物能源和生物材料的生物质。本文进一步研究了微生物降解，包括活跃的微生物群落演替以及转化有机物和影响碳循环的关键降解剂，并得出了以闭环“预警-精准拦截-高价值转化”框架为中心的产业化前景。 与之前关注个别方面的评论不同，这项工作明确地将生态驱动因素与生物技术应用和工业可行性联系起来。我们批判性地研究了这些领域如何相互联系，确定了知识差距，并提出了将浒苔建立为海洋生物经济模型物种的路线图。这种综合视角将环境威胁转化为可持续的绿色资源。"
      summary_zh: "摘要：浒苔是黄海大规模绿潮的主要致病物种，对海洋生态系统和沿海经济构成反复威胁。近年来，研究经历了从灾害控制到资源利用的根本转变。这项多学科审查综合了整个绿潮管理链的进展，重点关注监测和预测方面的进展。其中包括具有深度学习的多源卫星遥感、用于水华预测的耦合水动力生态模型、基于 eDNA 的微繁殖体早期检测，以及对生态和生理机制的深入了解，例如化感竞争、营养驱动的快速生长和支撑水华优势的胁迫适应特征。 此外，我们还重点介绍了种质和栽培方面的突破，特别是基于天然原生质体的克隆繁殖和利用合成生物学进行遗传改良的潜力，以及通过提取生物活性多糖实现高价值资源利用、发现用于高效酶处理的耐热绿藻硫化多糖酶，以及探索用于功能性食品、药品、生物能源和生物材料的生物质。本文进一步研究了微生物降解，包括活跃的微生物群落演替以及转化有机物和影响碳循环的关键降解剂，并得出了以闭环“预警-精准拦截-高价值转化”框架为中心的产业化前景。 与之前关注个别方面的评论不同，这项工作明确地将生态驱动因素与生物技术应用和工业可行性联系起来。我们批判性地研究了这些领域如何相互联系，确定了知识差距，并提出了将浒苔建立为海洋生物经济模型物种的路线图。这种综合视角将环境威胁转化为可持续的绿色资源。"
      summary_en: "Abstract: Ulva prolifera is the primary causative species of large-scale green tides in the Yellow Sea, posing recurrent threats to marine ecosystems and coastal economies. In recent years, research has undergone a fundamental shift from disaster control toward resource utilization. This multidisciplinary review synthesizes progress across the entire chain of green tide management, focusing on advances in monitoring and prediction. These include multi-source satellite remote sensing with deep learning, coupled hydrodynamic-ecological models for bloom forecasting, and eDNA-based early detection of micropropagules, alongside insights into ecological and physiological mechanisms such as allelopathic competition, nutrient-driven rapid growth, and stress adaptation traits that underpin bloom dominance. Besides, we also highlight breakthroughs in germplasm and cultivation, notably natural protoplast-based clonal propagation and the potential for genetic improvement using synthetic biology, alongside high-value resource utilization through the extraction of bioactive polysaccharides, the discovery of a thermostable ulvan lyase for efficient enzymatic processing, and the exploration of biomass for functional foods, pharmaceuticals, bioenergy, and biomaterials. This review further examines microbial degradation, including active microbial community succession and key degraders that transform organic matter and influence carbon cycling, and concludes with industrialization prospects centered on a closed-loop “early warning–precise interception –high-value conversion” framework. Unlike previous reviews that focused on individual aspects, this work explicitly linked ecological drivers to biotechnological applications and industrial feasibility. We critically examined how these domains connected, identified knowledge gaps, and proposed a roadmap for establishing U. prolifera as a model species for the marine bioeconomy. This integrated perspective transforms an environmental threat into a sustainable green resource."
    - title: "Tracing species-specific kelp eDNA in marine sediments for blue carbon assessment along the Norwegian Coast"
      authors: "Marc B. Anglès d’Auriac; Sarah Bachmann Ørberg; Gunhild Borgersen; Hege Gundersen; Sanna Matsson; Marit F. Markussen Bjorbækmo; Philip Francis Thomsen; Dorte Krause-Jensen; et al."
      journal: "Frontiers in Marine Science"
      published: "2026-06-26"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3389/fmars.2026.1784926"
      url: "https://doi.org/10.3389/fmars.2026.1784926"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：陆地初级生产被认为是大气碳转化和储存的主要贡献者。相比之下，海洋初级生产，特别是海带森林的贡献，仍然较少被研究和解释。为了促进对海洋海带和有机碳的研究，我们在此介绍一种基于环境 DNA 的方法，用于追踪北欧海洋沉积物中的两种常见海带物种，为估计目标物种埋藏的有机碳奠定基础。我们开发并测试了 Saccharina latissima 和 Laminaria hyperborea 的物种特异性定量 PCR (qPCR) 检测方法。接下来，我们对挪威海岸（58° N 至 72° N）沿线的 79 个海洋表面 (0–2 cm) 沉积物样本进行了分析，范围从浅近岸 (8. 1 m) 到深海位置 (1334 m)。在 87% 的位置检测到海带 DNA，其中含有来自海带的 DNA。 分别在 73% 和 72% 的地点检测到 latissima 和 L. hyperborea。在 58% 的地点同时检测到了这两个物种的 DNA。空间分析显示，在浅海沿海地区，海带 DNA 浓度较高，特别是 S. latissima，而在近海地区，海带 DNA 基本上不存在。两种物种均与沉积物总有机碳（TOC）浓度呈很强的相关性。有趣的是，与未受影响的地区相比，受海胆放牧影响的海带森林地区的海带 eDNA 浓度和 TOC 浓度较低。我们的研究提出了一种追踪关键海带物种的新方法，并提供了一个框架来估计它们对沉积物碳库的潜在贡献和评估海带碳封存。 该框架有可能改进对沉积物中蓝碳贡献的评估，并且也应适用于海带以外的其他生物。"
      summary_zh: "摘要：陆地初级生产被认为是大气碳转化和储存的主要贡献者。相比之下，海洋初级生产，特别是海带森林的贡献，仍然较少被研究和解释。为了促进对海洋海带和有机碳的研究，我们在此介绍一种基于环境 DNA 的方法，用于追踪北欧海洋沉积物中的两种常见海带物种，为估计目标物种埋藏的有机碳奠定基础。我们开发并测试了 Saccharina latissima 和 Laminaria hyperborea 的物种特异性定量 PCR (qPCR) 检测方法。接下来，我们对挪威海岸（58° N 至 72° N）沿线的 79 个海洋表面 (0–2 cm) 沉积物样本进行了分析，范围从浅近岸 (8. 1 m) 到深海位置 (1334 m)。在 87% 的位置检测到海带 DNA，其中含有来自海带的 DNA。 分别在 73% 和 72% 的地点检测到 latissima 和 L. hyperborea。在 58% 的地点同时检测到了这两个物种的 DNA。空间分析显示，在浅海沿海地区，海带 DNA 浓度较高，特别是 S. latissima，而在近海地区，海带 DNA 基本上不存在。两种物种均与沉积物总有机碳（TOC）浓度呈很强的相关性。有趣的是，与未受影响的地区相比，受海胆放牧影响的海带森林地区的海带 eDNA 浓度和 TOC 浓度较低。我们的研究提出了一种追踪关键海带物种的新方法，并提供了一个框架来估计它们对沉积物碳库的潜在贡献和评估海带碳封存。 该框架有可能改进对沉积物中蓝碳贡献的评估，并且也应适用于海带以外的其他生物。"
      summary_en: "Abstract: Terrestrial primary production is acknowledged as a major contributor to atmospheric carbon transformation and storage. In contrast, marine primary production, especially the contribution from kelp forests, remains less studied and accounted for. To facilitate studies on marine kelp and organic carbon, we here introduce an environmental DNA-based approach for tracing two common kelp species in Nordic marine sediments, establishing a basis for estimating the organic carbon buried from the targeted species. We developed and tested species-specific quantitative PCR (qPCR) assays for Saccharina latissima and Laminaria hyperborea . Next, we applied the assays on 79 marine surface (0–2 cm) sediment samples along the Norwegian coast (58° N to 72° N), ranging from shallow nearshore (8.1 m) to deep offshore locations (1334 m). Kelp DNA was detected in 87% of the locations, with DNA from S. latissima and L. hyperborea detected in 73% and 72% of the locations, respectively. DNA from both species were detected together in 58% of the locations. Spatial analysis revealed higher kelp DNA concentrations in shallow, coastal areas, particularly for S. latissima while kelp DNA was largely absent at the offshore locations. Both species exhibited a strong correlation with the sediment total organic carbon (TOC) concentration. Interestingly, kelp eDNA concentrations and TOC concentrations were lower in areas where kelp forests were impacted by sea urchin grazing compared to non-impacted areas. Our study presents a novel method for tracing key kelp species and provides a framework to estimate their potential contributions to sediment carbon pools and assessing kelp carbon sequestration. This framework has the potential to improve assessment of blue carbon contributions in sediments and should also be applicable to other organisms beyond kelp."
