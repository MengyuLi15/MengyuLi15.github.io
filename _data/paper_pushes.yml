      tags: "BGC-Argo; chlorophyll fluorescence; NPQ; DCM"
      tags_zh: "BGC-Argo; chlorophyll fluorescence; NPQ; DCM"
      tags_en: "BGC-Argo; chlorophyll fluorescence; NPQ; DCM"
      summary: "这项研究关注 2024 年春季东北大西洋异常偏低的新生产。它利用 BGC-Argo 相关剖面、叶绿素荧光和混合层信息来分析春季生产力状态。研究讨论较弱冬季混合是否减少了营养盐补给，从而影响春季新生产。结果指出，物理混合异常可能通过营养盐供应改变次表层和 DCM 附近的生产结构。它对解释 BGC-Argo 叶绿素荧光、NPQ 校正和年际生产力异常很有帮助。"
      summary_zh: "这项研究关注 2024 年春季东北大西洋异常偏低的新生产。它利用 BGC-Argo 相关剖面、叶绿素荧光和混合层信息来分析春季生产力状态。研究讨论较弱冬季混合是否减少了营养盐补给，从而影响春季新生产。结果指出，物理混合异常可能通过营养盐供应改变次表层和 DCM 附近的生产结构。它对解释 BGC-Argo 叶绿素荧光、NPQ 校正和年际生产力异常很有帮助。"
      summary_en: "This study investigates anomalously low new production in the Northeast Atlantic during spring 2024. It uses BGC-Argo-related profiles, chlorophyll fluorescence, and mixed-layer information to analyse spring productivity conditions. The work tests whether weaker winter mixing reduced nutrient resupply and therefore suppressed new production. The results suggest that physical mixing anomalies can alter production structure near the subsurface and DCM layers through nutrient supply. It is useful for interpreting BGC-Argo fluorescence, NPQ correction, and interannual productivity anomalies."
    - title: "BGC-Argo+: Global biogeochemical Argo float data with secondary quality control and derived parameters"
      authors: "Seth M. Bushinsky; Zachary Nachod; Mathilde Jutras; Daniela König; Shannon McClish; Charles Addey"
      journal: "Earth System Science Data Discussions"
      published: "2026"
