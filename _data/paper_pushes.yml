      summary: "摘要：叶绿素-a 被广泛用作爱琴海浮游植物生物量和初级生产力的指标，对海洋生态系统功能具有直接影响。然而，其变异性与该地区物理驱动因素之间的联系仍然相对不足。本研究调查了1998年至2022年爱琴海海面叶绿素-a的年际变化和长期趋势及其与物理强迫机制（黑海海水流入、海面温度、混合层深度和风）的关系。大气和海洋强迫变量是通过再分析和卫星产品获得的。季节动态主导着叶绿素a的变异性，在冬季和早春深度混合下达到峰值，在夏季强烈分层时达到最低值。空间格局显示出明显的南北梯度，凸显了黑海水流入的影响。在流域尺度上没有检测到统计上显着的长期趋势，但是，在 2010 年之后的过去十年中观察到了统计上显着的负趋势。该分析将季节性和非季节性变化分开，将年内和年际波动与大规模物理过程和偶发性局部事件联系起来。黑海水流入量的变化反映在博斯普鲁斯海峡（黑海入口）和达达尼尔海峡（爱琴海出口）之间的海平面差异。流入量的变化与非季节性叶绿素波动直接相关，强调了水平水交换在爱琴海施肥和区域浮游植物动态中的作用。"
      summary_zh: "摘要：叶绿素-a 被广泛用作爱琴海浮游植物生物量和初级生产力的指标，对海洋生态系统功能具有直接影响。然而，其变异性与该地区物理驱动因素之间的联系仍然相对不足。本研究调查了1998年至2022年爱琴海海面叶绿素-a的年际变化和长期趋势及其与物理强迫机制（黑海海水流入、海面温度、混合层深度和风）的关系。大气和海洋强迫变量是通过再分析和卫星产品获得的。季节动态主导着叶绿素a的变异性，在冬季和早春深度混合下达到峰值，在夏季强烈分层时达到最低值。空间格局显示出明显的南北梯度，凸显了黑海水流入的影响。在流域尺度上没有检测到统计上显着的长期趋势，但是，在 2010 年之后的过去十年中观察到了统计上显着的负趋势。该分析将季节性和非季节性变化分开，将年内和年际波动与大规模物理过程和偶发性局部事件联系起来。黑海水流入量的变化反映在博斯普鲁斯海峡（黑海入口）和达达尼尔海峡（爱琴海出口）之间的海平面差异。流入量的变化与非季节性叶绿素波动直接相关，强调了水平水交换在爱琴海施肥和区域浮游植物动态中的作用。"
      summary_en: "Abstract: Chlorophyll-a is widely used as an indicator of phytoplankton biomass and primary productivity in the Aegean Sea, with direct implications for marine ecosystem functioning. However, the connection of its variability to physical drivers in the region remain relatively understudied. This study investigates the interannual variability and long-term trends of sea surface chlorophyll-a in the Aegean Sea over 1998–2022 and their relation to physical forcing mechanisms (Black Sea water inflow, sea surface temperature, mixed layer depth, and wind). Atmospheric and oceanic forcing variables were obtained from reanalysis and satellite products. Seasonal dynamics dominate chlorophyll-a variability, with peak values in winter–early spring under deep mixing and minima in summer when strong stratification prevails. Spatial patterns reveal a pronounced north–south gradient, highlighting the influence of the Black Sea Water inflow. No statistically significant long-term trend was detected at the basin scale, however, statistically significant negative trends were observed during the last decade, after 2010. The analysis separates seasonal and non-seasonal variability, linking intra- and interannual fluctuations to both large-scale physical processes and episodic local events. The variability of the Black Sea Water inflow is reflected in the sea level differences between Bosporus (Black Sea entrance) and Dardanelles (Aegean exit). The inflow variability is directly associated with non-seasonal chlorophyll fluctuations, emphasizing the role of horizontal water exchanges in the fertilization of the Aegean Sea and the regional phytoplankton dynamics."
