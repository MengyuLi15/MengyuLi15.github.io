      tags_en: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      summary: "用一支 BGC-Argo 浮标在东热带北太平洋低氧区做近三年剖面观测，联合氧、硝酸盐、亚硝酸盐、pH、叶绿素和 POC。结果显示 BGC-Argo 可用于诊断氮氧化还原过程与碳循环耦合，而不只是看 Chl-a 或 POC 代理量。"
      summary_zh: "用一支 BGC-Argo 浮标在东热带北太平洋低氧区做近三年剖面观测，联合氧、硝酸盐、亚硝酸盐、pH、叶绿素和 POC。结果显示 BGC-Argo 可用于诊断氮氧化还原过程与碳循环耦合，而不只是看 Chl-a 或 POC 代理量。"
      summary_en: "A nearly three-year BGC-Argo record from an oxygen-deficient zone combines oxygen, nitrate, nitrite, pH, chlorophyll and POC. The study shows that BGC-Argo can diagnose coupled nitrogen redox and carbon cycling processes, not only biomass proxies."
    - title: "Global declines in net primary production in the ocean color era"
      authors: "Greg M. Silsbe; James Fox; Toby K. Westberry; Kimberly H. Halsey"
