      summary: "摘要：浮游植物群落的长期变化是理解和预测生态系统对气候驱动的环流变化的反应的关键。通过分析黄海两个沉积岩芯的沉积古DNA，我们重建了黄海暖流（YSWC）增强期间全新世中晚期浮游植物的动态。我们发现浮游植物群落在不同地点之间存在显着差异，真核生物的空间分化比蓝细菌更强。甲藻和叶绿藻总体上占主导地位，而网藻纲（硅鞭藻）相对于硅藻则出乎意料地丰富。系统发育重建恢复了以拟藻属为主的不同网藻纲谱系（2目，6属），表明区域多样性比之前认识的要大。蓝藻组合包括 SIO2C1、UCYN-A 和 PCC-6307 谱系。随着约 3 ka BP 以来 YSWC 的加强，真核生物群落结构在中央盆地发生了变化。 18S rRNA 基因丰度增加，而多样性和硅化物与甲藻的比率下降。尽管岩心 B07 的绝对年龄仍处于暂定状态，但在 100 cmbsf 左右的锋区发生了明显的地层更替，从叶绿素主导转向甲藻主导，这与淡水影响的减少和 YSWC 影响的增强相一致。许多指示物种在这些转变之前和之后表现出对比鲜明的丰度模式。这些发现证明了沿海浮游植物对环流驱动的状况变化的敏感性。"
      summary_zh: "摘要：浮游植物群落的长期变化是理解和预测生态系统对气候驱动的环流变化的反应的关键。通过分析黄海两个沉积岩芯的沉积古DNA，我们重建了黄海暖流（YSWC）增强期间全新世中晚期浮游植物的动态。我们发现浮游植物群落在不同地点之间存在显着差异，真核生物的空间分化比蓝细菌更强。甲藻和叶绿藻总体上占主导地位，而网藻纲（硅鞭藻）相对于硅藻则出乎意料地丰富。系统发育重建恢复了以拟藻属为主的不同网藻纲谱系（2目，6属），表明区域多样性比之前认识的要大。蓝藻组合包括 SIO2C1、UCYN-A 和 PCC-6307 谱系。随着约 3 ka BP 以来 YSWC 的加强，真核生物群落结构在中央盆地发生了变化。 18S rRNA 基因丰度增加，而多样性和硅化物与甲藻的比率下降。尽管岩心 B07 的绝对年龄仍处于暂定状态，但在 100 cmbsf 左右的锋区发生了明显的地层更替，从叶绿素主导转向甲藻主导，这与淡水影响的减少和 YSWC 影响的增强相一致。许多指示物种在这些转变之前和之后表现出对比鲜明的丰度模式。这些发现证明了沿海浮游植物对环流驱动的状况变化的敏感性。"
      summary_en: "Abstract: Long-term changes in phytoplankton communities are key to understanding and predicting ecosystem responses to climate-driven circulation change. By analyzing sedimentary ancient DNA from two sediment cores in the Yellow Sea, we reconstructed mid-late Holocene phytoplankton dynamics during the intensification of the Yellow Sea Warm Current (YSWC). We found that phytoplankton communities differed significantly between sites, with stronger spatial differentiation in eukaryotes than in cyanobacteria. Dinoflagellates and chlorophytes dominated overall, while Dictyochophyceae (silicoflagellates) were unexpectedly abundant relative to diatoms. Phylogenetic reconstruction recovered diverse Dictyochophyceae lineages (2 orders, 6 genera) dominated by Pseudopedinella, indicating greater regional diversity than previously recognized. The cyanobacterial assemblages comprised SIO2C1, UCYN-A and PCC-6307 lineages. Following the intensification of the YSWC since ~3 ka BP, eukaryotic community structure shifted in the central basin. 18S rRNA gene abundance increased, whereas diversity and silicifier-to-dinoflagellate ratios declined. Although the absolute age of core B07 remains tentative, a pronounced stratigraphic turnover occurred in the frontal zone around 100 cmbsf, with a shift from chlorophyte to dinoflagellate dominance, consistent with reduced freshwater influence and an enhanced YSWC impact. Numerous indicator species exhibited contrasting abundance patterns before and after these transitions. These findings demonstrate the sensitivity of coastal phytoplankton to circulation-driven regime shifts."
