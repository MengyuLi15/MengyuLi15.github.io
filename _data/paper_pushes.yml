      summary: "摘要：半干旱地区正在通过不同的途径在全球范围内扩张：在东亚（EA）通过半湿润地区的干燥，而在北美（NA）通过干旱地区的湿润。这种横跨太平洋的年代际干湿逆转在机制上仍不清楚。在这里，我们证明了太平洋年代际振荡（PDO）驱动了这种气候跷跷板。对 1948-2022 年数据的分析表明，PDO 解释了 EA 中约 21% 的干湿方差和 NA 中约 63% 的干湿方差。我们确定了一个跨太平洋遥相关，其中 PDO 相变产生了关键的大气异常——夏季欧亚反气旋和冬季加深的阿留申低气压——随后改变了东亚季风和西风气流。这种大气重组改变了水分输送模式，最终在各大洲产生相反的水文气候趋势。 我们的工作建立了 PDO 相移与年代际干湿反转之间的因果关系，为预测自然气候变率下脆弱半干旱地区的长期水文气候风险提供了重要的机制理解。"
      summary_zh: "摘要：半干旱地区正在通过不同的途径在全球范围内扩张：在东亚（EA）通过半湿润地区的干燥，而在北美（NA）通过干旱地区的湿润。这种横跨太平洋的年代际干湿逆转在机制上仍不清楚。在这里，我们证明了太平洋年代际振荡（PDO）驱动了这种气候跷跷板。对 1948-2022 年数据的分析表明，PDO 解释了 EA 中约 21% 的干湿方差和 NA 中约 63% 的干湿方差。我们确定了一个跨太平洋遥相关，其中 PDO 相变产生了关键的大气异常——夏季欧亚反气旋和冬季加深的阿留申低气压——随后改变了东亚季风和西风气流。这种大气重组改变了水分输送模式，最终在各大洲产生相反的水文气候趋势。 我们的工作建立了 PDO 相移与年代际干湿反转之间的因果关系，为预测自然气候变率下脆弱半干旱地区的长期水文气候风险提供了重要的机制理解。"
      summary_en: "Abstract: Semi‐arid regions are expanding globally through divergent pathways: in East Asia (EA) via drying of semi‐humid lands, while in North America (NA) through wetting of arid areas. This interdecadal dry‐wet reversal across the Pacific has remained mechanistically unclear. Here we demonstrate that the Pacific Decadal Oscillation (PDO) drives this climatic seesaw. Analysis of 1948–2022 data reveals the PDO explains approximately 21% of dry‐wet variance in EA and 63% in NA. We identify a trans‐Pacific teleconnection where PDO phase transitions generate key atmospheric anomalies—a summer Eurasian anticyclone and winter‐deepened Aleutian Low—that subsequently modify East Asian monsoons and westerly flows. This atmospheric reorganization alters moisture transport patterns, ultimately producing opposing hydroclimatic trends across the continents. Our work establishes a causal relationship between PDO phase shifts and interdecadal dry‐wet reversals, providing crucial mechanistic understanding for predicting long‐term hydroclimatic risks in vulnerable semi‐arid regions under natural climate variability."
    - title: "Upper‐Ocean Variability of the Marine Carbonate System in the Northeast Pacific"
      authors: "Ana C. Franco; Debby Ianson; Raffaele Bernardello; Adam H. Monahan"
      journal: "Global Biogeochemical Cycles"
      published: "2026-05"
      published_month: "2026-05"
      published_month_zh: "2026-05"
      doi: "10.1029/2025gb008762"
      url: "https://doi.org/10.1029/2025gb008762"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：在东北太平洋，海洋碳酸盐系统在时间尺度上的变化没有得到很好的限制。在这里，我们量化了观察到的溶解无机碳 (DIC)、二氧化碳分压 () 和文石饱和状态的季节性和非季节性变化，并讨论了潜在的驱动因素。我们使用了四个 P 线时间序列站三十年的观测数据，这是东北太平洋最长的海洋碳酸盐系统时间序列（1990-2019 年）。为了衡量变异模式的空间范围，我们使用了代表观测周期的全球海洋模型的输出。在东北太平洋，10 m 处的季节性和非季节性变化很小，主要受到 DIC 和季节性和年际时间尺度温度变化的相反影响的抑制。 对于 DIC 和 ，季节周期主导了顶部 60-70 m 的总变率，平均横断面 10 m 季节幅度分别为 35 3 μmol 和 0. 31 0. 04。在上部 60-70 m，大多数变量的非季节变化幅度至少是季节变化幅度的一半。从检查的五个气候指数中，我们重点关注盆地规模的太平洋年代际振荡指数（PDO），以调查非季节性变化的潜在驱动因素，DIC 中 20%–40% 的非季节性变化与该指数相关。在东北太平洋，每增加一个 PDO 单位，正 PDO 周期与 10 m DIC 平均减少 5 μmol 和 10 m DIC 增加 0. 04 有关，这可能会减少海洋酸化事件的发生和严重程度。在负 PDO 期间，情况可能会相反。"
      summary_zh: "摘要：在东北太平洋，海洋碳酸盐系统在时间尺度上的变化没有得到很好的限制。在这里，我们量化了观察到的溶解无机碳 (DIC)、二氧化碳分压 () 和文石饱和状态的季节性和非季节性变化，并讨论了潜在的驱动因素。我们使用了四个 P 线时间序列站三十年的观测数据，这是东北太平洋最长的海洋碳酸盐系统时间序列（1990-2019 年）。为了衡量变异模式的空间范围，我们使用了代表观测周期的全球海洋模型的输出。在东北太平洋，10 m 处的季节性和非季节性变化很小，主要受到 DIC 和季节性和年际时间尺度温度变化的相反影响的抑制。 对于 DIC 和 ，季节周期主导了顶部 60-70 m 的总变率，平均横断面 10 m 季节幅度分别为 35 3 μmol 和 0. 31 0. 04。在上部 60-70 m，大多数变量的非季节变化幅度至少是季节变化幅度的一半。从检查的五个气候指数中，我们重点关注盆地规模的太平洋年代际振荡指数（PDO），以调查非季节性变化的潜在驱动因素，DIC 中 20%–40% 的非季节性变化与该指数相关。在东北太平洋，每增加一个 PDO 单位，正 PDO 周期与 10 m DIC 平均减少 5 μmol 和 10 m DIC 增加 0. 04 有关，这可能会减少海洋酸化事件的发生和严重程度。在负 PDO 期间，情况可能会相反。"
      summary_en: "Abstract: In the Northeast Pacific, the marine carbonate system's variability across timescales is not well constrained. Here, we quantify observed seasonal and non‐seasonal variability in Dissolved Inorganic Carbon (DIC), partial pressure of carbon dioxide () and aragonite saturation state and discuss potential drivers. We used three decades of observations from four Line P time series stations, the longest marine carbonate system time series in the Northeast Pacific (1990–2019). To gauge the spatial extent of the variability patterns, we used output from a global ocean model representing the observed period. In the Northeast Pacific, seasonal and non‐seasonal variability at 10 m was minimal, mostly damped by the opposing influence of DIC and temperature changes at both seasonal and interannual timescales. For DIC and , the seasonal cycle dominated total variability in the top 60–70 m, with mean‐transect 10 m seasonal amplitudes of 35 3 μmol and 0.31 0.04, respectively. In the upper 60–70 m, the magnitude of non‐seasonal variability was at least half that of the seasonal variability for most variables. From five climate indices examined, we focused on the basin‐scale Pacific Decadal Oscillation index (PDO) to investigate potential drivers of non‐seasonal variability, with 20%–40% of the non‐seasonal variability in DIC and associated to this index. In the Northeast Pacific, positive PDO periods were linked to a mean reduction in 10 m DIC of 5 μmol and an increase in 10 m of 0.04 for each PDO unit increase, which could potentially reduce the occurrence and severity of ocean acidification events. The opposite could be expected during negative PDO periods."
    - title: "Optical complexity of North Sea, Baltic Sea, and adjacent coastal and inland waters derived from Sentinel-3 OLCI satellite data"
      authors: "Martin Hieronymi; Daniel Behr; Shun Bi; Rüdiger Röttgers"
      journal: "Earth System Science Data"
      published: "2026-02-19"
      published_month: "2026-02"
      published_month_zh: "2026-02"
      doi: "10.5194/essd-18-1307-2026"
