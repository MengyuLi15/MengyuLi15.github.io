      tags: "PACE; ocean colour; hyperspectral remote sensing"
      tags_zh: "PACE; ocean colour; hyperspectral remote sensing"
      tags_en: "PACE; ocean colour; hyperspectral remote sensing"
      summary: "这篇文章总结 PACE Data Hackweek 的组织经验和开放科学实践。它关注的对象不是单一科学结果，而是如何让研究者有效学习和使用 PACE 高光谱数据。文章梳理课程设计、数据访问、协作工具和社区参与方式。结果展示了 Hackweek 如何促进开放代码、开放数据和跨学科训练。它对 PACE 用户社区建设、海色遥感教学和可重复科研工作流很有帮助。"
      summary_zh: "这篇文章总结 PACE Data Hackweek 的组织经验和开放科学实践。它关注的对象不是单一科学结果，而是如何让研究者有效学习和使用 PACE 高光谱数据。文章梳理课程设计、数据访问、协作工具和社区参与方式。结果展示了 Hackweek 如何促进开放代码、开放数据和跨学科训练。它对 PACE 用户社区建设、海色遥感教学和可重复科研工作流很有帮助。"
      summary_en: "This article summarizes the organization and open-science practice of the PACE Data Hackweek. It is not centred on one scientific result, but on helping researchers learn and use PACE hyperspectral data effectively. The paper describes curriculum design, data access, collaborative tools, and community engagement. The result shows how a Hackweek can promote open code, open data, and interdisciplinary training. It is useful for building the PACE user community, teaching ocean-colour remote sensing, and developing reproducible research workflows."
