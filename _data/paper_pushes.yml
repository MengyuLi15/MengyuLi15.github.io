    - title: "Global Ocean data set of marine aerosol properties"
      authors: "Patricia K. Quinn; Timothy S. Bates; Derek J. Coffman; James E. Johnson; Lucia M. Upchurch; Hanna Best"
      journal: "Earth System Science Data"
      published: "2026-06-25"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/essd-18-4317-2026"
      url: "https://doi.org/10.5194/essd-18-4317-2026"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
