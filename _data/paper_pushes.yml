      summary: "摘要：环路电流锋面涡流 (LCFE) 是由于环路电流 (LC) 的不稳定性而产生的涡流。 LCFE 长期以来一直被认为是鱼类群落的绿洲，因为它们的叶绿素-a (Chl-a) 浓度较高，通常归因于其气旋性质。然而，LCFE 中叶绿素 a 增加的具体驱动因素仍有待探索。利用多个卫星数据集（绝对动态地形和叶绿素a）、高分辨率（~4公里）混合坐标海洋模型（HYCOM）再分析和河流数据，我们确定了影响LCFE内和东部海湾叶绿素a浓度的几个关键物理和生物地球化学因素。其中包括 LC 相位、LCFE 位置、涡流驱动的水平和垂直平流、季节性混合层变化以及密西西比-阿查法拉亚河流量和相关营养物浓度。 我们发现，混合层季节性和河流养分输入经常竞争影响叶绿素a的年内变异。在冬季，河流养分含量最低，更深的混合层和减少的分层有利于近海地区叶绿素的增加。相比之下，在夏季，河流养分浓度增加和风引起的跨陆架输送更强，补偿了强烈分层和浅混合层引起的垂直通量减少。此外，涡流驱动的水平和垂直平流将富含营养物质的水域从大陆架和深海输送到涡流中，在调节叶绿素a浓度方面发挥着关键作用。我们的研究结果表明，LCFE 和 Chl-a 之间的关系比之前想象的更为复杂，并强调了物理和生物地球化学过程在塑造 Chl-a 模式中的重要性。 了解这些动态可以通过提高叶绿素a在时间和空间尺度上的可预测性来改善渔业管理。"
      summary_zh: "摘要：环路电流锋面涡流 (LCFE) 是由于环路电流 (LC) 的不稳定性而产生的涡流。 LCFE 长期以来一直被认为是鱼类群落的绿洲，因为它们的叶绿素-a (Chl-a) 浓度较高，通常归因于其气旋性质。然而，LCFE 中叶绿素 a 增加的具体驱动因素仍有待探索。利用多个卫星数据集（绝对动态地形和叶绿素a）、高分辨率（~4公里）混合坐标海洋模型（HYCOM）再分析和河流数据，我们确定了影响LCFE内和东部海湾叶绿素a浓度的几个关键物理和生物地球化学因素。其中包括 LC 相位、LCFE 位置、涡流驱动的水平和垂直平流、季节性混合层变化以及密西西比-阿查法拉亚河流量和相关营养物浓度。 我们发现，混合层季节性和河流养分输入经常竞争影响叶绿素a的年内变异。在冬季，河流养分含量最低，更深的混合层和减少的分层有利于近海地区叶绿素的增加。相比之下，在夏季，河流养分浓度增加和风引起的跨陆架输送更强，补偿了强烈分层和浅混合层引起的垂直通量减少。此外，涡流驱动的水平和垂直平流将富含营养物质的水域从大陆架和深海输送到涡流中，在调节叶绿素a浓度方面发挥着关键作用。我们的研究结果表明，LCFE 和 Chl-a 之间的关系比之前想象的更为复杂，并强调了物理和生物地球化学过程在塑造 Chl-a 模式中的重要性。 了解这些动态可以通过提高叶绿素a在时间和空间尺度上的可预测性来改善渔业管理。"
      summary_en: "Abstract: Loop Current Frontal Eddies (LCFEs) are eddies that generate through instabilities of the Loop Current (LC). LCFEs have long been considered oases for fish communities due to their elevated chlorophyll‐a (Chl‐a) concentrations, typically attributed to their cyclonic nature. However, the specific drivers of the increased Chl‐a within LCFEs remain unexplored. Using multiple satellite data sets (absolute dynamic topography and Chl‐a), a high‐resolution (∼4 km) Hybrid Coordinate Ocean Model (HYCOM) reanalysis and riverine data, we identify several key physical and biogeochemical factors influencing Chl‐a concentrations within LCFEs and in the eastern Gulf. These include the LC phase, LCFE position, eddy‐driven horizontal and vertical advection, seasonal mixed layer variability, and Mississippi‐Atchafalaya River discharge and associated nutrient concentrations. We find that mixed layer seasonality and riverine nutrient input often compete to shape intra‐annual Chl‐a variability. In winter, when riverine nutrients are minimal, deeper mixed layers and reduced stratification facilitate Chl‐a increase in offshore regions. In contrast, during summer, increased riverine nutrient concentration and stronger wind‐induced cross‐shelf transport compensate for reduced vertical fluxes caused by strong stratification and shallow mixed layers. Additionally, eddy‐driven horizontal and vertical advection transports nutrient‐rich waters from the continental shelf and the deep ocean into the eddy, playing a key role in modulating their Chl‐a concentrations. Our findings reveal that the relationship between LCFEs and Chl‐a is more complex than previously thought and underscore the importance of physical and biogeochemical processes in shaping Chl‐a patterns. Understanding these dynamics can improve fishery management by increasing Chl‐a predictability across temporal and spatial scales."
    - title: "Tidal modulation constrains phytoplankton bloom resilience in a eutrophic estuary"
      authors: "Yichong Wang; Jixin Chen; Weinan Li; Wenxin Fan; Min Bao; Lingxin Chen; Nengwang Chen; Wupeng Xiao; et al."
      journal: "Limnology and Oceanography"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1002/lno.70437"
      url: "https://doi.org/10.1002/lno.70437"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton; vertical structure"
      tags_zh: "phytoplankton; vertical structure"
      tags_en: "phytoplankton; vertical structure"
      summary: "摘要：潮汐活跃的河口浮游植物的繁殖通常是短暂的，但驱动其快速爆发和突然崩溃的机制仍然知之甚少。仅靠营养富集并不能解释这些快速的繁荣-萧条循环，这表明潮汐循环等周期性强迫在控制水华动态方面具有潜在的调节作用。在这里，我们使用高分辨率三维物理-生物地球化学耦合模型，并通过现场观测进行验证，来调查厦门湾（一个富营养化的亚热带海湾）的短暂水华。小潮分层和最佳温度-光照条件有利于水华的发生，但随后的大潮通过湍流破坏、垂直输出到光限制层以及近海平流损失而导致水华迅速下降。 诊断预算分析显示，尽管生物产量仍然为正值，但实物出口始终超过其产量，这凸显了生物量保留相对于养分供应在维持水华方面的首要地位。尽管氮持续过量，但磷枯竭、光照稀释和阵发性强风进一步限制了水华的恢复能力。空间异质性进一步塑造了水华轨迹，半封闭的子流域支持局部生长，而开放区域则以运输过程为主。总之，这些结果支持了大潮汐河口水华调节的保留控制框架，其中春季-小潮周期充当了控制产量和损失之间平衡的分层时间调节器。 这种从以营养为中心到以滞留为介导的控制的转变有助于解释为什么富营养化河口经常出现短暂的水华，并为解释潮汐活跃的沿海环境中的水华变化提供了通用的机制基础。"
      summary_zh: "摘要：潮汐活跃的河口浮游植物的繁殖通常是短暂的，但驱动其快速爆发和突然崩溃的机制仍然知之甚少。仅靠营养富集并不能解释这些快速的繁荣-萧条循环，这表明潮汐循环等周期性强迫在控制水华动态方面具有潜在的调节作用。在这里，我们使用高分辨率三维物理-生物地球化学耦合模型，并通过现场观测进行验证，来调查厦门湾（一个富营养化的亚热带海湾）的短暂水华。小潮分层和最佳温度-光照条件有利于水华的发生，但随后的大潮通过湍流破坏、垂直输出到光限制层以及近海平流损失而导致水华迅速下降。 诊断预算分析显示，尽管生物产量仍然为正值，但实物出口始终超过其产量，这凸显了生物量保留相对于养分供应在维持水华方面的首要地位。尽管氮持续过量，但磷枯竭、光照稀释和阵发性强风进一步限制了水华的恢复能力。空间异质性进一步塑造了水华轨迹，半封闭的子流域支持局部生长，而开放区域则以运输过程为主。总之，这些结果支持了大潮汐河口水华调节的保留控制框架，其中春季-小潮周期充当了控制产量和损失之间平衡的分层时间调节器。 这种从以营养为中心到以滞留为介导的控制的转变有助于解释为什么富营养化河口经常出现短暂的水华，并为解释潮汐活跃的沿海环境中的水华变化提供了通用的机制基础。"
      summary_en: "Abstract: Phytoplankton blooms in tidally energetic estuaries are typically short‐lived, yet the mechanisms driving their rapid onset and abrupt collapse remain poorly understood. Nutrient enrichment alone cannot account for these rapid boom‐bust cycles, pointing to the potential regulatory role of periodic forcings such as tidal cycles in governing bloom dynamics. Here, we used a high‐resolution three‐dimensional physical‐biogeochemical coupled model, validated with field observations, to investigate a transient bloom in Xiamen Bay, a eutrophic subtropical embayment. Bloom initiation was favored by neap‐tide stratification and optimal temperature‐light conditions, but subsequent spring tides induced rapid decline through turbulent disruption, vertical export into light‐limited layers, and offshore advective loss. Diagnostic budget analyses revealed that although biological production remained positive, it was consistently outweighed by physical export, underscoring the primacy of biomass retention over nutrient supply in sustaining blooms. Despite persistent nitrogen excess, bloom resilience was further constrained by phosphorus depletion, light dilution, and episodic wind forcing. Spatial heterogeneity further shaped bloom trajectories, with semi‐enclosed sub‐basins supporting local growth while open areas were dominated by transport processes. Together, these results support a retention‐controlled framework for bloom regulation in macrotidal estuaries, in which the spring‐neap cycle acts as a hierarchical temporal regulator governing the balance between production and loss. This shift from nutrient‐centric to retention‐mediated controls helps explain why eutrophic estuaries often host short‐lived blooms and provides a generalized mechanistic basis for interpreting bloom variability in tidally energetic coastal environments."
    - title: "Extraction of Alteration Minerals and Prospecting Prediction in Vegetated Regions Based on GF-5B Hyperspectral Data: A Case Study of the Huzhou Region, Zhejiang Province, China"
      authors: "Yifan Huang; Zhichun Wu; Zhiqiang Zhang; Fusheng Guo; Baowen Guan; Ziwei Yan; Hualiang Li; Hui Liang; et al."
      journal: "Minerals"
      published: "2026-06-24"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/min16070669"
      url: "https://doi.org/10.3390/min16070669"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean colour; vertical structure"
      tags_zh: "ocean colour; vertical structure"
      tags_en: "ocean colour; vertical structure"
      summary: "摘要：高光谱遥感可以通过光谱图像集成和高分辨率功能来精确识别蚀变矿物。然而，植被干扰严重阻碍了植被地区蚀变信息的提取，从而对蚀变矿物的可靠识别提出了挑战。本研究利用在中国浙江省湖州地区获取的 GF-5B 卫星 AHSI 图像，通过新型区域自适应植被抑制技术 (ZAVST) 来应对这一挑战。 通过构建分段统计模型，将多个光谱带的反射率特征与 NDVI 值联系起来，ZAVST 展示了减轻植被遮挡对地下岩性特征的影响的增强能力，同时大大提高了对矿化的微妙光谱特征特征的识别。 结果揭示了不同的空间模式：含铁蚀变矿物（赤铁矿、黄铁矿）沿 NE 向断层和火山盆地边缘排列； Al-OH蚀变（蒙脱石、高岭石）聚集在侵入接触面附近； Mg-OH 蚀变（绿泥石、绿帘石）发生在碳酸盐层序和隐蔽侵入体之间的界面处。 在该地区发现了表现出堆叠矿物特征（多达四种不同类型）的复合蚀变异常，表明与已知矿化中心具有很强的空间相关性。综合蚀变分带、构造线貌、地层、地球化学异常和矿体记录等，研究圈定了李家巷镇、梅溪镇东部、庙溪镇和莫干山火山盆地中部四个优先目标。"
      summary_zh: "摘要：高光谱遥感可以通过光谱图像集成和高分辨率功能来精确识别蚀变矿物。然而，植被干扰严重阻碍了植被地区蚀变信息的提取，从而对蚀变矿物的可靠识别提出了挑战。本研究利用在中国浙江省湖州地区获取的 GF-5B 卫星 AHSI 图像，通过新型区域自适应植被抑制技术 (ZAVST) 来应对这一挑战。 通过构建分段统计模型，将多个光谱带的反射率特征与 NDVI 值联系起来，ZAVST 展示了减轻植被遮挡对地下岩性特征的影响的增强能力，同时大大提高了对矿化的微妙光谱特征特征的识别。 结果揭示了不同的空间模式：含铁蚀变矿物（赤铁矿、黄铁矿）沿 NE 向断层和火山盆地边缘排列； Al-OH蚀变（蒙脱石、高岭石）聚集在侵入接触面附近； Mg-OH 蚀变（绿泥石、绿帘石）发生在碳酸盐层序和隐蔽侵入体之间的界面处。 在该地区发现了表现出堆叠矿物特征（多达四种不同类型）的复合蚀变异常，表明与已知矿化中心具有很强的空间相关性。综合蚀变分带、构造线貌、地层、地球化学异常和矿体记录等，研究圈定了李家巷镇、梅溪镇东部、庙溪镇和莫干山火山盆地中部四个优先目标。"
      summary_en: "Abstract: Hyperspectral remote sensing enables precise identification of alteration mineral through spectral–image integration and high-resolution capabilities. However, vegetation interference significantly hinders the extraction of alteration information in vegetated areas, thereby posing challenges to the reliable identification of alteration minerals. This study employs GF-5B satellite AHSI imagery acquired in the Huzhou region of Zhejiang Province, China, to address this challenge via a novel Zonal Adaptive Vegetation Suppression Technique (ZAVST). By constructing segmented statistical models that links reflectance characteristics across multiple spectral bands to NDVI values, ZAVST demonstrates an enhanced capability to mitigate vegetation obscuration effects on subsurface lithological features while substantially improving the identification of subtle spectral signatures characteristic of mineralization. Results reveal distinct spatial patterns: Fe-bearing alteration minerals (hematite, pyrite) align along NE-trending faults and volcanic basin margins; Al-OH alterations (montmorillonite, kaolinite) cluster near intrusive contacts; Mg-OH alterations (chlorite, epidote) occur at interfaces between carbonate sequences and concealed intrusions. Composite alteration anomalies exhibiting stacked mineral signatures (up to four distinct types) were identified across the region, demonstrating a strong spatial correlation with known mineralization centers. By integrating alteration zonation, structural lineaments, stratigraphy, geochemical anomalies, and orebody records, this study delineated four priority targets: Lijiaxiang Town, eastern Meixi Town, Miaoxi Town, and the central Moganshan Volcanic Basin."
    - title: "Retrieving tropospheric temperature and humidity profiles over the ocean using buoy-based microwave radiometers"
      authors: "Zhiqian Li; Fuqing Liu; Shuo Jiang; Zhongling Zhou; Zhijin Qiu; Jing Zou; Tong Hu; Ke Qi; et al."
      journal: "Atmospheric Measurement Techniques"
      published: "2026-06-25"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/amt-19-4121-2026"
      url: "https://doi.org/10.5194/amt-19-4121-2026"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：获取海上大气温度和湿度剖面对于气象预报、海洋监测和国家安全具有重要战略意义。在复杂海况下实现其实时、稳定、常规检索是一项关键而紧迫的挑战。传统的检索方法严重依赖于大型历史数据集。然而，海洋探测站稀疏，使得数据采集具有挑战性。地基微波辐射计具有独特的连续、全天候遥感大气热辐射的能力，能够对海洋区域的温度和湿度剖面进行常规检索。同时，浮标平台会受到波浪扰动，导致天顶角观测结果发生实时变化。如果不进行校正，这会导致目标亮度温度出现显着的随机误差。 针对这些问题，本文提出了一种协作检索方法。该方法不依赖大规模历史数据集进行模型训练，并集成平台态度信息。我们的方法使用多目标遗传算法基于有限数量的本地无线电探空仪数据构建小规模联合先验数据库，该数据库仅作为检索过程的初始物理约束。它还结合了姿态误差修正模型、经验压力高度方程和并行优化策略。这从而减少了对大量历史数据集的依赖。它还可以有效减轻姿态引起的亮度温度偏差，提高计算效率，并实现海洋大气剖面的实时、常规检索。 模拟实验和青岛胶州湾的现场测试证实了这一结果。在稀疏数据条件下，系统偏差校正前温度RMSE为4. 11 K，校正后为2. 13 K；相对湿度RMSE校正前为24. 09 %，校正后为21. 42 %。提出了用于操作部署的单一静态偏差校正配置文件，其实现了与交​​叉验证结果相当的性能。这验证了该方法在真实海洋环境中的稳定性和适用性。这项研究为无线电探空仪稀疏的海洋区域实时、稳定、常规地探测海洋大气参数提供了一条潜在的实用途径。"
      summary_zh: "摘要：获取海上大气温度和湿度剖面对于气象预报、海洋监测和国家安全具有重要战略意义。在复杂海况下实现其实时、稳定、常规检索是一项关键而紧迫的挑战。传统的检索方法严重依赖于大型历史数据集。然而，海洋探测站稀疏，使得数据采集具有挑战性。地基微波辐射计具有独特的连续、全天候遥感大气热辐射的能力，能够对海洋区域的温度和湿度剖面进行常规检索。同时，浮标平台会受到波浪扰动，导致天顶角观测结果发生实时变化。如果不进行校正，这会导致目标亮度温度出现显着的随机误差。 针对这些问题，本文提出了一种协作检索方法。该方法不依赖大规模历史数据集进行模型训练，并集成平台态度信息。我们的方法使用多目标遗传算法基于有限数量的本地无线电探空仪数据构建小规模联合先验数据库，该数据库仅作为检索过程的初始物理约束。它还结合了姿态误差修正模型、经验压力高度方程和并行优化策略。这从而减少了对大量历史数据集的依赖。它还可以有效减轻姿态引起的亮度温度偏差，提高计算效率，并实现海洋大气剖面的实时、常规检索。 模拟实验和青岛胶州湾的现场测试证实了这一结果。在稀疏数据条件下，系统偏差校正前温度RMSE为4. 11 K，校正后为2. 13 K；相对湿度RMSE校正前为24. 09 %，校正后为21. 42 %。提出了用于操作部署的单一静态偏差校正配置文件，其实现了与交​​叉验证结果相当的性能。这验证了该方法在真实海洋环境中的稳定性和适用性。这项研究为无线电探空仪稀疏的海洋区域实时、稳定、常规地探测海洋大气参数提供了一条潜在的实用途径。"
      summary_en: "Abstract: The acquisition of atmospheric temperature and humidity profiles over the sea is strategically vital for meteorological forecasting, marine monitoring, and national security. Achieving their real-time, stable, and routine retrieval under complex sea conditions is a critical and urgent challenge. Traditional retrieval methods rely heavily on large historical datasets. However, marine sounding stations are sparse, making data acquisition challenging. Ground-based microwave radiometers offer a unique capability for continuous, all-weather remote sensing of atmospheric thermal emission, enabling routine retrieval of temperature and humidity profiles over oceanic regions. Meanwhile, buoy platforms experience wave disturbance, causing real-time variations in zenith angle observations. Without correction, this induces significant random errors in target brightness temperature. To address these issues, this paper proposes a collaborative retrieval method. This method does not rely on large-scale historical datasets for model training and integrates platform attitude information. Our approach uses a multi-objective genetic algorithm to construct a small-scale joint prior database based on a limited amount of local radiosonde data, which serves only as an initial physical constraint for the retrieval process. It also incorporates an attitude error correction model, an empirical pressure-altitude equation, and a parallel optimization strategy. This thereby reduces dependence on extensive historical datasets. It also effectively mitigates attitude-induced brightness-temperature deviation, enhances computational efficiency, and enables real-time, routine retrieval of marine atmospheric profiles. Simulation experiments and field tests in Qingdao's Jiaozhou Bay confirm the results. Under sparse-data conditions, the temperature RMSE is 4.11 K before systematic bias correction and 2.13 K after correction, while the relative-humidity RMSE is 24.09 % before correction and 21.42 % after correction. A single static bias correction profile is proposed for operational deployment, which achieves performance comparable to the cross-validation results. This validates the method's stability and applicability in real marine environments. This research provides a potentially practical pathway for ocean areas with sparse radiosondes for real-time, stable, and routine detection of marine atmospheric parameters."
    - title: "Biodiversity-Centered Blue Carbon Management in Vegetated Coastal Wetlands: A Review of Conservation, Restoration, Monitoring, and Climate Adaptation Across Mangroves, Seagrass Beds, and Salt Marshes"
      authors: "Yan Zheng; Wenhai Lu; Hefeng Wang"
      journal: "Diversity"
      published: "2026-06-24"
