      tags: "phytoplankton; bio-optics"
      tags_zh: "phytoplankton; bio-optics"
      tags_en: "phytoplankton; bio-optics"
      summary: "摘要：NOAA 的太平洋海洋环境实验室 (PMEL) 自 1991 年以来一直在研究航行中测量气溶胶化学、微物理、光学和云成核特性。这 25 次航行覆盖了世界上所有的海洋 - 太平洋、大西洋、印度洋、北极和南半球。其结果是迄今为止最全面、公开的海洋大气气溶胶特性数据库。该数据库还包含气相物种（O3、SO2）、氡和二甲硫醚（DMS）、海水物种（DMS、NH4+、NO3-和叶绿素a）以及气象参数。此处提供了巡航的详细信息（地点、日期和目标）、测量的参数、使用的仪器和数据可用性。还包括 PMEL 的高级主要发现以及其他人过去对数据的使用。 本文的目标是提高大气气溶胶原位测量、卫星和建模界对数据库的更广泛认识。数据可在 NOAA 国家环境信息中心 (NCEI) 数据档案中公开获取 (https://www.ncei.noaa.gov/, NOAA, 2025)（另请参阅表 7 中所有数据集的列表）。本文提供了每次巡航的数字对象标识符 (DOI) 的链接。"
      summary_zh: "摘要：NOAA 的太平洋海洋环境实验室 (PMEL) 自 1991 年以来一直在研究航行中测量气溶胶化学、微物理、光学和云成核特性。这 25 次航行覆盖了世界上所有的海洋 - 太平洋、大西洋、印度洋、北极和南半球。其结果是迄今为止最全面、公开的海洋大气气溶胶特性数据库。该数据库还包含气相物种（O3、SO2）、氡和二甲硫醚（DMS）、海水物种（DMS、NH4+、NO3-和叶绿素a）以及气象参数。此处提供了巡航的详细信息（地点、日期和目标）、测量的参数、使用的仪器和数据可用性。还包括 PMEL 的高级主要发现以及其他人过去对数据的使用。 本文的目标是提高大气气溶胶原位测量、卫星和建模界对数据库的更广泛认识。数据可在 NOAA 国家环境信息中心 (NCEI) 数据档案中公开获取 (https://www.ncei.noaa.gov/, NOAA, 2025)（另请参阅表 7 中所有数据集的列表）。本文提供了每次巡航的数字对象标识符 (DOI) 的链接。"
      summary_en: "Abstract: NOAA's Pacific Marine Environmental Laboratory (PMEL) has made measurements of aerosol chemical, microphysical, optical, and cloud nucleating properties onboard research cruises since 1991. The twenty-five cruises have covered all of the world's oceans – the Pacific, Atlantic, Indian, Arctic, and Southern. The result is the most comprehensive, publicly available database of aerosol properties in the marine atmosphere to date. The database also contains gas-phase species (O3, SO2), Radon, and dimethylsulfide (DMS), seawater species (DMS, NH4+, NO3-, and chlorophyll a), and meteorological parameters. Details of the cruises (locations, dates, and objectives), parameters measured, instrumentation used, and data availability are provided here. Also included are PMEL's high-level major findings and past usage of the data by others. The goal of this paper is to promote broader awareness of the database to the atmospheric aerosol in situ measurement, satellite, and modelling communities. Data are publicly available at NOAA's National Centers for Environmental Information (NCEI) data archive (https://www.ncei.noaa.gov/, NOAA, 2025) (see also the list of all data sets in Table 7). Links to the Digital Object Identifiers (DOIs) for each cruise are provided herein."
    - title: "A 30-year ocean front dataset from 1993 to 2023 for the Northwest Pacific Ocean based on deep learning"
      authors: "Yuan Niu; Xuefeng Zhang; Dianjun Zhang"
      journal: "Earth System Science Data"
      published: "2026-06-24"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/essd-18-4303-2026"
      url: "https://doi.org/10.5194/essd-18-4303-2026"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：海洋锋面是不同水团之间的关键界面，深刻影响着大气-海洋相互作用、天气系统、海洋生态系统和气候调节。对海洋锋面的准确和长期观测对于推进气象学、海洋学和气候科学的研究至关重要。然而，目前尚不存在公开可用的长期海滨数据集，并且现有的检测方法通常依赖于耗时的手动标记或传统算法，在复杂的正面区域精度有限。在这项研究中，我们发布了第一个公开的西北太平洋 30 年海滨数据集（1993-2023），该数据集是通过将深度学习框架（Mask R-CNN）应用于每日海面温度（SST）场而生成的，并使用手动注释的样本进行模型训练。 该模型利用 L3 遥感卫星海表温度数据和 GLORYS12V1 L4 再分析海表温度产品进行训练。该数据集提供像素级额叶边界以及相关属性，包括位置、强度和宽度，以 NetCDF-4 格式以 1/12° 空间和每日时间分辨率存储。精度评估表明，平均精度（mAP）超过0. 90，与传统梯度方法相比，前沿宽度和强度误差更小。该数据集提供了三个主要贡献：（1）它通过提供标准化的长期海滨产品填补了关键空白； （2）它作为深度学习模型的即用型训练资源，大大减少了手动标记的需要； (3)为其他海滨探测产品的验证和比对提供基准样本。 该数据集支持对季节性到年际锋面变化的强有力的研究，并为气象学、生态系统管理和气候变化研究的应用提供了宝贵的基础。本研究开发的海滨数据集可在 https://doi 上获取。 org/10.第5281章16921277（牛，2025a）。"
      summary_zh: "摘要：海洋锋面是不同水团之间的关键界面，深刻影响着大气-海洋相互作用、天气系统、海洋生态系统和气候调节。对海洋锋面的准确和长期观测对于推进气象学、海洋学和气候科学的研究至关重要。然而，目前尚不存在公开可用的长期海滨数据集，并且现有的检测方法通常依赖于耗时的手动标记或传统算法，在复杂的正面区域精度有限。在这项研究中，我们发布了第一个公开的西北太平洋 30 年海滨数据集（1993-2023），该数据集是通过将深度学习框架（Mask R-CNN）应用于每日海面温度（SST）场而生成的，并使用手动注释的样本进行模型训练。 该模型利用 L3 遥感卫星海表温度数据和 GLORYS12V1 L4 再分析海表温度产品进行训练。该数据集提供像素级额叶边界以及相关属性，包括位置、强度和宽度，以 NetCDF-4 格式以 1/12° 空间和每日时间分辨率存储。精度评估表明，平均精度（mAP）超过0. 90，与传统梯度方法相比，前沿宽度和强度误差更小。该数据集提供了三个主要贡献：（1）它通过提供标准化的长期海滨产品填补了关键空白； （2）它作为深度学习模型的即用型训练资源，大大减少了手动标记的需要； (3)为其他海滨探测产品的验证和比对提供基准样本。 该数据集支持对季节性到年际锋面变化的强有力的研究，并为气象学、生态系统管理和气候变化研究的应用提供了宝贵的基础。本研究开发的海滨数据集可在 https://doi 上获取。 org/10.第5281章16921277（牛，2025a）。"
      summary_en: "Abstract: Ocean fronts are critical interfaces between different water masses and profoundly influence atmosphere–ocean interactions, weather systems, marine ecosystems, and climate regulation. Accurate and long-term observations of ocean fronts are essential for advancing studies in meteorology, oceanography, and climate science. However, no publicly available, long-term ocean front dataset currently exists, and the existing detection methods often rely on time-consuming manual labeling or traditional algorithms with limited accuracy in complex frontal regions. In this study, we release the first publicly available 30-year ocean front dataset (1993–2023) for the Northwest Pacific, which was generated by applying a deep learning framework (Mask R-CNN) to daily sea surface temperature (SST) fields with manually annotated samples for model training. The model was trained utilizing both L3 remote sensing satellite SST data and the GLORYS12V1 L4 reanalysis SST product. The dataset provides pixel-level frontal boundaries along with the associated attributes, including the position, intensity, and width, stored in NetCDF-4 format at a 1/12° spatial and daily temporal resolution. An accuracy evaluation shows that the mean average precision (mAP) exceeds 0.90, and compared with traditional gradient methods, the errors in front width and intensity are smaller. The dataset offers three main contributions: (1) It fills a critical gap by providing a standardized, long-term ocean front product; (2) it serves as a ready-to-use training resource for deep learning models that greatly reduces the need for manual labeling; and (3) it provides benchmark samples for validation and intercomparison of other ocean front detection products. This dataset supports robust investigations of the seasonal-to-interannual frontal variability and provides a valuable foundation for applications in meteorology, ecosystems management and climate change research. The ocean front dataset developed in this study is available at https://doi.org/10.5281/zenodo.16921277 (Niu, 2025a)."
