      tags: "vertical structure"
      tags_zh: "vertical structure"
      tags_en: "vertical structure"
      summary: "摘要：识别每年夏天驱动南极海冰融化的全套过程对于改善当前模型准确模拟年度海冰周期的气候退却阶段的能力至关重要。这对于（1）理解和归因观察到的趋势和最近海冰覆盖的突然变化以及（2）对未来海冰状况和影响进行更可靠的预测至关重要。本文确定了波浪驱动的过程，可以加速边缘冰区（MIZ）和内部海冰区（SIZ）内开放水域海冰的季节性融化。它建立在长期持有的观点之上，即季节性南极海冰消融主要是由浮冰横向和底部融化驱动的，通过浮冰的波浪破碎而增强了MIZ，通过证明海浪通过三组过程在产生表面和内部融化（称为“波浪融化”）方面发挥着重要的附加作用：“波浪淹没”，“波浪粉碎”和“波浪绿化”（涉及波浪改变的冰中的藻类增殖）。根据现有的观测和简单的一维建模，与积雪覆盖的冰相比，这些波浪过程估计会使冰反照率降低 0. 64，导致垂直融化速率增强 0. 2 cm d−1，并通过波浪绿化放大至 1。该研究还确定了五种可能进一步加速冰融化的正反馈和子反馈机制。它解决了当前气候和地球系统模型中的一个空白，这些模型解释了波浪对浮冰尺寸分布的影响，但忽略了这些耦合的波浪驱动的动力学、热力学和生物过程，这些过程可能有助于解释南极海冰每年夏天为何以及如何快速融化。 这项基础研究的目的是促进进一步有针对性的调查，旨在量化波浪融化在年度海冰循环中的作用，以及波浪绿化对海冰区初级生产的贡献及其在反馈气候的关键生物地球化学过程中的作用。这项工作对行星反照率、全球气候反馈、海洋生态系统以及未来海冰和气候预测的准确性（在日益风暴的南大洋以及不断变化的北极）具有重要意义。"
      summary_zh: "摘要：识别每年夏天驱动南极海冰融化的全套过程对于改善当前模型准确模拟年度海冰周期的气候退却阶段的能力至关重要。这对于（1）理解和归因观察到的趋势和最近海冰覆盖的突然变化以及（2）对未来海冰状况和影响进行更可靠的预测至关重要。本文确定了波浪驱动的过程，可以加速边缘冰区（MIZ）和内部海冰区（SIZ）内开放水域海冰的季节性融化。它建立在长期持有的观点之上，即季节性南极海冰消融主要是由浮冰横向和底部融化驱动的，通过浮冰的波浪破碎而增强了MIZ，通过证明海浪通过三组过程在产生表面和内部融化（称为“波浪融化”）方面发挥着重要的附加作用：“波浪淹没”，“波浪粉碎”和“波浪绿化”（涉及波浪改变的冰中的藻类增殖）。根据现有的观测和简单的一维建模，与积雪覆盖的冰相比，这些波浪过程估计会使冰反照率降低 0. 64，导致垂直融化速率增强 0. 2 cm d−1，并通过波浪绿化放大至 1。该研究还确定了五种可能进一步加速冰融化的正反馈和子反馈机制。它解决了当前气候和地球系统模型中的一个空白，这些模型解释了波浪对浮冰尺寸分布的影响，但忽略了这些耦合的波浪驱动的动力学、热力学和生物过程，这些过程可能有助于解释南极海冰每年夏天为何以及如何快速融化。 这项基础研究的目的是促进进一步有针对性的调查，旨在量化波浪融化在年度海冰循环中的作用，以及波浪绿化对海冰区初级生产的贡献及其在反馈气候的关键生物地球化学过程中的作用。这项工作对行星反照率、全球气候反馈、海洋生态系统以及未来海冰和气候预测的准确性（在日益风暴的南大洋以及不断变化的北极）具有重要意义。"
      summary_en: "Abstract: Identifying the full suite of processes that drive the melting of Antarctic sea ice each summer is crucial to improving the currently-poor ability of contemporary models to accurately simulate the climatological retreat phase of the annual sea-ice cycle. This is critical to (1) understanding and attributing observed trends and recent abrupt changes in sea-ice coverage and (2) the more robust prediction of future sea-ice conditions and impacts. This paper identifies wave-driven processes that can accelerate the seasonal melting of sea ice both in the marginal ice zone (MIZ) and in open-water areas within the interior sea-ice zone (SIZ). It builds on the long-held view that seasonal Antarctic sea-ice ablation is primarily driven by ice-floe lateral and basal melting enhanced in the MIZ by wave breakup of ice floes, by demonstrating that ocean waves play important additional roles in generating surface and interior melting (termed “wave melting”) via three sets of processes: “wave flooding”, “wave pulverisation”, and “wave greening” (involving algal proliferation in wave-modified ice). Based on existing observations and simple one-dimensional modelling, these wave processes are estimated to reduce ice albedo by 0.38–0.64 compared to snow-covered ice, resulting in vertical melt-rate enhancements of 0.9–5.2 cm d−1 amplified by wave greening to 1.1–6.1 cm d−1. The study also identifies five positive feedback and sub-feedback mechanisms that likely accelerate the ice melting further. It addresses a gap in current climate and Earth system models, which account for wave effects on floe-size distributions but overlook these coupled wave-driven dynamic, thermodynamic and biological processes that may contribute to explaining why and how Antarctic sea ice can melt back so rapidly each summer. An intention of this foundational study is to stimulate further targeted investigation aimed at quantifying the role of wave melting in the annual sea-ice cycle – as well as the contribution of wave greening to primary production in the sea-ice zone and its role in key biogeochemical processes that feed back to climate. The work has implications for planetary albedo, global climate feedbacks, marine ecosystems, and the accuracy of future sea-ice and climate projections in an increasingly-stormy Southern Ocean, as well as in a changing Arctic."
    - title: "Mapping Octopus (Octopus cyanea) Fishing Grounds Based on Sea Surface Temperature and Chlorophyll-a In the Waters of Langkai–Lanjukang"
      authors: "Nasdwiana Nasdwiana; Hasmawati Hasmawati; Husniati Husniati; Nirwan Dessibali; Nuryamin Nuryamin"
