      summary: "摘要：这项研究开发了一个基于异常的框架，根据 2022 年至 2024 年期间卫星获得的海面温度 (SST) 和叶绿素-a (Chl-a) 绘制望加锡海峡的潜在捕鱼区 (PFZ)。每日 GCOM-C/SGLI Level-3 第 3 版产品经过质量屏蔽、转换为物理单位、聚合为 0. 1° 网格，并汇总为每月综合数据。然后相对于特定月份的三年气候学计算每月异常情况。 PFZ 被定义为同时显示高叶绿素 a 异常的像素，由时间平均异常场空间分布的第 80 个百分位数表示，并且相对冷却（海温异常 ≤ 0）。每月 PFZ 面积范围为 4,658 至 144,923 km²，平均值为 52,606 ± 33,834 km²，而 PFZ 面积分数范围为 0。从季节上看，PFZ 在 JJA 期间最广泛（平均 66,973 km²；分数 0. 161），在 DJF 期间最广泛（43,046 km²；分数 0. 161）。反复出现的 PFZ 热点集中在望加锡海峡中南部和苏拉威西海岸附近的东部地区，有效像素诊断显示 AOI 水平覆盖相对稳定（SST 平均值为 0. 548），这表明观察到的 PFZ 变化不能仅用数据差距来解释。支持基于生态系统的渔业管理、生物多样性保护和海洋资源的可持续利用，同时符合可持续发展目标 14（水下生物）和《生物多样性公约》2020 年后全球生物多样性框架。"
      summary_zh: "摘要：这项研究开发了一个基于异常的框架，根据 2022 年至 2024 年期间卫星获得的海面温度 (SST) 和叶绿素-a (Chl-a) 绘制望加锡海峡的潜在捕鱼区 (PFZ)。每日 GCOM-C/SGLI Level-3 第 3 版产品经过质量屏蔽、转换为物理单位、聚合为 0. 1° 网格，并汇总为每月综合数据。然后相对于特定月份的三年气候学计算每月异常情况。 PFZ 被定义为同时显示高叶绿素 a 异常的像素，由时间平均异常场空间分布的第 80 个百分位数表示，并且相对冷却（海温异常 ≤ 0）。每月 PFZ 面积范围为 4,658 至 144,923 km²，平均值为 52,606 ± 33,834 km²，而 PFZ 面积分数范围为 0。从季节上看，PFZ 在 JJA 期间最广泛（平均 66,973 km²；分数 0. 161），在 DJF 期间最广泛（43,046 km²；分数 0. 161）。反复出现的 PFZ 热点集中在望加锡海峡中南部和苏拉威西海岸附近的东部地区，有效像素诊断显示 AOI 水平覆盖相对稳定（SST 平均值为 0. 548），这表明观察到的 PFZ 变化不能仅用数据差距来解释。支持基于生态系统的渔业管理、生物多样性保护和海洋资源的可持续利用，同时符合可持续发展目标 14（水下生物）和《生物多样性公约》2020 年后全球生物多样性框架。"
      summary_en: "Abstract: This study developed an anomaly-based framework to map potential fishing zones (PFZs) in the Makassar Strait from satellite-derived sea surface temperature (SST) and chlorophyll-a (Chl-a) during 2022–2024. Daily GCOM-C/SGLI Level-3 Version 3 products were quality-masked, converted to physical units, aggregated to a 0.1° × 0.1° grid, and summarized as monthly composites. Monthly anomalies were then calculated relative to a month-specific three-year climatology. PFZs were defined as pixels simultaneously showing high Chl-a anomalies, represented by the 80th percentile of the spatial distribution of the temporal mean anomaly field, and relative cooling (SST anomaly ≤ 0). Monthly PFZ area ranged from 4,658 to 144,923 km², with a mean of 52,606 ± 33,834 km², whereas PFZ area fraction ranged from 0.012 to 0.352, with a mean of 0.130 ± 0.084. Seasonally, PFZs were most extensive during JJA (mean 66,973 km²; fraction 0.161) and least extensive during DJF (43,046 km²; fraction 0.112). Recurrent PFZ hotspots were concentrated in the central-southern Makassar Strait and along the eastern sector near the Sulawesi coast, where occurrence frequency reached about 58%. Valid-pixel diagnostics showed relatively stable AOI-level coverage (SST mean 0.534; Chl-a mean 0.548), indicating that the observed PFZ variability could not be explained by data gaps alone. These findings indicate that recurrent PFZs can be interpreted as pelagic ecosystem service hotspots that support ecosystem-based fisheries management, biodiversity conservation, and the sustainable use of marine resources, while aligning with SDG 14 (Life Below Water) and the post-2020 global biodiversity framework of the Convention on Biological Diversity."
