      summary: "把 Line P 附近 BGC-Argo、色素和 DNA metabarcoding 结合分析。结果显示 2015 和 2019 海洋热浪期间 POC 异常升高，但小颗粒在中层累积并缓慢再矿化，未必提高深海封存，反而可能降低碳泵效率。"
      summary_zh: "把 Line P 附近 BGC-Argo、色素和 DNA metabarcoding 结合分析。结果显示 2015 和 2019 海洋热浪期间 POC 异常升高，但小颗粒在中层累积并缓慢再矿化，未必提高深海封存，反而可能降低碳泵效率。"
      summary_en: "This study combines BGC-Argo, pigments and DNA metabarcoding near Line P. It finds anomalously high POC during the 2015 and 2019 marine heatwaves, but small particles accumulated and remineralized slowly at mid-depths, potentially reducing carbon-pump efficiency."
