      tags_en: "phytoplankton metabolites; dissolved organic matter; microbial loop"
      summary: "这项研究分析浮游植物释放的代谢物如何影响表层海洋碳通量。它使用高分辨率有机分子分析和稳定同位素追踪来识别快速周转的溶解有机碳来源。研究关注这些低浓度、短寿命代谢物如何被微生物利用，并进入微生物环。结果把浮游植物初级生产和 labile DOC 的分子组成联系起来。它对理解 DOM、微生物碳泵和非颗粒碳通道很有帮助。"
      summary_zh: "这项研究分析浮游植物释放的代谢物如何影响表层海洋碳通量。它使用高分辨率有机分子分析和稳定同位素追踪来识别快速周转的溶解有机碳来源。研究关注这些低浓度、短寿命代谢物如何被微生物利用，并进入微生物环。结果把浮游植物初级生产和 labile DOC 的分子组成联系起来。它对理解 DOM、微生物碳泵和非颗粒碳通道很有帮助。"
      summary_en: "This study examines how metabolites released by phytoplankton mediate carbon flux through the surface ocean. It uses high-resolution molecular analysis and stable-isotope tracing to identify rapidly cycling sources of dissolved organic carbon. The work focuses on how low-concentration, short-lived metabolites are consumed by microbes and routed into the microbial loop. The results connect phytoplankton primary production with the molecular composition of labile DOC. It is useful for understanding DOM cycling, the microbial carbon pump, and non-particle carbon pathways."
    - title: "Hyperspectral retrieval of phytoplankton absorption and community composition from NASA’s PACE-OCI in estuarine–coastal waters using a hybrid framework combining mixture-of-experts and Variational Autoencoder"
      authors: "Xingyu Bai; Bingqing Liu; Jiang Li; Yuanheng Xiong; Eurico J. D'Sa; Melissa M. Baustian; Xiaodong Zhang; Brice K. Grunert; et al."
      journal: "Remote Sensing of Environment"
