    - title: "Physiological responses of intertidal and subtidal corals Anomastraea irregularis and Pocillopora verrucosa exposed to experimental thermal stress"
      authors: "Prishani Boodraj; David Glassom; Dalene Vosloo"
      journal: "Frontiers in Marine Science"
      published: "2026-06-08"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3389/fmars.2026.1828013"
