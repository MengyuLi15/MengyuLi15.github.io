      tags: "ocean colour; phytoplankton blooms; warming"
      tags_zh: "ocean colour; phytoplankton blooms; warming"
      tags_en: "ocean colour; phytoplankton blooms; warming"
      summary: "这项研究利用长期海色记录分析低纬到中纬海洋绿度和浮游植物藻华变化。它把卫星观测中的颜色、叶绿素和藻华信号放到气候变暖背景下解释。研究重点是识别变暖海洋中表层浮游植物活动是否减弱，以及这种变化在哪些纬度带更明显。结果指向低中纬海域海洋绿度和藻华活动下降。它对评估海色趋势、生产力变化和未来生态系统响应很有参考价值。"
      summary_zh: "这项研究利用长期海色记录分析低纬到中纬海洋绿度和浮游植物藻华变化。它把卫星观测中的颜色、叶绿素和藻华信号放到气候变暖背景下解释。研究重点是识别变暖海洋中表层浮游植物活动是否减弱，以及这种变化在哪些纬度带更明显。结果指向低中纬海域海洋绿度和藻华活动下降。它对评估海色趋势、生产力变化和未来生态系统响应很有参考价值。"
      summary_en: "This study uses long-term ocean-colour records to analyse changes in ocean greenness and phytoplankton blooms from low to mid-latitudes. It interprets satellite colour, chlorophyll, and bloom signals in the context of a warming climate. The work asks whether surface phytoplankton activity is weakening and where that weakening is most evident. The results point to declining ocean greenness and bloom activity across low- to mid-latitude waters. It is useful for assessing ocean-colour trends, productivity change, and future ecosystem responses."
    - title: "Decoupled timescales of organic carbon and phosphorus recycling in the global ocean"
      authors: "Megan R. Sullivan; François W. Primeau; Hojong Seo; Judith Camps-Castellà; Keisuke Inomura; Adam C. Martiny"
      journal: "Proceedings of the National Academy of Sciences"
      published: "2026"
      published_month: "2026-02"
      published_month_zh: "2026-02"
      doi: "10.1073/pnas.2514991123"
      url: "https://www.pnas.org/doi/10.1073/pnas.2514991123"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "organic carbon; phosphorus recycling; microbial carbon"
      tags_zh: "organic carbon; phosphorus recycling; microbial carbon"
      tags_en: "organic carbon; phosphorus recycling; microbial carbon"
      summary: "这项研究比较全球海洋中有机碳和磷的再循环时间尺度。它关注的问题是碳和营养元素是否按相同速度循环，而不是简单假设固定化学计量关系。研究通过全球尺度的循环框架分析微生物再矿化、营养盐供应和有机物周转之间的差异。结果说明，有机碳和磷的再循环可以明显脱耦，从而改变系统对扰动或施肥的响应。它对理解微生物碳循环、营养盐限制和生物碳泵效率很重要。"
      summary_zh: "这项研究比较全球海洋中有机碳和磷的再循环时间尺度。它关注的问题是碳和营养元素是否按相同速度循环，而不是简单假设固定化学计量关系。研究通过全球尺度的循环框架分析微生物再矿化、营养盐供应和有机物周转之间的差异。结果说明，有机碳和磷的再循环可以明显脱耦，从而改变系统对扰动或施肥的响应。它对理解微生物碳循环、营养盐限制和生物碳泵效率很重要。"
      summary_en: "This study compares the recycling timescales of organic carbon and phosphorus in the global ocean. It asks whether carbon and nutrient elements cycle at the same pace, rather than assuming fixed stoichiometric behaviour. The analysis uses a global cycling framework to examine differences among microbial remineralization, nutrient supply, and organic-matter turnover. The results show that organic carbon and phosphorus recycling can be strongly decoupled, changing how the system responds to disturbance or fertilization. It is important for understanding microbial carbon cycling, nutrient limitation, and biological carbon-pump efficiency."
    - title: "Global warming drives a threefold increase in persistence and 1 °C rise in intensity of marine heatwaves"
      authors: "Marta Marcos; Angel Amores; Miguel Agulles; Jon Robson; Xiangbo Feng"
      journal: "Proceedings of the National Academy of Sciences"
      published: "2025"
      published_month: "2025-04"
      published_month_zh: "2025-04"
      doi: "10.1073/pnas.2413505122"
      url: "https://www.pnas.org/doi/10.1073/pnas.2413505122"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "marine heatwaves; warming; global trend"
      tags_zh: "marine heatwaves; warming; global trend"
      tags_en: "marine heatwaves; warming; global trend"
      summary: "这项研究量化全球变暖对海洋热浪持续性和强度的影响。它使用全球海表温度记录和反事实气候比较，区分自然变率与人为变暖的作用。研究分析如果没有全球变暖，观测到的海洋热浪会有多强、多持久。结果显示，全球变暖显著增加了海洋热浪的持续时间，并提高了热浪强度。它为评估热浪生态影响、垂向浮游植物响应和未来极端事件风险提供了物理背景。"
      summary_zh: "这项研究量化全球变暖对海洋热浪持续性和强度的影响。它使用全球海表温度记录和反事实气候比较，区分自然变率与人为变暖的作用。研究分析如果没有全球变暖，观测到的海洋热浪会有多强、多持久。结果显示，全球变暖显著增加了海洋热浪的持续时间，并提高了热浪强度。它为评估热浪生态影响、垂向浮游植物响应和未来极端事件风险提供了物理背景。"
      summary_en: "This study quantifies how global warming affects the persistence and intensity of marine heatwaves. It uses global sea-surface temperature records and counterfactual climate comparisons to separate natural variability from anthropogenic warming. The analysis asks how strong and persistent observed marine heatwaves would have been without global warming. The results show that warming substantially increases heatwave persistence and raises heatwave intensity. It provides physical context for ecological impacts, vertical phytoplankton responses, and future ocean extreme-event risk."
    - title: "Characterization of phytoplankton-excreted metabolites mediating carbon flux through the surface ocean"
      authors: "Yuting Zhu; Hanna S. Anderson; Eli Salcedo; Samuel E. Miller; Krista Longnecker; Melissa C. Kido Soule; Sheean T. Haley; Gretchen J. Swarr; et al."
      journal: "Proceedings of the National Academy of Sciences"
