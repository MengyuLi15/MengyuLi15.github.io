      summary: "摘要：中尺度涡流是海洋的活跃物理特征，对有机物的生物地球化学循环产生强烈影响。然而，它们在构建耦合颗粒物和溶解有机物（POM 和 DOM）动力学方面的综合作用仍然知之甚少，限制了对其对碳输出和封存净效应的机械理解。为了解决这一知识差距，我们对西北太平洋的一对冷暖中尺度涡流进行了多参数调查，将水文观测与 POM 稳定同位素分析（δ 13 C-POC 和 δ 15 N-PN）以及发色和荧光溶解有机物（CDOM 和 FDOM）的光学表征相结合。我们的结果表明，冷涡和暖涡代表了有机物产生和转化的两种截然不同的机制。尽管冷涡通过上升流增强了营养供应，刺激了新鲜浮游植物衍生的聚甲醛的产生，但由于快速的生物降解，其库存量相对较低，这表明高周转过程。相比之下，暖涡起到了降解反应器的作用，其中表面有机物和富氧水的下降和俯冲促进了微生物再加工，富含 13 C 的颗粒有机碳和顽固性腐殖质 DOM 的产生增加就证明了这一点。这些发现表明，在所研究的一对特定涡流中，冷涡流和暖涡流可以支持互补的碳路径，冷涡流促进快速生物泵，而暖涡流促进微生物再加工，将有机物转移到溶解池中。 因此，这些路径的相对重要性可能会影响公海涡流丰富区域的碳封存潜力。"
      summary_zh: "摘要：中尺度涡流是海洋的活跃物理特征，对有机物的生物地球化学循环产生强烈影响。然而，它们在构建耦合颗粒物和溶解有机物（POM 和 DOM）动力学方面的综合作用仍然知之甚少，限制了对其对碳输出和封存净效应的机械理解。为了解决这一知识差距，我们对西北太平洋的一对冷暖中尺度涡流进行了多参数调查，将水文观测与 POM 稳定同位素分析（δ 13 C-POC 和 δ 15 N-PN）以及发色和荧光溶解有机物（CDOM 和 FDOM）的光学表征相结合。我们的结果表明，冷涡和暖涡代表了有机物产生和转化的两种截然不同的机制。尽管冷涡通过上升流增强了营养供应，刺激了新鲜浮游植物衍生的聚甲醛的产生，但由于快速的生物降解，其库存量相对较低，这表明高周转过程。相比之下，暖涡起到了降解反应器的作用，其中表面有机物和富氧水的下降和俯冲促进了微生物再加工，富含 13 C 的颗粒有机碳和顽固性腐殖质 DOM 的产生增加就证明了这一点。这些发现表明，在所研究的一对特定涡流中，冷涡流和暖涡流可以支持互补的碳路径，冷涡流促进快速生物泵，而暖涡流促进微生物再加工，将有机物转移到溶解池中。 因此，这些路径的相对重要性可能会影响公海涡流丰富区域的碳封存潜力。"
      summary_en: "Abstract: Mesoscale eddies are active physical features of the ocean that exert a strong influence on the biogeochemical cycling of organic matter. However, their integrated roles in structuring coupled particulate and dissolved organic matter (POM and DOM) dynamics remain poorly understood, limiting the mechanistic understanding of their net effect on carbon export and sequestration. To address this knowledge gap, we conducted a multi‐parameter investigation across a cold‐warm pair of mesoscale eddies in the northwestern Pacific Ocean, combining hydrographic observations with stable isotope analyses of POM (δ 13 C‐POC and δ 15 N‐PN) and optical characterization of chromophoric and fluorescent dissolved organic matter (CDOM and FDOM). Our results show that the cold and warm eddies represent two contrasting regimes of organic matter production and transformation. The cold eddy, despite enhanced nutrient supply through upwelling that stimulated the production of fresh phytoplankton‐derived POM, exhibited relatively low inventories due to rapid biological degradation, indicative of a high‐turnover process. In contrast, the warm eddy functioned as a degradation reactor, where downwelling and subduction of surface organic matter and rich‐oxygen water fueled elevated microbial reprocessing, as evidenced by 13 C‐enriched particulate organic carbon and enhanced production of recalcitrant humic‐like DOM. These findings indicate that in the specific pair of eddies investigated, cold and warm eddies can support complementary carbon pathways, with cold eddies promoting a rapid biological pump and warm eddies fostering microbial reprocessing that shifts organic matter toward the dissolved pool. The relative importance of these pathways is therefore likely to influence the carbon sequestration potential of eddy‐rich regions in the open ocean."
