      summary: "摘要：细菌代谢是海洋有机碳转化的核心驱动力，但其与浮游植物产生的不同生物碳库的耦合仍然受到很少的限制。我们在太平洋亚热带边缘海台湾海峡的不同环境梯度上进行了七次航行，同时量化了细菌代谢率以及浮游植物衍生的颗粒初级生产（PPP）和溶解初级生产（DPP），以研究它们与细菌代谢的关系。浮游植物释放的 DPP 通常不足以满足细菌碳需求 (BCD)，这表明很大程度上依赖于通过食物网处理从颗粒有机物中再生的溶解有机碳。细菌的产生与 DPP 的相关性更强，而细菌的呼吸与 PPP 的相关性更密切。因此，细菌生长效率（BGE）与以溶解形式释放的初级产物的比例共同变化，表明浮游植物碳分配和细菌代谢平衡之间存在系统关联。细菌-浮游植物耦合在不同的物理水团中进一步变化。河流羽流水域表现出较低的 BGE 和较低的 DPP 分数，而近海寡营养水域则表现出较高的 BGE 和较高的 DPP 分数。上升流和混合水显示出相似的 DPP 分数，但 BGE 和 BCD 不同，反映了环境条件和碳供应动态的变化。这些发现为动态边缘海中细菌-浮游植物耦合和微生物碳流路径提供了观测限制。"
      summary_zh: "摘要：细菌代谢是海洋有机碳转化的核心驱动力，但其与浮游植物产生的不同生物碳库的耦合仍然受到很少的限制。我们在太平洋亚热带边缘海台湾海峡的不同环境梯度上进行了七次航行，同时量化了细菌代谢率以及浮游植物衍生的颗粒初级生产（PPP）和溶解初级生产（DPP），以研究它们与细菌代谢的关系。浮游植物释放的 DPP 通常不足以满足细菌碳需求 (BCD)，这表明很大程度上依赖于通过食物网处理从颗粒有机物中再生的溶解有机碳。细菌的产生与 DPP 的相关性更强，而细菌的呼吸与 PPP 的相关性更密切。因此，细菌生长效率（BGE）与以溶解形式释放的初级产物的比例共同变化，表明浮游植物碳分配和细菌代谢平衡之间存在系统关联。细菌-浮游植物耦合在不同的物理水团中进一步变化。河流羽流水域表现出较低的 BGE 和较低的 DPP 分数，而近海寡营养水域则表现出较高的 BGE 和较高的 DPP 分数。上升流和混合水显示出相似的 DPP 分数，但 BGE 和 BCD 不同，反映了环境条件和碳供应动态的变化。这些发现为动态边缘海中细菌-浮游植物耦合和微生物碳流路径提供了观测限制。"
      summary_en: "Abstract: Bacterial metabolism is a central driver of organic carbon transformation in the ocean, yet its coupling to distinct biogenic carbon pools produced by phytoplankton remains poorly constrained. We conducted seven cruises across diverse environmental gradients in the Taiwan Strait, a subtropical marginal sea of the Pacific, simultaneously quantifying bacterial metabolic rates alongside phytoplankton‐derived particulate primary production (PPP) and dissolved primary production (DPP) to examine their relationships with bacterial metabolism. Phytoplankton‐released DPP was generally insufficient to meet bacterial carbon demand (BCD), indicating substantial reliance on dissolved organic carbon regenerated from particulate organic matter through food‐web processing. Bacterial production showed a stronger association with DPP, whereas bacterial respiration was more closely associated with PPP. Accordingly, bacterial growth efficiency (BGE) co‐varied with the fraction of primary production released in the dissolved form, indicating systematic associations between phytoplankton carbon partitioning and bacterial metabolic balance. Bacteria‐phytoplankton coupling further varied across distinct physical water masses. River‐plume waters exhibited lower BGE and lower DPP fractions, whereas offshore oligotrophic waters exhibited higher BGE and higher DPP fractions. Upwelling and mixed waters displayed similar DPP fractions but differed in BGE and BCD, reflecting variability in environmental conditions and carbon supply dynamics. These findings provide observational constraints on bacteria‐phytoplankton coupling and microbial carbon flow pathways in dynamic marginal seas."
