      summary: "摘要：珊瑚礁生态系统通常被称为“海洋雨林”，在维持海洋生物多样性和沿海保护方面发挥着至关重要的作用，但日益受到气候变化和人类造成的压力的威胁。这项研究将遥感 (RS) 和地理信息系统 (GIS) 集成到 Google 地球引擎 (GEE) 云计算框架中，以评估埃及苏伊士湾西海岸珊瑚礁的退化情况。开发了一种稳健、可重复的方法来分析 Landsat 和 Sentinel-2 图像的 33 年时间序列（1986-2019）。使用经过验证的算法对关键环境压力因素进行量化，包括海面温度 (SST)、叶绿素 a 浓度和水浊度。使用监督随机森林分类绘制珊瑚礁范围图，总体准确度达到 91. 2%。 结果显示，研究期间珊瑚礁覆盖面积净损失 1. 15 平方公里，从 1986 年的 57. 15 平方公里减少到 2019 年的 55. 99 平方公里，估计不确定性为 ±2. 15 平方公里。 8平方公里。空间分析显示了明显的区域差异：最明显的损失发生在 2 区（Ras El Adabia–Ain Sokhna 港口；–4. 89 km²）和 4 区（Ras Abu Darge–Ras El Zaafrana；–4. 37 km²），主要是由于海上作业、港口扩张和沿海城市化。相反，7 区（Ras Bakar-Al-Ghardaqa）的增幅显着为 +7。 4平方公里，可能与有利的水动力条件和有限的人为干扰有关。这些发现证明了局部人类活动和自然过程如何共同塑造珊瑚礁动态。 该研究强调了将经过验证的地理空间技术整合到早期预警系统、保护规划和适应性管理策略中的至关重要性，以在全球环境加速变化的情况下增强珊瑚礁生态系统的长期可持续性。"
      summary_zh: "摘要：珊瑚礁生态系统通常被称为“海洋雨林”，在维持海洋生物多样性和沿海保护方面发挥着至关重要的作用，但日益受到气候变化和人类造成的压力的威胁。这项研究将遥感 (RS) 和地理信息系统 (GIS) 集成到 Google 地球引擎 (GEE) 云计算框架中，以评估埃及苏伊士湾西海岸珊瑚礁的退化情况。开发了一种稳健、可重复的方法来分析 Landsat 和 Sentinel-2 图像的 33 年时间序列（1986-2019）。使用经过验证的算法对关键环境压力因素进行量化，包括海面温度 (SST)、叶绿素 a 浓度和水浊度。使用监督随机森林分类绘制珊瑚礁范围图，总体准确度达到 91. 2%。 结果显示，研究期间珊瑚礁覆盖面积净损失 1. 15 平方公里，从 1986 年的 57. 15 平方公里减少到 2019 年的 55. 99 平方公里，估计不确定性为 ±2. 15 平方公里。 8平方公里。空间分析显示了明显的区域差异：最明显的损失发生在 2 区（Ras El Adabia–Ain Sokhna 港口；–4. 89 km²）和 4 区（Ras Abu Darge–Ras El Zaafrana；–4. 37 km²），主要是由于海上作业、港口扩张和沿海城市化。相反，7 区（Ras Bakar-Al-Ghardaqa）的增幅显着为 +7。 4平方公里，可能与有利的水动力条件和有限的人为干扰有关。这些发现证明了局部人类活动和自然过程如何共同塑造珊瑚礁动态。 该研究强调了将经过验证的地理空间技术整合到早期预警系统、保护规划和适应性管理策略中的至关重要性，以在全球环境加速变化的情况下增强珊瑚礁生态系统的长期可持续性。"
      summary_en: "Abstract: Coral reef ecosystems, often described as the “rainforests of the sea,” play a vital role in maintaining marine biodiversity and coastal protection but are increasingly threatened by climate change and human-induced pressures. This study integrates Remote Sensing (RS) and Geographic Information Systems (GIS) within the Google Earth Engine (GEE) cloud-computing framework to assess the degradation of coral reefs along the western coast of the Gulf of Suez, Egypt. A robust, reproducible methodology was developed to analyze a 33-year time series (1986–2019) of Landsat and Sentinel-2 imagery. Key environmental stressors, including sea surface temperature (SST), chlorophyll-a concentration, and water turbidity, were quantified using validated algorithms. Coral reef extent was mapped using a supervised Random Forest classification, achieving an overall accuracy of 91.2%. Results revealed a net loss of 1.15 km² of coral reef cover over the study period, decreasing from 57.15 km² in 1986 to 55.99 km² in 2019, with an estimated uncertainty of ±2.8 km². Spatial analysis showed distinct regional variations: the most pronounced losses occurred in Zone 2 (Ras El Adabia–Ain Sokhna Port; –4.89 km²) and Zone 4 (Ras Abu Darge–Ras El Zaafrana; –4.37 km²), mainly due to maritime operations, port expansion, and coastal urbanization. Conversely, Zone 7 (Ras Bakar–Al-Ghardaqa) exhibited a notable increase of +7.4 km², likely linked to favorable hydrodynamic conditions and limited anthropogenic disturbance. These findings demonstrate how localized human activities and natural processes jointly shape reef dynamics. The study underscores the critical importance of integrating validated geospatial technologies into early warning systems, conservation planning, and adaptive management strategies to enhance the long-term sustainability of coral reef ecosystems amid accelerating global environmental change."

