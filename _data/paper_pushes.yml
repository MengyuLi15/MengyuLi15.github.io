      tags_en: "biogeochemical forecasting; neural network; operational oceanography"
      summary: "这项研究用神经模拟器识别黑海浮游植物变化的驱动因素和动力学。它把复杂生物地球化学模型或观测关系压缩成计算更高效的机器学习表示。研究分析环境变量如何控制浮游植物时空变化，并评估模拟器是否能再现关键动态。结果提供了一个用于快速探索和预测黑海生态状态的工具。它对区域生物地球化学预报、模型加速和业务海洋学很有帮助。"
      summary_zh: "这项研究用神经模拟器识别黑海浮游植物变化的驱动因素和动力学。它把复杂生物地球化学模型或观测关系压缩成计算更高效的机器学习表示。研究分析环境变量如何控制浮游植物时空变化，并评估模拟器是否能再现关键动态。结果提供了一个用于快速探索和预测黑海生态状态的工具。它对区域生物地球化学预报、模型加速和业务海洋学很有帮助。"
      summary_en: "This study uses a neural emulator to identify drivers and dynamics of phytoplankton in the Black Sea. It compresses complex biogeochemical-model behaviour or observational relationships into a faster machine-learning representation. The analysis examines how environmental variables control phytoplankton variability and whether the emulator can reproduce key dynamics. The result is a tool for rapid exploration and forecasting of Black Sea ecosystem states. It is useful for regional biogeochemical prediction, model acceleration, and operational oceanography."
    - title: "Subsurface biogeochemical response to Hurricane Idalia within a cyclonic eddy and river plume–stratified environment"
      authors: "Jennifer K. McWhorter; Lev B. Looney; Matthieu Le Hénaff; Heather L. Roman-Stork; Gregory R. Foltz; Fabian Gomez; Marin Cornec; Madison Soden; et al."
      journal: "Frontiers in Marine Science"
      published: "2026"
      published_month: "2026-02"
      published_month_zh: "2026-02"
      doi: "10.3389/fmars.2026.1740354"
