      summary: "摘要：刚果河是大西洋最大的淡水排放量之一。在这项研究中，我们使用 3 公里分辨率的真实数值模拟研究了中尺度和亚中尺度动力学在调节盐度输运中的作用。由于现场观测、卫星数据和自动识别系统 (AIS) 推断的海流的可用性，我们重点关注 2016 年。这些数据使我们能够确认刚果河羽流、区域环流和中尺度特征的适当表示。对于 2016 年 3 月至 4 月的一个大型反气旋涡流，我们演示了中尺度涡流如何捕获低盐度水域并将其输送到公海。受这一特殊事件的推动，我们在刚果河口附近进行了盐度和体积预算与涡均流分解相结合，证实了中尺度活动在沿海和公海之间水域交换中的关键作用。向西通量主导羽流水的净输出。由于东部边界和垂直通量分别降低和增加了盐度，该区域内发生了强烈的盐度变化。中尺度动力学通过强烈但间歇性的事件做出贡献，这些事件可以主导淡水输出，特别是在最大羽流延伸期间。在短暂事件期间，亚中尺度的贡献可能超过局部盐度输送的 30%。然而，季节性动态在全年中占主导地位。虽然我们的结果强调了中尺度变化在间歇性淡水输出中的重要性，但未来的工作应该将分析扩展到多年，以评估年际变化并利用即将到来的高分辨率卫星任务。"
      summary_zh: "摘要：刚果河是大西洋最大的淡水排放量之一。在这项研究中，我们使用 3 公里分辨率的真实数值模拟研究了中尺度和亚中尺度动力学在调节盐度输运中的作用。由于现场观测、卫星数据和自动识别系统 (AIS) 推断的海流的可用性，我们重点关注 2016 年。这些数据使我们能够确认刚果河羽流、区域环流和中尺度特征的适当表示。对于 2016 年 3 月至 4 月的一个大型反气旋涡流，我们演示了中尺度涡流如何捕获低盐度水域并将其输送到公海。受这一特殊事件的推动，我们在刚果河口附近进行了盐度和体积预算与涡均流分解相结合，证实了中尺度活动在沿海和公海之间水域交换中的关键作用。向西通量主导羽流水的净输出。由于东部边界和垂直通量分别降低和增加了盐度，该区域内发生了强烈的盐度变化。中尺度动力学通过强烈但间歇性的事件做出贡献，这些事件可以主导淡水输出，特别是在最大羽流延伸期间。在短暂事件期间，亚中尺度的贡献可能超过局部盐度输送的 30%。然而，季节性动态在全年中占主导地位。虽然我们的结果强调了中尺度变化在间歇性淡水输出中的重要性，但未来的工作应该将分析扩展到多年，以评估年际变化并利用即将到来的高分辨率卫星任务。"
      summary_en: "Abstract: The Congo River represents one of the largest freshwater discharges in the Atlantic Ocean. In this study, we investigate the role of mesoscale and submesoscale dynamics in modulating salinity transport, using a 3 km‐resolution realistic numerical simulation. We focus on the year 2016 due to the availability of in situ observations, satellite data, and currents inferred from Automatic Identification System (AIS). These data allow us to confirm the appropriate representation of the Congo River plume, regional circulation, and mesoscale features. For one large anticyclonic eddy in March–April 2016, we demonstrate how mesoscale eddies can trap low‐salinity waters and transport them into the open ocean. Motivated by this particular event, we perform, off the Congo River mouth, a salinity and volume budget combined with an eddy‐mean flow decomposition that confirms the key role of mesoscale activity in the exchange of waters between the coastal and open ocean. Westward fluxes dominate the net export of plume waters. Strong salinity changes within the domain occur due to eastern boundary and vertical fluxes, which reduce and enhance salinity, respectively. Mesoscale dynamics contribute through intense but intermittent events that can dominate freshwater export, particularly during the maximum plume extension. Submesoscale contributions can locally exceed 30% of the salinity transport during short‐lived events. However, the seasonal dynamics dominate over the year. While our results highlight the importance of mesoscale variability in episodically exporting freshwater, future work should extend the analysis to multiple years to assess interannual variability and leverage upcoming high‐resolution satellite missions."
    - title: "Deglacial Permafrost Organic Carbon Delivery at the Northern Svalbard Continental Margin: Insights From Tetraether Lipids and Plant Biomarkers"
      authors: "Mathia Sabino; Alessio Nogarotto; Riko Noormets; Teena Chauhan; Gesine Mollenhauer; Jens Hefter; Tommaso Tesi"
      journal: "Biogeosciences"
