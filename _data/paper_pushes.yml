      summary: "摘要：引言 对南非等未受研究地区的栖息地与环境状况对比的珊瑚进行热应力实验对于阐明珊瑚对热应力的恢复力/敏感性的机制至关重要。本研究研究了从南非东海岸环境变化的潮间带和更稳定的潮下生境收集的不规则巨形藻（块状形态）和疣状波西洛波拉（分枝形态）的热弹性/敏感性。方法 将珊瑚饲养在封闭的循环水族箱中，并暴露在两种热应激条件（28°C 和 30°C）下三个月，然后在对照条件（26°C）下恢复两个月。每月测量呼吸、光合作用和生长速率。在热应激开始和结束以及恢复期结束时分析共生科密度、叶绿素a浓度和脂质浓度。结果这些处理引起了两个栖息地的两个物种的白化，并导致光合作用和生长速率下降。在整个实验过程中，观察到物种和栖息地之间所有测量的生理参数的固有差异，包括生存的变化，这强调了环境起源和可能的形态可以影响耐热性。潮间带珊瑚比潮下同种珊瑚更具耐受性，而 A.规则珊瑚似乎比 P. 更耐受。潮间带珊瑚在热应激结束时将其呼吸速率降低到控制水平，并且在研究开始和整个研究过程中，与潮下同种珊瑚相比，保持了更高的共生藻密度、叶绿素-a 和脂质浓度。 不规则藻可能源于较厚的组织，这使得共生藻密度和脂质浓度较高，并且 P:R 比率较低，这与更异养的性质一致。两个栖息地的两个物种的光合作用和生长速率、共生科密度、叶绿素a浓度和脂质浓度在热应激后两个月都没有恢复，这表明长期热应激后恢复生理稳态可能需要更长的时间。因此，本研究的结果应被解释为差异耐受性和早期恢复反应的证据，而不是完全复原力的证据。这些发现提供了对高纬度珊瑚耐热性的生理机制的深入了解，强调了在环境变化的环境中持续存在的珊瑚可以表现出对于了解气候变化恢复能力至关重要的特征。需要考虑的一个重要警告是，尽管定期换水，封闭的再循环系统可能会随着时间的推移积累代谢废物，这会独立影响珊瑚的生理机能并混淆热应激反应。"
      summary_zh: "摘要：引言 对南非等未受研究地区的栖息地与环境状况对比的珊瑚进行热应力实验对于阐明珊瑚对热应力的恢复力/敏感性的机制至关重要。本研究研究了从南非东海岸环境变化的潮间带和更稳定的潮下生境收集的不规则巨形藻（块状形态）和疣状波西洛波拉（分枝形态）的热弹性/敏感性。方法 将珊瑚饲养在封闭的循环水族箱中，并暴露在两种热应激条件（28°C 和 30°C）下三个月，然后在对照条件（26°C）下恢复两个月。每月测量呼吸、光合作用和生长速率。在热应激开始和结束以及恢复期结束时分析共生科密度、叶绿素a浓度和脂质浓度。结果这些处理引起了两个栖息地的两个物种的白化，并导致光合作用和生长速率下降。在整个实验过程中，观察到物种和栖息地之间所有测量的生理参数的固有差异，包括生存的变化，这强调了环境起源和可能的形态可以影响耐热性。潮间带珊瑚比潮下同种珊瑚更具耐受性，而 A.规则珊瑚似乎比 P. 更耐受。潮间带珊瑚在热应激结束时将其呼吸速率降低到控制水平，并且在研究开始和整个研究过程中，与潮下同种珊瑚相比，保持了更高的共生藻密度、叶绿素-a 和脂质浓度。 不规则藻可能源于较厚的组织，这使得共生藻密度和脂质浓度较高，并且 P:R 比率较低，这与更异养的性质一致。两个栖息地的两个物种的光合作用和生长速率、共生科密度、叶绿素a浓度和脂质浓度在热应激后两个月都没有恢复，这表明长期热应激后恢复生理稳态可能需要更长的时间。因此，本研究的结果应被解释为差异耐受性和早期恢复反应的证据，而不是完全复原力的证据。这些发现提供了对高纬度珊瑚耐热性的生理机制的深入了解，强调了在环境变化的环境中持续存在的珊瑚可以表现出对于了解气候变化恢复能力至关重要的特征。需要考虑的一个重要警告是，尽管定期换水，封闭的再循环系统可能会随着时间的推移积累代谢废物，这会独立影响珊瑚的生理机能并混淆热应激反应。"
      summary_en: "Abstract: Introduction Thermal stress experiments on corals from habitats with contrasting environmental regimes in understudied regions, such as South Africa, are essential to elucidate the mechanisms underlying coral resilience/susceptibility to thermal stress. This study examined the thermal resilience/susceptibility of Anomastraea irregularis (massive morphology) and Pocillopora verrucosa (branching morphology) collected from environmentally variable intertidal and more stable subtidal habitats from the east coast of South Africa. Methods Corals were maintained in closed recirculating aquaria and exposed to two thermal stress conditions (28°C and 30°C) for three months, followed by recovery at control conditions (26°C) for two months. Rates of respiration, photosynthesis, and growth were measured monthly. The Symbiodiniaceae density, chlorophyll-a concentration, and lipid concentration were analysed at the start and end of the thermal stress and at the end of the recovery period. Results The treatments induced bleaching in both species from both habitats with an associated decrease in photosynthetic and growth rates. Inherent differences across all measured physiological parameters, including variation in survival, were observed between the species and habitat throughout the experiment, highlighting that environmental origin and possibly morphology can influence thermal tolerance. The intertidal corals were more tolerant than their subtidal conspecifics, and A. irregularis appeared more tolerant than P. verrucosa in both treatments. The intertidal corals decreased their respiration rates to control levels by the end of thermal stress and, both initially and throughout the study, maintained higher Symbiodiniaceae densities, chlorophyll-a, and lipid concentrations than their subtidal conspecifics. Discussion The tolerance of A. irregularis may stem from thicker tissue which allowed higher Symbiodiniaceae density and lipid concentrations and lower P:R ratios consistent with a more heterotrophic nature. The photosynthetic and growth rates, Symbiodiniaceae density, chlorophyll-a concentration, and lipid concentration of both species from both habitats did not recover two months after thermal stress indicating that restoration of physiological homeostasis following prolonged thermal stress likely requires substantially longer periods. Therefore, the results in this study should be interpreted as evidence of differential tolerance and early recovery responses rather than complete resilience. These findings provide insight into the physiological mechanisms underpinning thermal tolerance in high-latitude corals, highlighting that corals persisting in environmentally variable environments can exhibit traits critical for understanding resilience to climate change. An important caveat to consider, despite regular water changes, the closed recirculating systems may accumulate metabolic waste products over time, which can independently affect coral physiology and confound thermal stress responses."
    - title: "Warm-core eddy intensifies surface mixotrophic bacterivory and fuels mesopelagic heterotrophic grazing"
      authors: "Ying Wang; Xin Liu; Zhonghua Zhao; Dapeng Xu; Bangqin Huang; Ping Sun"
      journal: "Communications Biology"
      published: "2026-06-08"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1038/s42003-026-10438-y"
      url: "https://doi.org/10.1038/s42003-026-10438-y"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "phytoplankton; microbial carbon; vertical structure"
      tags_zh: "phytoplankton; microbial carbon; vertical structure"
      tags_en: "phytoplankton; microbial carbon; vertical structure"
      summary: "摘要：反气旋涡流（ACE）重组资源并驱动营养级联，但对纳米鞭毛虫细菌的深度分辨影响仍不清楚。我们利用南海暖核 ACE 中的荧光珠孵化，通过吞噬混合营养型纳米浮游植物 (PMNP) 和异养纳米鞭毛虫 (HNF) 来量化细菌的数量。尽管纳米真核生物减少了 16%，PMNP 丰度显着增加（2. 4 倍深叶绿素最大值 (DCM)，转向较大的细胞，并提高细菌周转和吞噬混合营养生产。尽管每细胞速率相似，HNF 群落放牧也在两个真光深度增加，产生与 PMNP 相当的影响。结构方程模型将 PMNP 放牧与地表水质量、营养物质和 DCM 联系起来浑浊度，而 HNF 放牧跟踪水团和猎物/病毒动态，在中层区域，HNF 占主导地位；放牧 HNF 丰度在 500 m 处增加 2. 7 倍，并与颗粒束衰减系数（原位颗粒代表）相关。这些发现揭示了中尺度强迫与微生物碳处理的深度分区响应。"
      summary_zh: "摘要：反气旋涡流（ACE）重组资源并驱动营养级联，但对纳米鞭毛虫细菌的深度分辨影响仍不清楚。我们利用南海暖核 ACE 中的荧光珠孵化，通过吞噬混合营养型纳米浮游植物 (PMNP) 和异养纳米鞭毛虫 (HNF) 来量化细菌的数量。尽管纳米真核生物减少了 16%，PMNP 丰度显着增加（2. 4 倍深叶绿素最大值 (DCM)，转向较大的细胞，并提高细菌周转和吞噬混合营养生产。尽管每细胞速率相似，HNF 群落放牧也在两个真光深度增加，产生与 PMNP 相当的影响。结构方程模型将 PMNP 放牧与地表水质量、营养物质和 DCM 联系起来浑浊度，而 HNF 放牧跟踪水团和猎物/病毒动态，在中层区域，HNF 占主导地位；放牧 HNF 丰度在 500 m 处增加 2. 7 倍，并与颗粒束衰减系数（原位颗粒代表）相关。这些发现揭示了中尺度强迫与微生物碳处理的深度分区响应。"
      summary_en: "Abstract: Anticyclonic eddies (ACEs) restructure resources and drive trophic cascades, yet depth-resolved effects on nanoflagellate bacterivory remain unclear. We quantify bacterivory by phago-mixotrophic nanophytoplankton (PMNP) and heterotrophic nanoflagellate (HNF) using fluorescent-bead incubations in a warm-core ACE in the South China Sea. Despite a 16% decline in nanoeukaryotes, PMNP abundance increases significantly (2.8× surface, 1.4× deep chlorophyll maximum (DCM), shifts toward larger cells, and elevates bacterial turnover and phago-mixotrophic production. HNF community grazing also increases at both euphotic depths despite similar per-cell rates, yielding impacts comparable to PMNP. Structural equation models link PMNP grazing to surface water-mass properties and nutrients and DCM turbidity, whereas HNF grazing tracks water-mass and prey/virus dynamics. In the mesopelagic zone, HNFs dominate; grazing HNF abundance increases 2.7× at 500 m and is associated with particulate beam attenuation coefficient, an in situ particle proxy. These findings reveal a depth-partitioned response coupling mesoscale forcing to microbial carbon processing."
