      summary: "这项研究关注楚科奇海边缘区的生物光学性质和辐射加热率。它分析浮游植物生物量、海冰覆盖和光学吸收如何共同影响水体吸收太阳辐射。研究把北极海色验证与物理加热过程联系起来，而不仅仅描述叶绿素浓度。结果说明，浮游植物和海冰状态会共同调节上层海洋的辐射加热。它对北极海色产品、冰缘生态和气候反馈研究很有帮助。"
      summary_zh: "这项研究关注楚科奇海边缘区的生物光学性质和辐射加热率。它分析浮游植物生物量、海冰覆盖和光学吸收如何共同影响水体吸收太阳辐射。研究把北极海色验证与物理加热过程联系起来，而不仅仅描述叶绿素浓度。结果说明，浮游植物和海冰状态会共同调节上层海洋的辐射加热。它对北极海色产品、冰缘生态和气候反馈研究很有帮助。"
      summary_en: "This study examines bio-optical properties and radiant heating rates in the Chukchi Sea borderlands. It analyses how phytoplankton biomass, sea-ice cover, and optical absorption jointly affect the uptake of solar radiation by seawater. The work links Arctic ocean-colour validation with physical heating processes rather than describing chlorophyll alone. The results show that phytoplankton and sea-ice conditions together regulate upper-ocean radiant heating. It is useful for Arctic ocean-colour products, ice-edge ecology, and climate-feedback studies."
    - title: "A Machine Learning Approach for Chlorophyll- a Estimation in Coastal Waters From Top-of-Atmosphere VIIRS Satellite Data"
