    - title: "Dynamics off the Congo River and Its Impact on the Water Exchange Between the Coastal and Open Ocean at Different Timescales"
      authors: "C. Cardot; I. Dadou; D. C. Napolitano; H. M. A. Aguedjou; R. Ngakala; Y. Morel; G. Morvan; G. Alory; et al."
      journal: "Journal of Geophysical Research: Oceans"
