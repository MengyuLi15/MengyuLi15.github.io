      summary: "摘要：虽然每年北大西洋春季水华中的浮游植物动态已得到很好的表征，但驱动这些变化的生理基础及其对该地区生物地球化学的净影响却知之甚少。浮游植物代谢既受该地区营养循环、初级生产以及最终碳输出命运的影响，也影响着该地区的营养循环、初级生产。因此，了解这些过程至关重要。作为美国宇航局远程传感计划向北大西洋开展的海洋出口过程的一部分，测量了浮游植物生物量、生物率和基因表达数据以及相关的环境参数，以评估春季开花期间四个最主要的浮游植物群（硅藻、甲藻、附着藻和叶绿藻）内这些过程之间的关系。 我们观察到从活跃硅藻生长主导时期（定义为第一阶段）到非硅藻浮游植物群主导时期（第二阶段）的转变。硅酸消耗似乎限制了总体产量并减少了来自硅藻的竞争，可能导致第二阶段固定藻的贡献增强。在整个观察期间，参与细胞维持、光合作用以及氮和维生素代谢的关键蛋白质编码基因的表达在不同类群中存在差异。参与硅运输的硅藻基因的表达模式与参与硝酸盐同化和光合作用的硅藻基因的表达模式不相关，这表明生长的变化可能与硅化无关。 我们的分析表明，不同的硅酸浓度如何对浮游植物群落结构产生重大影响并调节初级生产，从而有助于总体水华下降。"
      summary_zh: "摘要：虽然每年北大西洋春季水华中的浮游植物动态已得到很好的表征，但驱动这些变化的生理基础及其对该地区生物地球化学的净影响却知之甚少。浮游植物代谢既受该地区营养循环、初级生产以及最终碳输出命运的影响，也影响着该地区的营养循环、初级生产。因此，了解这些过程至关重要。作为美国宇航局远程传感计划向北大西洋开展的海洋出口过程的一部分，测量了浮游植物生物量、生物率和基因表达数据以及相关的环境参数，以评估春季开花期间四个最主要的浮游植物群（硅藻、甲藻、附着藻和叶绿藻）内这些过程之间的关系。 我们观察到从活跃硅藻生长主导时期（定义为第一阶段）到非硅藻浮游植物群主导时期（第二阶段）的转变。硅酸消耗似乎限制了总体产量并减少了来自硅藻的竞争，可能导致第二阶段固定藻的贡献增强。在整个观察期间，参与细胞维持、光合作用以及氮和维生素代谢的关键蛋白质编码基因的表达在不同类群中存在差异。参与硅运输的硅藻基因的表达模式与参与硝酸盐同化和光合作用的硅藻基因的表达模式不相关，这表明生长的变化可能与硅化无关。 我们的分析表明，不同的硅酸浓度如何对浮游植物群落结构产生重大影响并调节初级生产，从而有助于总体水华下降。"
      summary_en: "Abstract: While phytoplankton dynamics in the annual North Atlantic spring bloom have been well characterized, the physiological underpinnings driving these changes and their net impact on the biogeochemistry of the region are less understood. Phytoplankton metabolism is both affected by, and influences the region’s nutrient cycling, primary production, and ultimately, the fate of carbon export. Thus, developing an understanding of these processes is critical. Phytoplankton biomass, biological rates, and gene expression data along with associated environmental parameters were measured as part of the NASA EXport Processes in the Ocean from RemoTe Sensing program’s campaign to the North Atlantic to evaluate the relationships amongst these processes within the four most dominant phytoplankton groups (diatoms, dinoflagellates, haptophytes, and chlorophytes) during the spring bloom. We observe a transition from a period dominated by active diatom growth (defined as Phase I) to a period dominated by non-diatom phytoplankton groups (Phase II). Silicic acid depletion appears to limit overall production and reduce competition from diatoms, likely leading to enhanced contributions of haptophytes in Phase II. Expression of key protein-encoding genes involved in cell maintenance, photosynthesis, and nitrogen and vitamin metabolisms varied amongst the taxa throughout the observation period. Expression patterns of diatom genes involved in silicon transport are uncoupled with those involved in nitrate assimilation and photosynthesis, suggesting a change in growth which may be uncoupled from silicification. Our analysis demonstrates how variable silicic acid concentrations can have a significant effect on phytoplankton community structure and regulate primary production, aiding in overall bloom decline."
    - title: "Evaluating Heavy Metal and Physicochemical Pollution in the Karnaphuli River Estuary through Remote Sensing and Machine Learning Approaches"
      authors: "Sheikh Samanin Tasnim; Mahima Yusuf Tarana; Dr. Mohammad Moniruzzaman; Sadia Afrin; Shamiha Shafinaz Shreya"
      journal: "Journal of Earth Observation and Geospatial Applications"
      published: "2026-06-26"
