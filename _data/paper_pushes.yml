      summary: "摘要：海洋热浪 (MHW) 是持续的极端海面温度 (SST) 时期，其范围延伸很远，对海洋生态系统和经济产生巨大影响。本研究使用高分辨率（5公里）NOAA珊瑚礁观察（CRW）数据集研究了北美东部附近的亚热带和热带水域的海表温度和最高水温趋势（1985-2024年），该数据集可以阐明公海和较浅的沿海水域的趋势。结果显示，在所有暖季月份（5 月至 10 月），MHW 频率（每十年 > 2. 0 天）和空间范围（自 1985 年以来扩大了 25%–45%）普遍大幅且具有统计意义的显着增加。大频率和持续时间趋势在 9 月和 10 月尤其普遍；强度趋势不太明显，但七月和八月佛罗里达州附近以及十月整个加勒比海地区的强度趋势很明显。虽然频率和持续时间趋势模式密切相关，但两者都不像强度趋势模式，尤其是在 10 月之前。应用现有的 MHW 强度等级来分析趋势，I 类（“中等”；气候日平均海表温度与每日第 90 个百分位数海表温度之间差异的一到两倍）MHW 的频率增加最为显着。然而，在过去十年中，II 类（‘强’；两到三倍的差异）和 III 类（‘严重’；三到四倍的差异）MHW 也变得更加常见。例如，2023-2024 年 II 类 MHW 的频率超过 2023 年之前除 1 年（2005 年）以外的 I 类频率。MHW 频率和强度受 ENSO 调节，峰值优先出现在厄尔尼诺事件（12 月至 3 月）之后的温暖季节。 总体而言，结果支持模型预测到 21 世纪末将出现近乎永久的暖季 MHW 状态。"
      summary_zh: "摘要：海洋热浪 (MHW) 是持续的极端海面温度 (SST) 时期，其范围延伸很远，对海洋生态系统和经济产生巨大影响。本研究使用高分辨率（5公里）NOAA珊瑚礁观察（CRW）数据集研究了北美东部附近的亚热带和热带水域的海表温度和最高水温趋势（1985-2024年），该数据集可以阐明公海和较浅的沿海水域的趋势。结果显示，在所有暖季月份（5 月至 10 月），MHW 频率（每十年 > 2. 0 天）和空间范围（自 1985 年以来扩大了 25%–45%）普遍大幅且具有统计意义的显着增加。大频率和持续时间趋势在 9 月和 10 月尤其普遍；强度趋势不太明显，但七月和八月佛罗里达州附近以及十月整个加勒比海地区的强度趋势很明显。虽然频率和持续时间趋势模式密切相关，但两者都不像强度趋势模式，尤其是在 10 月之前。应用现有的 MHW 强度等级来分析趋势，I 类（“中等”；气候日平均海表温度与每日第 90 个百分位数海表温度之间差异的一到两倍）MHW 的频率增加最为显着。然而，在过去十年中，II 类（‘强’；两到三倍的差异）和 III 类（‘严重’；三到四倍的差异）MHW 也变得更加常见。例如，2023-2024 年 II 类 MHW 的频率超过 2023 年之前除 1 年（2005 年）以外的 I 类频率。MHW 频率和强度受 ENSO 调节，峰值优先出现在厄尔尼诺事件（12 月至 3 月）之后的温暖季节。 总体而言，结果支持模型预测到 21 世纪末将出现近乎永久的暖季 MHW 状态。"
      summary_en: "Abstract: Marine heatwaves (MHWs) are periods of persistent extreme sea surface temperatures (SSTs) that extend over vast distances and have enormous impacts on marine ecosystems and economies. This study examines SST and MHW trends (1985–2024) in the subtropical and tropical waters adjacent to eastern North America, using the high‐resolution (5 km) NOAA Coral Reef Watch (CRW) dataset, which can elucidate trends both in the open ocean and more shallow coastal waters. Results show widespread large and statistically significant increases in MHW frequency (> 2.0 MHWs per decade), duration (> 2.0 days per decade), and spatial extent (25%–45% larger since 1985) in all warm‐season months (May–October). Large frequency and duration trends are especially widespread in September and October; intensity trends are less pronounced but are notable near Florida in July and August and in October across the Caribbean. While frequency and duration trend patterns are strongly correlated, neither resembles intensity trend patterns, especially before October. Applying an existing MHW intensity scale to analyse trends, the frequency of Category I (‘Moderate’; one to two times the difference between the climatological daily mean SST and the daily 90th percentile SST) MHWs has increased most dramatically. However, Category II (‘Strong’; two to three times the difference) and III (‘Severe’; three to four times the difference) MHWs have also become more common during the past decade. For example, the frequency of Category II MHWs in 2023–2024 exceeds all but 1 year (2005) of Category I frequency before 2023. MHW frequency and intensity are modulated by ENSO, with peaks preferentially occurring during warm seasons that follow (December–March) El Niño events. Overall, results support model projections of a near‐perpetual warm‐season MHW state by the end of the 21st century."
