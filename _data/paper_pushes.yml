      tags: "ocean colour; NPP; climate trend"
      tags_zh: "ocean colour; NPP; climate trend"
      tags_en: "ocean colour; NPP; climate trend"
      summary: "用 SeaWiFS 和 MODIS-Aqua 的 25 年海色记录重估全球 NPP 变化。主要结论是近一半海域 NPP 显著下降，集中在热带和副热带层化海区，机制指向营养盐限制增强，是海色监测 carbon pump 生产端变化的关键论文。"
      summary_zh: "用 SeaWiFS 和 MODIS-Aqua 的 25 年海色记录重估全球 NPP 变化。主要结论是近一半海域 NPP 显著下降，集中在热带和副热带层化海区，机制指向营养盐限制增强，是海色监测 carbon pump 生产端变化的关键论文。"
      summary_en: "Using 25 years of SeaWiFS and MODIS-Aqua ocean-colour records, this study finds significant NPP declines across nearly half of the ocean, especially in stratified tropical and subtropical waters. The likely mechanism is stronger nutrient limitation."
