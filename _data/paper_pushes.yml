      tags_en: "carbon pump; microbial carbon"
      summary: "摘要：溶解有机氮 (DON) 和溶解有机磷 (DOP) 代表贫营养地表水中最大的生物可利用氮和磷库。当无机形式的氮和磷稀缺时，虽然两者都可以作为自养生物的同化营养源，但它们利用的位置和定量意义仍不清楚。在这里，我们回顾了新的地球化学指标和建模工具，将表层海洋 DON 和 DOP 与盆地规模的生物地球化学过程联系起来，并确定其源区和汇区。我们发现，海洋表面溶解的有机营养物受到磷酸盐和铁胁迫以及太平洋反硝化和大西洋大气尘埃沉积的影响，并分别支持北太平洋西部和北大西洋环流高达66%和80%的年净群落生产。 总的来说，这项工作加深了我们对有机营养物在支持生物泵和控制上层海洋营养物循环方面的作用的理解。"
      summary_zh: "摘要：溶解有机氮 (DON) 和溶解有机磷 (DOP) 代表贫营养地表水中最大的生物可利用氮和磷库。当无机形式的氮和磷稀缺时，虽然两者都可以作为自养生物的同化营养源，但它们利用的位置和定量意义仍不清楚。在这里，我们回顾了新的地球化学指标和建模工具，将表层海洋 DON 和 DOP 与盆地规模的生物地球化学过程联系起来，并确定其源区和汇区。我们发现，海洋表面溶解的有机营养物受到磷酸盐和铁胁迫以及太平洋反硝化和大西洋大气尘埃沉积的影响，并分别支持北太平洋西部和北大西洋环流高达66%和80%的年净群落生产。 总的来说，这项工作加深了我们对有机营养物在支持生物泵和控制上层海洋营养物循环方面的作用的理解。"
      summary_en: "Abstract: Dissolved organic N (DON) and dissolved organic P (DOP) represent the largest pools of bioavailable N and P in oligotrophic surface waters. While both serve as assimilative nutrient sources for autotrophs when inorganic forms of N and P are scarce, the location and quantitative significance of their utilization remain unclear. Here, we review new geochemical metrics and modeling tools that link surface-ocean DON and DOP to basin-scale biogeochemical processes and identify their source and sink regions. We find that surface-ocean dissolved organic nutrients are influenced by both phosphate and iron stress, as well as denitrification in the Pacific and atmospheric dust deposition in the Atlantic, and support up to 66% and 80% of annual net community production in the western North Pacific and North Atlantic gyres, respectively. Collectively, this work refines our understanding of the role of organic nutrients in supporting the biological pump and the controls on upper-ocean nutrient cycling."
    - title: "Macroalgal influence on particulate organic matter sources and early transformation in an Arctic fjord"
      authors: "Ashok S. Jagtap; Archana Singh; Anand Jain; Nandini Raj; Manish Tiwari"
      journal: "Biogeosciences"
      published: "2026-06-26"
