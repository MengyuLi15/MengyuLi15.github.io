      tags_en: "satellite validation; field campaign; PACE"
      summary: "这项研究介绍用可追溯矩阵支持外场观测设计和实施的方法。它面向卫星验证和大型外场活动，把科学目标、观测需求、传感器配置和采样计划连接起来。研究重点是让每一项现场测量都能对应到明确的产品或算法验证需求。结果提供了一个更系统的外场设计决策流程。它对 PACE 验证航次、海色现场采样和跨团队观测协调很有帮助。"
      summary_zh: "这项研究介绍用可追溯矩阵支持外场观测设计和实施的方法。它面向卫星验证和大型外场活动，把科学目标、观测需求、传感器配置和采样计划连接起来。研究重点是让每一项现场测量都能对应到明确的产品或算法验证需求。结果提供了一个更系统的外场设计决策流程。它对 PACE 验证航次、海色现场采样和跨团队观测协调很有帮助。"
      summary_en: "This study presents a traceability-matrix approach for field-campaign design and implementation. It targets satellite validation and large field activities by connecting science goals, measurement requirements, sensor choices, and sampling plans. The method ensures that each field measurement maps to a clear product or algorithm-validation need. The result is a more systematic decision workflow for campaign planning. It is useful for PACE validation cruises, ocean-colour field sampling, and coordination across observing teams."
    - title: "Inconsistencies in annual variations of flux and reactivity of sinking particles in the Pacific Arctic: evidence from a sediment trap"
      authors: "Yang Zhang; Haiyan Jin; Yanpei Zhuang; Zhongqiang Ji; Jian Ren; Kui Wang; Jianfang Chen"
      journal: "Frontiers in Marine Science"
      published: "2026"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.3389/fmars.2026.1806793"
      url: "https://doi.org/10.3389/fmars.2026.1806793"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "primary production; carbon export; sediment traps"
      tags_zh: "primary production; carbon export; sediment traps"
      tags_en: "primary production; carbon export; sediment traps"
      summary: "这项研究利用沉积物捕获器证据分析太平洋北极下沉颗粒通量和反应性的年际变化。它关注的不只是有多少颗粒下沉，还包括这些颗粒在化学和生物反应性上的差异。研究比较不同年份中颗粒通量与初级生产或环境条件之间的关系。结果显示，下沉通量和颗粒反应性并不总是同步变化。它对理解北极碳输出、颗粒降解和沉积物捕获器资料解释很重要。"
      summary_zh: "这项研究利用沉积物捕获器证据分析太平洋北极下沉颗粒通量和反应性的年际变化。它关注的不只是有多少颗粒下沉，还包括这些颗粒在化学和生物反应性上的差异。研究比较不同年份中颗粒通量与初级生产或环境条件之间的关系。结果显示，下沉通量和颗粒反应性并不总是同步变化。它对理解北极碳输出、颗粒降解和沉积物捕获器资料解释很重要。"
      summary_en: "This study uses sediment-trap evidence to analyse annual variations in sinking-particle flux and reactivity in the Pacific Arctic. It focuses not only on how much material sinks, but also on how chemically and biologically reactive that material is. The analysis compares particle flux with primary production or environmental conditions across different years. The results show that sinking flux and particle reactivity do not always vary together. It is important for understanding Arctic carbon export, particle degradation, and interpretation of sediment-trap records."
    - title: "Identifying drivers and dynamics of phytoplankton in the Black Sea: application of a neural emulator"
      authors: "Philip A. H. Smith; Anshul Chauhan; Marilaure Grégoire; Luc Vandenbulcke; Filipe Rodrigues; Asbjørn Christensen; Michael A. St John; Patrizio Mariani"
