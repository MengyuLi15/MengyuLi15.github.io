    - title: "LCS-Net: a lightweight architecture for efficient coastal water segmentation"
      authors: "Mingjie Lv; Haibo Wang; Weiwei Yu; Yinjie Miao; Xinkun Song"
      journal: "Frontiers in Earth Science"
      published: "2026-06-12"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3389/feart.2026.1817534"
      url: "https://doi.org/10.3389/feart.2026.1817534"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：在高分辨率遥感影像中，近岸水体通常呈现出曲折的岸线、破碎的湖岸海湾以及建筑物反射、植被阴影和混合基质等叠加的干扰，对水体边界的精细提取提出了重大挑战。虽然基于深度学习的语义分割大幅提高了水体识别精度，但现有方法大多侧重于全局上下文建模，而对边缘设备的计算效率关注不够；现有的轻量级模型还难以在复杂的近岸场景中平衡高精度和低功耗部署。针对这一差距，本文提出了LCS-Net，一种面向边缘部署的架构，通过现有高效组件的重组，建立了“冗余特征生成-动态特征过滤-旁路补偿”的系统级协作范式。该架构遵循 UNet 型编码器-解码器框架，通过级联具有深度可分离卷积的标准 Ghost 模块来构建轻量级主干，嵌入通道空间注意机制以抑制频谱混叠，并引入具有跳跃连接的双线性插值卷积上采样以恢复高频细节。实验结果表明，在自建无人机近岸水域数据集上，LCS-Net 实现了 95. 92% 的交并比 (IoU) 和 97. 24 GFLOPs，同时实现了高精度和高效率。应该指出的是，所报告的性能是在特定季节和传感器配置下获得的；该模型在更广泛的环境条件下的零样本泛化能力有待后续验证。"
      summary_zh: "摘要：在高分辨率遥感影像中，近岸水体通常呈现出曲折的岸线、破碎的湖岸海湾以及建筑物反射、植被阴影和混合基质等叠加的干扰，对水体边界的精细提取提出了重大挑战。虽然基于深度学习的语义分割大幅提高了水体识别精度，但现有方法大多侧重于全局上下文建模，而对边缘设备的计算效率关注不够；现有的轻量级模型还难以在复杂的近岸场景中平衡高精度和低功耗部署。针对这一差距，本文提出了LCS-Net，一种面向边缘部署的架构，通过现有高效组件的重组，建立了“冗余特征生成-动态特征过滤-旁路补偿”的系统级协作范式。该架构遵循 UNet 型编码器-解码器框架，通过级联具有深度可分离卷积的标准 Ghost 模块来构建轻量级主干，嵌入通道空间注意机制以抑制频谱混叠，并引入具有跳跃连接的双线性插值卷积上采样以恢复高频细节。实验结果表明，在自建无人机近岸水域数据集上，LCS-Net 实现了 95. 92% 的交并比 (IoU) 和 97. 24 GFLOPs，同时实现了高精度和高效率。应该指出的是，所报告的性能是在特定季节和传感器配置下获得的；该模型在更广泛的环境条件下的零样本泛化能力有待后续验证。"
      summary_en: "Abstract: In high-resolution remote sensing imagery, near-shore water bodies typically exhibit tortuous shorelines, fragmented lakeshore coves, and superimposed disturbances such as building reflections, vegetation shadows, and mixed substrates, posing significant challenges to the fine extraction of water boundaries. Although deep learning-based semantic segmentation has substantially improved water body recognition accuracy, most existing methods focus on global context modeling while paying insufficient attention to computational efficiency on edge devices; existing lightweight models also struggle to balance high precision with low-power deployment in complex near-shore scenarios. To address this gap, this paper proposes LCS-Net, an edge-deployment-oriented architecture that establishes a system-level collaborative paradigm of “redundant feature generation—dynamic feature filtering—bypass compensation” through the recombination of existing efficient components. Following a UNet-type encoder-decoder framework, the architecture constructs a lightweight backbone by cascading standard Ghost modules with depthwise separable convolutions, embeds channel-spatial attention mechanisms to suppress spectral aliasing, and introduces bilinear-interpolation-convolution upsampling with skip connections to restore high-frequency details. Experimental results demonstrate that on a self-built unmanned aerial vehicle near-shore water dataset, LCS-Net achieves 95.92% Intersection over Union (IoU) and 97.86% F1-score with merely 2.24 million parameters and 8.24 GFLOPs, simultaneously attaining high accuracy and efficiency. It should be noted that the reported performance was obtained under specific seasonal and sensor configurations; the model’s zero-shot generalization capability under broader environmental conditions awaits subsequent validation."

