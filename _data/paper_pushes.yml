      summary: "摘要：海洋热浪 (MHW) 通过改变水体中的氧气和生物生产力，破坏多个营养级的生态系统，但大多数研究都集中在地表，忽视了影响生态系统响应的地下过程。为了解决这一差距，我们分析了 16 年在澳大利亚周围大陆架上进行的常规和基于事件的滑翔机观测，首次对四个对比沿海地区的地表 MHW 期间的地下生物地球化学响应进行了全面评估。在所有地区和季节中，叶绿素浓度的分布在 MHW 期间向混合层中下降和混合层以下增加的方向转变，受事件类别的调节。溶解氧显示出更复杂的分布，在中等和强的 MHW 事件期间也会发生变化，可以说混合层中的变化比下面更大。当考虑到区域和季节的特殊性时，MHW的地下特征会根据环境背景而变化，包括大陆架结构、热带或亚热带状况以及边界流的影响，特别是通过层结的变化。夏季表面高温水的特点是混合层深度比正常条件更浅，并且层化增强，将变暖限制在海洋上层，而其他季节则在弱层化条件下允许更深的渗透。因此，最大分层深度成为 MHW 垂直范围的有用代表。 物理过程（例如季节性循环和分层）与生物反馈（包括深层叶绿素最大值和潜在氧气产生的存在）之间的相互作用，突出了对 MHW 的复杂生物地球化学反应，并强调了区域特定动态的重要性以及更一致的观测策略（包括生物地球化学过程）的需要。"
      summary_zh: "摘要：海洋热浪 (MHW) 通过改变水体中的氧气和生物生产力，破坏多个营养级的生态系统，但大多数研究都集中在地表，忽视了影响生态系统响应的地下过程。为了解决这一差距，我们分析了 16 年在澳大利亚周围大陆架上进行的常规和基于事件的滑翔机观测，首次对四个对比沿海地区的地表 MHW 期间的地下生物地球化学响应进行了全面评估。在所有地区和季节中，叶绿素浓度的分布在 MHW 期间向混合层中下降和混合层以下增加的方向转变，受事件类别的调节。溶解氧显示出更复杂的分布，在中等和强的 MHW 事件期间也会发生变化，可以说混合层中的变化比下面更大。当考虑到区域和季节的特殊性时，MHW的地下特征会根据环境背景而变化，包括大陆架结构、热带或亚热带状况以及边界流的影响，特别是通过层结的变化。夏季表面高温水的特点是混合层深度比正常条件更浅，并且层化增强，将变暖限制在海洋上层，而其他季节则在弱层化条件下允许更深的渗透。因此，最大分层深度成为 MHW 垂直范围的有用代表。 物理过程（例如季节性循环和分层）与生物反馈（包括深层叶绿素最大值和潜在氧气产生的存在）之间的相互作用，突出了对 MHW 的复杂生物地球化学反应，并强调了区域特定动态的重要性以及更一致的观测策略（包括生物地球化学过程）的需要。"
      summary_en: "Abstract: Marine heatwaves (MHWs) disrupt ecosystems across multiple trophic levels by altering oxygen and biological productivity through the water column and yet, most studies focus on the surface, overlooking subsurface processes that shape ecosystem responses. To address this gap, we analysed 16 years of routine and event-based glider observations on the continental shelf around Australia to present the first comprehensive assessment of the subsurface biogeochemical response during surface MHWs across four contrasting coastal regions. Across all regions and seasons, the distribution of chlorophyll concentrations shifted towards a decline in the mixed layer and an increase below the mixed layer during MHWs, modulated by the event categories. Dissolved oxygen shows a more complex distribution, which also varies during moderate and strong MHW events, arguably with more variation in the mixed layer than below. When regional and seasonal specificities are taken into account, the subsurface characteristics of MHWs vary in accordance with the environmental setting, including the continental shelf structure, tropical or sub-tropical regime, and boundary current influence, especially through the changes in stratification. Summer surface MHWs were characterised by a shallower mixed layer depth than normal conditions and enhanced stratification, confining warming to the upper ocean, while other seasons allow deeper penetration under weakly stratified conditions. The depth of maximum stratification therefore emerged as a useful proxy for the vertical extent of MHWs. The interaction between physical processes, such as seasonal circulation and stratification, and biological feedback, including the presence of deep chlorophyll maxima and potential oxygen production, highlights the complex biogeochemical responses to MHWs, and underscores the importance of region-specific dynamics and the need for more consistent observation strategy, including biogeochemical processes."
    - title: "Climate intervention through stratospheric aerosol injection may partially mitigate marine heatwaves"
      authors: "Lala Kounta; Lifeng Luo; Gouri Anil; Daniel M Hueholt; Cheryl S Harrison; Daniele Visioni; Mari Rachel Tye; Tyler Felgenhauer; et al."
      journal: "Environmental Research: Climate"
