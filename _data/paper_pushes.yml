      summary: "摘要：生物发光海湾（biobays）是一种罕见的沿海生态系统，具有密集的甲藻种群，通常发现于红树林环礁湖中，具有较长的保水时间和较高的有机质（OM）水平。尽管红树林与高甲藻丰度相关，但在塑造浮游植物群落方面，无机养分与红树林衍生的有机物质相比如何仍不确定。我们在圣维尔京群岛红树林泻湖进行了短期原位生物测定，以比较浮游植物群落对添加无机养分（N 和 P）和衰老红树林叶子的反应。使用高效液相色谱 (HPLC) 色素分析结合 CHEMTAX 评估浮游植物组成，并使用成分和中心对数比主成分分析 (CLR-PCA) 分析数据。营养物添加主要增加了浮游植物总生物量，有利于以硅藻为主的群落，与氮限制一致，但没有显着改变群落组成。相反，添加衰老的红树林叶子始终使群落转向含有多甲素的甲藻丰度更高，而不会显着增加其他浮游植物群的丰度。多变量分析表明，叶子的添加使群落沿着连续的组成谱变化，而不是创造不同的组合。这些发现表明，来自衰老红树林叶子的 OM（渗滤液），而不是单独的无机氮和磷富集，是促进红树林泻湖中甲藻优势的合理机制。 我们的结果强调了红树林 OM 输入在维持一些热带泻湖中以甲藻为主的环境中的潜在作用，证明了红树林可以调节邻近水域浮游植物群落组成的机制。"
      summary_zh: "摘要：生物发光海湾（biobays）是一种罕见的沿海生态系统，具有密集的甲藻种群，通常发现于红树林环礁湖中，具有较长的保水时间和较高的有机质（OM）水平。尽管红树林与高甲藻丰度相关，但在塑造浮游植物群落方面，无机养分与红树林衍生的有机物质相比如何仍不确定。我们在圣维尔京群岛红树林泻湖进行了短期原位生物测定，以比较浮游植物群落对添加无机养分（N 和 P）和衰老红树林叶子的反应。使用高效液相色谱 (HPLC) 色素分析结合 CHEMTAX 评估浮游植物组成，并使用成分和中心对数比主成分分析 (CLR-PCA) 分析数据。营养物添加主要增加了浮游植物总生物量，有利于以硅藻为主的群落，与氮限制一致，但没有显着改变群落组成。相反，添加衰老的红树林叶子始终使群落转向含有多甲素的甲藻丰度更高，而不会显着增加其他浮游植物群的丰度。多变量分析表明，叶子的添加使群落沿着连续的组成谱变化，而不是创造不同的组合。这些发现表明，来自衰老红树林叶子的 OM（渗滤液），而不是单独的无机氮和磷富集，是促进红树林泻湖中甲藻优势的合理机制。 我们的结果强调了红树林 OM 输入在维持一些热带泻湖中以甲藻为主的环境中的潜在作用，证明了红树林可以调节邻近水域浮游植物群落组成的机制。"
      summary_en: "Abstract: Bioluminescent bays (biobays) are uncommon coastal ecosystems featuring dense populations of dinoflagellates, often found in mangrove‐ringed lagoons with long water retention times and high organic matter (OM) levels. Although mangroves are associated with high dinoflagellate abundance, it remains uncertain how inorganic nutrients compare with mangrove‐derived organic matter in shaping phytoplankton communities. We performed short‐term in situ bioassays in Mangrove Lagoon, St. Croix, U.S. Virgin Islands, to compare phytoplankton community responses to additions of inorganic nutrients (N and P) and senescent mangrove leaf additions. Phytoplankton composition was assessed using high‐performance liquid chromatography (HPLC) pigment analysis combined with CHEMTAX, and data were analyzed with compositional and centered log‐ratio principal component analyses (CLR–PCAs). Nutrient additions primarily increased total phytoplankton biomass and favored diatom‐dominated communities, consistent with N limitation, but did not significantly alter community composition. Conversely, adding senescent mangrove leaves consistently shifted the community toward higher abundances of peridinin‐containing dinoflagellates, without significantly increasing the abundance of other phytoplankton groups. Multivariate analysis showed that leaf additions shifted the community along a continuous compositional spectrum rather than creating distinct assemblages. These findings suggest that OM (leachate) from senescent mangrove leaves, rather than inorganic N and P enrichment alone, is a plausible mechanism for promoting dinoflagellate dominance in Mangrove Lagoon. Our results underscore the potential role of mangrove OM input in sustaining dinoflagellate‐dominated environments in some tropical lagoons, demonstrating a mechanism by which mangroves may regulate phytoplankton community composition in adjacent waters."

