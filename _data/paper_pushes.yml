      tags: "phytoplankton pigments; primary production; carbon flux"
      tags_zh: "phytoplankton pigments; primary production; carbon flux"
      tags_en: "phytoplankton pigments; primary production; carbon flux"
      summary: "这项研究分析未来海洋光谱环境变化对浮游植物色素策略的影响。它把水下光谱变化、色素可塑性和浮游植物适应性联系起来，而不是只看叶绿素总量。研究评估不同色素调节能力的浮游植物在未来光环境中是否仍具有优势。结果表明，如果海洋光谱变率下降，具有灵活色素含量的类群可能反而处于不利位置。它对初级生产模型、photoacclimation 表达和碳通量估计很有帮助。"
      summary_zh: "这项研究分析未来海洋光谱环境变化对浮游植物色素策略的影响。它把水下光谱变化、色素可塑性和浮游植物适应性联系起来，而不是只看叶绿素总量。研究评估不同色素调节能力的浮游植物在未来光环境中是否仍具有优势。结果表明，如果海洋光谱变率下降，具有灵活色素含量的类群可能反而处于不利位置。它对初级生产模型、photoacclimation 表达和碳通量估计很有帮助。"
      summary_en: "This study examines how future changes in the underwater light spectrum affect phytoplankton pigment strategies. It links spectral light variability, pigment flexibility, and phytoplankton fitness rather than focusing only on bulk chlorophyll. The analysis tests whether taxa with flexible pigment content remain advantaged under projected future light conditions. The results suggest that reduced variability in the ocean light spectrum can disadvantage phytoplankton with flexible pigment content. It is useful for primary-production models, photoacclimation parameterization, and carbon-flux estimates."
    - title: "Modeling the Vertical Flux of Organic Carbon in the Global Ocean"
      authors: "Adrian B. Burd"
      journal: "Annual Review of Marine Science"
      published: "2026"
      published_month: "2024-01"
      published_month_zh: "2024-01"
      doi: "10.1146/annurev-marine-022123-102516"
      url: "https://doi.org/10.1146/annurev-marine-022123-102516"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "carbon flux; review; model synthesis"
      tags_zh: "carbon flux; review; model synthesis"
      tags_en: "carbon flux; review; model synthesis"
      summary: "这篇综述系统梳理全球海洋有机碳垂向通量的形成和转化过程。它整合颗粒形成、沉降、再矿化、物理输运和生态调控等多类机制。文章关注模型如何表达这些过程，以及不同模型假设会如何影响深海碳封存估计。结果是一个用于理解和比较有机碳通量模型的框架。它对生物碳泵建模、BGC-Argo 光学代理变量解释和全球碳预算研究很有价值。"
      summary_zh: "这篇综述系统梳理全球海洋有机碳垂向通量的形成和转化过程。它整合颗粒形成、沉降、再矿化、物理输运和生态调控等多类机制。文章关注模型如何表达这些过程，以及不同模型假设会如何影响深海碳封存估计。结果是一个用于理解和比较有机碳通量模型的框架。它对生物碳泵建模、BGC-Argo 光学代理变量解释和全球碳预算研究很有价值。"
      summary_en: "This review synthesizes the formation and transformation of vertical organic carbon flux in the global ocean. It integrates particle formation, sinking, remineralization, physical transport, and ecological controls. The paper focuses on how models represent these processes and how different assumptions affect estimates of deep-ocean carbon sequestration. The result is a framework for understanding and comparing models of organic carbon flux. It is valuable for biological carbon-pump modelling, interpretation of BGC-Argo optical proxies, and global carbon-budget studies."
    - title: "Two Decades of Increase in Southern Ocean Net Community Production Revealed by BGC‐Argo Floats"
      authors: "Guillaume Liniger; Jonathan D. Sharp; Yuichiro Takeshita; Kenneth S. Johnson"
      journal: "Global Biogeochemical Cycles"
      published: "2025"
      published_month: "2025-08"
      published_month_zh: "2025-08"
      doi: "10.1029/2024GB008371"
      url: "https://repository.library.noaa.gov/view/noaa/71386"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "BGC-Argo; NCP; Southern Ocean"
      tags_zh: "BGC-Argo; NCP; Southern Ocean"
      tags_en: "BGC-Argo; NCP; Southern Ocean"
      summary: "这项研究利用 BGC-Argo 浮标揭示南大洋净群落生产力的年代际增长。它通过剖面观测约束硝酸盐和相关生物地球化学变量，从而弥补传统船测时空覆盖不足。研究分析物理混合和采样差异之后的生产力变化信号。结果显示，南大洋净群落生产力在过去约二十年中呈增加趋势。它对理解南大洋碳吸收、营养盐消耗和浮标驱动的生产力估算很重要。"
      summary_zh: "这项研究利用 BGC-Argo 浮标揭示南大洋净群落生产力的年代际增长。它通过剖面观测约束硝酸盐和相关生物地球化学变量，从而弥补传统船测时空覆盖不足。研究分析物理混合和采样差异之后的生产力变化信号。结果显示，南大洋净群落生产力在过去约二十年中呈增加趋势。它对理解南大洋碳吸收、营养盐消耗和浮标驱动的生产力估算很重要。"
      summary_en: "This study uses BGC-Argo floats to reveal a multi-decadal increase in Southern Ocean net community production. It constrains nitrate and related biogeochemical variables with profile observations, helping overcome the sparse coverage of ship-based sampling. The analysis separates productivity signals from physical mixing and sampling effects. The results show an increase in Southern Ocean net community production over roughly two decades. It is important for understanding Southern Ocean carbon uptake, nutrient drawdown, and float-based productivity estimates."
    - title: "Southern Ocean Carbon Export Revealed by Backscatter and Oxygen Measurements From BGC‐Argo Floats"
      authors: "Guillaume Liniger; Sébastien Moreau; Delphine Lannuzel; Magdalena M. Carranza; Peter G. Strutton"
      journal: "Global Biogeochemical Cycles"
      published: "2025"
      published_month: "2025-04"
      published_month_zh: "2025-04"
      doi: "10.1029/2024GB008193"
      url: "https://doi.org/10.1029/2024GB008193"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "BGC-Argo; backscatter; oxygen; carbon export"
      tags_zh: "BGC-Argo; backscatter; oxygen; carbon export"
      tags_en: "BGC-Argo; backscatter; oxygen; carbon export"
      summary: "这项研究用 BGC-Argo 后向散射和氧气观测估计南大洋碳输出。它把光学颗粒信号与氧气约束结合起来，从而获得比单一指标更稳健的碳输出信息。研究比较不同海盆、锋区和海冰影响区域的输出差异。结果展示了南大洋碳输出的空间结构，并强调海冰区也需要纳入盆地尺度估算。它对利用剖面浮标量化生物碳泵和校验碳循环模型很有帮助。"
      summary_zh: "这项研究用 BGC-Argo 后向散射和氧气观测估计南大洋碳输出。它把光学颗粒信号与氧气约束结合起来，从而获得比单一指标更稳健的碳输出信息。研究比较不同海盆、锋区和海冰影响区域的输出差异。结果展示了南大洋碳输出的空间结构，并强调海冰区也需要纳入盆地尺度估算。它对利用剖面浮标量化生物碳泵和校验碳循环模型很有帮助。"
      summary_en: "This study estimates Southern Ocean carbon export using BGC-Argo backscatter and oxygen measurements. It combines optical particle signals with oxygen constraints, providing a more robust view than either proxy alone. The analysis compares export across basins, frontal zones, and regions influenced by sea ice. The results reveal spatial structure in Southern Ocean carbon export and highlight the need to include the sea-ice zone in basin-scale estimates. It is useful for quantifying the biological carbon pump from profiling floats and validating carbon-cycle models."
    - title: "Deep Learning Identifies the Climate Warming Signal in Global Ocean Chlorophyll From Satellite Records"
      authors: "Lei Lin; Chen Dong; Stephanie Henson; Bingzhang Chen"
      journal: "Geophysical Research Letters"
      published: "2026"
      published_month: "2026-02"
      published_month_zh: "2026-02"
      doi: "10.1029/2025GL120669"
      url: "https://doi.org/10.1029/2025GL120669"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean colour; deep learning; chlorophyll"
      tags_zh: "ocean colour; deep learning; chlorophyll"
      tags_en: "ocean colour; deep learning; chlorophyll"
      summary: "这项研究用深度学习从全球卫星叶绿素记录中识别气候变暖信号。它面对的核心难点是海色记录相对较短，容易被自然年际和年代际变率掩盖。研究训练模型来区分气候强迫信号和内部变率对叶绿素变化的贡献。结果说明，深度学习可以在全球叶绿素资料中提取出变暖相关的长期信号。它对海色趋势检测、气候影响归因和生产力变化研究很有帮助。"
      summary_zh: "这项研究用深度学习从全球卫星叶绿素记录中识别气候变暖信号。它面对的核心难点是海色记录相对较短，容易被自然年际和年代际变率掩盖。研究训练模型来区分气候强迫信号和内部变率对叶绿素变化的贡献。结果说明，深度学习可以在全球叶绿素资料中提取出变暖相关的长期信号。它对海色趋势检测、气候影响归因和生产力变化研究很有帮助。"
      summary_en: "This study uses deep learning to identify the climate-warming signal in global satellite chlorophyll records. The central challenge is that ocean-colour records are relatively short and can be masked by natural interannual and decadal variability. The model is trained to separate externally forced signals from internal variability in chlorophyll change. The results show that deep learning can extract a warming-related long-term signal from global chlorophyll observations. It is useful for ocean-colour trend detection, climate-impact attribution, and productivity-change studies."
    - title: "Seasonal Variability of Surface Ocean Carbon Uptake and Chlorophyll‐a Concentration in the West Antarctic Peninsula Over Two Decades"
      authors: "Jessica S. Turner; David R. Munro; Amanda Fay; Sharon Stammerjohn; Heather Kim; Oscar Schofield; Heidi Dierssen"
      journal: "Geophysical Research Letters"
      published: "2025"
      published_month: "2025-02"
      published_month_zh: "2025-02"
      doi: "10.1029/2024GL112446"
      url: "https://doi.org/10.1029/2024GL112446"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton; carbon uptake; Antarctic Peninsula"
      tags_zh: "phytoplankton; carbon uptake; Antarctic Peninsula"
      tags_en: "phytoplankton; carbon uptake; Antarctic Peninsula"
      summary: "这项研究分析西南极半岛二十年来表层海洋碳吸收和叶绿素 a 的季节变化。它结合原位 CO2 通量资料和卫星叶绿素记录，关注快速变暖区域中的季节节律。研究比较生产季内浮游植物物候与海气 CO2 交换之间的联系。结果说明，叶绿素季节变化会影响区域碳吸收的时间分布和强度。它对南极半岛碳汇评估、浮游植物物候研究和高纬海洋气候反馈很有帮助。"
      summary_zh: "这项研究分析西南极半岛二十年来表层海洋碳吸收和叶绿素 a 的季节变化。它结合原位 CO2 通量资料和卫星叶绿素记录，关注快速变暖区域中的季节节律。研究比较生产季内浮游植物物候与海气 CO2 交换之间的联系。结果说明，叶绿素季节变化会影响区域碳吸收的时间分布和强度。它对南极半岛碳汇评估、浮游植物物候研究和高纬海洋气候反馈很有帮助。"
      summary_en: "This study analyses two decades of seasonal variability in surface-ocean carbon uptake and chlorophyll-a around the West Antarctic Peninsula. It combines in-situ CO2 flux information with satellite chlorophyll records to examine seasonal timing in a rapidly warming region. The analysis connects phytoplankton phenology during the growing season with air-sea CO2 exchange. The results show that seasonal chlorophyll variability can shape the timing and strength of regional carbon uptake. It is useful for Antarctic Peninsula carbon-sink estimates, phytoplankton phenology, and high-latitude climate feedback studies."
    - title: "Unprecedented Summer Phytoplankton Bloom in the Ross Sea"
      authors: "Esther Portela; Meredith G. Meyer; Karen J. Heywood; Walker O. Smith"
      journal: "Geophysical Research Letters"
      published: "2025"
      published_month: "2025-02"
      published_month_zh: "2025-02"
      doi: "10.1029/2024GL111264"
      url: "https://doi.org/10.1029/2024GL111264"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "marine heatwave; phytoplankton bloom; Ross Sea"
      tags_zh: "marine heatwave; phytoplankton bloom; Ross Sea"
      tags_en: "marine heatwave; phytoplankton bloom; Ross Sea"
      summary: "这项研究报道罗斯海一次异常强的夏季浮游植物藻华。它利用高分辨率水下滑翔机观测解析藻华在上层水柱中的持续时间和垂向范围。研究关注藻华可能的群落组成、光照条件和水柱结构背景。结果显示，该藻华持续时间长、浓度高，并延伸到上百米深度范围。它对理解南大洋极端生产事件、海冰边缘生态过程和区域碳输出很有价值。"
      summary_zh: "这项研究报道罗斯海一次异常强的夏季浮游植物藻华。它利用高分辨率水下滑翔机观测解析藻华在上层水柱中的持续时间和垂向范围。研究关注藻华可能的群落组成、光照条件和水柱结构背景。结果显示，该藻华持续时间长、浓度高，并延伸到上百米深度范围。它对理解南大洋极端生产事件、海冰边缘生态过程和区域碳输出很有价值。"
      summary_en: "This study reports an unusually strong summer phytoplankton bloom in the Ross Sea. It uses high-resolution underwater glider observations to resolve the bloom’s persistence and vertical extent in the upper water column. The analysis considers possible community composition, light conditions, and water-column structure. The results show a long-lasting, high-chlorophyll bloom extending through a deep upper-ocean layer. It is valuable for understanding extreme production events, ice-edge ecosystem processes, and regional carbon export in the Southern Ocean."
    - title: "Anomalously Low New Production in the Northeast Atlantic During Spring 2024: A Consequence of Weaker Winter Mixing?"
      authors: "S. C. Painter; E. E. García‐Martín; C. Feltham; R. Muliawan; E. Mawji; K. Peel; S. Kelly; A. Flohr; et al."
      journal: "Journal of Geophysical Research: Oceans"
      published: "2026"
      published_month: "2026-02"
      published_month_zh: "2026-02"
      doi: "10.1029/2025JC023249"
