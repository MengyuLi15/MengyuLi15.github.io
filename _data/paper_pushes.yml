      tags: "particulate backscattering; bio-optics; ocean colour"
      tags_zh: "particulate backscattering; bio-optics; ocean colour"
      tags_en: "particulate backscattering; bio-optics; ocean colour"
      summary: "这项研究分析海水颗粒后向散射的光谱变异及其细尺度特征。它关注 bbp 光谱形状中可能被宽波段产品忽略的微小变化。研究把颗粒光学信号与颗粒组成、大小或生物地球化学状态联系起来。结果说明，高光谱或细光谱信息可以揭示更多颗粒过程细节。它对 PACE 高光谱海色、BGC-Argo bbp 解释和颗粒碳估算很有帮助。"
      summary_zh: "这项研究分析海水颗粒后向散射的光谱变异及其细尺度特征。它关注 bbp 光谱形状中可能被宽波段产品忽略的微小变化。研究把颗粒光学信号与颗粒组成、大小或生物地球化学状态联系起来。结果说明，高光谱或细光谱信息可以揭示更多颗粒过程细节。它对 PACE 高光谱海色、BGC-Argo bbp 解释和颗粒碳估算很有帮助。"
      summary_en: "This study analyses spectral variability in particulate light backscattering and its fine-scale optical features. It focuses on subtle changes in bbp spectral shape that may be missed by broad-band products. The work links particle optical signals with particle composition, size, or biogeochemical state. The results show that hyperspectral or fine-spectral information can reveal more detail about particle processes. It is useful for PACE hyperspectral ocean colour, interpretation of BGC-Argo bbp, and particulate carbon estimation."
    - title: "The PACE Data Hackweek Launches a New Wave of Open Science: How We Did It (Twice), and Why"
      authors: "Anna Windle; Ian Carroll; Carina Poulin; Skye Caplan; Jeremy Werdell"
      journal: "Oceanography"
      published: "2026"
