      tags: "ocean colour; ocean optics; bio-optics"
      tags_zh: "ocean colour; ocean optics; bio-optics"
      tags_en: "ocean colour; ocean optics; bio-optics"
      summary: "摘要：尽管遥感技术取得了进步，但由于方法分散，对淡水-海洋系统的水质进行一致监测仍然具有挑战性。在这里，我们概述了根据光学卫星数据估计的内陆水域、海岸和公海水质特征的示例数据集（https://doi.org/10.26050/WDCC/AquaINFRA_Sentinel3_v2，Hieronymi 等人，2025）。具体来说，这是整个北海和波罗的海地区 2023 年 6 月至 9 月期间的 Sentinel-3 OLCI（海洋和陆地颜色仪器）数据。该数据集包括每日汇总的观测数据，空间分辨率约为 300 m 的大气层顶部反射率，以及无云水域的遥感反射率、水的固有光学特性以及水成分浓度的估计，例如水的浓度。 g。 与水体碳含量有关。这些是新颖的 A4O 大气校正和 ONNS 水算法的结果。该数据集可作为理解处理链和相互依赖性的原型，也可用于开发高度连接性以回答各种科学问题；我们不对数据集中的 73 个单独参数进行实际验证。使用一个参数（水中的颗粒有机碳浓度）说明了涵盖所有水类型的验证的挑战。这项工作的目的是展示如何通过对哥白尼卫星数据应用光学水类型特定和基于神经网络的处理方案来克服从湖泊、河流到海洋的水体连续体水质监测的碎片化。 这项工作的重点是分析北海、波罗的海、沿海和内陆水域遥感反射率的光学复杂性。新的光学水类型分类的结果表明，A4O 提供的几乎所有 (99. 7 %) 遥感反射光谱都是可分类的，并且根据这些数据，该地区表现出天然水体的全方位光学多样性。该数据集可以作为水生环境整体视图的蓝图，也是迈向复杂系统基于观测的数字孪生组件的一步。"
      summary_zh: "摘要：尽管遥感技术取得了进步，但由于方法分散，对淡水-海洋系统的水质进行一致监测仍然具有挑战性。在这里，我们概述了根据光学卫星数据估计的内陆水域、海岸和公海水质特征的示例数据集（https://doi.org/10.26050/WDCC/AquaINFRA_Sentinel3_v2，Hieronymi 等人，2025）。具体来说，这是整个北海和波罗的海地区 2023 年 6 月至 9 月期间的 Sentinel-3 OLCI（海洋和陆地颜色仪器）数据。该数据集包括每日汇总的观测数据，空间分辨率约为 300 m 的大气层顶部反射率，以及无云水域的遥感反射率、水的固有光学特性以及水成分浓度的估计，例如水的浓度。 g。 与水体碳含量有关。这些是新颖的 A4O 大气校正和 ONNS 水算法的结果。该数据集可作为理解处理链和相互依赖性的原型，也可用于开发高度连接性以回答各种科学问题；我们不对数据集中的 73 个单独参数进行实际验证。使用一个参数（水中的颗粒有机碳浓度）说明了涵盖所有水类型的验证的挑战。这项工作的目的是展示如何通过对哥白尼卫星数据应用光学水类型特定和基于神经网络的处理方案来克服从湖泊、河流到海洋的水体连续体水质监测的碎片化。 这项工作的重点是分析北海、波罗的海、沿海和内陆水域遥感反射率的光学复杂性。新的光学水类型分类的结果表明，A4O 提供的几乎所有 (99. 7 %) 遥感反射光谱都是可分类的，并且根据这些数据，该地区表现出天然水体的全方位光学多样性。该数据集可以作为水生环境整体视图的蓝图，也是迈向复杂系统基于观测的数字孪生组件的一步。"
      summary_en: "Abstract: Despite advances in remote sensing, consistent monitoring of water quality across freshwater-marine systems remains challenging due to methodological fragmentation. Here, we provide an overview of an exemplary dataset on water quality characteristics in inland waters, coasts, and the open sea estimated from optical satellite data (https://doi.org/10.26050/WDCC/AquaINFRA_Sentinel3_v2, Hieronymi et al., 2025). Specifically, this is Sentinel-3 OLCI (Ocean and Land Colour Instrument) data for the entire North Sea and Baltic Sea region for the period June to September 2023. The dataset includes daily aggregated observational data with a spatial resolution of approximately 300 m of reflectance at the top-of-atmosphere and for cloud-free water areas remote-sensing reflectance, inherent optical properties of the water, and an estimation of the concentrations of water constituents, e.g. related to the aquatic carbon content. These are the results of the novel A4O atmospheric correction and the ONNS water algorithm. The dataset serves as a prototype for understanding the processing chain and interdependencies, but also for developing a high degree of connectivity for answering various scientific questions; we do not perform an actual validation of the 73 individual parameters in the dataset. The challenges of a validation covering all water types are illustrated using one parameter, the particulate organic carbon concentration in water. The aim of this work is to show how fragmentation in water quality monitoring along the aquatic continuum from lakes, rivers to the sea can be overcome by applying an optical water type-specific and neural network-based processing scheme for Copernicus satellite data. Emphasis of this work is on analysing the optical complexity of remote-sensing reflectance in the North Sea, Baltic Sea, coastal, and inland waters. Results of a new optical water type classification show that almost all (99.7 %) remote-sensing reflectance spectra delivered by A4O are classifiable and that, based on this data, the region exhibits the full range of optical diversity of natural water bodies. The dataset can serve as a blueprint for a holistic view of the aquatic environment and is a step towards an observation-based digital twin component of the complex system."
    - title: "Springtime Intensification of Mesoscale Eddies in the Southeastern Tropical Indian Ocean"
      authors: "Yifei Zhou; Xuhua Cheng; Xiangzhou Song; Wei Duan"
      journal: "Journal of Geophysical Research: Oceans"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1029/2025jc023723"
      url: "https://doi.org/10.1029/2025jc023723"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：热带印度洋东南部（SETIO）的中尺度涡旋调节区域环流和热量再分配。利用 1993 年至 2024 年的卫星测高和 GLORYS12V1 海洋再分析，我们发现 SETIO 中的涡动能 (EKE) 长期显着增加。该趋势表现出明显的季节性不对称，强化集中在南方春季（9月至11月），表明季节性EKE周期的放大。能量诊断表明，春季 EKE 增强主要是由斜压能量转换增强而不是正压过程驱动的。斜压不稳定性的增强与冬末和春季水平密度梯度的增强有关。 进一步的分析表明，爪哇南部沿海上升流的加强和上层海洋风能输入的增加可能有助于观测到的春季 EKE 增强。这些发现增进了我们对东部边界涡动力学的理解。"
      summary_zh: "摘要：热带印度洋东南部（SETIO）的中尺度涡旋调节区域环流和热量再分配。利用 1993 年至 2024 年的卫星测高和 GLORYS12V1 海洋再分析，我们发现 SETIO 中的涡动能 (EKE) 长期显着增加。该趋势表现出明显的季节性不对称，强化集中在南方春季（9月至11月），表明季节性EKE周期的放大。能量诊断表明，春季 EKE 增强主要是由斜压能量转换增强而不是正压过程驱动的。斜压不稳定性的增强与冬末和春季水平密度梯度的增强有关。 进一步的分析表明，爪哇南部沿海上升流的加强和上层海洋风能输入的增加可能有助于观测到的春季 EKE 增强。这些发现增进了我们对东部边界涡动力学的理解。"
      summary_en: "Abstract: Mesoscale eddies in the southeastern tropical Indian Ocean (SETIO) regulate regional circulation and heat redistribution. Using satellite altimetry and the GLORYS12V1 ocean reanalysis for 1993–2024, we identify a significant long‐term increase in eddy kinetic energy (EKE) in the SETIO. The trend exhibits pronounced seasonal asymmetry, with the intensification concentrated on austral spring (September–November), indicating an amplification of the seasonal EKE cycle. Energy diagnostics reveal that the springtime EKE intensification is primarily driven by enhanced baroclinic energy conversion rather than barotropic processes. The intensified baroclinic instability is associated with enhanced horizontal density gradients during late winter and spring. Further analyses suggest that strengthened coastal upwelling south of Java and increased wind energy input to the upper ocean likely contribute to the observed springtime EKE enhancement. These findings advance our understanding of eastern boundary eddy dynamics."
    - title: "Potential of optical and ecological proxies to quantify phytoplankton carbon in oligotrophic waters"
      authors: "David Antoine; Chandanlal Parida; Camille Grimaldi"
      journal: "Biogeosciences"
