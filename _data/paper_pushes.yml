      summary: "这项研究分析气候变率如何改变西班牙不同海洋生态区的浮游植物物候。它利用区域时间序列或遥感资料比较藻华发生时间、持续时间和季节峰值。研究关注不同生态区对气候振荡和环境变化的响应是否一致。结果显示，浮游植物物候会随气候变率发生区域差异明显的改变。它对陆架海生态监测、藻华预警和区域生产力研究很有帮助。"
      summary_zh: "这项研究分析气候变率如何改变西班牙不同海洋生态区的浮游植物物候。它利用区域时间序列或遥感资料比较藻华发生时间、持续时间和季节峰值。研究关注不同生态区对气候振荡和环境变化的响应是否一致。结果显示，浮游植物物候会随气候变率发生区域差异明显的改变。它对陆架海生态监测、藻华预警和区域生产力研究很有帮助。"
      summary_en: "This study analyses how climate variability changes phytoplankton phenology across Spanish marine ecoregions. It uses regional time series or remote-sensing information to compare bloom timing, duration, and seasonal peaks. The work asks whether different ecoregions respond similarly to climate oscillations and environmental change. The results show that phytoplankton phenology shifts with clear regional differences. It is useful for shelf-sea monitoring, bloom early warning, and regional productivity studies."
