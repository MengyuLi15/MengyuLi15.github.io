    - title: "An Effective Deep Learning Model for the Pacific Decadal Oscillation Prediction"
      authors: "Wenbo Liu; Jianqi Sun; Kai Wang; Huijun Wang"
      journal: "Environmental Research Communications"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1088/2515-7620/ae7b04"
      url: "https://doi.org/10.1088/2515-7620/ae7b04"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：太平洋年代际振荡（PDO）是气候变化的重要年代际模式，对气候、水文气候和海洋生态系统产生深远的全球影响。因此，巧妙地预测PDO具有重要的科学和社会意义。然而，当前的统计和动态方法在预测 PDO 方面面临着挑战，特别是在两年交付周期之后。为了应对这一挑战，我们开发了一个专为 PDO 预测定制的深度学习 (DL) 模型。 DL 模型表现出巧妙的预测，在 1-8 年的交付周期和 ~0 的交付周期内实现平均相关系数 > 0. 64。 41 领先 7-8 年。此外，我们开发的基于深度学习的物理诊断方法表明，这种性能的提高主要源于深度学习模型识别有效预测因素并捕获其协同相互作用的能力。 总的来说，这些发现为十年间气候预测提供了一种变革性方法，超越了 PDO 扩展到其他十年模式和气候模式。"
      summary_zh: "摘要：太平洋年代际振荡（PDO）是气候变化的重要年代际模式，对气候、水文气候和海洋生态系统产生深远的全球影响。因此，巧妙地预测PDO具有重要的科学和社会意义。然而，当前的统计和动态方法在预测 PDO 方面面临着挑战，特别是在两年交付周期之后。为了应对这一挑战，我们开发了一个专为 PDO 预测定制的深度学习 (DL) 模型。 DL 模型表现出巧妙的预测，在 1-8 年的交付周期和 ~0 的交付周期内实现平均相关系数 > 0. 64。 41 领先 7-8 年。此外，我们开发的基于深度学习的物理诊断方法表明，这种性能的提高主要源于深度学习模型识别有效预测因素并捕获其协同相互作用的能力。 总的来说，这些发现为十年间气候预测提供了一种变革性方法，超越了 PDO 扩展到其他十年模式和气候模式。"
      summary_en: "Abstract: The Pacific Decadal Oscillation (PDO) is an essential decadal mode in climate variability, exerting profound global impacts on climates, hydroclimates, and marine ecosystems. Consequently, skillful prediction of the PDO is of considerable scientific and societal significance. However, current statistical and dynamical approaches face a challenge in predicting the PDO, particularly beyond two-year lead times. To address this challenge, we develop a deep learning (DL) model tailored for the PDO prediction. The DL model exhibits a skillful prediction, achieving a mean correlation coefficient > 0.64 at lead times of 1–8 years and ~0.41 at 7–8-year leads. Moreover, our developed DL-based physical diagnosis method demonstrates that this improved performance stems primarily from the DL model’s capability to identify effective predictors and capture their synergistic interactions. Collectively, these findings provide a transformative approach for decadal climate prediction, extending beyond the PDO to other decadal modes and climatic patterns."
