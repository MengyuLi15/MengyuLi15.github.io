      tags_zh: "ocean colour; multi-task learning; remote sensing products"
      tags_en: "ocean colour; multi-task learning; remote sensing products"
      summary: "这项研究比较多任务学习和单任务学习在香港近岸水体海色反演中的表现。它利用复杂近岸水体案例来测试不同机器学习策略是否能同时改善多个海色变量。研究评估模型在相关任务之间共享信息时是否更稳定、更准确。结果给出了多任务与单任务方法的性能差异和适用场景。它对复杂水体遥感产品开发、模型选择和区域监测很有参考价值。"
      summary_zh: "这项研究比较多任务学习和单任务学习在香港近岸水体海色反演中的表现。它利用复杂近岸水体案例来测试不同机器学习策略是否能同时改善多个海色变量。研究评估模型在相关任务之间共享信息时是否更稳定、更准确。结果给出了多任务与单任务方法的性能差异和适用场景。它对复杂水体遥感产品开发、模型选择和区域监测很有参考价值。"
      summary_en: "This study compares multi-task and single-task learning for ocean-colour retrieval in Hong Kong coastal waters. It uses an optically complex coastal case to test whether different machine-learning strategies can improve multiple ocean-colour variables at the same time. The analysis evaluates whether sharing information among related tasks makes retrievals more stable or accurate. The results clarify the performance differences and suitable use cases for multi-task versus single-task models. It is useful for complex-water remote-sensing products, model selection, and regional monitoring."
    - title: "Field Campaign Design and Implementation with Traceability Matrix Decision Support"
