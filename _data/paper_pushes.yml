      summary: "摘要：河口和沿海生态系统正面临来自陆地污染和海水养殖活动等复合压力的重大威胁。这些生态系统面临着严峻的挑战，包括环境负担增加和生态健康状况下降。传统的依赖统计数据的评价方法难以满足河口沿岸水环境精细化管理的要求。本研究以钦州湾为案例，将多源数据（包括遥感影像的水质指标、海水养殖分布和土地利用信息）纳入遥感数据与压力-状态-响应（PSR）模型相结合的综合生态健康评估系统。该方法能够对2015年8月（汛期）、2015年12月（非汛期）、2022年5月（汛期）和2022年12月（非汛期）的生态健康状况进行空间连续定量评估。结果表明，钦州湾生态健康状况存在显着的季节差异，非汛期总体状况优于汛期。对比2015年指示性估算和2022年反演结果，2022年总体生态健康指数呈上升趋势，但部分近岸和河口地区出现下降趋势。本研究将遥感等多源数据纳入PSR模型框架，从而将生态健康评估从传统的基于离散站点的评估推进到空间连续评估。 验证了该方法在识别河口沿岸生态健康时空变化的有效性，为河口沿岸水环境精细化管理和生态恢复提供科学支撑。"
      summary_zh: "摘要：河口和沿海生态系统正面临来自陆地污染和海水养殖活动等复合压力的重大威胁。这些生态系统面临着严峻的挑战，包括环境负担增加和生态健康状况下降。传统的依赖统计数据的评价方法难以满足河口沿岸水环境精细化管理的要求。本研究以钦州湾为案例，将多源数据（包括遥感影像的水质指标、海水养殖分布和土地利用信息）纳入遥感数据与压力-状态-响应（PSR）模型相结合的综合生态健康评估系统。该方法能够对2015年8月（汛期）、2015年12月（非汛期）、2022年5月（汛期）和2022年12月（非汛期）的生态健康状况进行空间连续定量评估。结果表明，钦州湾生态健康状况存在显着的季节差异，非汛期总体状况优于汛期。对比2015年指示性估算和2022年反演结果，2022年总体生态健康指数呈上升趋势，但部分近岸和河口地区出现下降趋势。本研究将遥感等多源数据纳入PSR模型框架，从而将生态健康评估从传统的基于离散站点的评估推进到空间连续评估。 验证了该方法在识别河口沿岸生态健康时空变化的有效性，为河口沿岸水环境精细化管理和生态恢复提供科学支撑。"
      summary_en: "Abstract: Estuarine and coastal ecosystems are facing significant threats from compounded pressures, such as land-based pollution and mariculture activities. These ecosystems confront severe challenges, including increasing environmental burdens and declining ecological health. Traditional evaluation methods that rely on statistical data struggle to meet the requirements for refined management of estuarine and coastal water environments. Taking Qinzhou Bay as a case study, this research incorporated multi-source data (including water quality indicators retrieved from remote sensing imagery, mariculture distribution, and land use information) into an integrated ecological health assessment system that combined remotely sensed data with the Pressure–State–Response (PSR) model. This approach enables a spatially continuous and quantitative evaluation of ecological health conditions for August 2015 (flood season), December 2015 (non-flood season), May 2022 (flood season), and December 2022 (non-flood season). The results indicated significant seasonal differences in the ecological health of Qinzhou Bay, with conditions generally better during the non-flood season than the flood season. Based on a comparison between the indicative estimation for 2015 and the inversion results for 2022, the overall ecological health index in 2022 showed an increasing trend, although some nearshore and estuarine areas experienced a declining trend. This study incorporated multi-source data, including remote sensing, into the PSR model framework, thereby advancing ecological health assessment from conventional discrete station-based evaluation to spatially continuous assessment. The effectiveness of this methodological approach in identifying spatiotemporal variations in the ecological health of estuarine and coastal zones was validated, providing scientific support for the refined management of estuarine and coastal water environments and ecological restoration."
    - title: "Mapping Potential Fishing Zones as Indicators of Pelagic Ecosystem Service Hotspots in the Makassar Strait using Satellite-Derived SST and Chlorophyll-a Anomalies"
      authors: "Ummu Salma; Fadil Apresia"
      journal: "Asian Journal of Environmental Research"
