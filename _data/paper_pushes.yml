      tags: "Southern Ocean; optical observations; POM flux"
      tags_zh: "Southern Ocean; optical observations; POM flux"
      tags_en: "Southern Ocean; optical observations; POM flux"
      summary: "这项研究提出从原位光学观测估计颗粒有机物通量的框架。它重点处理悬浮颗粒对光学信号的影响，并把随深度变化的降解过程纳入通量估计。研究把后向散射等光学量与 POM 通量联系起来，使剖面观测更接近碳输出诊断。结果提供了一个可用于修正和解释光学通量估计的方法。它对南大洋碳输出、BGC-Argo 光学代理变量和颗粒降解研究很有帮助。"
      summary_zh: "这项研究提出从原位光学观测估计颗粒有机物通量的框架。它重点处理悬浮颗粒对光学信号的影响，并把随深度变化的降解过程纳入通量估计。研究把后向散射等光学量与 POM 通量联系起来，使剖面观测更接近碳输出诊断。结果提供了一个可用于修正和解释光学通量估计的方法。它对南大洋碳输出、BGC-Argo 光学代理变量和颗粒降解研究很有帮助。"
      summary_en: "This study develops a framework for estimating particulate organic matter flux from in-situ optical observations. It explicitly addresses the influence of suspended particles and includes depth-dependent degradation in flux estimates. The work links optical quantities such as backscatter with POM flux, bringing profile observations closer to carbon-export diagnostics. The result is a method for correcting and interpreting optical flux estimates. It is useful for Southern Ocean carbon export, BGC-Argo optical proxies, and particle-degradation studies."
