      summary: "摘要：海洋热浪 (MHW) 对海洋生物和生态系统服务造成重大损害，并可能加剧飓风。上个世纪，全球变暖增加了重灾区的持续时间和强度，预计到 21 世纪末，许多海洋区域将出现永久性的重灾区。已提出采取平流层气溶胶注入（SAI）等气候干预措施来降低全球平均温度；然而，它们对 MHW 的潜在影响尚不清楚。在本研究中，我们使用社区地球系统模型的输出来量化多个时间范围和气候变化情景下的 MHW。我们评估了历史（1990-2009）、当前（2015-2034）和未来（2050-2069）时期的全球MHW特性，包括持续时间和最大强度（高于气候学的最大超出）。我们分析了旨在将全球平均表面温度维持在 ∼1 的两个 SAI 情景的输出。比工业化前水平高 0°C (ARISE-SAI-1. 0) 和一种非 SAI 情景 (SSP2-4)。我们的结果表明，尽管 SAI 相对于 SSP2-4. 5 减少了 MHW 的全球平均最大强度和持续时间，但影响的程度在空间上有所不同。与目前的气候相比，SAI 情景将减少 25-76% 海洋的 MHW 强度和 20% 的 MHW 持续时间。 21-80%的海洋未来最大强度和持续时间的最大减少发生在热带大西洋、印度洋、北冰洋和南大西洋的沿海地区，即使是在更激进的SAI情景下（ARISE-SAI-1. 0），近25%的海洋将不受影响，北大西洋、热带太平洋和南大洋部分地区仍会经历更强烈和更长的MHW，这意味着即使全球平均温度目标正在实现，SAI在减轻MHW方面可能会被当地认为无效。"
      summary_zh: "摘要：海洋热浪 (MHW) 对海洋生物和生态系统服务造成重大损害，并可能加剧飓风。上个世纪，全球变暖增加了重灾区的持续时间和强度，预计到 21 世纪末，许多海洋区域将出现永久性的重灾区。已提出采取平流层气溶胶注入（SAI）等气候干预措施来降低全球平均温度；然而，它们对 MHW 的潜在影响尚不清楚。在本研究中，我们使用社区地球系统模型的输出来量化多个时间范围和气候变化情景下的 MHW。我们评估了历史（1990-2009）、当前（2015-2034）和未来（2050-2069）时期的全球MHW特性，包括持续时间和最大强度（高于气候学的最大超出）。我们分析了旨在将全球平均表面温度维持在 ∼1 的两个 SAI 情景的输出。比工业化前水平高 0°C (ARISE-SAI-1. 0) 和一种非 SAI 情景 (SSP2-4)。我们的结果表明，尽管 SAI 相对于 SSP2-4. 5 减少了 MHW 的全球平均最大强度和持续时间，但影响的程度在空间上有所不同。与目前的气候相比，SAI 情景将减少 25-76% 海洋的 MHW 强度和 20% 的 MHW 持续时间。 21-80%的海洋未来最大强度和持续时间的最大减少发生在热带大西洋、印度洋、北冰洋和南大西洋的沿海地区，即使是在更激进的SAI情景下（ARISE-SAI-1. 0），近25%的海洋将不受影响，北大西洋、热带太平洋和南大洋部分地区仍会经历更强烈和更长的MHW，这意味着即使全球平均温度目标正在实现，SAI在减轻MHW方面可能会被当地认为无效。"
      summary_en: "Abstract: Marine heatwaves (MHWs) cause significant harm to marine life and ecosystem services, and can intensify hurricanes. Global warming has increased the duration and intensity of MHWs over the last century, and permanent MHWs have been predicted in many areas of the ocean by the end of the 21st century. Climate interventions, such as stratospheric aerosol injection (SAI), have been proposed to reduce the mean global temperature; however, their potential impact on MHWs is unclear. In this study, we used the output from the Community Earth System Model to quantify MHWs under multiple timeframes and climate change scenarios. We evaluated global MHW properties, including duration and maximum intensity—the maximum exceedance above the climatology—over historical (1990-2009), present (2015-2034), and future (2050-2069) periods. We analyzed output from two SAI scenarios aimed to maintain global mean surface temperatures at ∼1.5 and ∼1.0°C above pre-industrial levels (ARISE-SAI-1.5 and ARISE-SAI-1.0) and one non-SAI scenario (SSP2-4.5). Our results show that despite the SAI reducing the global average maximum intensity and duration of MHWs relative to SSP2-4.5, the magnitude of the effects varies spatially. Compared with the present climate, SAI scenarios would reduce MHW intensity in 25-76% of the ocean and MHW duration in 21-80% of the ocean. The largest future reductions in maximum intensity and duration occurred in the coastal regions of the Tropical Atlantic, Indian, Arctic, and South Atlantic oceans. Even with a more aggressive SAI scenario (ARISE-SAI-1.0), nearly 25% of the ocean would remain unaffected, with areas like the North Atlantic, Tropical Pacific, and parts of the Southern Oceans still experiencing more intense and longer MHWs, meaning that SAI could be perceived locally as ineffective at mitigating MHW even while the global mean temperature target is being met."
    - title: "Climate-modulated upwelling drives phytoplankton variability and biomass connectivity in the Humboldt Archipelago coastal system"
      authors: "Victor M. Aguilera; Matthew L. Hammond; Iván Pérez; Pablo Gorostiaga"
      journal: "Scientific Reports"
      published: "2026-06-11"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1038/s41598-026-56707-y"
      url: "https://doi.org/10.1038/s41598-026-56707-y"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "phytoplankton"
      tags_zh: "phytoplankton"
      tags_en: "phytoplankton"
      summary: "摘要：由浮游植物生物量（叶绿素-a、Chl）驱动的海洋生产力维持着洪堡群岛（南纬 29°）的生物多样性、渔业和生态系统服务，该群岛是洪堡洋流系统内的一个干旱沿海上升流区域。该群岛的特点是强烈的水深梯度和海底峡谷，产生复杂的环流模式，可能影响浮游植物的聚集。尽管上升流全年都会发生，但其效率在区域大气强迫和大尺度气候模式（包括厄尔尼诺南方涛动（ENSO）和太平洋经向模式（PMM））的影响下会出现季节性和年际变化。我们评估了当地水文结构、上升流动力学和气候变化如何相互作用，以调节科金博-洪堡上升流系统内的叶绿素变化和生物量连通性。为了解决这个问题，我们将 2022 年 11 月至 2024 年 12 月期间 21 次近月度调查期间在固定地点收集的 CTD 荧光剖面与卫星观测和大气数据相结合。使用分层广义加性模型分析叶绿素变异性，其中基线物理模型解释了 80% 的叶绿素偏差，而包含 PMM 将其增加到约 84%，并显着提高了模型性能。叶绿素的季节性变化主要与混合层深度浅滩和中间埃克曼输运有关，表明短期物理强迫的强烈控制。相反，PMM-Ekman 输运相互作用表明，上升流效率取决于大尺度气候背景。卫星观测进一步表明浮游植物生物量从科金博湾系统偶尔输出到群岛。 这些结果表明，气候模式调节局部上升流效率，塑造东南太平洋生物多样性最丰富的沿海地区之一的浮游植物动态。"
      summary_zh: "摘要：由浮游植物生物量（叶绿素-a、Chl）驱动的海洋生产力维持着洪堡群岛（南纬 29°）的生物多样性、渔业和生态系统服务，该群岛是洪堡洋流系统内的一个干旱沿海上升流区域。该群岛的特点是强烈的水深梯度和海底峡谷，产生复杂的环流模式，可能影响浮游植物的聚集。尽管上升流全年都会发生，但其效率在区域大气强迫和大尺度气候模式（包括厄尔尼诺南方涛动（ENSO）和太平洋经向模式（PMM））的影响下会出现季节性和年际变化。我们评估了当地水文结构、上升流动力学和气候变化如何相互作用，以调节科金博-洪堡上升流系统内的叶绿素变化和生物量连通性。为了解决这个问题，我们将 2022 年 11 月至 2024 年 12 月期间 21 次近月度调查期间在固定地点收集的 CTD 荧光剖面与卫星观测和大气数据相结合。使用分层广义加性模型分析叶绿素变异性，其中基线物理模型解释了 80% 的叶绿素偏差，而包含 PMM 将其增加到约 84%，并显着提高了模型性能。叶绿素的季节性变化主要与混合层深度浅滩和中间埃克曼输运有关，表明短期物理强迫的强烈控制。相反，PMM-Ekman 输运相互作用表明，上升流效率取决于大尺度气候背景。卫星观测进一步表明浮游植物生物量从科金博湾系统偶尔输出到群岛。 这些结果表明，气候模式调节局部上升流效率，塑造东南太平洋生物多样性最丰富的沿海地区之一的浮游植物动态。"
      summary_en: "Abstract: Marine productivity driven by phytoplankton biomass (chlorophyll-a, Chl) sustains biodiversity, fisheries, and ecosystem services in the Humboldt Archipelago (29°S), an arid coastal upwelling region within the Humboldt Current System. The archipelago is characterized by strong bathymetric gradients and a submarine canyon that generate complex circulation patterns, potentially affecting phytoplankton aggregation. Although upwelling occurs year-round, its efficiency varies seasonally and interannually under the influence of regional atmospheric forcing and large-scale climate modes, including the El Niño–Southern Oscillation (ENSO) and the Pacific Meridional Mode (PMM). We evaluated how local hydrographic structure, upwelling dynamics, and climate variability interact to regulate Chl variability and biomass connectivity within the Coquimbo–Humboldt upwelling system. To address this, CTD-fluorescence profiles collected at a fixed site during 21 near-monthly surveys between November 2022 and December 2024 were combined with satellite observations and atmospheric data. Chlorophyll variability was analyzed using hierarchical Generalized Additive Models, of which the baseline physical model explained 80% of Chl deviance, while inclusion of the PMM increased it to ~ 84% and substantially improved model performance. Seasonal Chl variability was primarily associated with mixed-layer depth shoaling and intermediate Ekman transport, indicating strong control by short-term physical forcing. In contrast, the PMM-Ekman transport interaction revealed that upwelling efficiency depended on the large-scale climatic background. Satellite observations further suggested the episodic export of phytoplankton biomass from the Coquimbo Bay system into the archipelago. These results demonstrate that climate modes modulate local upwelling efficiency, shaping phytoplankton dynamics in one of the most biodiverse coastal regions of the Southeastern Pacific."
    - title: "Quasi-Lagrangian observations of cloud transitions during the initial phase of marine cold air outbreaks in the Arctic – Part 2: Vertical cloud structure"
      authors: "Anna Weber; Fabian Hoffmann; Bernhard Mayer"
      journal: "Atmospheric Chemistry and Physics"
      published: "2026-06-10"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/acp-26-8001-2026"
