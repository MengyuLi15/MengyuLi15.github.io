      tags_en: "ocean colour; chlorophyll dataset; multi-sensor"
      summary: "这篇数据论文构建全球表层叶绿素 a 的年代际完整数据记录。它结合卫星海色和 BGC-Argo 观测，弥补单一资料源在空间覆盖或垂向约束上的不足。研究通过融合和插补方法获得空间上更连续的表层叶绿素场。结果提供了适合长期趋势、季节循环和区域比较的数据产品。它对海色产品评估、生产力估算和生态模型验证很有价值。"
      summary_zh: "这篇数据论文构建全球表层叶绿素 a 的年代际完整数据记录。它结合卫星海色和 BGC-Argo 观测，弥补单一资料源在空间覆盖或垂向约束上的不足。研究通过融合和插补方法获得空间上更连续的表层叶绿素场。结果提供了适合长期趋势、季节循环和区域比较的数据产品。它对海色产品评估、生产力估算和生态模型验证很有价值。"
      summary_en: "This data paper builds a decadal, spatially complete global surface chlorophyll-a record. It combines satellite ocean colour with BGC-Argo observations, reducing the limitations of any single data source in spatial coverage or profile constraint. The work uses fusion and gap-filling methods to produce a more continuous surface chlorophyll field. The result is a data product suited to long-term trends, seasonal cycles, and regional comparisons. It is valuable for ocean-colour product assessment, productivity estimates, and ecosystem-model validation."
    - title: "Phytoplankton coastal-offshore monitoring by the Strait of Dover at high spatial resolution: the DYPHYRAD surveys"
      authors: "Zéline Hubert; Aurélie Libeau; Clémentine Gallot; Vincent Cornille; Muriel Crouvoisier; Éric Lécuyer; Luis Felipe Artigas"
