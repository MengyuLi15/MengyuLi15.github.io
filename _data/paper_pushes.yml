    - title: "Hotspots of Arctic and sub-Arctic marine sediment organic carbon are dominated by the Baltic, Barents and Chukchi Seas"
      authors: "B. Langley; H. L. Burdett; K. Cameron; T. Juul-Pedersen; A. Rouillard; C. Slaymark; N. A. Kamenos"
      journal: "Communications Earth &amp; Environment"
      published: "2026-06-19"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1038/s43247-026-03720-8"
      url: "https://doi.org/10.1038/s43247-026-03720-8"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：北极和亚北极地区的变暖速度至少是全球平均水平的三倍，改变了陆地碳向海洋的输送和海洋碳循环。将此类碳封存在海洋沉积物中是气候调节的关键因素。尽管如此，人们对高纬度地区有机碳热点的位置知之甚少，这阻碍了我们识别其对环境变化敏感性的能力。利用包含超过 13,000 个沉积物样本的分位数回归森林，我们将波罗的海、巴伦支海和楚科奇海确定为主要的高纬度海洋有机碳热点，在面积归一化的全球沉积碳储量中发挥着不成比例的重要作用。浅层陆架环境和海岸线的有机碳积累率升高，特别是在北极河流附近。 有机碳热点的发展反映了本地和外部过程，包括盐度、混合层深度、初级生产和沉积，证明了陆地-海洋耦合过程的重要性。因此，有机碳循环和运输途径（包括河流运输）未来变化的不确定性是海洋沉积物碳储存稳定性的一个新兴风险因素。更重要的是，目前只有 10. 19% 的表层沉积物有机碳储量位于海洋保护区内，这使得 >17 Pg 面临更高的人为干扰风险。"
      summary_zh: "摘要：北极和亚北极地区的变暖速度至少是全球平均水平的三倍，改变了陆地碳向海洋的输送和海洋碳循环。将此类碳封存在海洋沉积物中是气候调节的关键因素。尽管如此，人们对高纬度地区有机碳热点的位置知之甚少，这阻碍了我们识别其对环境变化敏感性的能力。利用包含超过 13,000 个沉积物样本的分位数回归森林，我们将波罗的海、巴伦支海和楚科奇海确定为主要的高纬度海洋有机碳热点，在面积归一化的全球沉积碳储量中发挥着不成比例的重要作用。浅层陆架环境和海岸线的有机碳积累率升高，特别是在北极河流附近。 有机碳热点的发展反映了本地和外部过程，包括盐度、混合层深度、初级生产和沉积，证明了陆地-海洋耦合过程的重要性。因此，有机碳循环和运输途径（包括河流运输）未来变化的不确定性是海洋沉积物碳储存稳定性的一个新兴风险因素。更重要的是，目前只有 10. 19% 的表层沉积物有机碳储量位于海洋保护区内，这使得 >17 Pg 面临更高的人为干扰风险。"
      summary_en: "Abstract: The Arctic and sub-Arctic are warming at least three times faster than the global average, altering terrestrial carbon delivery to the oceans and marine carbon cycling. The sequestration of such carbon into marine sediments is a key contributor to climate regulation. Despite this, the location of organic carbon hotspots at high latitudes are poorly understood, hindering our ability to identify their sensitivity to environmental change. Using quantile regression forests with >13,000 sediment samples, we identify the Baltic, Barents and Chukchi Seas as the dominant high-latitude marine organic carbon hotspots, playing a disproportionately large role in the area-normalised global sedimentary carbon stock. Organic carbon accumulation rates are elevated across shallow shelf environments and coastlines, particularly in proximity to Arctic rivers. Development of organic carbon hotspots reflects both local and external processes, including salinity, mixed layer depth, primary production and sedimentation, demonstrating the importance of coupled land-ocean processes. Uncertainty in future changes to organic carbon cycling and transit pathways, including river transport, is therefore an emerging risk factor for the stability of marine sediment carbon stores. Compounding this, only 10.19% of the surface sediment organic carbon stock is currently within marine protected areas, placing >17 Pg at higher risk of anthropogenic disturbance."
