      summary: "摘要：高纬度海洋中的海洋热浪（MHW）正在增加，但溯河产卵鱼类在短暂的海洋觅食季节对这些潜在压力源的行为反应仍知之甚少。我们将声学遥测（内部温度和深度）与卫星获取的海面温度数据相结合，量化了两个截然不同的夏季中北极红点鲑（Salvelinus alpinus）对拉布拉多海沿岸的 MHW 的响应：2023 年，早季 MHW 频繁出现；2024 年，以晚季事件为主。使用非 MHW 检测，我们拟合每条鱼的季节性基线并计算温度和深度异常。炭火往往发生在内部栖息地（河口/峡湾），尽管 2024 年在外部（沿海/岬角）栖息地的利用方面显示出更大的个体差异。 MHW 发作期间内部温度相对于基线有所增加（中位数 +0. 64°C），发病后有适度的持续性（+0. 23°C），而深度异常没有表现出一致的偏离。从MHW之前到MHW期间，不同体型的温度异常有所增加，并且在发作期间对于较大的鱼类来说最为强烈。相比之下，在控制季节性后，MHW 条件增加了主要针对较小鱼类的内部栖息地检测的可能性。不同年份的迁徙时间因体型大小而异，较大的鱼类在 2023 年早些时候离开海洋环境并进入河流。总体而言，北极红点鲑的反应并没有提供证据表明它们在 MHW 期间寻找热避难所。然而，栖息地利用和迁移时间的大小依赖性变化表明，MHW 仍然可以改变海洋栖息地的权衡，可能是通过间接生态因素（例如猎物可用性）。 然而，当未来的热浪超过生理或生长性能阈值时，北极红点的反应可能会加剧。"
      summary_zh: "摘要：高纬度海洋中的海洋热浪（MHW）正在增加，但溯河产卵鱼类在短暂的海洋觅食季节对这些潜在压力源的行为反应仍知之甚少。我们将声学遥测（内部温度和深度）与卫星获取的海面温度数据相结合，量化了两个截然不同的夏季中北极红点鲑（Salvelinus alpinus）对拉布拉多海沿岸的 MHW 的响应：2023 年，早季 MHW 频繁出现；2024 年，以晚季事件为主。使用非 MHW 检测，我们拟合每条鱼的季节性基线并计算温度和深度异常。炭火往往发生在内部栖息地（河口/峡湾），尽管 2024 年在外部（沿海/岬角）栖息地的利用方面显示出更大的个体差异。 MHW 发作期间内部温度相对于基线有所增加（中位数 +0. 64°C），发病后有适度的持续性（+0. 23°C），而深度异常没有表现出一致的偏离。从MHW之前到MHW期间，不同体型的温度异常有所增加，并且在发作期间对于较大的鱼类来说最为强烈。相比之下，在控制季节性后，MHW 条件增加了主要针对较小鱼类的内部栖息地检测的可能性。不同年份的迁徙时间因体型大小而异，较大的鱼类在 2023 年早些时候离开海洋环境并进入河流。总体而言，北极红点鲑的反应并没有提供证据表明它们在 MHW 期间寻找热避难所。然而，栖息地利用和迁移时间的大小依赖性变化表明，MHW 仍然可以改变海洋栖息地的权衡，可能是通过间接生态因素（例如猎物可用性）。 然而，当未来的热浪超过生理或生长性能阈值时，北极红点的反应可能会加剧。"
      summary_en: "Abstract: Marine heatwaves (MHWs) are increasing in high‐latitude oceans, yet behavioural responses of anadromous fishes to these potential stressors during short marine feeding seasons remain poorly understood. We combined acoustic telemetry (internal temperature and depth) with satellite‐derived sea surface temperature data to quantify Arctic char ( Salvelinus alpinus ) responses to MHWs in the coastal Labrador Sea across two contrasting summers: 2023, with frequent early‐season MHWs, and 2024, dominated by a late‐season event. Using non‐MHW detections, we fit seasonal baselines for each fish and calculated temperature and depth anomalies. Char tended to occur in inner habitats (estuaries/fjords), though 2024 showed greater among‐individual variability in outer (coastal/headland) habitat use. Internal temperatures increased relative to baseline during MHW onset (median +0.64°C) with modest persistence post‐onset (+0.23°C), whereas depth anomalies showed no consistent departures. Temperature anomalies increased from pre to during MHWs across body sizes and were strongest for larger fish during onset. In contrast, MHW conditions increased the probability of inner‐habitat detection primarily for smaller fish after controlling for seasonality. Migration timing differed between years in a size‐dependent way, with larger fish leaving the marine environment and entering rivers earlier in 2023. Overall, Arctic char responses did not provide evidence that they sought out thermal refuges during MHWs. However, size‐dependent shifts in habitat use and migration timing indicate that MHWs can still alter marine habitat trade‐offs, likely through indirect ecological factors (e.g., prey availability). Arctic char responses may intensify, however, when future heatwaves exceed physiological or growth‐performance thresholds."
    - title: "Epibenthic Invertebrate Diversity on Sublittoral Rocky Habitats in Marine Protected Areas of the North Aegean Sea After a Severe Heatwave Event"
      authors: "Chryssanthi Antoniadou; Martha Pantelidou; Chariton Chintiroglou"
      journal: "Diversity"
      published: "2026-06-20"
