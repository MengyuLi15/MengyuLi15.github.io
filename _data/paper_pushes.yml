      tags_en: "phytoplankton"
      summary: "摘要：新鲜西兰花极易腐烂，迅速变黄，品质变差，保质期短。在本研究中，我们研究了不同厚度的纳米材料气调包装 (MAP) 袋（指定为 2. 5C (25 μm) 和 4C (40 μm)）对西兰花生理生化变化的影响，并在 20 ± 1 °C 储存 8 天期间进行了评估。结果表明，两种 MAP 处理均通过抑制从绿色到黄色的快速颜色转变（L*、a*、b* 和色调角值的变化）以及抑制叶绿素降解来显着延迟小花衰老。 2. 5C处理在储存期间表现出更明显的效果。 MAP 处理通过保留总酚和维生素 C (Vc) 含量、保持茎硬度和表面光泽度、调节开瓶后呼吸速率和减少水分流失来帮助保持商业质量。 MAP处理还有效抑制了超氧阴离子(O2•−)和过氧化氢(H2O2)的积累。此外，如 DPPH 和 ABTS 测定以及西兰花中的 O2•− 清除率所证明的那样，MAP 处理增强了自由基清除能力。这些结果表明，适当厚度（例如2. 5C）的MAP处理可以有效抑制ROS的过量产生并增强抗氧化能力，从而延缓小花叶绿素降解和衰老。这项研究为利用物理 MAP 处理新鲜西兰花制定有效的绿色保鲜策略奠定了基础。"
      summary_zh: "摘要：新鲜西兰花极易腐烂，迅速变黄，品质变差，保质期短。在本研究中，我们研究了不同厚度的纳米材料气调包装 (MAP) 袋（指定为 2. 5C (25 μm) 和 4C (40 μm)）对西兰花生理生化变化的影响，并在 20 ± 1 °C 储存 8 天期间进行了评估。结果表明，两种 MAP 处理均通过抑制从绿色到黄色的快速颜色转变（L*、a*、b* 和色调角值的变化）以及抑制叶绿素降解来显着延迟小花衰老。 2. 5C处理在储存期间表现出更明显的效果。 MAP 处理通过保留总酚和维生素 C (Vc) 含量、保持茎硬度和表面光泽度、调节开瓶后呼吸速率和减少水分流失来帮助保持商业质量。 MAP处理还有效抑制了超氧阴离子(O2•−)和过氧化氢(H2O2)的积累。此外，如 DPPH 和 ABTS 测定以及西兰花中的 O2•− 清除率所证明的那样，MAP 处理增强了自由基清除能力。这些结果表明，适当厚度（例如2. 5C）的MAP处理可以有效抑制ROS的过量产生并增强抗氧化能力，从而延缓小花叶绿素降解和衰老。这项研究为利用物理 MAP 处理新鲜西兰花制定有效的绿色保鲜策略奠定了基础。"
      summary_en: "Abstract: Fresh broccoli is highly perishable, exhibiting rapid yellowing and quality deterioration with a short shelf life. In this study, we investigated the effects of nanomaterial-modified atmosphere packaging (MAP) bags with different thicknesses, designated as 2.5C (25 μm) and 4C (40 μm), on the physiological and biochemical changes in broccoli were evaluated during storage at 20 ± 1 °C for 8 days. Results showed that both MAP treatments remarkably delayed floret senescence by inhibiting the rapid color transition from green to yellow, as indicated by alterations in L*, a*, b*, and hue angle values, as well as by suppressing chlorophyll degradation. The 2.5C treatment exhibited a more pronounced effect during storage. MAP treatments helped maintain commercial quality by preserving total phenols and vitamin C (Vc) content, retaining stem firmness and surface glossiness, regulating post-opening respiration rate and reducing water loss. MAP treatments also effectively suppressed the accumulation of superoxide anion (O2•−) and hydrogen peroxide (H2O2). Furthermore, MAP treatments enhanced free radical scavenging capacity, as demonstrated by DPPH and ABTS assays and the O2•− scavenging rate in broccoli. These results indicate that MAP treatment with an appropriate thickness (e.g., 2.5C) effectively inhibits excessive ROS production and enhances antioxidant capacity, thereby delaying floret chlorophyll degradation and senescence. This study provides a foundation for developing effective and green preservation strategies using physical MAP treatments for fresh broccoli."
    - title: "Typhoon-Induced Asymmetric Responses of Mesoscale Eddies in the South China Sea"
      authors: "Jialun Wu; Yucheng Shi; Guangjun Xu; Shuyi Zhou; Huabing Xu; Dongyang Fu"
      journal: "Journal of Marine Science and Engineering"
      published: "2026-04-09"
      published_month: "2026-04"
      published_month_zh: "2026-04"
