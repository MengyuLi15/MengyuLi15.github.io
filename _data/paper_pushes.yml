      summary: "用细胞资源分配模型评估变暖下浮游植物蛋白、糖类和脂类组成变化。结论是高纬和极区蛋白比例可能下降、有机质质量改变；这会影响食物网营养质量和用固定化学计量估算碳输出的可靠性。"
