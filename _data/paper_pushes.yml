      tags: "vertical structure"
      tags_zh: "vertical structure"
      tags_en: "vertical structure"
      summary: "摘要：这项工作的目的是研究北极海洋冷空气爆发期间低层混合相云中微物理云特性的垂直分布，特别是热力学相分配和云滴尺寸。为此，我们对机载 HALO–(𝒜𝒞)3 活动期间使用高光谱和偏振成像系统 specMACS 收集的弗拉姆海峡强海洋冷空气爆发初始阶段的高分辨率观测结果进行了分析。云热力学相的伪垂直剖面通常显示冰分数随着高度的增加和温度的降低而增加，但云顶的几何薄层除外，该层更多地以液体为主。测量结果表明，冰的形成优先发生在最冷的温度下。此外，正如预期的那样，液云滴的有效半径随着高度的增加而增加。观察到的液云滴的垂直演化可以通过夹带包裹模型成功地建模。云滴效应半径的测量和计算垂直剖面与基于原位测量的附加信息之间的良好一致性表明，对于观测到的云，碰撞聚结和冰过程（例如起雾、韦格纳-伯杰龙-芬德森机制以及通过非均匀冻结形成冰）对液云滴的影响很小。所提供的分析和数据有助于改善模型中低层北极混合相云的表示，并进一步加深我们对这些云和相关微物理过程的理解。"
      summary_zh: "摘要：这项工作的目的是研究北极海洋冷空气爆发期间低层混合相云中微物理云特性的垂直分布，特别是热力学相分配和云滴尺寸。为此，我们对机载 HALO–(𝒜𝒞)3 活动期间使用高光谱和偏振成像系统 specMACS 收集的弗拉姆海峡强海洋冷空气爆发初始阶段的高分辨率观测结果进行了分析。云热力学相的伪垂直剖面通常显示冰分数随着高度的增加和温度的降低而增加，但云顶的几何薄层除外，该层更多地以液体为主。测量结果表明，冰的形成优先发生在最冷的温度下。此外，正如预期的那样，液云滴的有效半径随着高度的增加而增加。观察到的液云滴的垂直演化可以通过夹带包裹模型成功地建模。云滴效应半径的测量和计算垂直剖面与基于原位测量的附加信息之间的良好一致性表明，对于观测到的云，碰撞聚结和冰过程（例如起雾、韦格纳-伯杰龙-芬德森机制以及通过非均匀冻结形成冰）对液云滴的影响很小。所提供的分析和数据有助于改善模型中低层北极混合相云的表示，并进一步加深我们对这些云和相关微物理过程的理解。"
      summary_en: "Abstract: The aim of this work is to study the vertical distribution of microphysical cloud properties, in particular the thermodynamic phase partitioning and the cloud droplet size, in low-level mixed-phase clouds during marine cold air outbreaks in the Arctic. For this purpose, high resolution observations of the initial phase of a strong marine cold air outbreak in the Fram Strait collected with the hyperspectral and polarized imaging system specMACS during the airborne HALO–(𝒜𝒞)3 campaign are analyzed. Pseudo-vertical profiles of the cloud thermodynamic phase generally showed increasing ice fractions with increasing height and decreasing temperature, except for a geometrically thin layer at the cloud top, which was more liquid-dominated. The measurements indicated that ice formation occurred preferentially at the coldest temperatures. In addition, the effective radius of the liquid cloud droplets increased with height, as expected. The observed vertical evolution of the liquid cloud droplets could be successfully modeled by an entraining parcel model. The good agreement between measured and calculated vertical profiles of the cloud droplet effect radius and additional information based on in situ measurements indicated that the influence of collision-coalescence and ice processes, such as riming, the Wegener-Bergeron-Findeisen mechanism, and ice formation through heterogeneous freezing, on the liquid cloud droplets was small for the observed clouds. The analyses and data presented can help to improve the representation of low-level Arctic mixed-phase clouds in models and to further our understanding of these clouds and the related microphysical processes."

