      summary: "摘要：本研究旨在利用基于地理信息系统（GIS）和空间分辨率为4公里的MODIS卫星数据的空间参与方法绘制章鱼渔场的分布图。通过将参与性捕捞位置数据与海洋学参数相结合进行空间分析，然后进行空间叠加和分布测绘，以确定潜在的捕捞区域。主要数据是通过采访渔民、记录捕鱼地点坐标以及观察温度、盐度和深度等海洋条件获得的。卫星图像和测深图等辅助数据用于支持分析。结果表明，章鱼渔场集中在西南海域，海面温度为28. 5°C，叶绿素a浓度为低至中等（0。相反，温度较高（>30°C）和叶绿素a浓度较高的区域往往不支持章鱼的存在。这表明，与初级生产力相比，海洋环境的物理因素，特别是温度，是章鱼分布的主要决定因素。这些发现对章鱼渔业管理，其中具有最佳温度的区域可以优先考虑作为潜在的捕捞区域。这项研究制作了章鱼渔场的空间地图，可以作为在斯佩蒙德群岛制定基于生态系统的适应性管理战略的基础。"
      summary_zh: "摘要：本研究旨在利用基于地理信息系统（GIS）和空间分辨率为4公里的MODIS卫星数据的空间参与方法绘制章鱼渔场的分布图。通过将参与性捕捞位置数据与海洋学参数相结合进行空间分析，然后进行空间叠加和分布测绘，以确定潜在的捕捞区域。主要数据是通过采访渔民、记录捕鱼地点坐标以及观察温度、盐度和深度等海洋条件获得的。卫星图像和测深图等辅助数据用于支持分析。结果表明，章鱼渔场集中在西南海域，海面温度为28. 5°C，叶绿素a浓度为低至中等（0。相反，温度较高（>30°C）和叶绿素a浓度较高的区域往往不支持章鱼的存在。这表明，与初级生产力相比，海洋环境的物理因素，特别是温度，是章鱼分布的主要决定因素。这些发现对章鱼渔业管理，其中具有最佳温度的区域可以优先考虑作为潜在的捕捞区域。这项研究制作了章鱼渔场的空间地图，可以作为在斯佩蒙德群岛制定基于生态系统的适应性管理战略的基础。"
      summary_en: "Abstract: This study aims to map the distribution of octopus fishing grounds using a spatial-participatory approach based on Geographic Information Systems (GIS) and MODIS satellite data with a spatial resolution of 4 km. Spatial analysis was conducted by integrating participatory fishing location data with oceanographic parameters, followed by spatial overlay and distribution mapping to identify potential fishing zones. Primary data were obtained through interviews with fishers, recording of fishing location coordinates, and observations of oceanographic conditions including temperature, salinity, and depth. Secondary data such as satellite imagery and bathymetric maps were used to support the analysis. The results show that octopus fishing grounds are concentrated in the southwestern waters with sea surface temperatures ranging from 28.9–29.5°C and low to moderate chlorophyll-a concentrations (0.167–2.14 mg/m³). In contrast, areas with higher temperatures (>30°C) and high chlorophyll-a concentrations tend not to support octopus presence. This indicates that physical factors of the marine environment, particularly temperature, are the main determinants of octopus distribution compared to primary productivity. These findings have important implications for octopus fisheries management, where zones with optimal temperatures can be prioritized as potential fishing areas. This study produces a spatial map of octopus fishing grounds that can serve as a basis for developing adaptive ecosystem-based management strategies in the Spermonde Archipelago."

