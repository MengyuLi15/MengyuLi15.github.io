    - title: "Detected impacts of atmospheric rivers on marine heatwaves"
      authors: "Suqiong Hu; Shineng Hu"
      journal: "Nature"
      published: "2026-06-11"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1038/s41467-026-74249-9"
      url: "https://doi.org/10.1038/s41467-026-74249-9"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "marine heatwaves"
      tags_zh: "marine heatwaves"
      tags_en: "marine heatwaves"
      summary: "摘要：海洋热浪 (MHW) 是指海洋表面温度异常高的时期，可持续数周至数月并延伸数千公里。它们在气候变化下不断增加的频率和强度威胁着海洋生态系统和渔业，但控制它们发生和进化的物理过程仍然知之甚少。在这里，我们对卫星和再分析数据进行了分析，结果表明大气河流（AR）——浓缩大气水分的狭长走廊，通常被描述为“天空中的河流”——在北太平洋和北大西洋的MHW发展中发挥着以前被忽视的作用。在 AR 下，增加的云量通过减少太阳辐射使海洋变冷，而异常温暖、潮湿的空气通过减少来自海洋的湍流热通量使海洋变暖。这两种相反的机制占主导地位，随着背景气候状态的不同而变化，导致 AR 对 MHW 的影响出现季节性和区域性变化。这些发现强调了了解海洋-大气复合极端现象及其在气候变暖下的变化的重要性。"
      summary_zh: "摘要：海洋热浪 (MHW) 是指海洋表面温度异常高的时期，可持续数周至数月并延伸数千公里。它们在气候变化下不断增加的频率和强度威胁着海洋生态系统和渔业，但控制它们发生和进化的物理过程仍然知之甚少。在这里，我们对卫星和再分析数据进行了分析，结果表明大气河流（AR）——浓缩大气水分的狭长走廊，通常被描述为“天空中的河流”——在北太平洋和北大西洋的MHW发展中发挥着以前被忽视的作用。在 AR 下，增加的云量通过减少太阳辐射使海洋变冷，而异常温暖、潮湿的空气通过减少来自海洋的湍流热通量使海洋变暖。这两种相反的机制占主导地位，随着背景气候状态的不同而变化，导致 AR 对 MHW 的影响出现季节性和区域性变化。这些发现强调了了解海洋-大气复合极端现象及其在气候变暖下的变化的重要性。"
      summary_en: "Abstract: Marine heatwaves (MHWs) are periods of unusually high sea surface temperature that can persist for weeks to months and extend across thousands of kilometers. Their increasing frequency and intensity under climate change threaten marine ecosystems and fisheries, yet the physical processes that govern their occurrence and evolution remain poorly understood. Here we analyze satellite and reanalysis data to show that atmospheric rivers (ARs)—long, narrow corridors of concentrated atmospheric moisture, often described as “rivers in the sky”—play a previously overlooked role in the development of MHWs in the North Pacific and North Atlantic. Under an AR, increased cloud cover cools the ocean through reduced solar radiation, while anomalously warm, humid air warms the ocean through the reduction of turbulent heat fluxes from the ocean. These two opposing mechanisms, dominant among others, vary with background climate state, causing seasonally and regionally varying ARs’ impacts on MHWs. These findings stress the importance of understanding ocean-atmosphere compound extremes and their changes under a warming climate."
    - title: "Understanding the resilient carbon cycle response to the 2014–2015 Blob event in the Gulf of Alaska using a regional ocean biogeochemical model"
      authors: "Yumi Abe; Takamitsu Ito; Amanda H. V. Timmerman; Christopher T. Reinhard; Joseph P. Montoya"
      journal: "Biogeosciences"
      published: "2026-06-12"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/bg-23-3871-2026"
      url: "https://doi.org/10.5194/bg-23-3871-2026"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "marine heatwaves; vertical structure"
      tags_zh: "marine heatwaves; vertical structure"
      tags_en: "marine heatwaves; vertical structure"
      summary: "摘要：海洋热浪（MHW）以异常高的海面温度为特征，其频率和强度不断增加，严重影响海洋环流、生物地球化学和海洋生态系统。在 2014-2015 年亚北极东北太平洋 MHW（通常称为 Blob）期间，帕帕海洋站（OSP；西经 145°，北纬 50°）的停泊观测显示，海洋 pCO2 适度下降，这与仅因变暖引起的溶解度降低而预期的增加相反。使用重现 OSP 观测到的 pCO2 变化和趋势的区域模型，我们发现这种下降是由于溶解无机碳 (DIC) 供应的减少超过了变暖驱动的 pCO2 的增加所致。 DIC 减少主要是由于与上层海洋层化增强相关的垂直输送减弱以及 Blob 出现之前埃克曼抽水减少引起的，这抑制了富含 DIC 的地下水的上涌。水平运输也为当地做出了贡献，特别是在 OSP。这些结果表明，异常的物理循环，而不是生物过程，是Blob期间二氧化碳吸收增加的主要驱动因素，并强调了在评估碳循环对极端变暖事件的响应时解决物理运输机制的重要性。"
      summary_zh: "摘要：海洋热浪（MHW）以异常高的海面温度为特征，其频率和强度不断增加，严重影响海洋环流、生物地球化学和海洋生态系统。在 2014-2015 年亚北极东北太平洋 MHW（通常称为 Blob）期间，帕帕海洋站（OSP；西经 145°，北纬 50°）的停泊观测显示，海洋 pCO2 适度下降，这与仅因变暖引起的溶解度降低而预期的增加相反。使用重现 OSP 观测到的 pCO2 变化和趋势的区域模型，我们发现这种下降是由于溶解无机碳 (DIC) 供应的减少超过了变暖驱动的 pCO2 的增加所致。 DIC 减少主要是由于与上层海洋层化增强相关的垂直输送减弱以及 Blob 出现之前埃克曼抽水减少引起的，这抑制了富含 DIC 的地下水的上涌。水平运输也为当地做出了贡献，特别是在 OSP。这些结果表明，异常的物理循环，而不是生物过程，是Blob期间二氧化碳吸收增加的主要驱动因素，并强调了在评估碳循环对极端变暖事件的响应时解决物理运输机制的重要性。"
      summary_en: "Abstract: Marine heatwaves (MHWs), characterized by anomalously high sea surface temperatures, are increasing in frequency and intensity and strongly impact ocean circulation, biogeochemistry, and marine ecosystems. During the 2014–2015 MHW (commonly called the Blob) in the NE subarctic Pacific, moored observations at Ocean Station Papa (OSP; 145° W, 50° N) showed a moderate decrease in oceanic pCO2, contrary to the increase expected from warming-induced solubility reduction alone. Using a regional model that reproduces the observed pCO2 variability and trend at OSP, we show that this decline resulted from a decrease in dissolved inorganic carbon (DIC) supply that outweighed the warming-driven increase in pCO2. The DIC reduction was primarily caused by weakened vertical transport associated with enhanced upper-ocean stratification and reduced Ekman pumping prior to the onset of the Blob, which suppressed the upwelling of DIC-rich subsurface waters. Horizontal transport also contributed locally, particularly at OSP. These results demonstrate that anomalous physical circulation, rather than biological processes, was the primary driver of the enhanced CO2 uptake during the Blob and highlight the importance of resolving physical transport mechanisms when assessing carbon cycle responses to extreme warming events."
    - title: "Asymmetric Phytoplankton Responses to El Niño Diversity in the China Seas Mediated by the Western North Pacific Subtropical High"
      authors: "Jing Yang; Peng Chen; Siqi Zhang; Zhenhua Zhang; Delu Pan"
      journal: "Biogeosciences"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1029/2026jg009926"
      url: "https://doi.org/10.1029/2026jg009926"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "carbon pump; phytoplankton"
      tags_zh: "carbon pump; phytoplankton"
      tags_en: "carbon pump; phytoplankton"
      summary: "摘要：在全球变暖的背景下，中太平洋（CP）厄尔尼诺事件的发生频率不断增加，需要重新评估 ENSO 对海洋碳循环的影响。尽管对典型的东太平洋（EP）厄尔尼诺现象进行了深入研究，但厄尔尼诺现象多样性的生态印记在边缘海中仍然没有得到很好的解决。利用 25 年的卫星记录，我们揭示了中国海域浮游植物对 EP 型厄尔尼诺现象和 CP 型厄尔尼诺现象的不同反应。这种不对称性在整个地区并不均匀。 EP事件主要通过层化主导的途径抑制南海的初级生产力：较浅的冬季混合层限制了养分供应，随后夏季变暖和西北太平洋副热带高压（WNPSH）增强和西移驱动的分层，加剧了养分限制。相反，CP事件通过混合主导的途径促进浮游植物生长，特别是在黄海和东海：通过加深冬季混合层，丰富营养物质，然后通过向东北的WNPSH退缩，冷却地表水并削弱这些北部次流域的分层。这些发现表明，WNPSH 作为一个关键的“大气开关”，在相反的代谢状态之间切换生态系统。我们的研究强调了区分厄尔尼诺现象的必要性，以准确预测气候变暖时陆架海生产力和生物碳泵效率的轨迹。"
      summary_zh: "摘要：在全球变暖的背景下，中太平洋（CP）厄尔尼诺事件的发生频率不断增加，需要重新评估 ENSO 对海洋碳循环的影响。尽管对典型的东太平洋（EP）厄尔尼诺现象进行了深入研究，但厄尔尼诺现象多样性的生态印记在边缘海中仍然没有得到很好的解决。利用 25 年的卫星记录，我们揭示了中国海域浮游植物对 EP 型厄尔尼诺现象和 CP 型厄尔尼诺现象的不同反应。这种不对称性在整个地区并不均匀。 EP事件主要通过层化主导的途径抑制南海的初级生产力：较浅的冬季混合层限制了养分供应，随后夏季变暖和西北太平洋副热带高压（WNPSH）增强和西移驱动的分层，加剧了养分限制。相反，CP事件通过混合主导的途径促进浮游植物生长，特别是在黄海和东海：通过加深冬季混合层，丰富营养物质，然后通过向东北的WNPSH退缩，冷却地表水并削弱这些北部次流域的分层。这些发现表明，WNPSH 作为一个关键的“大气开关”，在相反的代谢状态之间切换生态系统。我们的研究强调了区分厄尔尼诺现象的必要性，以准确预测气候变暖时陆架海生产力和生物碳泵效率的轨迹。"
      summary_en: "Abstract: The increasing frequency of Central Pacific (CP) El Niño events under global warming necessitates a reassessment of ENSO's impact on marine carbon cycles. Although the canonical Eastern Pacific (EP) El Niño is well studied, the ecological imprint of El Niño diversity remains poorly resolved in marginal seas. Using a 25‐year satellite record, we reveal contrasting phytoplankton responses in the China Seas to EP and CP El Niño. This asymmetry is not uniform across the region. EP events suppress primary productivity primarily in the South China Sea via a stratification‐dominated pathway: a shallower winter mixed layer limits nutrient supply, followed by summer warming and stratification driven by a strengthened and westward‐displaced Western North Pacific Subtropical High (WNPSH), exacerbating nutrient limitation. Conversely, CP events promote phytoplankton growth, particularly in the Yellow Sea and East China Sea, via a mixing‐dominated pathway: by deepening the winter mixed layer, enriching nutrients, and subsequently through a northeastward WNPSH retreat that cools surface waters and weakens stratification in these northern sub‐basins. These findings reveal that the WNPSH acts as a critical “atmospheric switch,” toggling the ecosystem between opposing metabolic states. Our study highlights the necessity of distinguishing El Niño flavors to accurately predict the trajectory of shelf sea productivity and biological carbon pump efficiency in a warming climate."
