      tags_en: "ocean colour; high-resolution observation; CubeSat"
      summary: "这项研究评估 SeaHawk-HawkEye CubeSat 海色遥感反射率产品的精度。它使用全球分布的水体站点进行验证，覆盖不同光学条件和水体类型。研究比较 CubeSat 产品与现场或参考观测之间的一致性，识别误差来源和适用范围。结果说明高空间分辨率小卫星海色产品在特定应用中具有潜力，但需要清楚理解不确定性。它对近岸藻华、锋面、小尺度过程和传统海色产品补充很有价值。"
      summary_zh: "这项研究评估 SeaHawk-HawkEye CubeSat 海色遥感反射率产品的精度。它使用全球分布的水体站点进行验证，覆盖不同光学条件和水体类型。研究比较 CubeSat 产品与现场或参考观测之间的一致性，识别误差来源和适用范围。结果说明高空间分辨率小卫星海色产品在特定应用中具有潜力，但需要清楚理解不确定性。它对近岸藻华、锋面、小尺度过程和传统海色产品补充很有价值。"
      summary_en: "This study evaluates the accuracy of SeaHawk-HawkEye CubeSat ocean-colour remote-sensing reflectance products. It uses globally distributed aquatic validation sites that cover different optical conditions and water types. The analysis compares CubeSat products with field or reference observations to identify uncertainties and suitable applications. The results show that high-spatial-resolution CubeSat ocean-colour products have strong potential when their errors are well understood. It is valuable for coastal blooms, fronts, small-scale processes, and complementing conventional ocean-colour missions."
    - title: "Phytoplankton With Flexible Pigment Content Disadvantaged by Projected Future Decrease in Variability of the Ocean Light Spectrum"
      authors: "Francesco Mattei; Anna E. Hickman; Julia Uitz; Vincenzo Vellucci; Laurence Garczarek; Frédéric Partensky; Stephanie Dutkiewicz"
