    - title: "Warm-core eddy intensifies surface mixotrophic bacterivory and fuels mesopelagic heterotrophic grazing"
      authors: "Ying Wang; Xin Liu; Zhonghua Zhao; Dapeng Xu; Bangqin Huang; Ping Sun"
      journal: "Communications Biology"
      published: "2026-06-08"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1038/s42003-026-10438-y"
      url: "https://doi.org/10.1038/s42003-026-10438-y"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "phytoplankton; microbial carbon; vertical structure"
      tags_zh: "phytoplankton; microbial carbon; vertical structure"
      tags_en: "phytoplankton; microbial carbon; vertical structure"
      summary: "摘要：Abstract Anticyclonic eddies (ACEs) restructure resources and drive trophic cascades, yet depth-resolved effects on nanoflagellate bacterivory remain unclear. We quantify bacterivory by phago-mixotrophic nanophytoplankton (PMNP) and heterotrophic nanoflagellate (HNF) using fluorescent-bead incubations in a warm-core ACE in the South China Sea. Despite a 16% decline in nanoeukaryotes, PMNP abundance increases significantly (2.8× surface, 1.4× deep chlorophyll maximum (DCM), shifts toward larger cells, and elevates bacterial turnover and phago-mixotrophic production. HNF community grazing also increases at both euphotic depths despite similar per-cell rates, yielding impacts comparable to PMNP. Structural equation models link PMNP grazing to surface water-mass properties and nutrients and DCM turbidity, whereas HNF grazing tracks water-mass and prey/virus dynamics. In the mesopelagic zone, HNFs dominate; grazing HNF abundance increases 2.7× at 500 m and is associated with particulate beam attenuation coefficient, an in situ particle proxy. These findings reveal a depth-partitioned response coupling mesoscale forcing to microbial carbon processing."
