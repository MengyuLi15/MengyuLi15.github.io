      tags_en: "vertical structure"
      summary: "摘要：全球导航卫星系统反射测量（GNSS-R）技术提供不受降雨影响的高时空分辨率的全球海洋表面风观测。风云三号E（FY-3E）任务是中国第一颗运行的GNSS-R卫星，提供适合数值天气预报（NWP）的低延迟数据。然而，GNSS-R 风的密集沿轨采样对数据同化中的观测误差规范提出了挑战。在本研究中，FY-3E GNSS-R 风被同化到天气研究和预报（WRF）模型中，以研究不同观测误差配置的影响。通过灵敏度实验和随后的观测系统实验 (OSE) 来评估静态和动态误差规格（无论是否有数据稀疏）。结果表明，使用 6 m/s 的静态观测误差而不进行数据稀疏可达到最佳性能。在这种配置下，GNSS-R 风在单一同化情况下影响从地表到大约 700 hPa 的大气分析，而循环实验则进一步在垂直和空间上扩展影响。这些发现强调了对密集 GNSS-R 数据进行适当观测误差规范的重要性，并为其在 WRF 中的同化提供了实际参考，并具有对其他 NWP 系统的潜在适用性。"
      summary_zh: "摘要：全球导航卫星系统反射测量（GNSS-R）技术提供不受降雨影响的高时空分辨率的全球海洋表面风观测。风云三号E（FY-3E）任务是中国第一颗运行的GNSS-R卫星，提供适合数值天气预报（NWP）的低延迟数据。然而，GNSS-R 风的密集沿轨采样对数据同化中的观测误差规范提出了挑战。在本研究中，FY-3E GNSS-R 风被同化到天气研究和预报（WRF）模型中，以研究不同观测误差配置的影响。通过灵敏度实验和随后的观测系统实验 (OSE) 来评估静态和动态误差规格（无论是否有数据稀疏）。结果表明，使用 6 m/s 的静态观测误差而不进行数据稀疏可达到最佳性能。在这种配置下，GNSS-R 风在单一同化情况下影响从地表到大约 700 hPa 的大气分析，而循环实验则进一步在垂直和空间上扩展影响。这些发现强调了对密集 GNSS-R 数据进行适当观测误差规范的重要性，并为其在 WRF 中的同化提供了实际参考，并具有对其他 NWP 系统的潜在适用性。"
      summary_en: "Abstract: The Global Navigation Satellite System Reflectometry (GNSS-R) technique provides global ocean surface wind observations unaffected by rainfall with high spatiotemporal resolution. The Fengyun-3E (FY-3E) mission, as the first operational GNSS-R satellite in China, offers low-latency data suitable for numerical weather prediction (NWP). However, the dense along-track sampling of GNSS-R winds poses challenges for observation error specification in data assimilation. In this study, FY-3E GNSS-R winds are assimilated into the Weather Research and Forecasting (WRF) model to investigate the impacts of different observation error configurations. Both static and dynamic error specifications, with and without data thinning, are evaluated through a sensitivity experiment and subsequent Observing System Experiments (OSEs). The results indicate that using a static observation error of 6 m/s without data thinning achieves the best performance. Under this configuration, GNSS-R winds influence atmospheric analyses from the surface up to approximately 700 hPa in a single assimilation case, while cycling experiments further extend the impact vertically and spatially. These findings highlight the importance of appropriate observation error specification for dense GNSS-R data and provide a practical reference for their assimilation in WRF, with potential applicability to other NWP systems."
    - title: "Multi‐Stressor Responses in Marine Bivalves: Integrating Climate Change, Pollutants, and Microbiome Shifts for Aquaculture Resilience"
