      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "chlorophyll maximum; CDOM; bio-optics"
      tags_zh: "chlorophyll maximum; CDOM; bio-optics"
      tags_en: "chlorophyll maximum; CDOM; bio-optics"
      summary: "这项研究分析南大洋 CDOM 吸收与叶绿素 a 浓度之间意外的弱耦合关系。它利用生物光学观测比较 CDOM、叶绿素最大值和相关光学信号。研究关注在南大洋中能否用叶绿素变化简单推断 CDOM 吸收。结果显示，两者之间存在近似独立性，提示传统经验关系可能不适用。它对南大洋海色反演、CDOM 校正和生物光学解释很重要。"
      summary_zh: "这项研究分析南大洋 CDOM 吸收与叶绿素 a 浓度之间意外的弱耦合关系。它利用生物光学观测比较 CDOM、叶绿素最大值和相关光学信号。研究关注在南大洋中能否用叶绿素变化简单推断 CDOM 吸收。结果显示，两者之间存在近似独立性，提示传统经验关系可能不适用。它对南大洋海色反演、CDOM 校正和生物光学解释很重要。"
      summary_en: "This study analyses the unexpected weak coupling between CDOM absorption and chlorophyll-a concentration in the Southern Ocean. It uses bio-optical observations to compare CDOM, chlorophyll maxima, and related optical signals. The work asks whether chlorophyll variability can be used to infer CDOM absorption in this region. The results show a quasi-independence between the two, warning against simple empirical relationships. It is important for Southern Ocean ocean-colour retrievals, CDOM correction, and bio-optical interpretation."
    - title: "Glaciogenic iron transport pathways to the Kerguelen offshore phytoplankton bloom"
      authors: "Alex Nalivaev; Francesco d'Ovidio; Laurent Bopp; Maristella Berta; Louise Rousselet; Clara Azarian; Stéphane Blain"
      journal: "Biogeosciences"
      published: "2026"
      published_month: "2026-01"
      published_month_zh: "2026-01"
      doi: "10.5194/bg-23-639-2026"
      url: "https://doi.org/10.5194/bg-23-639-2026"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton functional groups; iron; Southern Ocean bloom"
      tags_zh: "phytoplankton functional groups; iron; Southern Ocean bloom"
      tags_en: "phytoplankton functional groups; iron; Southern Ocean bloom"
      summary: "这项研究关注冰川来源铁如何输送到 Kerguelen 外海浮游植物藻华区。它结合区域海洋过程、铁供应路径和浮游植物响应来解释南大洋高生产力热点。研究分析冰川或陆源物质如何通过水团和环流进入外海。结果说明，铁的输送路径会影响藻华维持和浮游植物功能群结构。它对理解南大洋铁限制、HNLC 海区生产力和碳输出很有帮助。"
      summary_zh: "这项研究关注冰川来源铁如何输送到 Kerguelen 外海浮游植物藻华区。它结合区域海洋过程、铁供应路径和浮游植物响应来解释南大洋高生产力热点。研究分析冰川或陆源物质如何通过水团和环流进入外海。结果说明，铁的输送路径会影响藻华维持和浮游植物功能群结构。它对理解南大洋铁限制、HNLC 海区生产力和碳输出很有帮助。"
      summary_en: "This study examines how glaciogenic iron is transported to the Kerguelen offshore phytoplankton bloom. It links regional ocean processes, iron-supply pathways, and phytoplankton response in a Southern Ocean productivity hotspot. The analysis considers how glacier-derived or land-derived material can reach offshore waters through water masses and circulation. The results show that iron transport pathways influence bloom maintenance and phytoplankton functional structure. It is useful for understanding Southern Ocean iron limitation, HNLC productivity, and carbon export."
    - title: "Response of phytoplankton communities to the onset of the 2020 summer marine heatwave in the Drake Passage and Antarctic Peninsula"
      authors: "Andrés S. Rigual-Hernández; Amy Leventer; Manuel Fernández-Barba; José A. Flores; Gabriel Navarro; Johan Etourneau; Dimitris Evangelinos; Megan Duffy; et al."
      journal: "Biogeosciences"
