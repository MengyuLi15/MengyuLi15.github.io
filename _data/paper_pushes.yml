      summary: "摘要：明古鲁流域横跨两个行政区，在支持印度尼西亚明古鲁省的生态和社会经济功能方面发挥着至关重要的作用。其主要河流明古鲁河经历了土地转化、煤炭开采活动、生活垃圾排放和工业废水带来的环境压力，这可能会改变下游水质并扰乱河口生态过程，包括初级生产力。历史上，邻近的沿海地区在 2000 年代初曾被当地渔民用作渔场，但此后这一功能逐渐衰退。然而，关于这些压力对明古鲁河口浮游植物生产的生态影响的研究仍然有限。 本研究旨在以叶绿素 a 浓度为代表来评估浮游植物生产力，并检验其与关键环境参数的关系。实地考察是在 2025 年 6 月至 8 月的旱季高峰期间进行的，每次活动在大潮条件下的上午和下午进行两次采样。在三个站对三个采样事件进行了观测，并在三个深度进行了测量。在所有深度测量盐度、流速、溶解氧和硝酸盐浓度，而温度、pH 值和水透明度仅限于表面水平。使用分光光度法分析叶绿素-a (Chl-a) 浓度，并使用相关分析和分位数回归评估其与环境参数的关系。 结果表明，各站点的叶绿素 a 浓度始终非常低，范围为 0. 025 至 0. 139 µg/L，表明超微营养到贫营养条件。在测量的参数中，硝酸盐浓度和流速与叶绿素a的关系最强，表明它们是主要限制因素，而其他参数的影响相对较弱。这些发现表明，低养分利用率和水动力条件限制了明古鲁河口浮游植物生物量的发展和初级生产力，可能限制其可持续支持食物网的能力。"
      summary_zh: "摘要：明古鲁流域横跨两个行政区，在支持印度尼西亚明古鲁省的生态和社会经济功能方面发挥着至关重要的作用。其主要河流明古鲁河经历了土地转化、煤炭开采活动、生活垃圾排放和工业废水带来的环境压力，这可能会改变下游水质并扰乱河口生态过程，包括初级生产力。历史上，邻近的沿海地区在 2000 年代初曾被当地渔民用作渔场，但此后这一功能逐渐衰退。然而，关于这些压力对明古鲁河口浮游植物生产的生态影响的研究仍然有限。 本研究旨在以叶绿素 a 浓度为代表来评估浮游植物生产力，并检验其与关键环境参数的关系。实地考察是在 2025 年 6 月至 8 月的旱季高峰期间进行的，每次活动在大潮条件下的上午和下午进行两次采样。在三个站对三个采样事件进行了观测，并在三个深度进行了测量。在所有深度测量盐度、流速、溶解氧和硝酸盐浓度，而温度、pH 值和水透明度仅限于表面水平。使用分光光度法分析叶绿素-a (Chl-a) 浓度，并使用相关分析和分位数回归评估其与环境参数的关系。 结果表明，各站点的叶绿素 a 浓度始终非常低，范围为 0. 025 至 0. 139 µg/L，表明超微营养到贫营养条件。在测量的参数中，硝酸盐浓度和流速与叶绿素a的关系最强，表明它们是主要限制因素，而其他参数的影响相对较弱。这些发现表明，低养分利用率和水动力条件限制了明古鲁河口浮游植物生物量的发展和初级生产力，可能限制其可持续支持食物网的能力。"
      summary_en: "Abstract: The Bengkulu Watershed, which spans two administrative districts, plays a crucial role in supporting ecological and socio-economic functions in Bengkulu Province, Indonesia. Its main river, the Air Bengkulu, has experienced environmental pressures from land conversion, coal mining activities, domestic waste discharge, and industrial effluents, which may alter downstream water quality and disrupt estuarine ecological processes, including primary productivity. Historically, the adjacent coastal area was utilized by local fishers as a fishing ground in the early 2000s, but this function has since declined. However, studies on the ecological implications of these pressures on phytoplankton production in the Air Bengkulu estuary remain limited. This study aimed to assess phytoplankton productivity using Chl-a concentration as a proxy and examine its relationship with key environmental parameters. Fieldwork was conducted during the peak dry season from June to August 2025, with two sampling sessions per event in the morning and afternoon under spring tide conditions. Observations were carried out at three stations on three sampling events with measurements taken at three depth levels. Salinity, current velocity, dissolved oxygen, and nitrate concentration were measured at all depths, while temperature, pH, and water transparency were limited to surface levels. Chlorophyll-a (Chl-a) concentration was analyzed using spectrophotometric methods and its relationship with environmental parameters was evaluated using correlation analysis and quantile regression. The results showed that Chl-a concentrations were consistently very low across stations, ranging from 0.025 to 0.139 µg/L, indicating ultra-microtrophic to oligotrophic conditions. Among the measured parameters, nitrate concentration and current velocity exhibited the strongest relationships with Chl-a, suggesting their role as primary limiting factors, while other parameters showed comparatively weaker influences. These findings indicate that low nutrient availability and hydrodynamic conditions constrain phytoplankton biomass development and primary productivity in the Air Bengkulu River estuary, potentially limiting its capacity to sustainably support the food web."
    - title: "Deep Learning-Based Classification of Picocyanobacteria and Microcystis Using Multiwavelength Laser Microscopy"
      authors: "Sara Hemmati; Arthur Zastepa; Hyungchul Yoon; Younggy Kim"
      journal: "Environmental Engineering Science"
      published: "2026-06-22"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1177/15579018261460206"
      url: "https://doi.org/10.1177/15579018261460206"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "carbon pump"
      tags_zh: "carbon pump"
      tags_en: "carbon pump"
      summary: "摘要：微囊藻、聚球藻和蓝藻是有害藻华中释放蓝藻毒素的微生物。它们经常共存并具有相似的形态和絮凝模式，因此很难在显微图像中区分。使用多波长激光显微镜（405、488、561 和 640 nm 激光，黑白），并开发了深度学习模型来对蓝细菌进行分类。仅使用黑白图像进行机器训练时，准确率为 76. 56%；然而，所有五个通道图像的准确率提高到 98. 44%，这凸显了波长激光显微镜的重要性。单个波长激光的显微图像（带有黑白图像）提高了分类性能，但这些改进对于应变级分类来说还不够。 为了获得最佳模型性能，建议每个样本 45 个图像集、200 个 epoch 和 256 × 256 像素图像，机器训练仅需 11 分钟。总之，多波长激光显微镜可以非常有效地训练深度学习模型，为环境监测应用中蓝藻的可靠分类迈出了有希望的一步。"
      summary_zh: "摘要：微囊藻、聚球藻和蓝藻是有害藻华中释放蓝藻毒素的微生物。它们经常共存并具有相似的形态和絮凝模式，因此很难在显微图像中区分。使用多波长激光显微镜（405、488、561 和 640 nm 激光，黑白），并开发了深度学习模型来对蓝细菌进行分类。仅使用黑白图像进行机器训练时，准确率为 76. 56%；然而，所有五个通道图像的准确率提高到 98. 44%，这凸显了波长激光显微镜的重要性。单个波长激光的显微图像（带有黑白图像）提高了分类性能，但这些改进对于应变级分类来说还不够。 为了获得最佳模型性能，建议每个样本 45 个图像集、200 个 epoch 和 256 × 256 像素图像，机器训练仅需 11 分钟。总之，多波长激光显微镜可以非常有效地训练深度学习模型，为环境监测应用中蓝藻的可靠分类迈出了有希望的一步。"
      summary_en: "Abstract: Microcystis , Synechococcus , and Cyanobium are cyanotoxin-releasing microbes in harmful algal blooms. They often coexist and share similar morphology and flocculation patterns, making it difficult to differentiate in microscopic images. Multiwavelength laser microscopy was used (405-, 488-, 561-, and 640-nm lasers with black-and-white), and a deep learning model was developed to classify cyanobacteria. The accuracy was 76.56% using only black-and-white images for machine training; however, it improved to 98.44% with all five channel images, emphasizing the importance of wavelength laser microscopy. Microscopic images of individual wavelength lasers (with black-and-white images) improved classification performance, but the improvements were insufficient for strain-level classification. For optimal model performance, 45 image sets per sample, 200 epochs, and 256 × 256 pixel images are recommended, requiring only 11 min for machine training. In conclusion, multiwavelength laser microscopy allowed very efficient training of the deep learning model as a promising step toward reliable classification of cyanobacteria in environmental monitoring applications."
    - title: "SPATIAL MODELLING OF DOLPHIN MOVEMENT IN LOVINA, BALI: A MULTI-METHOD APPROACH FOR SUSTAINABLE MARINE CONSERVATION AND TOURISM MANAGEMENT"
      authors: "I PUTU ANANDA CITRA; I MADE ADIKAMPANA; I NYOMAN SUNARTA; I NYOMAN SUKMA ARIDA"
      journal: "JOURNAL OF SUSTAINABILITY SCIENCE AND MANAGEMENT"
      published: "2026-05-31"
