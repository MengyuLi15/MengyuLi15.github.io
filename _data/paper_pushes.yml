- date: "2026-05-27"
  title: "Daily Paper Push: BGC-Argo, ocean colour, marine heatwaves and carbon pump"
  summary: "First trial run with recent and highly relevant papers on BGC-Argo, phytoplankton vertical structure, ocean colour remote sensing, marine heatwaves and carbon export."
  docx: "/files/paper-push/每日新论文推送_2026-05-27.docx"
  figure: "/images/paper-push/机制示意图_2026-05-27.png"
  papers:
    - title: "Biochemical remodelling of phytoplankton cell composition under climate change"
      authors: "Sharoni, S.; Inomura, K.; Dutkiewicz, S.; et al."
      journal: "Nature Climate Change"
      published: "2026-03-31"
      doi: "10.1038/s41558-026-02598-w"
      url: "https://www.nature.com/articles/s41558-026-02598-w"
      group: "Nature series"
      tags: "phytoplankton; carbon pump; ocean colour context"
      summary: "This paper uses a cellular allocation model to examine how warming reshapes phytoplankton proteins, carbohydrates and lipids. It predicts declining protein allocation in polar and high-latitude systems and shifting organic matter quality, with implications for food webs and biological carbon pump stoichiometry."
    - title: "BGC-Argo float reveals shifts in nitrogen-carbon cycling in an oxygen-deficient zone"
      authors: "Bif, M. B.; Kelly, C.; Altabet, M. A.; et al."
      journal: "Communications Earth & Environment"
      published: "2026-04-06"
      doi: "10.1038/s43247-026-03410-5"
      url: "https://www.nature.com/articles/s43247-026-03410-5"
      group: "Nature series"
      tags: "BGC-Argo; microbial nitrogen-carbon cycling; ODZ"
      summary: "A three-year BGC-Argo record from the Eastern Tropical North Pacific oxygen-deficient zone links nitrite, nitrate, oxygen, pH, chlorophyll and POC. The study shows that BGC-Argo can diagnose coupled nitrogen redox and carbon cycling processes, not only biomass proxies."
    - title: "Global declines in net primary production in the ocean color era"
      authors: "Silsbe, G. M.; Fox, J.; Westberry, T. K.; et al."
      journal: "Nature Communications"
      published: "2025-07-01"
      doi: "10.1038/s41467-025-60906-y"
      url: "https://www.nature.com/articles/s41467-025-60906-y"
      group: "Nature series"
      tags: "ocean colour; NPP; climate trend"
      summary: "Using 25 years of SeaWiFS and MODIS-Aqua ocean colour observations, this paper finds significant NPP declines across nearly half of the ocean, mainly in tropical and subtropical stratified waters. The mechanism points to intensified nutrient limitation."
    - title: "Marine heatwaves modulate food webs and carbon transport processes"
      authors: "Bif, M. B.; Kellogg, C. T. E.; Huang, Y.; et al."
      journal: "Nature Communications"
      published: "2025-10-06"
      doi: "10.1038/s41467-025-63605-w"
      url: "https://www.nature.com/articles/s41467-025-63605-w"
      group: "Nature series"
      tags: "BGC-Argo; marine heatwaves; microbial ecology; POC"
      summary: "Combining BGC-Argo, pigments and DNA metabarcoding near Line P, the study finds anomalously high POC during the 2015 and 2019 marine heatwaves. Small particles accumulated in mesopelagic waters and slow remineralization reduced deep sequestration potential."
    - title: "Marine heatwaves are shaping the vertical structure of phytoplankton in the global ocean"
      authors: "Ma, X.; Chen, G."
      journal: "Communications Earth & Environment"
      published: "2025-08-29"
      doi: "10.1038/s43247-025-02718-y"
      url: "https://www.nature.com/articles/s43247-025-02718-y"
      group: "Nature series"
      tags: "BGC-Argo; marine heatwaves; vertical phytoplankton"
      summary: "Using global BGC-Argo profiles from 2008 to 2024, this paper shows that marine heatwaves can drive stronger subsurface than surface chlorophyll responses. It classifies intensified, weakened and subsurface-reversed response types and highlights DCM restructuring."
    - title: "The oceanic physical injection pump of organic carbon"
      authors: "Bellacicco, M.; Marullo, S.; Dall'Olmo, G.; et al."
      journal: "Nature Communications"
      published: "2025-08-02"
      doi: "10.1038/s41467-025-62363-z"
      url: "https://www.nature.com/articles/s41467-025-62363-z"
      group: "Nature series"
      tags: "carbon pump; POC/DOC; physical injection pump"
      summary: "This paper quantifies organic carbon export through the physical injection pump using 4D POC, DOC and circulation fields. It argues that mixing, entrainment and advection are essential carbon export pathways alongside sinking particles and vertical migrants."
    - title: "Antarctic krill vertical migrations modulate seasonal carbon export"
      authors: "Smith, A. J. R.; Wotherspoon, S.; Ratnarajah, L.; et al."
      journal: "Science"
      published: "2025"
      doi: "10.1126/science.adq5564"
      url: "https://www.science.org/doi/10.1126/science.adq5564"
      group: "Science series"
      tags: "carbon export; vertical migration; Southern Ocean"
      summary: "This Science paper focuses on how Antarctic krill vertical migration modulates seasonal carbon export. It complements BGC-Argo carbon-pump studies by emphasizing the migrant-pump pathway."
    - title: "Declining ocean greenness and phytoplankton blooms in low to mid-latitudes under a warming climate"
      authors: "Nature Index records 8 authors"
      journal: "Science Advances"
      published: "2025-10-17"
      doi: "10.1126/sciadv.adx4857"
      url: "https://www.science.org/doi/10.1126/sciadv.adx4857"
      group: "Science series"
      tags: "ocean colour; phytoplankton blooms; warming"
      summary: "This Science Advances paper uses long-term ocean-colour records to show declining greenness and bloom activity in low- to mid-latitude oceans under warming, indicating possible weakening of phytoplankton production and food-web support."
    - title: "Two Decades of Increase in Southern Ocean Net Community Production Revealed by BGC-Argo Floats"
      authors: "Liniger, G.; Sharp, J. D.; Takeshita, Y.; Johnson, K. S."
      journal: "Global Biogeochemical Cycles"
      published: "2025"
      doi: "10.1029/2024GB008371"
      url: "https://repository.library.noaa.gov/view/noaa/71386"
      group: "Highly relevant journals"
      tags: "BGC-Argo; NCP; Southern Ocean"
      summary: "A BGC-Argo-constrained neural network reconstructs Southern Ocean nitrate and estimates annual net community production. The paper reports basin-scale ANCP around 3.91 PgC yr-1 and a significant increase from 2004 to 2022."
    - title: "Southern Ocean Carbon Export Revealed by Backscatter and Oxygen Measurements From BGC-Argo Floats"
      authors: "Liniger, G.; Moreau, S.; Lannuzel, D.; Carranza, M. M.; Strutton, P. G."
      journal: "Global Biogeochemical Cycles"
      published: "2025"
      doi: "10.1029/2024GB008193"
      url: "https://doi.org/10.1029/2024GB008193"
      group: "Highly relevant journals"
      tags: "BGC-Argo; backscatter; oxygen; carbon export"
      summary: "Using 212 BGC-Argo floats, this study estimates Southern Ocean carbon export from backscatter and oxygen changes across 2014-2022, including sea-ice regions. It reports about 2.69 Pg C yr-1 sinking carbon export."
    - title: "Beyond the surface: machine learning uncovers ENSO's hidden and contrasting impacts on phytoplankton vertical structure"
      authors: "Yang, J.; Wen, Y.; Chen, P.; Zhang, Z.; Pan, D."
      journal: "ISPRS Journal of Photogrammetry and Remote Sensing"
      published: "2026-02"
      doi: "10.1016/j.isprsjprs.2026.01.002"
      url: "https://www.sciencedirect.com/science/article/pii/S092427162600002X"
      group: "Highly relevant journals"
      tags: "BGC-Argo; ocean colour; 3D chlorophyll; ENSO"
      summary: "This paper combines 133,792 BGC-Argo profiles with multi-source satellite data to reconstruct 3D chlorophyll fields. It shows that ENSO-driven subsurface chlorophyll responses can precede and exceed surface signals."
    - title: "Depth-resolved phytoplankton responses to persistent marine heatwaves in the southern tropical Indian Ocean"
      authors: "ScienceDirect metadata"
      journal: "International Journal of Applied Earth Observation and Geoinformation"
      published: "2026-05"
      doi: "10.1016/j.jag.2026.105323"
      url: "https://www.sciencedirect.com/science/article/pii/S1569843226002396"
      group: "Highly relevant journals"
      tags: "marine heatwaves; vertical phytoplankton; carbon export"
      summary: "This study examines depth-resolved phytoplankton responses to persistent marine heatwaves in the southern tropical Indian Ocean, distinguishing surface-intensified and subsurface-intensified heatwaves and their impacts on mixed-layer productivity and DCM behaviour."
    - title: "Ocean color remote sensing: From 2D legacy to the 3D, AI-driven future"
      authors: "ScienceDirect metadata"
      journal: "ISPRS Journal of Photogrammetry and Remote Sensing"
      published: "2026-07 issue"
      doi: "10.1016/j.isprsjprs.2026.04.044"
      url: "https://www.sciencedirect.com/science/article/pii/S0924271626002170"
      group: "Review and methods"
      tags: "ocean colour; review; lidar; polarization; AI"
      summary: "A review of the transition from 2D ocean-colour products to 3D, AI-driven, multi-sensor observation systems. It is useful as a roadmap for linking satellite bio-optics with BGC-Argo vertical profiles."
