      summary: "摘要：本研究利用 Sentinel-3 上海洋和陆地颜色仪器 (OLCI) 的遥感数据，研究了巴西帕拉伊巴 Seixas 海滩与水质相关的生物光学参数的时间行为。该地区是浅热带沿海环境，受季节性降雨、河口流量和城市输入影响，适合评估光学复杂水域中的卫星监测。该研究具有探索性特征，重点关注 2016 年 10 月至 2020 年 1 月期间光学指标的年际变化，该时期被选为代表降雨量较低和水柱稳定性较高的条件。分析了六个指数：底部反射指数（BRI）、归一化叶绿素指数（NDCI）、归一化浮藻/有害藻华指数（NFHI）、浊度指数（TBI）、藻碳指数（ACI）和海面温度（SST）。结果揭示了近岸和近海区域之间一致的空间梯度。统计分析表明 BRI 和 TBI 存在显着的年际差异，表明表观透明度和悬浮颗粒影响存在差异。由于缺乏现场数据，结果被解释为该地区光学状况的变化。该研究为使用 OLCI 作为监测巴西东北部热带沿海环境的筛查工具建立了方法学基线。"
      summary_zh: "摘要：本研究利用 Sentinel-3 上海洋和陆地颜色仪器 (OLCI) 的遥感数据，研究了巴西帕拉伊巴 Seixas 海滩与水质相关的生物光学参数的时间行为。该地区是浅热带沿海环境，受季节性降雨、河口流量和城市输入影响，适合评估光学复杂水域中的卫星监测。该研究具有探索性特征，重点关注 2016 年 10 月至 2020 年 1 月期间光学指标的年际变化，该时期被选为代表降雨量较低和水柱稳定性较高的条件。分析了六个指数：底部反射指数（BRI）、归一化叶绿素指数（NDCI）、归一化浮藻/有害藻华指数（NFHI）、浊度指数（TBI）、藻碳指数（ACI）和海面温度（SST）。结果揭示了近岸和近海区域之间一致的空间梯度。统计分析表明 BRI 和 TBI 存在显着的年际差异，表明表观透明度和悬浮颗粒影响存在差异。由于缺乏现场数据，结果被解释为该地区光学状况的变化。该研究为使用 OLCI 作为监测巴西东北部热带沿海环境的筛查工具建立了方法学基线。"
      summary_en: "Abstract: This study investigates the temporal behavior of bio-optical parameters related to water quality at Seixas Beach, Paraíba, Brazil, using remote sensing data from the Ocean and Land Colour Instrument (OLCI) onboard Sentinel-3. The area is a shallow tropical coastal environment influenced by seasonal rainfall, estuarine discharge, and urban inputs, making it suitable for evaluating satellite-based monitoring in optically complex waters. The study assumes an exploratory character, focusing on the interannual variability of optical proxies between October 2016 and January 2020, a period chosen to represent conditions of lower rainfall and greater water column stability. Six indices were analyzed: Bottom Reflectance Index (BRI), Normalized Difference Chlorophyll Index (NDCI), Normalized Floating Algal/Harmful Algal Bloom Index (NFHI), Turbidity Index (TBI), Algal Carbon Index (ACI), and Sea Surface Temperature (SST). The results reveal consistent spatial gradients between nearshore and offshore zones. Statistical analysis indicated significant interannual differences for BRI and TBI, suggesting variations in apparent transparency and suspended particle influence. Given the absence of in situ data, the results are interpreted as indicative of changes in the region’s optical regime. The study establishes a methodological baseline for using OLCI as a screening tool in monitoring tropical coastal environments in northeastern Brazil."
