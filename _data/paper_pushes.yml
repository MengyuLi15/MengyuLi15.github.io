      summary: "摘要：本研究旨在开发准确高效的海洋数据预测模型，以应对气候变化和复杂海洋动力学带来的挑战。主要目标是使用长短期记忆（LSTM）网络和遗传算法（GA）同时预测四个关键海洋因素：海面温度（SST）、海面高度（SSH）、海面盐度（SSS）和叶绿素-a（Chl-a）。采用实验定量方法，利用班达海地区的卫星数据。这种方法涉及使用 LSTM 进行时间序列建模，并通过 GA 针对神经元数量和批量大小等超参数进行优化。结果表明，组合的 LSTM-GA 模型大大提高了预测精度，即使在存在大量噪声的情况下，也能成功识别所有变量的季节性趋势和不规则变化。测试表明，每个变量的最佳配置各不相同，并且 GA 优化过程可以将模型收敛速度加快 10 个 epoch。这些发现强调了整合进化技术在训练海洋数据深度学习（DL）模型中的有效性。这项研究的影响包括自适应海洋监测系统、早期预警举措以及海洋资源管理中数据驱动规划的潜在应用。"
      summary_zh: "摘要：本研究旨在开发准确高效的海洋数据预测模型，以应对气候变化和复杂海洋动力学带来的挑战。主要目标是使用长短期记忆（LSTM）网络和遗传算法（GA）同时预测四个关键海洋因素：海面温度（SST）、海面高度（SSH）、海面盐度（SSS）和叶绿素-a（Chl-a）。采用实验定量方法，利用班达海地区的卫星数据。这种方法涉及使用 LSTM 进行时间序列建模，并通过 GA 针对神经元数量和批量大小等超参数进行优化。结果表明，组合的 LSTM-GA 模型大大提高了预测精度，即使在存在大量噪声的情况下，也能成功识别所有变量的季节性趋势和不规则变化。测试表明，每个变量的最佳配置各不相同，并且 GA 优化过程可以将模型收敛速度加快 10 个 epoch。这些发现强调了整合进化技术在训练海洋数据深度学习（DL）模型中的有效性。这项研究的影响包括自适应海洋监测系统、早期预警举措以及海洋资源管理中数据驱动规划的潜在应用。"
      summary_en: "Abstract: This study aims to develop an accurate and efficient ocean data prediction model to tackle the challenges posed by climate change and complex oceanographic dynamics. The main goal is to use long short-term memory (LSTM) networks along with genetic algorithms (GA) to predict four key ocean factors at once: sea surface temperature (SST), sea surface height (SSH), sea surface salinity (SSS), and chlorophyll-a (Chl-a). An experimental quantitative approach is employed, utilizing satellite data from the Banda Sea region. This approach involves time series modeling using LSTM, which is optimized by GA for hyperparameters such as the number of neurons and batch size. The results show that the combined LSTM-GA model greatly improves prediction accuracy and successfully identifies seasonal trends and irregular changes in all variables, even when there is a lot of noise. Tests reveal that the optimal configuration varies for each variable, and the GA optimization process can expedite model convergence by as little as 10 epochs. These findings underscore the effectiveness of integrating evolutionary techniques in training deep learning (DL) models for ocean data. The implications of this research include potential applications in adaptive ocean monitoring systems, early warning initiatives, and data-driven planning in marine resource management."
    - title: "The influence of ocean waves on Antarctic sea-ice albedo and seasonal melting, and potential coupled physical and biological feedbacks"
      authors: "Robert A. Massom; Phillip A. Reid; Stephen G. Warren; Bonnie Light; Donald K. Perovich; Luke G. Bennetts; Petteri Uotila; Siobhan P. O'Farrell; et al."
      journal: "The Cryosphere"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/tc-20-3271-2026"
      url: "https://doi.org/10.5194/tc-20-3271-2026"
      group: "其他相关期刊：按主题相关性补充"
