      summary: "摘要：鲭鱼是我国远洋渔业的重要目标物种，准确预测其潜在生境分布对于渔场预报至关重要。本研究利用2015-2024年5月至11月中国西北太平洋大型围网拖网渔业采集的日本对虾渔获量数据，应用最大熵模型（MaxEnt）和规则集产生遗传算法（GARP）模型预测西北太平洋日本对虾的潜在生境分布。接受者操作特征曲线下面积（AUC）和真实技能统计量（TSS）用于评估模型性能。 MaxEnt模型预测了相对集中的高度适宜栖息地，而GARP模型则确定了更广泛的高度适宜区域。 为了减少与单模型预测相关的偏差和不确定性，使用加权集成方法集成了 MaxEnt 和 GARP 模型的输出，MaxEnt 和 GARP 的最佳权重确定为 0. 7:0。 3. 集合模型取得了较高的预测性能，AUC为0. 983，TSS为0. 840。刺参高度适宜的生境主要集中在147°E~156°E和40°N~44°N范围内。叶绿素浓度、海面温度（SST）以及150 m和200 m深度的温度是影响潜在的主要环境变量。 MaxEnt模型中日本刺参的生境分布。这些发现为西北太平洋公海刺参的资源利用、渔场预报和可持续管理提供了有用的信息。"
      summary_zh: "摘要：鲭鱼是我国远洋渔业的重要目标物种，准确预测其潜在生境分布对于渔场预报至关重要。本研究利用2015-2024年5月至11月中国西北太平洋大型围网拖网渔业采集的日本对虾渔获量数据，应用最大熵模型（MaxEnt）和规则集产生遗传算法（GARP）模型预测西北太平洋日本对虾的潜在生境分布。接受者操作特征曲线下面积（AUC）和真实技能统计量（TSS）用于评估模型性能。 MaxEnt模型预测了相对集中的高度适宜栖息地，而GARP模型则确定了更广泛的高度适宜区域。 为了减少与单模型预测相关的偏差和不确定性，使用加权集成方法集成了 MaxEnt 和 GARP 模型的输出，MaxEnt 和 GARP 的最佳权重确定为 0. 7:0。 3. 集合模型取得了较高的预测性能，AUC为0. 983，TSS为0. 840。刺参高度适宜的生境主要集中在147°E~156°E和40°N~44°N范围内。叶绿素浓度、海面温度（SST）以及150 m和200 m深度的温度是影响潜在的主要环境变量。 MaxEnt模型中日本刺参的生境分布。这些发现为西北太平洋公海刺参的资源利用、渔场预报和可持续管理提供了有用的信息。"
      summary_en: "Abstract: Accurate prediction of the potential habitat distribution of Scomber japonicus, an important target species in China’s distant-water fisheries, is essential for fishing ground forecasting. Using catch data for S. japonicus collected from Chinese large-scale purse-seine and trawl fisheries in the Northwest Pacific Ocean from May to November during 2015–2024, this study applied the maximum entropy model (MaxEnt) and the genetic algorithm for rule-set production (GARP) model to predict the potential habitat distribution of S. japonicus in the Northwest Pacific Ocean. The area under the receiver operating characteristic curve (AUC) and the true skill statistic (TSS) were used to evaluate model performance. The MaxEnt model predicted a relatively concentrated highly suitable habitat, whereas the GARP model identified a broader highly suitable area. To reduce the bias and uncertainty associated with single-model predictions, the outputs of the MaxEnt and GARP models were integrated using a weighted ensemble approach, with the optimal weights for MaxEnt and GARP determined as 0.7:0.3. The ensemble model achieved higher predictive performance, with an AUC of 0.983 and a TSS of 0.840. The highly suitable habitat of S. japonicus was mainly concentrated within 147° E–156° E and 40° N–44° N. Chlorophyll concentration, sea surface temperature (SST), and temperatures at depths of 150 m and 200 m were the main environmental variables affecting the potential habitat distribution of S. japonicus in the MaxEnt model. These findings provide useful information for resource utilization, fishing ground forecasting, and sustainable management of S. japonicus in the high seas of the Northwest Pacific Ocean."
    - title: "Event-Scale Responses of Phytoplankton and Heterotrophic Bacterial Biomass and Production to Super Typhoon Maria in the East China Sea"
      authors: "Tzong-Yueh Chen; Nien En Thai; Chao-Chen Lai; Liang-Yu Chen; Fuh-Kwo Shiah; Gwo-Ching Gong"
      journal: "Biology"
      published: "2026-06-25"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/biology15131007"
      url: "https://doi.org/10.3390/biology15131007"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "phytoplankton; microbial carbon; vertical structure"
      tags_zh: "phytoplankton; microbial carbon; vertical structure"
      tags_en: "phytoplankton; microbial carbon; vertical structure"
      summary: "摘要：台风是边缘海的主要物理扰动，但其对微生物过程和碳循环的事件规模影响仍然很少受到限制。在这里，我们结合现场观测和卫星数据研究了东海超级台风玛丽亚（2018）的生物地球化学响应。虽然地表温度、营养物和叶绿素-a (Chl-a) 没有显着变化，但深度综合营养物和叶绿素-a 显着增加，揭示了由垂直混合和上升流驱动的地表和深度综合响应之间的明显脱钩。卫星观测进一步表明，浮游植物的增强是短暂的，叶绿素a在一周内恢复到背景水平。这种快速衰减可能反映了短暂的养分供应和强大的放牧压力。 相反，微生物反应的特点是细菌比生长率增加，而生物量或产量没有显着变化，表明微生物周转率增强。总之，这些结果表明，台风强迫促进了通过微生物循环的快速和垂直结构的碳处理，而不增加生物量积累。这凸显了时间分辨率和垂直结构在理解生态系统对边缘海偶发性扰动的响应方面的重要性。"
      summary_zh: "摘要：台风是边缘海的主要物理扰动，但其对微生物过程和碳循环的事件规模影响仍然很少受到限制。在这里，我们结合现场观测和卫星数据研究了东海超级台风玛丽亚（2018）的生物地球化学响应。虽然地表温度、营养物和叶绿素-a (Chl-a) 没有显着变化，但深度综合营养物和叶绿素-a 显着增加，揭示了由垂直混合和上升流驱动的地表和深度综合响应之间的明显脱钩。卫星观测进一步表明，浮游植物的增强是短暂的，叶绿素a在一周内恢复到背景水平。这种快速衰减可能反映了短暂的养分供应和强大的放牧压力。 相反，微生物反应的特点是细菌比生长率增加，而生物量或产量没有显着变化，表明微生物周转率增强。总之，这些结果表明，台风强迫促进了通过微生物循环的快速和垂直结构的碳处理，而不增加生物量积累。这凸显了时间分辨率和垂直结构在理解生态系统对边缘海偶发性扰动的响应方面的重要性。"
      summary_en: "Abstract: Typhoons are major physical disturbances in marginal seas, yet their event-scale impacts on microbial processes and carbon cycling remain poorly constrained. Here, we investigated the biogeochemical responses to Super Typhoon Maria (2018) in the East China Sea using combined field observations and satellite data. While surface temperature, nutrients, and chlorophyll-a (Chl-a) showed no significant changes, depth-integrated nutrients and Chl-a increased markedly, revealing a clear decoupling between surface and depth-integrated responses driven by vertical mixing and upwelling. Satellite observations further showed that phytoplankton enhancement was short-lived, with Chl-a returning to background levels within one week. This rapid attenuation likely reflects transient nutrient supply and strong grazing pressure. In contrast, microbial responses were characterized by increased bacterial specific growth rate without significant changes in biomass or production, indicating enhanced microbial turnover. Together, these results suggest that typhoon forcing promotes rapid and vertically structured carbon processing through the microbial loop without increasing biomass accumulation. This highlights the importance of temporal resolution and vertical structure in understanding ecosystem responses to episodic disturbances in marginal seas."

