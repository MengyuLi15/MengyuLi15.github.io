      tags_en: "phytoplankton"
      summary: "摘要：拉各斯存在许多相互连接的泻湖，这些泻湖与海洋相连，呈现季节性波动并支持水生生物。其中包括反映水生初级（光合作用）和次级生产活动等的新鲜到海洋形式的浮游植物和浮游动物。本文的目的是使用适当的标准方法评估尼日利亚拉各斯州 Iyagbe、Lagos 和 Epe 互连泻湖的物理化学特征、光合色素、浮游植物和浮游动物物种。对于光合色素，叶绿素值在 Iyagbe 泻湖最高，而拉各斯和埃佩泻湖分别记录为 10. 43 µg/L 和 10. 50 µg/L。叶绿素 b 值范围为 0. 12 至 1. 32 µg/L，而叶绿素 c（0. 05 和 0. 37 µg/L）和褐藻素值（0. 11 和 0. 57 µg/L）则表现出变化。 三个相互连接的泻湖中浮游植物和浮游动物的多样性和丰富度记录了 65 个类群。埃佩泻湖的浮游生物多样性更加多样化，其次是拉各斯泻湖和伊亚格贝泻湖。最丰富的浮游植物是一种中心硅藻——Aulocoseira capsulata var. angustissima（埃佩泻湖）。浮游动物作物记录了全浮游生物和小型浮游生物（幼体阶段）的形式。桡足类记录了 11 种，枝角类记录了 2 种，轮虫类记录了 2 种，被囊类记录了 2 种，水母 1 类群和幼年阶段记录了 10 种。更常见的形式是在 Iyagbe 和拉各斯泻湖中记录到的 Paracalanus parvus（桡足类）、Diaphanosoma excisum 和 Diaphnia sp。 （枝角类动物）仅来自 Epe 泻湖。从数量上看，藤壶和腹足动物幼虫是更重要的幼虫形式。 在微咸的 Iyagbe 和拉各斯泻湖（八种类型）中记录了更多的幼鱼阶段，这表明它们是比主要淡水栖息地 Epe 泻湖（两种类型）更受欢迎的育苗地。重要的是，藻类色素与浮游植物多样性和密度呈强烈负相关。这些水域中的水化学、光合色素和浮游生物多样性之间仍然存在 5 连续体和密切联系。"
      summary_zh: "摘要：拉各斯存在许多相互连接的泻湖，这些泻湖与海洋相连，呈现季节性波动并支持水生生物。其中包括反映水生初级（光合作用）和次级生产活动等的新鲜到海洋形式的浮游植物和浮游动物。本文的目的是使用适当的标准方法评估尼日利亚拉各斯州 Iyagbe、Lagos 和 Epe 互连泻湖的物理化学特征、光合色素、浮游植物和浮游动物物种。对于光合色素，叶绿素值在 Iyagbe 泻湖最高，而拉各斯和埃佩泻湖分别记录为 10. 43 µg/L 和 10. 50 µg/L。叶绿素 b 值范围为 0. 12 至 1. 32 µg/L，而叶绿素 c（0. 05 和 0. 37 µg/L）和褐藻素值（0. 11 和 0. 57 µg/L）则表现出变化。 三个相互连接的泻湖中浮游植物和浮游动物的多样性和丰富度记录了 65 个类群。埃佩泻湖的浮游生物多样性更加多样化，其次是拉各斯泻湖和伊亚格贝泻湖。最丰富的浮游植物是一种中心硅藻——Aulocoseira capsulata var. angustissima（埃佩泻湖）。浮游动物作物记录了全浮游生物和小型浮游生物（幼体阶段）的形式。桡足类记录了 11 种，枝角类记录了 2 种，轮虫类记录了 2 种，被囊类记录了 2 种，水母 1 类群和幼年阶段记录了 10 种。更常见的形式是在 Iyagbe 和拉各斯泻湖中记录到的 Paracalanus parvus（桡足类）、Diaphanosoma excisum 和 Diaphnia sp。 （枝角类动物）仅来自 Epe 泻湖。从数量上看，藤壶和腹足动物幼虫是更重要的幼虫形式。 在微咸的 Iyagbe 和拉各斯泻湖（八种类型）中记录了更多的幼鱼阶段，这表明它们是比主要淡水栖息地 Epe 泻湖（两种类型）更受欢迎的育苗地。重要的是，藻类色素与浮游植物多样性和密度呈强烈负相关。这些水域中的水化学、光合色素和浮游生物多样性之间仍然存在 5 连续体和密切联系。"
      summary_en: "Abstract: A number of interconnected lagoons exist in Lagos that are connected to the ocean, exhibit seasonal fluctuations and support aquatic life. These include fresh to marine forms of phytoplankton and zooplankton that reflects aquatic primary (photosynthetic) and secondary production activities and more. The objective of this paper was to evaluate the physicochemical characteristics, photosynthetic pigments, phytoplankton and zooplankton species of Iyagbe, Lagos and Epe interconnected lagoons in Lagos State, Nigeria using appropriate standard methods. For photosynthetic pigments, Chlorophyll values were highest in the Iyagbe lagoon, whereas the Lagos and Epe lagoons recorded 10.43µg/L and 10.50 µg/L respectively. Chlorophyll b values range from 0.12 to 1.32 µg/L while Chlorophyll c (0.05 and 0.37µg/L) and Phaeophytin values (0.11 and 0.57 µg/L) showed variations. The diversity and abundance of phytoplankton and zooplankton from the three interconnected lagoons recorded 65 taxa. The Epe lagoon was more diverse in terms of plankton diversity followed by the Lagos and Iyagbe lagoons. The most abundant phytoplankton was a centric diatom - Aulocoseira granulata var. angustissima (Epe lagoon). The zooplankton crop recorded both holoplankton and meroplankton (juvenile stages) forms. Whereas the Copepods recorded 11 species, the Cladocerans, two species, Rotifers, two species, Tunicates, 2 species, Jellyfish 1 taxon and the Juvenile stages reported 10 forms. The more common forms were Paracalanus parvus (copepod) recorded in both the Iyagbe and Lagos lagoons, Diaphanosoma excisum and Diaphnia sp. (cladocerans) reported solely from the Epe lagoon. Numerically the barnacle and gastropod larvae were the more important juvenile forms. More juvenile stages were recorded in the brackish Iyagbe and Lagos lagoons (eight forms), indicating them as preferred nursery grounds than the largely freshwater habitat of the Epe lagoon (two forms). Importantly algal pigments were strongly and negatively correlated with phytoplankton diversity and density. There continues to 5 exist a continuum and close link between the water chemistry, photosynthetic pigments and plankton diversity in these waters."

