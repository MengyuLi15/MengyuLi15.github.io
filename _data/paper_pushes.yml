      tags_zh: "satellite validation; field campaign; PACE"
      tags_en: "satellite validation; field campaign; PACE"
      summary: "这项研究介绍用可追溯矩阵支持外场观测设计和实施的方法。它面向卫星验证和大型外场活动，把科学目标、观测需求、传感器配置和采样计划连接起来。研究重点是让每一项现场测量都能对应到明确的产品或算法验证需求。结果提供了一个更系统的外场设计决策流程。它对 PACE 验证航次、海色现场采样和跨团队观测协调很有帮助。"
      summary_zh: "这项研究介绍用可追溯矩阵支持外场观测设计和实施的方法。它面向卫星验证和大型外场活动，把科学目标、观测需求、传感器配置和采样计划连接起来。研究重点是让每一项现场测量都能对应到明确的产品或算法验证需求。结果提供了一个更系统的外场设计决策流程。它对 PACE 验证航次、海色现场采样和跨团队观测协调很有帮助。"
      summary_en: "This study presents a traceability-matrix approach for field-campaign design and implementation. It targets satellite validation and large field activities by connecting science goals, measurement requirements, sensor choices, and sampling plans. The method ensures that each field measurement maps to a clear product or algorithm-validation need. The result is a more systematic decision workflow for campaign planning. It is useful for PACE validation cruises, ocean-colour field sampling, and coordination across observing teams."
