      summary: "摘要：热浪会严重影响沿海农业系统，但在印度尼西亚爪哇南部海岸，热浪的特征和气候驱动因素仍然相对不足。本研究使用 23 年数据集（2000-2022 年）研究陆地热浪 (THW)、海洋热浪 (MHW) 及其在 Pameungpeuk 的同时发生。 THW 的定义是每日最高表面气温 (SAT) 至少连续三天超过 85%，而 MHW 的定义是海面温度 (SST) 至少连续 5 天超过 90%。同时发生的事件的特点是 THW 和 MHW 之间的时间重叠。使用源自 Sentinel-2 数据的归一化植被指数 (NDVI) 以及土地利用信息来评估植被响应。 为了检查大规模气候驱动因素的影响，采用了统计和交叉小波分析。结果表明，THW 比 MHW 更频繁，主要发生在湿向干过渡期间（3 月至 5 月）。这些热浪的特点是 SAT 正异常超过 1 °C、相对湿度降低和风速适中。这些特征与当地报道的安金拉达现象有部分相似之处。重灾区频率较低，但往往持续时间较长，同时发生的事件则显示出不同的大气特征。 NDVI 下降 21-46。热浪期间稻田上空 5% 表明潜在的植被压力。 2010 年持续时间较长的 THW 事件凸显了大规模气候变化可能产生的影响。 然而，这些气候驱动因素相互作用产生复合热浪事件的程度仍不清楚，需要进一步调查。"
      summary_zh: "摘要：热浪会严重影响沿海农业系统，但在印度尼西亚爪哇南部海岸，热浪的特征和气候驱动因素仍然相对不足。本研究使用 23 年数据集（2000-2022 年）研究陆地热浪 (THW)、海洋热浪 (MHW) 及其在 Pameungpeuk 的同时发生。 THW 的定义是每日最高表面气温 (SAT) 至少连续三天超过 85%，而 MHW 的定义是海面温度 (SST) 至少连续 5 天超过 90%。同时发生的事件的特点是 THW 和 MHW 之间的时间重叠。使用源自 Sentinel-2 数据的归一化植被指数 (NDVI) 以及土地利用信息来评估植被响应。 为了检查大规模气候驱动因素的影响，采用了统计和交叉小波分析。结果表明，THW 比 MHW 更频繁，主要发生在湿向干过渡期间（3 月至 5 月）。这些热浪的特点是 SAT 正异常超过 1 °C、相对湿度降低和风速适中。这些特征与当地报道的安金拉达现象有部分相似之处。重灾区频率较低，但往往持续时间较长，同时发生的事件则显示出不同的大气特征。 NDVI 下降 21-46。热浪期间稻田上空 5% 表明潜在的植被压力。 2010 年持续时间较长的 THW 事件凸显了大规模气候变化可能产生的影响。 然而，这些气候驱动因素相互作用产生复合热浪事件的程度仍不清楚，需要进一步调查。"
      summary_en: "Abstract: Heatwaves can severely affect coastal agricultural systems, yet their characteristics and climate drivers remain relatively underexplored along the southern coast of Java, Indonesia. This study examines terrestrial heatwaves (THWs), marine heatwaves (MHWs), and their co-occurrence in Pameungpeuk using a 23-year dataset (2000–2022). THWs are defined as daily maximum surface air temperature (SAT) exceeding the 85th percentile for at least three consecutive days, while MHWs are identified as sea surface temperature (SST) exceeding the 90th percentile for at least five consecutive days. Co-occurring events are characterised by the temporal overlap between THWs and MHWs. The vegetation response is assessed using the Normalised Difference Vegetation Index (NDVI) derived from Sentinel-2 data, along with land-use information. To examine the influence of large-scale climate drivers, statistical and cross-wavelet analyses are employed. Results indicate that THWs are more frequent than MHWs, primarily occurring during the wet-to-dry transition period (March–May). These heatwaves are characterised by positive SAT anomalies exceeding 1 °C, reduced relative humidity, and moderate wind speeds. These features show partial similarities to the locally reported Angin Lada phenomenon. MHWs are less frequent but tend to persist longer, while co-occurring events display distinct atmospheric characteristics. NDVI declines of 21–46.5% over rice fields during heatwave periods suggest potential vegetation stress. A prolonged THW event in 2010 highlights the possible influence of large-scale climate variability. However, the extent to which these climate drivers interact to produce compound heatwave events remains unclear and warrants further investigation."
    - title: "Research on the Application of CYGNSS Data and Machine Learning for Monitoring and Predicting Soil Salinity in the Ben Tre Area, Vinh Long Province"
      authors: "Phan Minh Quan; Hoang Tich Phuc; Vu Phuong Lan; Nguyen Huu Duy; Ha Minh Cuong"
      journal: "VNU Journal of Science: Earth and Environmental Sciences"
      published: "2026-06-19"
