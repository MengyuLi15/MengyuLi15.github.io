      tags_en: "bio-optics"
      summary: "摘要：需要持续的全球观测技术来全面了解水生环境中塑料污染的质量平衡和时间趋势。近年来，实现漂浮海洋垃圾大规模自动化监测的努力不断加快。例如，借助多光谱、高光谱、热红外、偏振测量、合成孔径雷达等方法的研究，沿海地区漂浮海洋垃圾的卫星测绘已取得实质性进展。事实证明，基于卫星的方法对于公海来说具有挑战性，因为那里漂浮的海洋碎片过于分散。具体而言，大型漂浮大塑料（> 50 厘米）构成海洋塑料质量预算的重要组成部分，但即使通过表面拖网和目视观察等经典方法也很难量化。 在这里，我们展示了最近推出的自动碎片成像系统（ADIS）的进一步改进和首次全球活动。该技术采用光学图像和深度学习来检测和分类沿着血管横断面的漂浮大塑料。对于每次检测，都会创建一个地理标记的片段，以便进行人工验证和过滤误报。自最初的概念验证以来，我们已经编制了一个全球数据集，其中包含超过 2700 万张或 165TB 的照片，横跨五个大洋，面积达 14,485 km 2 。我们总共发现了 20,000 多个漂浮的大型塑料项目。至关重要的是，这项研究包括使用并发表面网拖网样本验证 ADIS 方法，从而能够评估检测的准确性和精度。 这些发现代表了开发可扩展、高分辨率的公海海洋塑料污染监测工具的重要一步。"
      summary_zh: "摘要：需要持续的全球观测技术来全面了解水生环境中塑料污染的质量平衡和时间趋势。近年来，实现漂浮海洋垃圾大规模自动化监测的努力不断加快。例如，借助多光谱、高光谱、热红外、偏振测量、合成孔径雷达等方法的研究，沿海地区漂浮海洋垃圾的卫星测绘已取得实质性进展。事实证明，基于卫星的方法对于公海来说具有挑战性，因为那里漂浮的海洋碎片过于分散。具体而言，大型漂浮大塑料（> 50 厘米）构成海洋塑料质量预算的重要组成部分，但即使通过表面拖网和目视观察等经典方法也很难量化。 在这里，我们展示了最近推出的自动碎片成像系统（ADIS）的进一步改进和首次全球活动。该技术采用光学图像和深度学习来检测和分类沿着血管横断面的漂浮大塑料。对于每次检测，都会创建一个地理标记的片段，以便进行人工验证和过滤误报。自最初的概念验证以来，我们已经编制了一个全球数据集，其中包含超过 2700 万张或 165TB 的照片，横跨五个大洋，面积达 14,485 km 2 。我们总共发现了 20,000 多个漂浮的大型塑料项目。至关重要的是，这项研究包括使用并发表面网拖网样本验证 ADIS 方法，从而能够评估检测的准确性和精度。 这些发现代表了开发可扩展、高分辨率的公海海洋塑料污染监测工具的重要一步。"
      summary_en: "Abstract: Continuous and global observation techniques are required for a comprehensive understanding of the mass balance and the temporal trends of plastic pollution in the aquatic environment. Efforts to achieve large-scale automated monitoring of floating marine debris have accelerated in recent years. For example, satellite-based mapping of floating marine debris in coastal regions has made substantial progress, aided by studies on the use of multispectral, hyperspectral, thermal infrared, polarimetry, synthetic aperture radar, and other methods. Satellite-based methods have proven challenging for the open ocean, where floating marine debris is too dispersed. Specifically, large floating macroplastics (>50 cm) constitute a significant part of the ocean plastic mass budget, but are poorly quantifiable even by classical methods, such as surface trawls and visual observations. Here, we demonstrate further refinements and a first-ever global campaign of the recently introduced Automated Debris Imaging System (ADIS). This technology employs optical imagery and deep learning to detect and classify floating macroplastics along vessel transects. For every detection, a geo-tagged snippet is created, allowing for human validation and filtering of false positives. Since the initial proof-ofconcept, we have compiled a global dataset, comprising over 27 million or 165TB of photographs, spanning 14,485 km 2 over five oceans. In total, we identified more than 20,000 floating macroplastic items. Crucially, this study includes validation of the ADIS approach using concurrent surface nettrawl samples, enabling an assessment of detection accuracy and precision. These findings represent a major step forward in the development of scalable, high-resolution monitoring tools for marine plastic pollution in the open ocean."

