      tags: "ocean colour; ocean optics"
      tags_zh: "ocean colour; ocean optics"
      tags_en: "ocean colour; ocean optics"
      summary: "摘要：卡纳普利河对周边流域的环境和社会经济状况具有重大影响，分析和监测污染对于管理河流水质至关重要。该研究的目的是结合实验室测试、Sentinel-2A 卫星图像分析和卡纳普利河口的机器学习，评估并建立水中物理化学和重金属污染之间的相关性。卡纳普里的水样中发现了高浓度的重金属，如12. 8 mg/L铝（Al）、15. 5 mg/L铁（Fe）和其他污染物。使用 GIS 插值图对连续水污染值进行可视化，显示靠近海岸的沉船区域污染程度较高。 本研究基于遥感反射率数据，确定多元线性回归（MLR）和主成分回归（PCR）是预测水质参数变异性的最有效模型。 Sentinel-2A 波段的卫星反射率产生了显着的结果，并预测了卡纳普利河中总悬浮固体 (TSS) 的 58%（最高）变异性和 43%（最低）的 pH 变异性。插值图旨在比栅格计算图更准确地表示污染水平，因为它们在整个建模过程中结合了基于观测值的空间自相关技术。 该分析提供了对污染动态的见解，有助于优先关注减少工业排放，鼓励对污水处理进行必要的基础设施投资，并利用遥感和机器学习进一步研究和数字化水质测量。"
      summary_zh: "摘要：卡纳普利河对周边流域的环境和社会经济状况具有重大影响，分析和监测污染对于管理河流水质至关重要。该研究的目的是结合实验室测试、Sentinel-2A 卫星图像分析和卡纳普利河口的机器学习，评估并建立水中物理化学和重金属污染之间的相关性。卡纳普里的水样中发现了高浓度的重金属，如12. 8 mg/L铝（Al）、15. 5 mg/L铁（Fe）和其他污染物。使用 GIS 插值图对连续水污染值进行可视化，显示靠近海岸的沉船区域污染程度较高。 本研究基于遥感反射率数据，确定多元线性回归（MLR）和主成分回归（PCR）是预测水质参数变异性的最有效模型。 Sentinel-2A 波段的卫星反射率产生了显着的结果，并预测了卡纳普利河中总悬浮固体 (TSS) 的 58%（最高）变异性和 43%（最低）的 pH 变异性。插值图旨在比栅格计算图更准确地表示污染水平，因为它们在整个建模过程中结合了基于观测值的空间自相关技术。 该分析提供了对污染动态的见解，有助于优先关注减少工业排放，鼓励对污水处理进行必要的基础设施投资，并利用遥感和机器学习进一步研究和数字化水质测量。"
      summary_en: "Abstract: The Karnaphuli River has critical impacts on the environmental and socio-economic situation of the surrounding catchment region, and it is crucial to analyze and monitor pollution for managing river water quality. The objective of the research was to evaluate and establish correlations between physicochemical and heavy metal pollution in water and a combination of laboratory testing, Sentinel-2A satellite imagery analysis, and machine learning for the Karnaphuli River estuary. High concentrations of heavy metals such as 12.8 mg/L Aluminum (Al), 15.5 mg/L Iron (Fe) and other pollutants have been found in the water samples of Karnaphuli. Continuous water pollution values were visualized using GIS interpolation maps, which showed a higher level of pollution in shipwrecking regions near the coast. Multiple linear regression (MLR) and principal component regression (PCR) were identified as the most effective models for predicting the variability of water quality parameters for this study based on remote sensing reflectance data. The satellite reflectance of Sentinel-2A bands produced significant results and predicted 58% (highest) of the variability of total suspended solids (TSS) and 43% (lowest) of the variability of pH in the Karnaphuli River. The interpolation maps aim to represent pollution levels more accurately than the raster calculation maps, as they incorporate spatial autocorrelation techniques based on observed values throughout the modeling process. This analysis provides insights into the dynamics of pollution, aids in prioritizing attention to reducing industrial discharges, encourages necessary infrastructural investments for sewage treatment, and further study and digitization of water quality measurement using remote sensing and machine learning."
    - title: "Modulation of internal tides properties off the Vitória–Trindade ridge during contrasted seasons from altimetry and a regional ocean model"
      authors: "Perrine Bauchot; Ariane Koch-Larrouy; Michel Tchilibou; Loren Carrère; Fabrice Hernandez; Guillaume Morvan; Jérôme Chanut"
      journal: "Ocean Science"
      published: "2026-06-26"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/os-22-2011-2026"
      url: "https://doi.org/10.5194/os-22-2011-2026"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：通过与中尺度涡流和其他瞬态海洋特征相互作用而产生的内潮汐的不相干部分仍然知之甚少且难以预测。这限制了我们准确表示这些波引起的能量转移和混合的能力。巴西大陆架外的维多利亚-特林达德海岭是研究这些过程的相关自然实验室，是一个中尺度活动强烈的区域内潮汐产生的热点。为了评估季节性分层和中尺度变率如何调节内潮汐，我们将 27 年的卫星测高记录与使用 NEMO v4 进行的高分辨率 (1/36°) 区域模拟进行了比较。 0.2. 这项联合分析使我们能够描述两种对比情况下内潮汐的产生、传播和消散的特征：以深密斜斜为特征的南方冬季（此处定义为五月至十月），以及以较浅且较尖锐的季节性密斜斜为特征的南方夏季（此处定义为十一月至四月）。模型和观测都描绘了从山脊向南传播的六个强烈的同相斜压通量光束。前两个光束的波长大约为 100 km，对应于传播模式 1，而更远的光束间隔仅约 50 km，这可能对应于传播模式 2。模型量化显示，夏季发电率比冬季高 5%–15%。耗散主要发生在海脊附近 (45%)，但也延伸到离岸 (40%)，达到 2-3 模 1 波长之外。 在开阔的海洋中，冬季的耗散强度高达 40%，导致与夏季相比，斜压通量在更短的距离内传播更弱。高度测量可确认波长和振幅的季节性变化，尤其是 2 型内潮汐。最后，记录了夏季条件下内潮汐与中尺度涡流之间相互作用的典型案例，显示了斜压通量的偏差和衍射。这项研究表明，中尺度变率和季节分层共同调节内潮汐的相干性和能量路径。这些发现对于改进非相干潮汐的预测和解释高分辨率高度观测至关重要。"
      summary_zh: "摘要：通过与中尺度涡流和其他瞬态海洋特征相互作用而产生的内潮汐的不相干部分仍然知之甚少且难以预测。这限制了我们准确表示这些波引起的能量转移和混合的能力。巴西大陆架外的维多利亚-特林达德海岭是研究这些过程的相关自然实验室，是一个中尺度活动强烈的区域内潮汐产生的热点。为了评估季节性分层和中尺度变率如何调节内潮汐，我们将 27 年的卫星测高记录与使用 NEMO v4 进行的高分辨率 (1/36°) 区域模拟进行了比较。 0.2. 这项联合分析使我们能够描述两种对比情况下内潮汐的产生、传播和消散的特征：以深密斜斜为特征的南方冬季（此处定义为五月至十月），以及以较浅且较尖锐的季节性密斜斜为特征的南方夏季（此处定义为十一月至四月）。模型和观测都描绘了从山脊向南传播的六个强烈的同相斜压通量光束。前两个光束的波长大约为 100 km，对应于传播模式 1，而更远的光束间隔仅约 50 km，这可能对应于传播模式 2。模型量化显示，夏季发电率比冬季高 5%–15%。耗散主要发生在海脊附近 (45%)，但也延伸到离岸 (40%)，达到 2-3 模 1 波长之外。 在开阔的海洋中，冬季的耗散强度高达 40%，导致与夏季相比，斜压通量在更短的距离内传播更弱。高度测量可确认波长和振幅的季节性变化，尤其是 2 型内潮汐。最后，记录了夏季条件下内潮汐与中尺度涡流之间相互作用的典型案例，显示了斜压通量的偏差和衍射。这项研究表明，中尺度变率和季节分层共同调节内潮汐的相干性和能量路径。这些发现对于改进非相干潮汐的预测和解释高分辨率高度观测至关重要。"
      summary_en: "Abstract: The incoherent fraction of internal tides, generated through interactions with mesoscale eddies and other transient oceanic features, remains poorly understood and challenging to predict. This limits our ability to accurately represent energy transfers and mixing induced by these waves. The Vitória–Trindade Ridge off the Brazilian shelf is a relevant natural laboratory to investigate these processes, as a hotspot for internal tides generation embedded in a region of intense mesoscale activity. To assess how seasonal stratification and mesoscale variability modulate internal tides, we compared a 27-year satellite altimetry record with a high-resolution (1/36°) regional simulation using NEMO v4.0.2. This joint analysis allows us to characterize the generation, propagation, and dissipation of internal tides under two contrasted regimes: austral winter (defined here from May to October) marked by a deep pycnocline, and austral summer (defined here from November to April) with a shallower and sharper seasonal pycnocline. Both model and observations depict six intense, in-phase beams of the baroclinic flux propagating southward from the ridge. The first two have a wavelength of 100 km approximately corresponding to the mode-1 of propagation, while more distant beams are spaced by about 50 km only, which likely corresponds to the mode-2 of propagation. Quantification from the model shows that generation rates are 5 %–15 % higher in summer than in winter. Dissipation occurs predominantly near the ridge (45 %) but also extends offshore (40 %), reaching beyond 2–3 mode-1 wavelengths. In the open ocean, dissipation is up to 40 % stronger in winter, leading to a weaker baroclinic flux propagating on shorter distances compared to summer. Altimetry confirms seasonal variations in both wavelength and amplitude, especially for mode-2 internal tides. Finally, a representative case of interaction between internal tides and a mesoscale eddy is documented under summer conditions, showing deviation and diffraction of the baroclinic flux. This study demonstrates that mesoscale variability and seasonal stratification jointly modulate the coherence and energy pathways of internal tides. These findings are essential for improving predictions of the incoherent tide and for interpreting high-resolution altimetric observations."

