      summary: "摘要：全球变暖和海平面上升导致的北极永久冻土退化可能引发正反馈，加剧气候变化。然而，由于我们对永久冻土气候反馈缺乏完整的了解，永久冻土系统如何响应仍然存在不确定性。最近地质历史中的快速变暖事件可以提供有价值的见解，以更好地限制这种反馈。在这里，我们对从斯瓦尔巴群岛北部大陆边缘取回的海洋沉积物岩心 HH11-09GC 进行了详细的生物地球化学研究。该核心跨越了过去约 30,000 年，包括一个富含在 Bølling-Allerød 间质沉积期间沉积的永久冻土衍生有机碳的单元。提供有关四醚脂质（支链和类异戊二烯甘油二烷基甘油四醚，GDGT）的新数据并扩展先前对 CuO 氧化产物（木质素酚；Nogarotto 等人 1038/s43247-023-01013-y）的研究，我们证明弱降解的陆地有机物可能在Bølling-Allerød 源自西伯利亚 Yedoma 永久冻土。在缓慢的侧向沉积物运输和海洋 GDGT 的原位生产过程中木质素酚的变化使我们无法添加有关该事件前后在研究地点输送的陆地物质来源的信息。这些发现凸显了由于气温和海平面上升导致永久冻土不稳定后可能出现严重碳循环扰动的可能性。我们的结果进一步强调了采用多代理方法来解决北极海洋环境中陆地碳输出的必要性，特别是在发生远距离传输时。"
      summary_zh: "摘要：全球变暖和海平面上升导致的北极永久冻土退化可能引发正反馈，加剧气候变化。然而，由于我们对永久冻土气候反馈缺乏完整的了解，永久冻土系统如何响应仍然存在不确定性。最近地质历史中的快速变暖事件可以提供有价值的见解，以更好地限制这种反馈。在这里，我们对从斯瓦尔巴群岛北部大陆边缘取回的海洋沉积物岩心 HH11-09GC 进行了详细的生物地球化学研究。该核心跨越了过去约 30,000 年，包括一个富含在 Bølling-Allerød 间质沉积期间沉积的永久冻土衍生有机碳的单元。提供有关四醚脂质（支链和类异戊二烯甘油二烷基甘油四醚，GDGT）的新数据并扩展先前对 CuO 氧化产物（木质素酚；Nogarotto 等人 1038/s43247-023-01013-y）的研究，我们证明弱降解的陆地有机物可能在Bølling-Allerød 源自西伯利亚 Yedoma 永久冻土。在缓慢的侧向沉积物运输和海洋 GDGT 的原位生产过程中木质素酚的变化使我们无法添加有关该事件前后在研究地点输送的陆地物质来源的信息。这些发现凸显了由于气温和海平面上升导致永久冻土不稳定后可能出现严重碳循环扰动的可能性。我们的结果进一步强调了采用多代理方法来解决北极海洋环境中陆地碳输出的必要性，特别是在发生远距离传输时。"
      summary_en: "Abstract: Degradation of Arctic permafrost due to global warming and sea level rise could trigger positive feedbacks, exacerbating climate change. However, uncertainties remain on how permafrost systems may respond because we lack a complete understanding of the permafrost‐climate feedback. Rapid warming events from the recent geological past can provide valuable insights to better constrain this feedback. Here, we present a detailed biogeochemical investigation of a marine sediment core HH11‐09GC, retrieved from the northern Svalbard continental margin. The core spans the last ∼30,000 years and includes a unit rich in permafrost‐derived organic carbon deposited during the Bølling‐Allerød interstadial. Presenting new data on tetraether lipids (branched and isoprenoid glycerol dialkyl glycerol tetraethers, GDGTs) and expanding previous investigations on CuO oxidation products (lignin phenols; Nogarotto et al., 2023, https://doi.org/10.1038/s43247‐023‐01013‐y ), we demonstrate that weakly degraded terrestrial organic matter likely advected via sea ice transport to the study site during the Bølling‐Allerød derives from Siberian Yedoma permafrost. Alteration of lignin phenols during slow lateral sediment transport and in situ production of marine GDGTs prevented us from adding information on the origin of terrestrial material delivered at the study site before and after this event. These findings highlight the potential for substantial carbon cycle perturbations following permafrost destabilization due to rising temperatures and sea levels. Our results further emphasize the necessity of a multi‐proxy approach to disentangle terrestrial carbon exports in Arctic marine environments, especially when long‐range transport occurs."
    - title: "Machine Learning Forecasts of Coastal Chlorophyll-a Based on Satellite and Model Data: A Case Assessment in the Northern Taiwan Strait"
      authors: "Yangcong Wu; Long Jiang; Heshan Lin; Chun Chen; Degang Jiang"
      journal: "Remote Sensing"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
