      tags_en: "phytoplankton; ocean colour"
      summary: "摘要：叶绿素-a (chl-a) 浓度是海洋生态系统状况、有害藻华和海洋初级生产力的主要指标。然而，在沿海水域，复杂的水动力和生态条件导致叶绿素a动态变化很大，由多种相互作用的机制驱动，这给叶绿素a的预测带来了巨大的挑战。为了评估机器学习方法在复杂沿海环境下预测叶绿素a的适用性，我们提出了台湾海峡的案例研究，该地区每年都会发生几次有害藻华。基于卫星遥感数据，应用时空插补和预测框架（STIMP）、时间模型（Transformer、CrossFormer、Tsmixer）和时空模型（MTGNN和PredRNN）来模拟chl-a时空变异性。将水动力-生物地球化学模型与这些机器学习方法进行比较，以评估沿海叶绿素-a 模拟中的模型技能。结果表明，使用卫星数据训练的机器学习模型在海上表现出合理的预测能力，具有明显的季节性变化和较低的数据缺失率，而在季节性信号被短期叶绿素a波动掩盖且缺失数据较多的地区，其性能会减弱。相比之下，水动力-生物地球化学模型代表了近岸地区叶绿素a的短期变化，具有较高的时间分辨率，并解释了浮游植物生物量积累和死亡的潜在机制。当使用模型输出进行训练时，机器学习方法在沿海叶绿素a预测方面表现出改进的性能，与水动力-生物地球化学模型相比，计算效率更高。 这项研究强调了机械和机器学习模型分别在破译沿海地区 Chl-a 变异的时空尺度和控制机制以及以计算效率提取时空变异方面的优势。如果输入数据具有足够的时间分辨率（例如，每天至 3 天）和持续时间（5-10 年），建议将机器学习和机械建模方法相结合来进行沿海浮游植物水华预测。"
      summary_zh: "摘要：叶绿素-a (chl-a) 浓度是海洋生态系统状况、有害藻华和海洋初级生产力的主要指标。然而，在沿海水域，复杂的水动力和生态条件导致叶绿素a动态变化很大，由多种相互作用的机制驱动，这给叶绿素a的预测带来了巨大的挑战。为了评估机器学习方法在复杂沿海环境下预测叶绿素a的适用性，我们提出了台湾海峡的案例研究，该地区每年都会发生几次有害藻华。基于卫星遥感数据，应用时空插补和预测框架（STIMP）、时间模型（Transformer、CrossFormer、Tsmixer）和时空模型（MTGNN和PredRNN）来模拟chl-a时空变异性。将水动力-生物地球化学模型与这些机器学习方法进行比较，以评估沿海叶绿素-a 模拟中的模型技能。结果表明，使用卫星数据训练的机器学习模型在海上表现出合理的预测能力，具有明显的季节性变化和较低的数据缺失率，而在季节性信号被短期叶绿素a波动掩盖且缺失数据较多的地区，其性能会减弱。相比之下，水动力-生物地球化学模型代表了近岸地区叶绿素a的短期变化，具有较高的时间分辨率，并解释了浮游植物生物量积累和死亡的潜在机制。当使用模型输出进行训练时，机器学习方法在沿海叶绿素a预测方面表现出改进的性能，与水动力-生物地球化学模型相比，计算效率更高。 这项研究强调了机械和机器学习模型分别在破译沿海地区 Chl-a 变异的时空尺度和控制机制以及以计算效率提取时空变异方面的优势。如果输入数据具有足够的时间分辨率（例如，每天至 3 天）和持续时间（5-10 年），建议将机器学习和机械建模方法相结合来进行沿海浮游植物水华预测。"
      summary_en: "Abstract: The chlorophyll-a (chl-a) concentration is a major indicator of marine ecosystem status, harmful algal blooms, and marine primary productivity. In coastal waters, however, complex hydrodynamic and ecological conditions lead to highly variable chl-a dynamics, driven by diverse and interacting mechanisms, posing substantial challenges for chl-a forecasts. To assess the applicability of machine learning approaches in predicting chl-a under complex coastal environments, we present a case study in the Taiwan Strait, where harmful algal blooms occur a few times every year. Based on satellite remote sensing data, a spatiotemporal imputation and prediction framework (STIMP), temporal models (Transformer, CrossFormer, Tsmixer), and spatiotemporal models (MTGNN and PredRNN) were applied to simulate chl-a spatiotemporal variability. A hydrodynamic–biogeochemical model was compared with these machine learning approaches to assess the model skills in coastal chl-a simulations. Results indicate that machine learning models trained with satellite data exhibit reasonable predictive skill offshore with pronounced seasonal variability and low data missing ratio, while their performance weakens in regions where seasonal signals are masked by short-term chl-a fluctuations with more missing data. In contrast, the hydrodynamic–biogeochemical model represents short-term variations in chl-a in nearshore regions with higher temporal resolution and accounts for the underlying mechanisms of phytoplankton biomass accumulation and die-off. When trained with model output, the machine learning approach shows improved performance in coastal chl-a forecasts, with much higher computational efficiency compared to the hydrodynamic–biogeochemical model. This study highlights the advantage of mechanistic and machine learning models in deciphering the spatiotemporal scales and governing mechanisms of chl-a variability in coastal regions and extracting spatiotemporal variability with computational efficiency, respectively. With input data of sufficient temporal resolution (e.g., daily to 3 days) and duration (5–10 years), a combination of the machine learning and mechanistic modeling approaches is recommended for operational coastal phytoplankton bloom forecasting."
    - title: "Robust Segmentation of Mangrove in Remote Sensing Images via ODE-Based Neural Networks and Adversarial Training"
      authors: "Hao Yu; Xiaoyan Pan; Tingtian Wu; Yiqing Chen; Yuanling Li; Xiaohua Chen; Junjie Hu; Zongzhu Chen"
      journal: "Applied Sciences"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/app16125812"
      url: "https://doi.org/10.3390/app16125812"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：红树林生态系统因其卓越的碳固存潜力和对沿海生态平衡的重要贡献而受到认可。然而，红树林面积急剧减少，需要通过遥感进行有效监测。虽然深度神经网络（DNN）在分割任务中表现出色，但其鲁棒性仍然不足。这种限制源于缺乏关于逐层离散变换的连续性的理论保证，渲染模型不仅容易受到人为的对抗性攻击，而且还容易受到自然退化的影响。为了解决这些漏洞，本文利用神经常微分方程（NODE）来增强红树林分割的鲁棒性。我们设计并集成了各种 NODE 架构，包括受自适应特征重新校准启发的新颖的 NODE-SE-Block，以实现更稳定的特征表示。至关重要的是，我们的研究结果表明，通过采用基于已知攻击的对抗性训练框架，NODE 集成网络表现出了卓越的跨域鲁棒性。它不仅可以防御恶意攻击，还可以显着增强对自然退化（例如高斯噪声和传感器引起的伪影）的恢复能力。红树林数据集的实验结果验证了所提出的方法为关键任务场景中的生态管理提供了可靠且抗干扰的基础。"
      summary_zh: "摘要：红树林生态系统因其卓越的碳固存潜力和对沿海生态平衡的重要贡献而受到认可。然而，红树林面积急剧减少，需要通过遥感进行有效监测。虽然深度神经网络（DNN）在分割任务中表现出色，但其鲁棒性仍然不足。这种限制源于缺乏关于逐层离散变换的连续性的理论保证，渲染模型不仅容易受到人为的对抗性攻击，而且还容易受到自然退化的影响。为了解决这些漏洞，本文利用神经常微分方程（NODE）来增强红树林分割的鲁棒性。我们设计并集成了各种 NODE 架构，包括受自适应特征重新校准启发的新颖的 NODE-SE-Block，以实现更稳定的特征表示。至关重要的是，我们的研究结果表明，通过采用基于已知攻击的对抗性训练框架，NODE 集成网络表现出了卓越的跨域鲁棒性。它不仅可以防御恶意攻击，还可以显着增强对自然退化（例如高斯噪声和传感器引起的伪影）的恢复能力。红树林数据集的实验结果验证了所提出的方法为关键任务场景中的生态管理提供了可靠且抗干扰的基础。"
      summary_en: "Abstract: Mangrove ecosystems are recognized for their exceptional carbon sequestration potential and crucial contribution to coastal ecological balance. However, the sharp decline in mangrove area necessitates efficient monitoring via remote sensing. While Deep Neural Networks (DNNs) have excelled in segmentation tasks, their robustness remains inadequate. This limitation stems from the lack of theoretical guarantees regarding the continuity of layer-by-layer discrete transformations, rendering models susceptible not only to man-made adversarial attacks but also to natural degradations. To address these vulnerabilities, this paper leverages Neural Ordinary Differential Equations (NODEs) to enhance the robustness of mangrove segmentation. We designed and integrated various NODE architectures, including a novel NODE-SE-Block inspired by adaptive feature recalibration, to achieve more stable feature representations. Crucially, our findings reveal that by employing an adversarial training framework based on known attacks, the NODE-integrated network demonstrates superior cross-domain robustness. It not only defends against malicious exploits but also exhibits significantly enhanced resilience toward natural degradations, such as Gaussian noise and sensor-induced artifacts. Experimental results on mangrove datasets verify that the proposed methodology provides a reliable and interference-resistant foundation for ecological management in mission-critical scenarios."
    - title: "Improved YOLOv8n Model for Remote Sensing Target Detection of Maritime Ships"
      authors: "Min Yang; Hanyu Wang; Xiaodan Wang; Nenghui Zhang"
      journal: "Engineering Research Express"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1088/2631-8695/ae7aef"
      url: "https://doi.org/10.1088/2631-8695/ae7aef"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：遥感图像视野开阔、覆盖范围广，可以实现大范围的实时监控。这使它们成为海上目标探测的绝佳选择。然而，遥感图像中的船舶目标经常表现出尺寸小、纹理模糊、边缘不清晰等特征。此外，海面背景经常受到波纹和阳光反射等因素的干扰。因此，提出了一种基于叠加滤波的数据处理方法，并结合改进的You Only Look Once版本8n模型进行目标检测。通过引入中值滤波和双边滤波的组合算法，提高了船舶目标的图像质量和细节保留能力，从而为目标检测模型提供更清晰的输入数据。实验结果表明，改进的YOLOv8n在海上船舶检测任务中表现良好。它的准确率达到 91%，召回率达到 88%，F1 分数达到 88%。此外，它在推理时间和错误率上也处于领先地位。该算法显着提高了模型的整体性能。这些发现表明，引入的模型为海上船只的目标检测提供了一种高效且精确的方法。可以促进海洋船舶的发展和建设。"
      summary_zh: "摘要：遥感图像视野开阔、覆盖范围广，可以实现大范围的实时监控。这使它们成为海上目标探测的绝佳选择。然而，遥感图像中的船舶目标经常表现出尺寸小、纹理模糊、边缘不清晰等特征。此外，海面背景经常受到波纹和阳光反射等因素的干扰。因此，提出了一种基于叠加滤波的数据处理方法，并结合改进的You Only Look Once版本8n模型进行目标检测。通过引入中值滤波和双边滤波的组合算法，提高了船舶目标的图像质量和细节保留能力，从而为目标检测模型提供更清晰的输入数据。实验结果表明，改进的YOLOv8n在海上船舶检测任务中表现良好。它的准确率达到 91%，召回率达到 88%，F1 分数达到 88%。此外，它在推理时间和错误率上也处于领先地位。该算法显着提高了模型的整体性能。这些发现表明，引入的模型为海上船只的目标检测提供了一种高效且精确的方法。可以促进海洋船舶的发展和建设。"
      summary_en: "Abstract: Remote sensing images boast a broad field of view and extensive coverage, allowing for real-time monitoring across vast areas. This makes them an excellent choice for maritime target detection. Nevertheless, ship targets in remote sensing images frequently exhibit traits like small size, faint textures, and indistinct edges. Additionally, the sea surface background is often disrupted by factors such as ripples and sunlight reflections. Therefore, a data processing method based on superposition filtering is proposed, combined with an improved You Only Look Once version 8n model for object detection. By introducing a combination algorithm of median filtering and bilateral filtering, the image quality and detail preservation ability of ship targets are improved, thereby providing clearer input data for object detection models. The experiment outcomes reveal that the proposed improved YOLOv8nperforms well in maritime ship detection tasks. It achieves an accuracy of 91%, a recall of 88%, and a F1 score of 88%. In addition, it also takes the lead in inference time and error rate. The algorithm significantly improves the overall performance of the model. These findings reveal that the introduced model provides a highly efficient and precise approach for target detection of maritime vessels. It can promote the development and construction of maritime vessels."
    - title: "In Situ Stress Control on Coal Reservoir Permeability and Hydraulic Fracturing Fracture Propagation: A Case Study in Yangquan Mining Area, Northeastern Qinshui Basin, China"
      authors: "Ben Ma; Xiaoyang Zhang; Dawei Lv; Miao Liu; Xunzhong Du; Junjian Zhang; Han Wang; Dongdong Wang"
      journal: "Processes"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/pr14121867"
      url: "https://doi.org/10.3390/pr14121867"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "vertical structure"
      tags_zh: "vertical structure"
      tags_en: "vertical structure"
      summary: "摘要：渗透率是控制煤层气产量的关键因素，水力压裂是低渗透煤储层增透的关键技术。地应力在煤储层渗透率演化和水力裂缝扩展中起着主导作用。以沁水盆地东北部阳泉矿区为研究区，综合注入/塌陷井测试和微地震监测数据，研究地应力对煤储层渗透率和水力裂缝几何形状的控制作用。结果表明，地应力和储层压力普遍随埋深的增加而增大。实测最大、最小水平主应力范围为4. 64 MPa，垂向主应力范围为6。地层压力范围为0. 09 MPa，平均值为2。侧向应力系数(λ)范围为0. 89)，呈现浅层分散、深层汇聚的格局。区域应力形态以走滑断层为主，约60. 5%的较深测点具有σ_H > σ_v > σ_h 特征。煤层渗透率范围为0. 62 mD，并随着有效应力的增加呈指数下降。煤层厚度对渗透率的控制作用表现出明显的分段特征。 23次水力压裂微震监测结果表明，约74%的裂缝走向NE5～NE55°，与区域最大水平主应力方向一致。裂缝长度范围为 124. 7 m，裂缝高度范围为 12. 7 m。 所有诱导骨折主要是垂直的。较大的水平主应力差与较低的渗透率相关，并促进了更长和更平面的水力裂缝的形成。这些结果表明，区域地应力场对煤储层渗透率和水力压裂形态均具有显着控制作用，为基于应力的煤层气开发和水力压裂设计提供了重要指导。"
      summary_zh: "摘要：渗透率是控制煤层气产量的关键因素，水力压裂是低渗透煤储层增透的关键技术。地应力在煤储层渗透率演化和水力裂缝扩展中起着主导作用。以沁水盆地东北部阳泉矿区为研究区，综合注入/塌陷井测试和微地震监测数据，研究地应力对煤储层渗透率和水力裂缝几何形状的控制作用。结果表明，地应力和储层压力普遍随埋深的增加而增大。实测最大、最小水平主应力范围为4. 64 MPa，垂向主应力范围为6。地层压力范围为0. 09 MPa，平均值为2。侧向应力系数(λ)范围为0. 89)，呈现浅层分散、深层汇聚的格局。区域应力形态以走滑断层为主，约60. 5%的较深测点具有σ_H > σ_v > σ_h 特征。煤层渗透率范围为0. 62 mD，并随着有效应力的增加呈指数下降。煤层厚度对渗透率的控制作用表现出明显的分段特征。 23次水力压裂微震监测结果表明，约74%的裂缝走向NE5～NE55°，与区域最大水平主应力方向一致。裂缝长度范围为 124. 7 m，裂缝高度范围为 12. 7 m。 所有诱导骨折主要是垂直的。较大的水平主应力差与较低的渗透率相关，并促进了更长和更平面的水力裂缝的形成。这些结果表明，区域地应力场对煤储层渗透率和水力压裂形态均具有显着控制作用，为基于应力的煤层气开发和水力压裂设计提供了重要指导。"
      summary_en: "Abstract: Permeability is the key factor controlling coalbed methane (CBM) production, and hydraulic fracturing is an essential technique for permeability enhancement in low-permeability coal reservoirs. In situ stress plays a dominant role in both coal reservoir permeability evolution and hydraulic fracture propagation. By taking the Yangquan Mining Area in the northeastern Qinshui Basin, China, as the study area, this study integrated injection/falloff well testing and microseismic monitoring data to investigate the controlling effect of in situ stress on coal reservoir permeability and hydraulic fracture geometry. The results show that the in situ stress and reservoir pressure generally increase with burial depth. The measured maximum and minimum horizontal principal stresses ranged from 4.04 to 23.41 MPa and 3.72 to 13.24 MPa, with average values of 14.54 MPa and 8.64 MPa, respectively, while the vertical principal stress ranged from 6.50 to 19.87 MPa, averaging 13.31 MPa. The reservoir pressure ranged from 0.55 to 6.09 MPa, with an average value of 2.32 MPa. The lateral stress coefficient (λ) ranged from 0.45 to 1.68 (average of 0.89), exhibiting a pattern of dispersion in shallow strata and convergence in deeper strata. The regional stress regime is dominated by strike-slip faulting, with approximately 60.5% of the deeper measurement points characterized by σ_H > σ_v > σ_h. The coal seam permeability ranged from 0.03 to 15.52 mD, with an average value of 1.62 mD, and decreased exponentially with increasing effective stress. The controlling effect of the coal seam thickness on the permeability exhibited distinct segmented characteristics. The microseismic monitoring results from 23 hydraulic fracturing treatments indicate that approximately 74% of the fractures trended NE5–NE55°, consistent with the regional maximum horizontal principal stress direction. The fracture lengths ranged from 124.9 to 447.7 m, with an average of 344.7 m, while the fracture heights ranged from 12.9 to 79.09 m. All the induced fractures were predominantly vertical. A greater horizontal principal stress difference was associated with a lower permeability and promoted the formation of longer and more planar hydraulic fractures. These results demonstrate that the regional in situ stress field exerts significant control on both the coal reservoir permeability and hydraulic fracture morphology, providing important guidance for stress-based optimization of CBM development and hydraulic fracturing design."
    - title: "Marine Heatwaves in the Arabian Sea: Drivers and Impacts on Atmospheric Circulation and Extreme Precipitation"
      authors: "D. L. Suhas; Weiqing Han; Toshiaki Shinoda; Rui Sun; Aneesh Subramanian; Mark Bourassa; Michael Alexander"
      journal: "Journal of Climate"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1175/jcli-d-25-0458.1"
      url: "https://doi.org/10.1175/jcli-d-25-0458.1"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "marine heatwaves"
      tags_zh: "marine heatwaves"
      tags_en: "marine heatwaves"
      summary: "摘要：海洋热浪 (MHW) 威胁海洋生态系统并严重影响天气模式。在阿拉伯海，夏季重灾区特别令人关注，因为它们对印度夏季风的潜在影响，而印度夏季风是近十亿人的生命线。然而，这些MHW的驱动因素及其对大气环流和季风降雨的影响仍然知之甚少。利用卫星观测、再分析数据集和数值模型实验，我们研究了 MHW 的关键驱动因素并评估其影响。当海温变暖趋势保持不变时，阿拉伯海东部和北部将成为水温热点，在 1982 年至 2023 年期间显示出快速增加，这主要是由于人为变暖。在消除海温趋势以消除人为变暖对个别MHW的影响后，我们发现大多数MHW都是短暂的（持续≤20天），并且是由增强的表面短波辐射和减少的潜热损失引发的，这些潜热损失与北方夏季季节内振荡（BSISO）的对流阶段受到抑制有关。年际海温异常 (SSTA)，包括 ENSO 和印度洋偶极子 (IOD)，进一步调节了 MHW 的逐年变化。相反，MHW期间的温暖海温异常会产生强烈的大气反馈。阿拉伯海东部的重水天气会驱动气旋风，加剧水汽汇聚，并增加印度西南海岸极端降水的风险。在阿拉伯海北部，MHW 引发的气旋在印度西北部和巴基斯坦引发强降雨，导致 2022 年巴基斯坦洪水等极端事件。这些发现提高了我们预测阿拉伯海MHW并评估其风险的能力，提供了显着的社会经济和生态效益。"
      summary_zh: "摘要：海洋热浪 (MHW) 威胁海洋生态系统并严重影响天气模式。在阿拉伯海，夏季重灾区特别令人关注，因为它们对印度夏季风的潜在影响，而印度夏季风是近十亿人的生命线。然而，这些MHW的驱动因素及其对大气环流和季风降雨的影响仍然知之甚少。利用卫星观测、再分析数据集和数值模型实验，我们研究了 MHW 的关键驱动因素并评估其影响。当海温变暖趋势保持不变时，阿拉伯海东部和北部将成为水温热点，在 1982 年至 2023 年期间显示出快速增加，这主要是由于人为变暖。在消除海温趋势以消除人为变暖对个别MHW的影响后，我们发现大多数MHW都是短暂的（持续≤20天），并且是由增强的表面短波辐射和减少的潜热损失引发的，这些潜热损失与北方夏季季节内振荡（BSISO）的对流阶段受到抑制有关。年际海温异常 (SSTA)，包括 ENSO 和印度洋偶极子 (IOD)，进一步调节了 MHW 的逐年变化。相反，MHW期间的温暖海温异常会产生强烈的大气反馈。阿拉伯海东部的重水天气会驱动气旋风，加剧水汽汇聚，并增加印度西南海岸极端降水的风险。在阿拉伯海北部，MHW 引发的气旋在印度西北部和巴基斯坦引发强降雨，导致 2022 年巴基斯坦洪水等极端事件。这些发现提高了我们预测阿拉伯海MHW并评估其风险的能力，提供了显着的社会经济和生态效益。"
      summary_en: "Abstract: Marine heatwaves (MHWs) threaten marine ecosystems and significantly impact weather patterns. In the Arabian Sea, summer MHWs are of particular concern due to their potential impacts on the Indian summer monsoon, a lifeline for nearly a billion people. However, the drivers of these MHWs and their influence on atmospheric circulation and monsoon rainfall remain poorly understood. Using satellite observations, reanalysis datasets, and numerical model experiments, we investigate the key drivers ofMHWsand assess their impacts. When SSTwarming trends are retained, the eastern and northern Arabian Sea emerge asMHWhotspots, showing rapid increases during 1982–2023, largely due to anthropogenic warming. After detrending the SST to remove the influence of anthropogenic warming on individual MHWs, we find that most MHWs are short-lived (lasting ≤ 20 days) and are initiated by enhanced surface shortwave radiation and reduced latent heat loss associated with the suppressed convection phases of the Boreal Summer Intraseasonal Oscillation (BSISO). Interannual SST anomalies (SSTAs), including ENSO and Indian Ocean Dipole (IOD), further modulate the year-to-year MHW variability. Conversely, the warmSSTAs duringMHWsexert strong atmospheric feedbacks. MHWsin the eastern Arabian Sea drive cyclonic winds, intensify moisture convergence and increase the risk of extreme precipitation along the southwest coast of India. In the northern Arabian Sea, MHW-induced cyclones trigger intense rainfall over northwestern India and Pakistan, contributing to extreme events like the 2022 Pakistan floods. These findings improve our capacity to predict Arabian Sea MHWs and assess their risks, offering significant socio-economic and ecological benefits."
