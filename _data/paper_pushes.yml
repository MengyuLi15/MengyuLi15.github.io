      summary: "摘要：0 数据库，非球形和不均匀气溶胶和冰颗粒的单散射特性的综合汇编。该数据库满足了社区在遥感算法、辐射传输模型、数据同化系统和气候预测中改进大气颗粒（特别是气溶胶和冰晶）表示的关键需求。 0 通过采用先进的计算电磁方法（例如不变嵌入 T 矩阵方法和基于超球体几何形状的复杂粒子模型）超越了传统的过度简化的近似。它涵盖主要气溶胶类型，包括灰尘、黑碳和海盐以及冰晶，覆盖 0. 3–20 μm 的宽光谱范围（冰晶延伸至 100 μm）。所有模型都经过实验室测量和/或遥感观测的严格验证，建立了 ZJU-SCATT-V1。 0作为粒子微观物理和宏观辐射影响之间的重要桥梁。为了最大限度地提高可访问性和实用性，数据库及其神经网络模拟器被集成到深时数字地球计划平台中。我们欢迎社区反馈来评估和改进 ZJU-SCATT-V1。"
      summary_zh: "摘要：0 数据库，非球形和不均匀气溶胶和冰颗粒的单散射特性的综合汇编。该数据库满足了社区在遥感算法、辐射传输模型、数据同化系统和气候预测中改进大气颗粒（特别是气溶胶和冰晶）表示的关键需求。 0 通过采用先进的计算电磁方法（例如不变嵌入 T 矩阵方法和基于超球体几何形状的复杂粒子模型）超越了传统的过度简化的近似。它涵盖主要气溶胶类型，包括灰尘、黑碳和海盐以及冰晶，覆盖 0. 3–20 μm 的宽光谱范围（冰晶延伸至 100 μm）。所有模型都经过实验室测量和/或遥感观测的严格验证，建立了 ZJU-SCATT-V1。 0作为粒子微观物理和宏观辐射影响之间的重要桥梁。为了最大限度地提高可访问性和实用性，数据库及其神经网络模拟器被集成到深时数字地球计划平台中。我们欢迎社区反馈来评估和改进 ZJU-SCATT-V1。"
      summary_en: "Abstract: We introduce the ZJU–SCATT–V1.0 database, a comprehensive compilation of single–scattering properties for non–spherical and inhomogeneous aerosol and ice particles. This database addresses a critical community need for improved representation of atmospheric particles, particularly aerosols and ice crystals, in remote sensing algorithms, radiative transfer models, data assimilation systems, and climate projections. ZJU–SCATT–V1.0 transcends traditional oversimplified approximations by employing advanced computational electromagnetic methods, such as the invariant imbedding T–matrix method, and sophisticated particle models based on super–spheroidal geometries. It encompasses major aerosol types including dust, black carbon, and sea salt, as well as ice crystals, covering a broad spectral range of 0.3–20 μm (extending to 100 μm for ice crystals). All models have been rigorously validated against laboratory measurements and/or remote sensing observations, establishing ZJU–SCATT–V1.0 as a vital bridge between particle microphysics and macroscopic radiative impacts. To maximize accessibility and utility, the database as well as its neural network emulator are integrated into the Deep–time Digital Earth Program platform. We welcome community feedback to evaluate and improve the ZJU–SCATT–V1.0 for diverse applications."
    - title: "Spatiotemporal Patterns and Physical Drivers of Satellite-derived Chlorophyll-a in the Aegean Sea"
