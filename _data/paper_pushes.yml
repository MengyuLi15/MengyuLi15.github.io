      summary: "摘要：贻贝水产养殖通常被认为是环境可持续的，因为它具有过滤颗粒和回收养分的潜力，但其对沿海水质的大规模影响仍然难以量化，特别是在马尔马拉海等复杂且高度变化的系统中。在此，实施了基于安装的分析框架，利用 Google Earth Engine 中处理的 Sentinel-2 卫星观测数据来评估贻贝养殖场与浊度和叶绿素动态的潜在关联。马尔马拉海南部的 21 个贻贝养殖场通过高分辨率 Google 地球图像（最近的图像年份：2025 年）得到确认和数字化，并使用行政信息支持的时间序列图像解释来指定大约的安装年份。 控制区域被定义为每个农场周围 1-3 公里的环形缓冲区，以提高可解释性。浊度 (B3/B2) 和归一化叶绿素指数 (NDCI) 源自 2018 年、2020 年、2022 年和 2024 年 Sentinel-2 表面反射率复合材料的年度和月度中位数。年度规模分析（方差分析和线性回归）检测到安装前后没有显着的统计差异 (p>0. 05)，并且与安装后的时间没有显着关系。然而，春季开花期（3 月至 5 月）的季节性比较显示，农场区域相对于对照区域经常出现叶绿素负差异，尽管幅度有限且在统计上并不始终强劲。 总体而言，结果表明，马尔马拉海与贻贝相关的信号取决于尺度和季节：可能与过滤相关过程一致的模式在高生产力条件下更为明显，但在很大程度上被强烈的区域变异和混合以及沿海光学遥感的已知不确定性所掩盖。"
      summary_zh: "摘要：贻贝水产养殖通常被认为是环境可持续的，因为它具有过滤颗粒和回收养分的潜力，但其对沿海水质的大规模影响仍然难以量化，特别是在马尔马拉海等复杂且高度变化的系统中。在此，实施了基于安装的分析框架，利用 Google Earth Engine 中处理的 Sentinel-2 卫星观测数据来评估贻贝养殖场与浊度和叶绿素动态的潜在关联。马尔马拉海南部的 21 个贻贝养殖场通过高分辨率 Google 地球图像（最近的图像年份：2025 年）得到确认和数字化，并使用行政信息支持的时间序列图像解释来指定大约的安装年份。 控制区域被定义为每个农场周围 1-3 公里的环形缓冲区，以提高可解释性。浊度 (B3/B2) 和归一化叶绿素指数 (NDCI) 源自 2018 年、2020 年、2022 年和 2024 年 Sentinel-2 表面反射率复合材料的年度和月度中位数。年度规模分析（方差分析和线性回归）检测到安装前后没有显着的统计差异 (p>0. 05)，并且与安装后的时间没有显着关系。然而，春季开花期（3 月至 5 月）的季节性比较显示，农场区域相对于对照区域经常出现叶绿素负差异，尽管幅度有限且在统计上并不始终强劲。 总体而言，结果表明，马尔马拉海与贻贝相关的信号取决于尺度和季节：可能与过滤相关过程一致的模式在高生产力条件下更为明显，但在很大程度上被强烈的区域变异和混合以及沿海光学遥感的已知不确定性所掩盖。"
      summary_en: "Abstract: Mussel aquaculture is often considered environmentally sustainable due to its potential to filter particles and recycle nutrients, yet its large-scale influence on coastal water quality remains difficult to quantify, especially in complex and highly variable systems such as the Sea of Marmara. Here, an installation-based analytical framework was implemented to evaluate potential mussel farm associations with turbidity and chlorophyll dynamics using Sentinel-2 satellite observations processed in Google Earth Engine. Twenty-one mussel farms in the southern Sea of Marmara were confirmed and digitized from high-resolution Google Earth imagery (most recent imagery year: 2025), and approximate installation years were assigned using time-series imagery interpretation supported by administrative information. Control areas were defined as a 1–3 km ring buffer around each farm to improve interpretability. Turbidity (B3/B2) and the Normalized Difference Chlorophyll Index (NDCI) were derived from annual and monthly median Sentinel-2 surface reflectance composites for 2018, 2020, 2022, and 2024. Annual-scale analyses (ANOVA and linear regression) detected no statistically significant pre- vs post-installation differences (p>0.05) and no significant relationships with time since installation. However, seasonal comparisons during the spring bloom period (March–May) revealed a recurrent negative chlorophyll difference in farm areas relative to controls, although the magnitude was limited and not consistently statistically strong. Overall, results indicate that mussel-related signals in the Sea of Marmara are scale- and season-dependent: patterns that may be consistent with filtration-related processes were more apparent under high-productivity conditions but are largely masked by strong regional variability and mixing, as well as known uncertainties in coastal optical remote sensing."
