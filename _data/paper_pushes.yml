      tags: "carbon pump; POC/DOC; physical injection pump"
      tags_zh: "carbon pump; POC/DOC; physical injection pump"
      tags_en: "carbon pump; POC/DOC; physical injection pump"
      summary: "单独量化 biological carbon pump 之外的物理注入泵。结果表明混合、夹卷和输运造成的 POC/DOC 输出不可忽略，carbon pump 研究不能只关注重力沉降。"
      summary_zh: "单独量化 biological carbon pump 之外的物理注入泵。结果表明混合、夹卷和输运造成的 POC/DOC 输出不可忽略，carbon pump 研究不能只关注重力沉降。"
      summary_en: "This paper quantifies the physical injection pump of organic carbon, separate from gravitational sinking. Mixing, entrainment and transport export substantial POC and DOC, showing that carbon-pump studies should not focus only on sinking particles."
