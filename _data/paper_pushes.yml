      published_month_zh: "2026-06"
      doi: "10.25073/2588-1094/vnuees.5462"
      url: "https://doi.org/10.25073/2588-1094/vnuees.5462"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：土壤盐分是一个严重的环境问题，直接影响作物生产力和农业可持续发展，特别是在气候变化背景下。本研究开发了一种低成本方法来绘制土壤电导率 (EC)，该方法基于机器学习与越南湄公河三角洲沿海平原地区永隆省槟椥地区的多源遥感数据。使用三种机器学习模型（CatBoost (CB)、随机森林 (RF)、XGBoost (XGB)）以及从 MODIS 图像、辅助数据和 CYGNSS 卫星的 GNSS-R 反射率数据中提取的 17 个输入变量。特征重要性分析表明，源自 CYGNSS 的表面反射率 (SR) 是三个最重要的预测因子之一。 性能比较显示了模型的学习能力和泛化性能之间的区别。在训练集上，CatBoost 表现出了卓越的学习能力 (R = 0. 89)，其次是 XGB (R = 0. 84) 和 RF (R = 0. 83)。然而，在验证集上，RF模型表现出最好的泛化性能，达到R = 0. 71。由此产生的盐度分布图显示出明显的空间趋势：盐度从西部内陆地区向东部沿海地区增加。研究结果证实了整合机器学习和 GNSS-R 数据进行土壤盐分监测的可行性。"
      summary_zh: "摘要：土壤盐分是一个严重的环境问题，直接影响作物生产力和农业可持续发展，特别是在气候变化背景下。本研究开发了一种低成本方法来绘制土壤电导率 (EC)，该方法基于机器学习与越南湄公河三角洲沿海平原地区永隆省槟椥地区的多源遥感数据。使用三种机器学习模型（CatBoost (CB)、随机森林 (RF)、XGBoost (XGB)）以及从 MODIS 图像、辅助数据和 CYGNSS 卫星的 GNSS-R 反射率数据中提取的 17 个输入变量。特征重要性分析表明，源自 CYGNSS 的表面反射率 (SR) 是三个最重要的预测因子之一。 性能比较显示了模型的学习能力和泛化性能之间的区别。在训练集上，CatBoost 表现出了卓越的学习能力 (R = 0. 89)，其次是 XGB (R = 0. 84) 和 RF (R = 0. 83)。然而，在验证集上，RF模型表现出最好的泛化性能，达到R = 0. 71。由此产生的盐度分布图显示出明显的空间趋势：盐度从西部内陆地区向东部沿海地区增加。研究结果证实了整合机器学习和 GNSS-R 数据进行土壤盐分监测的可行性。"
      summary_en: "Abstract: Soil salinity is a serious environmental problem, directly affecting crop productivity and sustainable agricultural development, especially in the context of climate change. This study develops a low-cost method for mapping soil electrical conductivity (EC), based on machine learning combined with multi-source remote sensing data for the Ben Tre area, Vinh Long province, a coastal plain region of the Mekong Delta, Vietnam. Three machine learning models (CatBoost (CB), Random Forest (RF), XGBoost (XGB)) were used with 17 input variables extracted from MODIS imagery, ancillary data, and GNSS-R reflectivity data from the CYGNSS satellite. Feature importance analysis revealed that Surface Reflectivity (SR) derived from CYGNSS was one of the three most important predictors. The performance comparison showed a distinction between the models' learning capabilities and their generalization performance. On the training set, CatBoost demonstrated superior learning capability (R = 0.89), followed by XGB (R = 0.84) and RF (R = 0.83). However, on the validation set, RF model showed the best generalization performance, achieving R = 0.71. The resulting salinity distribution map indicates a clear spatial trend: salinity increases from the inland Western areas to the coastal Eastern areas. The research results confirm the feasibility of integrating machine learning and GNSS-R data for soil salinity monitoring."

