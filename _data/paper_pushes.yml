      summary: "摘要：鄂尔多斯盆地深层煤层气资源丰富，其高效开发很大程度上依赖于大规模体积压裂技术的有效实施。为综合评价该盆地深层煤储层可压裂性，以本溪组8号煤层为研究对象。基于岩石力学实验和测井数据，建立多元线性回归模型来预测杨氏模量（E）和泊松比（μ）。应用Huang模型确定了煤层的三个主地应力。此外，综合脆性指数（BI）、水平应力差（Δσh）和抗拉强度（St）三个关键指标，构建了综合可压裂性评价模型。采用熵值评价法确定各指标的权重，计算出深层煤储层的可压裂指数（F）。结果表明，控制可压裂性的因素权重依次递减：抗拉强度（0. 332）、水平应力差（0. 8），盆地南北地区煤层，包括大宁—蓟县、神府、郏县、榆林北部和延川南部地区，可压裂性相对较好，而柳林北部和榆林南部则可压裂性较差。此外，可压裂指数呈现明显的正相关关系。根据这种关系，将深层煤储层分为三类：Ⅰ类储层（F > 0. 55），具有高可压裂性和高生产潜力； 55），具有中等可压裂性和中等生产潜力；和Ⅲ类水库（F"
      summary_zh: "摘要：鄂尔多斯盆地深层煤层气资源丰富，其高效开发很大程度上依赖于大规模体积压裂技术的有效实施。为综合评价该盆地深层煤储层可压裂性，以本溪组8号煤层为研究对象。基于岩石力学实验和测井数据，建立多元线性回归模型来预测杨氏模量（E）和泊松比（μ）。应用Huang模型确定了煤层的三个主地应力。此外，综合脆性指数（BI）、水平应力差（Δσh）和抗拉强度（St）三个关键指标，构建了综合可压裂性评价模型。采用熵值评价法确定各指标的权重，计算出深层煤储层的可压裂指数（F）。结果表明，控制可压裂性的因素权重依次递减：抗拉强度（0. 332）、水平应力差（0. 8），盆地南北地区煤层，包括大宁—蓟县、神府、郏县、榆林北部和延川南部地区，可压裂性相对较好，而柳林北部和榆林南部则可压裂性较差。此外，可压裂指数呈现明显的正相关关系。根据这种关系，将深层煤储层分为三类：Ⅰ类储层（F > 0. 55），具有高可压裂性和高生产潜力； 55），具有中等可压裂性和中等生产潜力；和Ⅲ类水库（F"
      summary_en: "Abstract: The Ordos Basin contains abundant deep coalbed methane (CBM) resources, whose efficient development largely depends on the effective implementation of large-scale volumetric fracturing technologies. To comprehensively evaluate the fracability of deep coal reservoirs in this basin, this study focuses on the No. 8 coal seam of the Benxi Formation. Based on rock mechanical experiments and well-logging data, multivariate linear regression models were established to predict Young’s modulus (E) and Poisson’s ratio (μ). The Huang model was applied to determine the three principal in situ stresses of the coal seam. Furthermore, a comprehensive fracability evaluation model was constructed by integrating three key indicators, namely brittleness index (BI), horizontal stress difference (Δσh), and tensile strength (St). The entropy evaluation method was used to determine the weights of these indicators, and the fracability index (F) of deep coal reservoirs was calculated. The results show that the weights of the factors controlling fracability decrease in the following order: tensile strength (0.434), brittleness index (0.332), and horizontal stress difference (0.234). The No. 8 coal seam in the northern and southern parts of the basin, including the Daning–Jixian, Shenfu, Jiaxian, northern Yulin, and southern Yanchuan areas, exhibits relatively favorable fracability, whereas northern Liulin and southern Yulin show comparatively poor fracability. In addition, the fracability index shows a clear positive correlation with the peak gas production of vertical CBM wells. Based on this relationship, the deep coal reservoirs were classified into three categories: Class I reservoirs (F > 0.55), characterized by high fracability and high production potential; Class II reservoirs (0.50 ≤ F ≤ 0.55), characterized by moderate fracability and moderate production potential; and Class III reservoirs (F"
    - title: "Marine Heatwave Trends in Eastern North America Waters Using a High‐Resolution (5‐km) SST Dataset"
