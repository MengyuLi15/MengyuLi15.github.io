    - title: "Stressed Overwintering Bottleneck Hypothesis: Ocean Warming and Acidification Synergistically Disrupt Arctic Zooplankton Overwintering"
      authors: "Jildou Dijkstra; Janne E. Søreide; Luise Schott; Nele Thomsen; Helena Reinardy; Mathieu Lutier; Khuong V. Dinh"
      journal: "Global Change Biology"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1002/gcb4.70022"
      url: "https://doi.org/10.1002/gcb4.70022"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：海洋变暖（OW）与大西洋深处温暖水团影响的增加有关，以及酸化（OA）正在重塑北极越冬栖息地的环境条件。然而，人们对它们潜在的协同效应知之甚少，特别是在极夜期间，海洋物种特别容易受到压力源的影响。在这里，我们测试了压力越冬瓶颈假说（SOBH），该假说预测，气候变暖会通过损害支撑生存和繁殖的健康相关特征，扰乱占主导地位的泛北极桡足类Calanus glacialis（一种关键的二次生产者）的越冬。在北极极夜期间，将 glacialis 调整到当前和预计的未来 OW 水平（0°C 和 4°C）和 OA 水平（pH 8. 3），持续 53 天。我们评估了生存、发育、生理（耗氧、脂质消耗）和分子机制（DNA 损伤以及与氧化应激和损伤修复相关的基因）。 glacialis 死亡率，而 OA 增加了桡足类在 0°C 的存活率。值得注意的是，正如 SOBH 所预测的，它们的综合效应 (OWA) 协同使死亡率加倍。变暖还加速了桡足类从 V 期到 12 月成年期的换羽，并增加了呼吸作用，导致脂质储备在 3 月初耗尽，大约在春季藻华爆发前 1-4 个月，进一步支持了 SOBH。 DNA 损伤和基因表达模式表明维护和损伤修复投资较低。总的来说，这些发现揭示了 OW 和 OA 通过增加死亡率、加速换羽、提高代谢率和导致早期脂质消耗来协同威胁越冬桡足类的机制。 这些影响造成越冬生存、能量储备、繁殖和初级生产之间的跨季节物候不匹配。像桡足类这样的主要次级生产者所面临的这种压力过冬的瓶颈，为水肥和水肥如何限制北极海洋食物网提供了解释。从更广泛的角度来看，SOBH 提供了一个概念框架，用于理解破坏食物网关键组成部分越冬的多种压力源如何重塑生态系统的生物多样性、生产力和营养转移。"
      summary_zh: "摘要：海洋变暖（OW）与大西洋深处温暖水团影响的增加有关，以及酸化（OA）正在重塑北极越冬栖息地的环境条件。然而，人们对它们潜在的协同效应知之甚少，特别是在极夜期间，海洋物种特别容易受到压力源的影响。在这里，我们测试了压力越冬瓶颈假说（SOBH），该假说预测，气候变暖会通过损害支撑生存和繁殖的健康相关特征，扰乱占主导地位的泛北极桡足类Calanus glacialis（一种关键的二次生产者）的越冬。在北极极夜期间，将 glacialis 调整到当前和预计的未来 OW 水平（0°C 和 4°C）和 OA 水平（pH 8. 3），持续 53 天。我们评估了生存、发育、生理（耗氧、脂质消耗）和分子机制（DNA 损伤以及与氧化应激和损伤修复相关的基因）。 glacialis 死亡率，而 OA 增加了桡足类在 0°C 的存活率。值得注意的是，正如 SOBH 所预测的，它们的综合效应 (OWA) 协同使死亡率加倍。变暖还加速了桡足类从 V 期到 12 月成年期的换羽，并增加了呼吸作用，导致脂质储备在 3 月初耗尽，大约在春季藻华爆发前 1-4 个月，进一步支持了 SOBH。 DNA 损伤和基因表达模式表明维护和损伤修复投资较低。总的来说，这些发现揭示了 OW 和 OA 通过增加死亡率、加速换羽、提高代谢率和导致早期脂质消耗来协同威胁越冬桡足类的机制。 这些影响造成越冬生存、能量储备、繁殖和初级生产之间的跨季节物候不匹配。像桡足类这样的主要次级生产者所面临的这种压力过冬的瓶颈，为水肥和水肥如何限制北极海洋食物网提供了解释。从更广泛的角度来看，SOBH 提供了一个概念框架，用于理解破坏食物网关键组成部分越冬的多种压力源如何重塑生态系统的生物多样性、生产力和营养转移。"
      summary_en: "Abstract: Ocean warming (OW), associated with increasing influence of warm Atlantic water masses at depth, and acidification (OA) are reshaping environmental conditions in Arctic overwintering habitats. However, their potential synergistic effects are poorly understood, especially during the Polar Night when marine species are particularly vulnerable to stressors. Here, we tested our Stressed Overwintering Bottleneck Hypothesis (SOBH) which predicts that warming disrupts the overwintering of the dominant pan‐Arctic copepod Calanus glacialis , a pivotal secondary producer, by impairing fitness‐related traits underpinning survival and reproduction. We exposed C. glacialis to current and projected future OW levels (0°C and 4°C) and OA levels (pH 8.0 and 7.4–7.3) for 53 days during the Arctic Polar Night. We assessed survival, development, and physiological (oxygen consumption, lipid depletion) and molecular mechanisms (DNA damage and genes related to oxidative stress and damage repair). OW alone did not affect C. glacialis mortality, while OA increased copepod survival at 0°C. Notably, their combined effects (OWA) synergistically doubled mortality, as predicted by SOBH. Warming also accelerated moulting from copepodite stage V to adulthood in December, and increased respiration, resulting in lipid reserves being exhausted by early March, approximately 1–4 months prior to the spring algal bloom, further supporting SOBH. DNA damage and gene expression patterns indicated low investment in maintenance and damage repair. Collectively, these findings reveal mechanisms by which OW and OA synergistically threaten overwintering Calanus copepods by increasing mortality, accelerating moulting, raising metabolic rates, and causing early lipid depletion. These effects generate cross‐seasonal phenological mismatches among overwintering survival, energy reserves, reproduction, and primary production. Such stressed overwintering bottlenecks in dominant secondary producers like Calanus copepods provide explanations for how OW and OA can constrict Arctic marine food webs. From a broader perspective, SOBH provides a conceptual framework for understanding how multiple stressors that disrupt overwintering in key food web components could reshape biodiversity, productivity and trophic transfer across ecosystems."
    - title: "External Organic Nitrogen Supply by Atmospheric Aerosols is Important Over the Northwest Pacific Ocean"
      authors: "Yujue Wang; Yue Jiang; Xu Yu; Chao Yu; Hongyan Bao; Shubin Li; Yizhe Yi; Lin Zheng; et al."
      journal: "Geophysical Research Letters"
      published: "2026-06-16"
      published_month: "2026-06"
