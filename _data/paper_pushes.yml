      summary_en: "Abstract: Abstract Anticyclonic eddies (ACEs) restructure resources and drive trophic cascades, yet depth-resolved effects on nanoflagellate bacterivory remain unclear. We quantify bacterivory by phago-mixotrophic nanophytoplankton (PMNP) and heterotrophic nanoflagellate (HNF) using fluorescent-bead incubations in a warm-core ACE in the South China Sea. Despite a 16% decline in nanoeukaryotes, PMNP abundance increases significantly (2.8× surface, 1.4× deep chlorophyll maximum (DCM), shifts toward larger cells, and elevates bacterial turnover and phago-mixotrophic production. HNF community grazing also increases at both euphotic depths despite similar per-cell rates, yielding impacts comparable to PMNP. Structural equation models link PMNP grazing to surface water-mass properties and nutrients and DCM turbidity, whereas HNF grazing tracks water-mass and prey/virus dynamics. In the mesopelagic zone, HNFs dominate; grazing HNF abundance increases 2.7× at 500 m and is associated with particulate beam attenuation coefficient, an in situ particle proxy. These findings reveal a depth-partitioned response coupling mesoscale forcing to microbial carbon processing."
    - title: "Research on the Effect of Polar Marine Microbial Carbon Pump and Its Response Mechanisms to Climate Change"
      authors: "Chengwen Sun"
      journal: "Theoretical and Natural Science"
      published: "2026-06-08"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.54254/2753-8818/2026.34179"
      url: "https://doi.org/10.54254/2753-8818/2026.34179"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "carbon pump; microbial carbon"
      tags_zh: "carbon pump; microbial carbon"
      tags_en: "carbon pump; microbial carbon"
      summary: "摘要：The polar marine microbial carbon pump (MCP) is a key component in global carbon sequestration and climate regulation systems. The research addresses the regulatory and adaptive principles of the polar marine MCP systems in response to climate change by conducting an integrated research on the microbial ecological, biogeochemical and environmental adaptation processes. We are focusing on the microbial communities in arctic and antarctic waters, their physiologic/evolutionary adaptation strategies and carbon transformation abilities under environmental change forcing. Our research has demonstrated that marine polar microorganisms have developed sophisticated strategies to survive in such a cold environment with responses of high expression of cryoprotectants, changes of cell membrane and metabolic pathways. The research suggests that anthropogenic global warming has dramatic effects on the efficiency of MCP due to shifts of thermal conditions, cryospheric processes and carbonate chemistry. Notably, our comparative study revealed that the polar region responses are different between polar regions as the Arctic had high metabolic flexibility, while Antarctic had high cold-adapted Arctic. These findings help us get valuable information regarding the sensitivity of polar carbon storage systems and potential feedbacks to climate."
