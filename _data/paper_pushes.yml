      tags_zh: "BGC-Argo; ocean colour; ocean optics; bio-optics; vertical structure"
      tags_en: "BGC-Argo; ocean colour; ocean optics; bio-optics; vertical structure"
      summary: "摘要：自主原位辐射观测越来越多地用于约束生物光学过程并验证卫星海洋颜色产品，例如遥感反射率和漫衰减系数。由于这些观测数据的收集与天气和海况条件无关，因此它们的应用关键取决于强大的质量控制。从 2012 年开始，BioGeoChemical-Argo (BGC-Argo) 计划在自主浮标上测量了三个波长的下降流辐照度 (Ed)。自 2022 年以来，由 12 个 BGC-Argo 浮标组成的试点阵列配备了测量 E d 和上升流辐射率 (L u ) 的 TriOS-RAMSES 高光谱辐射计，已部署在具有不同生物光学特性的公海区域。迄今为止，这些浮标已在当地中午附近每隔约 10 天获取了数百个 0-300 m 的高光谱剖面。本研究提出了一种由 BGC-Argo 浮标测量的高光谱 E d 和 Lu 剖面的自动质量控制 (QC) 方法，该方法建立在以前为多光谱辐射测量设计的 QC 程序的基础上。该方法标记由自阴影、大倾斜角、经过的云、波聚焦、尖峰引起的光场扰动，并校正暗电流信号。首先在五个关键波长（380、443、490、555 和 620 nm）上应用 QC，以沿每个垂直剖面生成特定于波长的标志，然后将其组合到每个光谱剖面的最终全局分类中，即“良好”、“可疑”或“不良”。本文及其 Python 代码和数据文件为社区提供了一种强大且计算高效的方法来评估高光谱 BGC-Argo 数据质量，为其进一步的生物光学应用做好准备。"
      summary_zh: "摘要：自主原位辐射观测越来越多地用于约束生物光学过程并验证卫星海洋颜色产品，例如遥感反射率和漫衰减系数。由于这些观测数据的收集与天气和海况条件无关，因此它们的应用关键取决于强大的质量控制。从 2012 年开始，BioGeoChemical-Argo (BGC-Argo) 计划在自主浮标上测量了三个波长的下降流辐照度 (Ed)。自 2022 年以来，由 12 个 BGC-Argo 浮标组成的试点阵列配备了测量 E d 和上升流辐射率 (L u ) 的 TriOS-RAMSES 高光谱辐射计，已部署在具有不同生物光学特性的公海区域。迄今为止，这些浮标已在当地中午附近每隔约 10 天获取了数百个 0-300 m 的高光谱剖面。本研究提出了一种由 BGC-Argo 浮标测量的高光谱 E d 和 Lu 剖面的自动质量控制 (QC) 方法，该方法建立在以前为多光谱辐射测量设计的 QC 程序的基础上。该方法标记由自阴影、大倾斜角、经过的云、波聚焦、尖峰引起的光场扰动，并校正暗电流信号。首先在五个关键波长（380、443、490、555 和 620 nm）上应用 QC，以沿每个垂直剖面生成特定于波长的标志，然后将其组合到每个光谱剖面的最终全局分类中，即“良好”、“可疑”或“不良”。本文及其 Python 代码和数据文件为社区提供了一种强大且计算高效的方法来评估高光谱 BGC-Argo 数据质量，为其进一步的生物光学应用做好准备。"
      summary_en: "Abstract: Autonomous in-situ radiometric observations are increasingly used to constrain bio-optical processes and validate satellite ocean-color products, such as remote sensing reflectance and diffuse attenuation coefficients. Because these observations are collected independently of weather and sea-state conditions, their application critically depends on robust quality control. Starting in 2012, the BioGeoChemical-Argo (BGC-Argo) program has measured downwelling irradiance (Ed) at three wavelengths on autonomous floats. Since 2022, a pilot array of 12 BGC-Argo floats equipped with TriOS-RAMSES hyperspectral radiometers measuring E d and upwelling radiance (L u ) has been deployed across open-ocean regions with diverse bio-optical properties. To date, these floats have acquired hundreds of hyperspectral profiles from 0–300 m at ∼10-day intervals near local noon. This study presents an automated Quality Control (QC) method for hyperspectral E d and L u profiles measured by BGC-Argo floats, building upon previous QC procedures designed for multispectral radiometry. The method flags perturbations in the light field caused by self-shading, large tilt angles, passing clouds, wave focusing, spikes, and corrects for dark current signals. The QC is first applied at five key wavelengths (380, 443, 490, 555, and 620 nm) to generate wavelength-specific flags along each vertical profile, which are then combined into a final global classification for each spectral profile as Good , Questionable , or Bad . This paper, along with its Python code and data files, provides the community with a robust and computationally efficient approach for assessing hyperspectral BGC-Argo data quality, preparing it for further bio-optical applications."
