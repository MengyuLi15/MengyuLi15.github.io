      summary: "摘要：海洋双壳类发挥着关键的生态和经济作用，但日益受到多种环境压力的挑战。尽管对个体压力源的影响进行了广泛的研究，但仍需要进行全面的审查，以综合当前的证据并阐明多种相互作用的压力源如何共同影响海洋双壳类的生理和恢复力。本综述整合了 2010 年至 2025 年的证据，涵盖 178 项同行评审的研究，强调气候变化驱动因素（变暖、缺氧、盐度和海洋酸化）、污染物（重金属、持久性有机污染物、内分泌干扰化学品、抗生素、纳米粒子、微塑料）和微生物组变化对未来水产养殖恢复力的综合和交互影响。根据 PRISMA 2020 指南，从 Web of Science、Scopus、PubMed 和 Google Scholar 系统检索文献。 20）揭示了 2018 年之后研究的快速增长，其特点是对贻贝、巨牡蛎和蛤仔的研究。对最近的证据进行了系统评估，结合了生理、分子和微生物研究的数据，特别关注对水产养殖的影响。分析表明，压力源很少单独行动。相反，它们的累积和相互作用效应会导致氧化应激、能量分配中断、宿主-微生物关系不稳定、耐受阈值降低以及其他生态生理后果。这些结果凸显了双壳类种群对快速沿海城市化、水质下降和沉积物污染的脆弱性。 该综述的结论是，可以通过抗逆基因型的选择性育种、污染物和微生物指标的综合监测以及指导适应性水产养殖管理的多组学方法来增强恢复力。"
      summary_zh: "摘要：海洋双壳类发挥着关键的生态和经济作用，但日益受到多种环境压力的挑战。尽管对个体压力源的影响进行了广泛的研究，但仍需要进行全面的审查，以综合当前的证据并阐明多种相互作用的压力源如何共同影响海洋双壳类的生理和恢复力。本综述整合了 2010 年至 2025 年的证据，涵盖 178 项同行评审的研究，强调气候变化驱动因素（变暖、缺氧、盐度和海洋酸化）、污染物（重金属、持久性有机污染物、内分泌干扰化学品、抗生素、纳米粒子、微塑料）和微生物组变化对未来水产养殖恢复力的综合和交互影响。根据 PRISMA 2020 指南，从 Web of Science、Scopus、PubMed 和 Google Scholar 系统检索文献。 20）揭示了 2018 年之后研究的快速增长，其特点是对贻贝、巨牡蛎和蛤仔的研究。对最近的证据进行了系统评估，结合了生理、分子和微生物研究的数据，特别关注对水产养殖的影响。分析表明，压力源很少单独行动。相反，它们的累积和相互作用效应会导致氧化应激、能量分配中断、宿主-微生物关系不稳定、耐受阈值降低以及其他生态生理后果。这些结果凸显了双壳类种群对快速沿海城市化、水质下降和沉积物污染的脆弱性。 该综述的结论是，可以通过抗逆基因型的选择性育种、污染物和微生物指标的综合监测以及指导适应性水产养殖管理的多组学方法来增强恢复力。"
      summary_en: "Abstract: Marine bivalves play pivotal ecological and economic roles but are increasingly challenged by multiple environmental stressors. Although there is extensive research on the effects of individual stressors, a comprehensive review is needed to synthesize current evidence and clarify how multiple interacting stressors collectively affect the physiology and resilience of marine bivalves. This review integrates evidence from 2010 to 2025, encompassing 178 peer‐reviewed studies emphasizing the combined and interactive impacts of climate change drivers (warming, hypoxia, salinity, and ocean acidification), pollutants (heavy metals, persistent organic pollutants, endocrine‐disrupting chemicals, antibiotics, nanoparticles, microplastics), and microbiome shifts on future aquaculture resilience. Literature was systematically retrieved from Web of Science, Scopus, PubMed, and Google Scholar in accordance with PRISMA 2020 guidelines. Bibliometric mapping (VOSviewer 1.6.20) revealed a rapid growth in research after 2018, characterized by studies on Mytilus , Crassostrea , and Ruditapes . A systematic evaluation of recent evidence was conducted, combining data from physiological, molecular, and microbial studies, with particular attention to implications for aquaculture. The analysis reveals that stressors rarely act alone. Instead, their cumulative and interactive effects cause oxidative stress, disrupted energy allocation, destabilized host‐microbe relationships, lowered tolerance thresholds, and other eco‐physiological consequences. These results highlight the vulnerability of bivalve populations to rapid coastal urbanization, declining water quality, and sediment contamination. The review concludes that resilience can be enhanced through selective breeding for stress‐tolerant genotypes, integrated monitoring of pollutants and microbial indicators, and multi‐omics approaches to guide adaptive aquaculture management."
    - title: "TEMPORAL ANALYSIS OF BIO-OPTICAL INDICATORS RELATED TO WATER QUALITY AT SEIXAS BEACH, NORTHEASTERN BRAZIL: AN EXPLORATORY STUDY USING SENTINEL-3 OLCI"
      authors: "Mariana Mirelly da Silva Sá; Raimundo Aprigio de Menezes Junior; Karina Massei"
