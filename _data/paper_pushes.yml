      summary_en: "Abstract: Perairan Pulau Laut memiliki potensi sumber daya laut dan kelautan yang cukup besar. Perairan di gugusan Pulau Laut telah dikaji untuk kelayakan budidaya laut (karamba, jaring apung) berdasarkan parameter oseanografi dan kimia perairan. Kawasan pesisir dan pulau kecil seperti Pulau Laut juga dilihat sebagai calon lokasi pengembangan ekowisata bahari. Penelitian ini bertujuan untuk menganalisis pengaruh fenomena El Nino Southern Oscillation (ENSO) terhadap variabilitas curah hujan dan konsentrasi klorofil-a di wilayah perairan Pulau Laut. Kajian ini tergolong baru, mengingat belum banyak studi sebelumnya yang secara spesifik membahas hubungan antara ENSO, curah hujan, dan klorofil-a di kawasan ini. Penelitian ini menggunakan data observasi berbasis satelit. Curah hujan dan klorofil yang dianalisis mencakup rentang waktu 16 tahun, yaitu dari 2007 hingga 2022, Data curah hujan tersebut diambil dari Global Satellite Measurement of Precipitation (GSMaP) yang tersedia melalui JAXA Global Rainfall Watch dengan resolusi spasial 0,10°. Data konsentrasi klorofil-a diperoleh dari produk Ocean Color CCI (OC-CCI) Level 3 Standard (L3S) yang disediakan oleh Marine Copernicus. Metode penelitian mengacu pada pendekatan kuantitatif sebagaimana dijelaskan oleh, di mana data numerik dianalisis secara statistik dan ditampilkan melalui grafik serta peta sebagai bentuk visualisasi. Seluruh data suhu, angin, klorofil, dan curah hujan diolah secara spasial menggunakan perangkat lunak IDL (Interactive Data Language). Analisis hubungan ENSO terhadap curah hujan dan klorofil-a di perairan Pulau Laut menunjukkan bahwa pada musim barat tidak terdapat hubungan signifikan antara ENSO dan curah hujan, ditunjukkan oleh nilai p sebesar 0,595 (>0,05) dengan korelasi -0,079 yang mencerminkan hubungan negatif sangat lemah. Pada musim timur hubungan tersebut menjadi signifikan, dengan p-value 0,008 dan korelasi -0,378, yang mengindikasikan bahwa semakin kuat El-Nino, curah h