    - title: "Cyanotoxin exposure as a novel risk factor for liver fibrosis and steatosis"
      authors: "Brenda Y. Hernandez; Xuemei Zhu; Ella Macatugal; Michelle Nagata; Keiko Garvin; Yvette C. Paulino; Lynne R. Wilkens; Linda L. Wong; et al."
      journal: "International Journal of Cancer"
      published: "2026-03-15"
      published_month: "2026-03"
      published_month_zh: "2026-03"
      doi: "10.1002/ijc.70446"
      url: "https://doi.org/10.1002/ijc.70446"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：蓝藻是普遍存在的环境细菌，能够产生蓝藻毒素，包括有效的肝脏肿瘤促进剂。对蓝藻毒素暴露及其在肝癌发病机制中的潜在作用的了解有限。一项横断面研究评估了蓝藻毒素暴露与进行性肝病的两个标志（肝纤维化和脂肪变性）的关系，该研究对夏威夷州和美国领土关岛的 399 名无癌症病史的成年居民进行了评估。使用直接竞争性酶联免疫吸附测定法分析唾液、血清和尿液中的微囊藻毒素 (MC)、结节藻毒素 (NOD)、圆柱精藻蛋白酶 (CYN) 和鱼腥肽 (AB)。通过瞬时弹性成像测量肝纤维化和脂肪变性。 在多元广义线性和加性模型中评估了蓝藻毒素水平与纤维化和脂肪变性程度的线性和非线性关联。在所有个体中均检测到一种或多种蓝藻毒素。 18% 存在中度至重度纤维化或肝硬化，53% 存在中度至重度脂肪变性。观察到唾液蓝藻毒素与纤维化水平呈正相关：MC/NOD（线性：β = 9. 07，95% 置信区间 [CI] 1. 32–16. 82，p = . 022；非线性 p = . 0011）； CYN（线性：β = 24. 21，95% CI 14. 12–34. 30，p p = . 0001）； AB（非线性 p = . 0125）。观察到血清 MC/NOD 与脂肪变性水平呈正相关（非线性 p = . 0120）。蓝藻毒素与纤维化的非线性关联特定于规定的浓度。 我们的新发现表明蓝藻毒素是肝病的独立危险因素，这与我们之前将口腔蓝藻与肝细胞癌联系起来的研究是一致的，并且可能对肝癌的预防具有全球意义。"
      summary_zh: "摘要：蓝藻是普遍存在的环境细菌，能够产生蓝藻毒素，包括有效的肝脏肿瘤促进剂。对蓝藻毒素暴露及其在肝癌发病机制中的潜在作用的了解有限。一项横断面研究评估了蓝藻毒素暴露与进行性肝病的两个标志（肝纤维化和脂肪变性）的关系，该研究对夏威夷州和美国领土关岛的 399 名无癌症病史的成年居民进行了评估。使用直接竞争性酶联免疫吸附测定法分析唾液、血清和尿液中的微囊藻毒素 (MC)、结节藻毒素 (NOD)、圆柱精藻蛋白酶 (CYN) 和鱼腥肽 (AB)。通过瞬时弹性成像测量肝纤维化和脂肪变性。 在多元广义线性和加性模型中评估了蓝藻毒素水平与纤维化和脂肪变性程度的线性和非线性关联。在所有个体中均检测到一种或多种蓝藻毒素。 18% 存在中度至重度纤维化或肝硬化，53% 存在中度至重度脂肪变性。观察到唾液蓝藻毒素与纤维化水平呈正相关：MC/NOD（线性：β = 9. 07，95% 置信区间 [CI] 1. 32–16. 82，p = . 022；非线性 p = . 0011）； CYN（线性：β = 24. 21，95% CI 14. 12–34. 30，p p = . 0001）； AB（非线性 p = . 0125）。观察到血清 MC/NOD 与脂肪变性水平呈正相关（非线性 p = . 0120）。蓝藻毒素与纤维化的非线性关联特定于规定的浓度。 我们的新发现表明蓝藻毒素是肝病的独立危险因素，这与我们之前将口腔蓝藻与肝细胞癌联系起来的研究是一致的，并且可能对肝癌的预防具有全球意义。"
      summary_en: "Abstract: Cyanobacteria are ubiquitous environmental bacteria capable of producing cyanotoxins, including potent liver tumor promoters. There is limited knowledge of exposure to cyanotoxins and their potential role in the pathogenesis of liver cancer The relationship of cyanotoxin exposure with two hallmarks of progressive liver disease—liver fibrosis and steatosis—was evaluated in a cross‐sectional study of 399 adult residents of the state of Hawaii and the US territory of Guam without a history of cancer. Microcystins (MC), nodularins (NOD), cylindrospermopsin (CYN), and anabaenopeptins (AB) were analyzed in saliva, serum, and urine using direct competitive enzyme‐linked immunosorbent assays. Liver fibrosis and steatosis were measured by transient elastography. Linear and non‐linear associations of cyanotoxin levels with degree of fibrosis and steatosis were evaluated in multivariate generalized linear and additive models. One or more cyanotoxins were variably detected in all individuals. Moderate to severe fibrosis or cirrhosis was present in 18% and moderate to severe steatosis in 53%. Positive associations with fibrosis level were observed for salivary cyanotoxins: MC/NOD (linear: β = 9.07, 95% confidence interval [CI] 1.32–16.82, p = .022; non‐linear p = .0011); CYN (linear: β = 24.21, 95% CI 14.12–34.30, p p = .0001); AB (non‐linear p = .0125). A positive association with steatosis level was observed for serum MC/NOD (non‐linear p = .0120). Non‐linear associations of cyanotoxins with fibrosis were specific to defined concentrations. Our novel findings suggesting that cyanotoxins are independent risk factors for liver disease are consistent with our prior study linking oral cyanobacteria to hepatocellular carcinoma and may have global implications for liver cancer prevention."
    - title: "Barrier layer formation and dynamics in the Red Sea based on Argo profiles and sea level anomaly analysis"
      authors: "Hadeel A. Alsayed; Mohammed A. Alsaafani; Turki M. Alraddadi"
      journal: "OCEANOLOGIA"
      published: "2026"
      published_month: "2026 (month not verified)"
      published_month_zh: "2026（月份未核准）"
      doi: "10.5697/uhuo2457"
      url: "https://doi.org/10.5697/uhuo2457"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "BGC-Argo; vertical structure"
      tags_zh: "BGC-Argo; vertical structure"
      tags_en: "BGC-Argo; vertical structure"
      summary: "摘要：本研究基于 2012 年至 2018 年 Argo 浮标观测并结合海平面异常 (SLA) 数据，首次对红海 (RS) 中的屏障层 (BL) 进行全面调查。 BL被定义为基于温度的混合层(MLT)和基于密度的混合层(MLD)之间的层。 RS 分为三个区域：北部 (26°N–22°N)、中部 (22°N–18°N) 和南部 (18°N–14°N)，以分析 BL 的时空变化。结果显示，冬季所有三个地区都存在 BL，其中 1 月至 2 月观察到最大厚度，到 4 月衰减，夏季几乎没有 BL。由于冬季降温和对流，BL 在北部最厚，盐度层化加深了 MLD 下方的 MLT。盆地中部较为温和、持续，南部较薄、持续时间较短。 浮力频率和盐度分析证实，盐分分层稳定了水柱并维持了屏障层。 SLA 数据用于检查中尺度涡流的影响，表明反气旋涡流（AE）通过会聚和下降流增加底线厚度，而气旋涡流（CE）倾向于通过浅化混合层来侵蚀底线厚度。在RS北部，CE内部有时会出现不寻常的深层混合层，这与冬季对流翻转一致。这些发现首次描述了 BL 特征，提高了我们对红海上层海洋动力学、垂直混合和气候相互作用的理解。"
      summary_zh: "摘要：本研究基于 2012 年至 2018 年 Argo 浮标观测并结合海平面异常 (SLA) 数据，首次对红海 (RS) 中的屏障层 (BL) 进行全面调查。 BL被定义为基于温度的混合层(MLT)和基于密度的混合层(MLD)之间的层。 RS 分为三个区域：北部 (26°N–22°N)、中部 (22°N–18°N) 和南部 (18°N–14°N)，以分析 BL 的时空变化。结果显示，冬季所有三个地区都存在 BL，其中 1 月至 2 月观察到最大厚度，到 4 月衰减，夏季几乎没有 BL。由于冬季降温和对流，BL 在北部最厚，盐度层化加深了 MLD 下方的 MLT。盆地中部较为温和、持续，南部较薄、持续时间较短。 浮力频率和盐度分析证实，盐分分层稳定了水柱并维持了屏障层。 SLA 数据用于检查中尺度涡流的影响，表明反气旋涡流（AE）通过会聚和下降流增加底线厚度，而气旋涡流（CE）倾向于通过浅化混合层来侵蚀底线厚度。在RS北部，CE内部有时会出现不寻常的深层混合层，这与冬季对流翻转一致。这些发现首次描述了 BL 特征，提高了我们对红海上层海洋动力学、垂直混合和气候相互作用的理解。"
      summary_en: "Abstract: This study presents the first comprehensive investigation of the barrier layer (BL) in the Red Sea (RS) based on Argo float observations from 2012 to 2018, combined with sea level anomaly (SLA) data. The BL is defined as the layer between the temperature-based mixed layer (MLT) and the density-based mixed layer (MLD). The RS is divided into three regions – north (26°N–22°N), central (22°N–18°N), and south (18°N–14°N) – to analyze the spatial and temporal variability of the BL. The results show strong evidence of BL presence in all three regions during winter, with maximum thickness observed in January–February, decay by April, and almost no BL during summer. The BL is thickest in the north due to winter cooling and convection, with salinity stratification deepening the MLT below the MLD. It is more moderate and persistent in the central basin, and thinner and short-lived in the south. Buoyancy frequency and salinity analysis confirm that haline stratification stabilizes the water column and sustains the barrier layer. SLA data were used to examine the impact of mesoscale eddies, indicating that anticyclonic eddies (AEs) enhance BL thickness through convergence and downwelling, whereas cyclonic eddies (CEs) tend to erode the BL by shoaling the mixed layer. In the northern RS, unusual deep mixed layers sometimes occur within CEs, which is consistent with the convective overturning during winter. These findings provide the first description of BL characteristics, which improve our understanding of Red Sea upper ocean dynamics, vertical mixing, and climate interactions."
    - title: "Sensitivity analysis of soil particulate organic carbon to sea-level rise in coastal salt marsh"
      authors: "Zhimeng Liang; Ocean University of China, Shandong Qingdao 266000, China"
      journal: "Ingegneria Sismica"
      published: "2026-04-30"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.65102/is2026537"
      url: "https://doi.org/10.65102/is2026537"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "carbon pump"
      tags_zh: "carbon pump"
      tags_en: "carbon pump"
      summary: "摘要：本研究旨在提高滨海盐沼湿地土壤颗粒有机碳（POC）响应海平面上升的监测和预测能力，为滨海湿地碳库管理提供科学依据。本文构建了基于多源环境数据的集成学习敏感性模型，并比较了随机森林（RF）和XGBoost等机器学习方法的预测性能。数据包括海拔、洪水频率、孔隙水盐度、沉降速率、植被指数和土壤粒径等多维变量。数据用缺失值进行估算，排除异常值并标准化。结合Shapley加性解释值（SHAP），分析各环境因素对POC敏感性的贡献及地区差异。 结果表明，沿海低洼盐沼POC对海平面上升扰动最为敏感，中部盐沼和内陆高盐沼的响应依次减弱，表现出明显的空间异质性。在典型的盐沼地区，模型的预测R²可以达到0. 88，RMSE和MAE分别为0. 015和0. 012，表明集成学习方法在捕捉环境变量的非线性耦合和空间异质性方面具有良好的性能。 SHAP分析表明，洪水频率、沉积速率和孔隙水盐度是POC变化的关键驱动因素，其方向和强度因地区条件而异。该研究为滨海湿地的蓝碳管理、生态恢复和数字监测提供定量方法和决策支持。"
      summary_zh: "摘要：本研究旨在提高滨海盐沼湿地土壤颗粒有机碳（POC）响应海平面上升的监测和预测能力，为滨海湿地碳库管理提供科学依据。本文构建了基于多源环境数据的集成学习敏感性模型，并比较了随机森林（RF）和XGBoost等机器学习方法的预测性能。数据包括海拔、洪水频率、孔隙水盐度、沉降速率、植被指数和土壤粒径等多维变量。数据用缺失值进行估算，排除异常值并标准化。结合Shapley加性解释值（SHAP），分析各环境因素对POC敏感性的贡献及地区差异。 结果表明，沿海低洼盐沼POC对海平面上升扰动最为敏感，中部盐沼和内陆高盐沼的响应依次减弱，表现出明显的空间异质性。在典型的盐沼地区，模型的预测R²可以达到0. 88，RMSE和MAE分别为0. 015和0. 012，表明集成学习方法在捕捉环境变量的非线性耦合和空间异质性方面具有良好的性能。 SHAP分析表明，洪水频率、沉积速率和孔隙水盐度是POC变化的关键驱动因素，其方向和强度因地区条件而异。该研究为滨海湿地的蓝碳管理、生态恢复和数字监测提供定量方法和决策支持。"
      summary_en: "Abstract: This study aims to improve the monitoring and prediction ability of soil particulate organic carbon (POC) in coastal salt marsh wetlands in response to sea level rise, and provide a scientific basis for carbon pool management in coastal wetlands. This paper constructs an ensemble learning sensitivity model based on multi-source environmental data, and compares the prediction performance of machine learning methods such as Random Forest (RF) and XGBoost. The data included multi-dimensional variables such as elevation, flooding frequency, pore water salinity, sedimentation rate, vegetation index and soil particle size. The data were imputed with missing values, excluded with outliers and standardized. Combined with the Shapley additive explanatory value (SHAP), the contribution of each environmental factor to the sensitivity of POC and regional differences were analyzed. The results show that the POC of coastal low-lying salt marshes is the most sensitive to sea rise disturbance, and the response of central salt marshes and inland high salt marshes is weakened in turn, showing obvious spatial heterogeneity. In the typical salt marsh area, the predicted R² of the model can reach 0.88, RMSE and MAE are 0.015 and 0.012, respectively, indicating that the ensemble learning method has good performance in capturing the nonlinear coupling and spatial heterogeneity of environmental variables. SHAP analysis showed that flooding frequency, deposition rate and pore water salinity were the key drivers of POC change, and their direction and strength varied with regional conditions. This study provides quantitative methods and decision support for blue carbon management, ecological restoration and digital monitoring of coastal wetlands."
