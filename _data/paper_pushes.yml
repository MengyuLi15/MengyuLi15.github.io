      tags_zh: "microbial carbon"
      tags_en: "microbial carbon"
      summary: "摘要：美国宇航局地表水和海洋地形（SWOT）卫星和美国宇航局浮游生物、气溶胶、云、海洋生态系统（PACE）卫星的重叠任务提供了从太空以前所未有的时空尺度观察海洋生物物理相互作用的机会。我们使用这两个前沿任务的临时数据集来研究亚热带中尺度涡旋微生物群落组成的次季节到季节变化。研究结果强调了中尺度涡旋作为短暂生态位重建海洋表面微生物群落的能力。 SWOT 和 PACE 的结合首次实现了对浮游生物群落组成以及构成浮游生物群落的物理过程的空间观测。"
      summary_zh: "摘要：美国宇航局地表水和海洋地形（SWOT）卫星和美国宇航局浮游生物、气溶胶、云、海洋生态系统（PACE）卫星的重叠任务提供了从太空以前所未有的时空尺度观察海洋生物物理相互作用的机会。我们使用这两个前沿任务的临时数据集来研究亚热带中尺度涡旋微生物群落组成的次季节到季节变化。研究结果强调了中尺度涡旋作为短暂生态位重建海洋表面微生物群落的能力。 SWOT 和 PACE 的结合首次实现了对浮游生物群落组成以及构成浮游生物群落的物理过程的空间观测。"
      summary_en: "Abstract: The overlapping missions of the NASA Surface Water and Ocean Topography (SWOT) satellite and NASA Plankton, Aerosol, Cloud, ocean Ecosystem (PACE) satellite provide the opportunity to observe oceanic biophysical interactions from space at unprecedented spatiotemporal scales. We use provisional datasets from these two cutting-edge missions to investigate subseasonal to seasonal variability in the microbial community compositions of subtropical mesoscale eddies. The results highlight the capacity of mesoscale eddies to act as transient ecological niches that restructure the surface marine microbial community. For the first time, the combination of SWOT and PACE enables space-based observations of plankton community composition alongside the physical processes that structure it."
    - title: "Species‐Specific Temporal Shifts in Distribution Patterns of Japanese Sardine and Japanese Anchovy in the Western North Pacific in Relation to the Pacific Decadal Oscillation"
      authors: "Kazunari Higashiguchi; Shota Nishijima; Yasuhiro Kamimura; Sho Furuichi; Ryuji Yukami"
      journal: "Oceanography"
      published: "2026-05-19"
      published_month: "2026-05"
      published_month_zh: "2026-05"
      doi: "10.1111/fog.70050"
      url: "https://doi.org/10.1111/fog.70050"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean biogeochemistry"
      tags_zh: "ocean biogeochemistry"
      tags_en: "ocean biogeochemistry"
      summary: "摘要：人们普遍认为日本沙丁鱼和日本鳀鱼的生物量会随着太平洋年代际振荡（PDO）等与气候相关的海洋变化而周期性波动。然而，人们对它们的空间生态如何随周期性海洋变化而变化却知之甚少。特别是，这两个物种的空间分布和对水温变化的响应，以及 PDO 和丰度的变化尚不清楚。为了揭示与生物量波动和PDO相关的时空动态，我们利用时空模型估算了2005年至2020年秋季北太平洋西部这两个物种的密度、空间分布和热生态位。结果表明，研究期间沙丁鱼丰度有所增加，但分布格局相对稳定。 此外，他们估计的热生态位（使用时空模型与其分布相关的估计温度）在 PDO 阶段没有变化。相比之下，在研究期间，日本鳀鱼的分布模式从日本列岛近海地区到沿海地区表现出显着的变化，并且其热生态位也发生了变化。本研究表明，热生态位的时间变化是解释环境变化下分布变化的物种特异性差异的关键。这一见解将有助于提高分布变化的预测准确性，并加强对气候变化对鱼类种群动态影响的评估。"
      summary_zh: "摘要：人们普遍认为日本沙丁鱼和日本鳀鱼的生物量会随着太平洋年代际振荡（PDO）等与气候相关的海洋变化而周期性波动。然而，人们对它们的空间生态如何随周期性海洋变化而变化却知之甚少。特别是，这两个物种的空间分布和对水温变化的响应，以及 PDO 和丰度的变化尚不清楚。为了揭示与生物量波动和PDO相关的时空动态，我们利用时空模型估算了2005年至2020年秋季北太平洋西部这两个物种的密度、空间分布和热生态位。结果表明，研究期间沙丁鱼丰度有所增加，但分布格局相对稳定。 此外，他们估计的热生态位（使用时空模型与其分布相关的估计温度）在 PDO 阶段没有变化。相比之下，在研究期间，日本鳀鱼的分布模式从日本列岛近海地区到沿海地区表现出显着的变化，并且其热生态位也发生了变化。本研究表明，热生态位的时间变化是解释环境变化下分布变化的物种特异性差异的关键。这一见解将有助于提高分布变化的预测准确性，并加强对气候变化对鱼类种群动态影响的评估。"
      summary_en: "Abstract: The biomass of Japanese sardine and Japanese anchovy is generally considered to cyclically fluctuate in response to climate‐related oceanic changes such as Pacific decadal oscillation (PDO). However, little is known about how their spatial ecology changes in relation to the periodic oceanic changes. In particular, the spatial distributions and responses to changes in water temperature of both species, along with shifts in PDO and abundance, are unclear. To reveal the spatiotemporal dynamics in relation to biomass fluctuation and PDO, we estimated the densities, the spatial distributions and thermal niche of both species in the western North Pacific during autumn from 2005 to 2020, using spatiotemporal models. The results indicated that the sardine abundance increased, whereas their distribution pattern was relatively stable during the study period. In addition, their estimated thermal niche (the estimated temperatures associated with their distributions using spatiotemporal models) did not change across PDO phases. In contrast, Japanese anchovy exhibited a notable shift in its distribution pattern from offshore to coastal regions of the Japanese archipelago and a change in their thermal niche over the study period. The present study suggests that temporal variability in the thermal niche is key to explaining species‐specific differences in distribution shifts under environmental change. This insight will help improve the projection accuracy of distribution shifts and enhance assessments of climate change impacts on population dynamics of fish species."
    - title: "Satellite-Observed Acceleration in the Occurrence of Compound Marine Heatwave and Phytoplankton Bloom Events in the Global Coastal Ocean"
      authors: "Jiajun Ma; Chunzai Wang"
      journal: "Remote Sensing"
      published: "2026-04-25"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.3390/rs18091322"
      url: "https://doi.org/10.3390/rs18091322"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton; marine heatwaves"
      tags_zh: "phytoplankton; marine heatwaves"
      tags_en: "phytoplankton; marine heatwaves"
      summary: "摘要：在气候变化的影响下，海洋热浪（MHW）和浮游植物大量繁殖的发生正在加速，但它们同时发生的频率和驱动因素仍然知之甚少。利用 2003 年至 2020 年沿海优化卫星观测结果，我们绘制了沿海大型海洋生态系统的全球复合 MHW-浮游植物水华 (MHW-PB) 事件，并量化了其时空趋势和环境预测因子。复合事件以 4. 8% yr−1 的速度增加，主要是由于 MHW 频率增加 6. 5% yr−1 所致；时间洗牌测试证实这种趋势低于随机共现预期，表明生物抑制积极限制复合事件的增长。 复合独立因子（CIF）揭示了纬度异质性：低纬度上升流系统表现出MHW-PB互斥性，而高纬度和富营养化沿海地区则表现出正向共现趋势。可解释的机器学习进一步表明，在低纬度地区，养分可用性主导着水华反应，而光在高纬度地区占主导地位，MHW 强度与水华概率呈现出营养依赖性的非线性关联。矛盾的是，在热带 MHW 快速加速的驱动下，低纬度地区 (6. 1% yr−1) 的复合频率加速速度几乎是高纬度地区 (3. 5% yr−1) 的两倍。这些不同的状况预示着双重生态风险：上升流系统的营养不匹配以及富营养化沿海水域缺氧和有害藻华危害的升级。"
      summary_zh: "摘要：在气候变化的影响下，海洋热浪（MHW）和浮游植物大量繁殖的发生正在加速，但它们同时发生的频率和驱动因素仍然知之甚少。利用 2003 年至 2020 年沿海优化卫星观测结果，我们绘制了沿海大型海洋生态系统的全球复合 MHW-浮游植物水华 (MHW-PB) 事件，并量化了其时空趋势和环境预测因子。复合事件以 4. 8% yr−1 的速度增加，主要是由于 MHW 频率增加 6. 5% yr−1 所致；时间洗牌测试证实这种趋势低于随机共现预期，表明生物抑制积极限制复合事件的增长。 复合独立因子（CIF）揭示了纬度异质性：低纬度上升流系统表现出MHW-PB互斥性，而高纬度和富营养化沿海地区则表现出正向共现趋势。可解释的机器学习进一步表明，在低纬度地区，养分可用性主导着水华反应，而光在高纬度地区占主导地位，MHW 强度与水华概率呈现出营养依赖性的非线性关联。矛盾的是，在热带 MHW 快速加速的驱动下，低纬度地区 (6. 1% yr−1) 的复合频率加速速度几乎是高纬度地区 (3. 5% yr−1) 的两倍。这些不同的状况预示着双重生态风险：上升流系统的营养不匹配以及富营养化沿海水域缺氧和有害藻华危害的升级。"
      summary_en: "Abstract: The occurrence of marine heatwaves (MHWs) and phytoplankton blooms is accelerating under climate change, yet the frequency and drivers of their compound co-occurrence remain poorly understood. Using coastal-optimized satellite observations from 2003–2020, we mapped global compound MHW–phytoplankton bloom (MHW-PB) events across coastal large marine ecosystems and quantified their spatiotemporal trends and environmental predictors. Compound events are increasing at 4.8% yr−1, driven primarily by a 6.5% yr−1 rise in MHW frequency; a temporal shuffle test confirms this trend falls below random co-occurrence expectation, indicating biological suppression actively constrains compound event growth. The compound independence factor (CIF) reveals latitudinal heterogeneity: low-latitude upwelling systems show MHW–PB mutual exclusivity, while high-latitude and eutrophic coastal regions show positive co-occurrence tendency. Interpretable machine learning further shows that nutrient availability dominates bloom responses at low latitudes whereas light dominates at high latitudes, with MHW intensity exhibiting nutrient-dependent non-linear associations with bloom probability. Paradoxically, compound frequency accelerates nearly twice as fast in low latitudes (6.1% yr−1) as in high latitudes (3.5% yr−1), driven by rapid tropical MHW acceleration. These diverging regimes signal dual ecological risks: trophic mismatches in upwelling systems and escalating hypoxia and harmful algal bloom hazards in eutrophic coastal waters."
