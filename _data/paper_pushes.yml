    - title: "Exploring Global Patterns of Trace Metal Limitation as a Regulator of the Distribution of Dominant Marine Phytoplankton Groups"
      authors: "Qiong Zhang; Yu Zhou; Jiayou Ge; Samuel Barton; Fengjie Liu; Roxana Shafiee; Kedong Yin; Heather A. Bouman; et al."
      journal: "Global Change Biology"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1002/gcb4.70029"
      url: "https://doi.org/10.1002/gcb4.70029"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "carbon pump; phytoplankton"
      tags_zh: "carbon pump; phytoplankton"
      tags_en: "carbon pump; phytoplankton"
      summary: "摘要：必需元素的可用性决定了浮游植物的生产力并调节海洋碳固存。多种微量金属对于驱动作为碳泵主要组成部分的关键浮游植物群的生物地理学的作用尚不清楚。我们通过诊断模型，将数十年实验室培养实验的汇编与新兴的海洋微量金属含量和基因组学数据集结合起来，探索跨不同功能群的浮游植物生长的微量金属限制模式。我们的分析强调了铁的重要性，表明硅藻和微微蓝细菌的代表性物种可能在全球海洋的约 60% 和 38% 中铁含量有限。硅藻的锰含量也限制在约 20% 的海洋中。自养甲藻在超过 60% 的海洋中可能受到锌的限制。限制水平很大程度上受痕量金属的生物利用度控制。我们的分析还强调，微量金属供应对硅藻分布的影响可能比对颗石藻的影响更大。不同浮游植物的痕量金属限制的推断模式得到了来自表层海洋的转录组数据的广泛支持。通过对痕量金属浓度如何随气候变化而变化的预测，我们表明未来的海洋可能会促进广泛的锌限制，将浮游植物群落转变为驱动较弱生物泵的群体。"
      summary_zh: "摘要：必需元素的可用性决定了浮游植物的生产力并调节海洋碳固存。多种微量金属对于驱动作为碳泵主要组成部分的关键浮游植物群的生物地理学的作用尚不清楚。我们通过诊断模型，将数十年实验室培养实验的汇编与新兴的海洋微量金属含量和基因组学数据集结合起来，探索跨不同功能群的浮游植物生长的微量金属限制模式。我们的分析强调了铁的重要性，表明硅藻和微微蓝细菌的代表性物种可能在全球海洋的约 60% 和 38% 中铁含量有限。硅藻的锰含量也限制在约 20% 的海洋中。自养甲藻在超过 60% 的海洋中可能受到锌的限制。限制水平很大程度上受痕量金属的生物利用度控制。我们的分析还强调，微量金属供应对硅藻分布的影响可能比对颗石藻的影响更大。不同浮游植物的痕量金属限制的推断模式得到了来自表层海洋的转录组数据的广泛支持。通过对痕量金属浓度如何随气候变化而变化的预测，我们表明未来的海洋可能会促进广泛的锌限制，将浮游植物群落转变为驱动较弱生物泵的群体。"
      summary_en: "Abstract: The availability of essential elements determines the productivity of phytoplankton and regulates ocean carbon sequestration. The role of multiple trace metals for driving the biogeography of key phytoplankton groups that are major components of the carbon pump is not well understood. We explore the patterns of trace metal limitation on phytoplankton growth, spanning across different functional groups by uniting a compilation of decades of laboratory culture experiments, via diagnostic modelling, with emerging global‐scale datasets of ocean trace metal content and genomics. Our analysis reinforces the importance of Fe, showing that representative species of diatoms and picocyanobacteria may be Fe limited in about 60% and 38% of the global ocean. Diatoms are also Mn limited in ~20% of the ocean. An autotrophic dinoflagellate may be Zn limited in over 60% of the ocean. The levels of limitation are highly controlled by the bioavailability of trace metals. Our analyses additionally highlight that trace metal supply may have a greater impact on the distribution of diatoms than on coccolithophores. The inferred patterns of trace metal limitation for different phytoplankton are broadly supported by transcriptomic data from the surface ocean. Using projections of how trace metal concentrations may evolve with climate change, we show that future oceans may promote widespread Zn limitation, shifting phytoplankton communities to groups that drive a weaker biological pump."
    - title: "Erosional and Hydrological Controls on the Age and Thermochemical Stability of Particulate Organic Carbon in an Arctic River"
      authors: "Marisa Repasch; Suzanne P. Anderson; Robert S. Anderson; Josie Arcuri; Valier Galy; Joshua C. Koch; Irina Overeem"
      journal: "Global Biogeochemical Cycles"
      published: "2026-06"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1029/2026gb009202"
      url: "https://doi.org/10.1029/2026gb009202"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "carbon pump; microbial carbon"
      tags_zh: "carbon pump; microbial carbon"
      tags_en: "carbon pump; microbial carbon"
      summary: "摘要：了解驱动北极景观中有机碳（OC）的动员和归宿的机制对于模拟永久冻土融化、碳循环和气候变化之间的反馈非常重要。虽然在测量永久冻土中原位 OC 分解和北极河流输出的散装颗粒有机碳 (POC) 方面取得了重大进展，但很少有研究区分整个北极景观中 POC 的来源和稳定性，这限制了我们预测移动的 POC 是否会被氧化为 CO 2 和 CH 4 或埋藏在下游沉积环境中的能力。本研究使用梯度热解/氧化放射性碳 (RPO-14 C) 分析来研究坎宁河（阿拉斯加北坡）从山区到海岸的下游运输过程中河流 POC 的热化学稳定性和放射性碳含量的时空变化。源头中的河流 POC 主要由源自页岩基岩的高活化能、热难成岩 OC (OC petro ) 组成。进入山麓和低地势的沿海平原，河岸侵蚀主要驱动不稳定、低活化能、土壤来源的 OC（OC 土壤）的动员。上游山区的河流POC由~70% OC石油和~30% OC土壤组成，而下游沿海平原河段的POC由~85% OC土壤和~15% OC石油组成。输出到海岸的 POC 的相对稳定性较高，表明其对氧化和微生物分解的敏感性较高，随着北极水文循环的加剧，这可能会增加 CO 2 的释放。然而，难熔OC石油石在悬浮物中的持久存在表明海洋沉积物中岩石有机碳长期埋藏的潜力。"
      summary_zh: "摘要：了解驱动北极景观中有机碳（OC）的动员和归宿的机制对于模拟永久冻土融化、碳循环和气候变化之间的反馈非常重要。虽然在测量永久冻土中原位 OC 分解和北极河流输出的散装颗粒有机碳 (POC) 方面取得了重大进展，但很少有研究区分整个北极景观中 POC 的来源和稳定性，这限制了我们预测移动的 POC 是否会被氧化为 CO 2 和 CH 4 或埋藏在下游沉积环境中的能力。本研究使用梯度热解/氧化放射性碳 (RPO-14 C) 分析来研究坎宁河（阿拉斯加北坡）从山区到海岸的下游运输过程中河流 POC 的热化学稳定性和放射性碳含量的时空变化。源头中的河流 POC 主要由源自页岩基岩的高活化能、热难成岩 OC (OC petro ) 组成。进入山麓和低地势的沿海平原，河岸侵蚀主要驱动不稳定、低活化能、土壤来源的 OC（OC 土壤）的动员。上游山区的河流POC由~70% OC石油和~30% OC土壤组成，而下游沿海平原河段的POC由~85% OC土壤和~15% OC石油组成。输出到海岸的 POC 的相对稳定性较高，表明其对氧化和微生物分解的敏感性较高，随着北极水文循环的加剧，这可能会增加 CO 2 的释放。然而，难熔OC石油石在悬浮物中的持久存在表明海洋沉积物中岩石有机碳长期埋藏的潜力。"
      summary_en: "Abstract: Understanding the mechanisms that drive the mobilization and fate of organic carbon (OC) in Arctic landscapes is important for modeling the feedbacks among permafrost thaw, carbon cycling, and climate change. While significant progress has been made toward measuring in situ OC decomposition in permafrost soils and bulk particulate organic carbon (POC) export from Arctic rivers, few studies have distinguished the source and lability of POC across Arctic landscapes, limiting our ability to predict whether mobilized POC will be oxidized to CO 2 and CH 4 or buried in downstream depositional environments. This study uses ramped pyrolysis/oxidation radiocarbon (RPO‐ 14 C) analyses to investigate spatial and temporal variations in the thermochemical stability and radiocarbon content of fluvial POC during downstream transport from mountains to the coast in the Canning River (North Slope, Alaska). Fluvial POC in the headwaters is predominantly comprised of high activation energy, thermally recalcitrant petrogenic OC (OC petro ) derived from shale bedrock. Moving into the foothills and low‐relief coastal plains, river bank erosion primarily drives mobilization of labile, low activation energy, soil‐derived OC (OC soil ). Fluvial POC in mountainous upstream reaches consisted of ∼70% OC petro and just ∼30% OC soil , while POC in the downstream coastal plain reaches comprised ∼85% OC soil and ∼15% OC petro . The high relative lability of POC exported to the coast indicates high susceptibility to oxidation and microbial decomposition, which could enhance CO 2 release as the Arctic hydrologic cycle intensifies. However, the persistence of refractory OC petro in the suspended load indicates the potential for long‐term burial of rock organic carbon in marine sediments."
    - title: "In-Situ Oceanographic Observations of Tropical Cyclones from Instrumented Sea Turtles"
      authors: "Christopher Charles Chapman; Ian Jonsen; Clive R Mcmahon; Robert Geoffrey Harcourt; Michele Thums; Marji Puotinen; Hamish Ramsay; Jason Rossendell; et al."
      journal: "Environmental Research Letters"
      published: "2026-06-10"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1088/1748-9326/ae7b61"
      url: "https://doi.org/10.1088/1748-9326/ae7b61"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "BGC-Argo"
      tags_zh: "BGC-Argo"
      tags_en: "BGC-Argo"
      summary: "摘要：热带气旋从温暖的海洋中汲取能量，在其他条件相同的情况下，海洋表面越温暖，风暴就越猛烈。然而，热带气旋也主要通过与更深、更冷的海水混合来冷却表层海洋。 “冷尾流”起到了负面反馈的作用——降低了风暴的强度。由于缺乏热带气旋内的海洋观测，特别是在 Argo 自主浮标无法到达的浅海，我们将这些信息纳入预报的能力受到限制。在这里，我们展示了从装有海洋传感器的海龟那里获得的上层海洋对五次热带风暴的响应的观察结果。海龟观测捕捉到了关键的海洋过程，例如混合引起的海洋冷却，这对预测很重要。相比之下，将现有海洋观测（尤其是海龟观测）与数值海洋模型相结合的海洋再分析系统无法捕获导致海洋表面冷却的许多过程。在展示了观测对于海洋-热带气旋相互作用研究的实用性之后，我们讨论了基于海龟的观测系统在监测和预报全球热带气旋方面可以发挥的作用。"
      summary_zh: "摘要：热带气旋从温暖的海洋中汲取能量，在其他条件相同的情况下，海洋表面越温暖，风暴就越猛烈。然而，热带气旋也主要通过与更深、更冷的海水混合来冷却表层海洋。 “冷尾流”起到了负面反馈的作用——降低了风暴的强度。由于缺乏热带气旋内的海洋观测，特别是在 Argo 自主浮标无法到达的浅海，我们将这些信息纳入预报的能力受到限制。在这里，我们展示了从装有海洋传感器的海龟那里获得的上层海洋对五次热带风暴的响应的观察结果。海龟观测捕捉到了关键的海洋过程，例如混合引起的海洋冷却，这对预测很重要。相比之下，将现有海洋观测（尤其是海龟观测）与数值海洋模型相结合的海洋再分析系统无法捕获导致海洋表面冷却的许多过程。在展示了观测对于海洋-热带气旋相互作用研究的实用性之后，我们讨论了基于海龟的观测系统在监测和预报全球热带气旋方面可以发挥的作用。"
      summary_en: "Abstract: Tropical cyclones draw their energy from warm seas and, all other things being equal, the warmer the ocean surface, the more intense the storm. However, tropical cyclones also cool the surface ocean primarily by mixing it with deeper, cooler waters. The `cold wake' acts as a negative feedback--reducing the storm's intensity. Our ability to incorporate this information in forecasts is limited by a lack of ocean observations within tropical cyclones, particularly in shallow seas inaccessible to autonomous Argo floats. Here, we show observations of the response of the upper ocean to five tropical storms obtained from sea turtles instrumented with oceanographic sensors. The turtle observations captured key ocean processes, such as mixing induced ocean cooling, that are important for forecasting. In comparison, an ocean reanalysis system that blends existing ocean observations but notably, not the turtle observations, with an numerical ocean model, fails to capture many of the processes responsible for the surface ocean cooling. Having shown the utility of the observations for ocean-tropical cyclone interaction studies, we discuss the role that a turtle based observing system could play in monitoring and forecasting tropical cyclones worldwide."
    - title: "SIG-Net: A Spectral-Index-Guided Network for Red Tide Extraction from Sentinel-2 Multispectral Imagery"
      authors: "Lei Zhou; Hongping Li; Xiaojun Chen; Zhanqiang Li"
      journal: "Remote Sensing"
      published: "2026-06-11"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/rs18121928"
      url: "https://doi.org/10.3390/rs18121928"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：赤潮事件对海洋生态系统、水产养殖和沿海公共卫生构成重大威胁。因此，根据卫星图像及时准确地描绘赤潮范围对于业务监测和预警至关重要。然而，现有的基于深度学习的语义分割方法通常将多光谱波段视为同质输入，并且没有充分利用传统遥感分析中常用的光谱指数所体现的领域知识。为了解决这一限制，本研究提出了一种光谱索引引导网络（SIG-Net），它通过双分支架构将光谱索引先验明确地纳入深度特征提取中。 SIG-Net 包含三个组件：基于混合视觉变换器 (MiT-B2) 的光谱编码器，可从原始 Sentinel-2 频段学习空间光谱表示；一种基于CNN的轻量级索引编码器，从四个光谱索引中提取判别特征，即本研究中提出的红绿指数（RGI）、蓝绿指数（BGI）、归一化差异植被指数（NDVI）和归一化差异夜光指数（NDNI）；光谱索引引导融合（SIGF）模块，使用空间缩减交叉注意力和门控融合机制自适应地集成来自两个分支的多尺度特征。在 Sentinel-2 赤潮数据集上进行的实验表明，SIG-Net 的性能优于单分支基线（包括 U-Net、DeepLabV3+ 和 SegFormer）以及朴素的多源融合策略。消融研究进一步证实了 SIGF 模块、门控机制和拟议的 NDNI 对性能改进的贡献。 该方法为将领域知识与深度学习相结合进行赤潮遥感监测提供了有效的框架。"
      summary_zh: "摘要：赤潮事件对海洋生态系统、水产养殖和沿海公共卫生构成重大威胁。因此，根据卫星图像及时准确地描绘赤潮范围对于业务监测和预警至关重要。然而，现有的基于深度学习的语义分割方法通常将多光谱波段视为同质输入，并且没有充分利用传统遥感分析中常用的光谱指数所体现的领域知识。为了解决这一限制，本研究提出了一种光谱索引引导网络（SIG-Net），它通过双分支架构将光谱索引先验明确地纳入深度特征提取中。 SIG-Net 包含三个组件：基于混合视觉变换器 (MiT-B2) 的光谱编码器，可从原始 Sentinel-2 频段学习空间光谱表示；一种基于CNN的轻量级索引编码器，从四个光谱索引中提取判别特征，即本研究中提出的红绿指数（RGI）、蓝绿指数（BGI）、归一化差异植被指数（NDVI）和归一化差异夜光指数（NDNI）；光谱索引引导融合（SIGF）模块，使用空间缩减交叉注意力和门控融合机制自适应地集成来自两个分支的多尺度特征。在 Sentinel-2 赤潮数据集上进行的实验表明，SIG-Net 的性能优于单分支基线（包括 U-Net、DeepLabV3+ 和 SegFormer）以及朴素的多源融合策略。消融研究进一步证实了 SIGF 模块、门控机制和拟议的 NDNI 对性能改进的贡献。 该方法为将领域知识与深度学习相结合进行赤潮遥感监测提供了有效的框架。"
      summary_en: "Abstract: Red tide events pose substantial threats to marine ecosystems, aquaculture, and coastal public health. Timely and accurate delineation of red tide extent from satellite imagery is therefore essential for operational monitoring and early warning. However, existing deep learning-based semantic segmentation methods generally treat multispectral bands as homogeneous inputs and do not fully exploit the domain knowledge embodied in spectral indices commonly used in traditional remote sensing analysis. To address this limitation, this study proposes a spectral-index-guided network (SIG-Net) that explicitly incorporates spectral-index priors into deep feature extraction through a dual-branch architecture. SIG-Net comprises three components: a spectral encoder based on a Mix Vision Transformer (MiT-B2) that learns spatial-spectral representations from the original Sentinel-2 bands; a lightweight CNN-based index encoder that extracts discriminative features from four spectral indices, namely the red-green index (RGI), blue-green index (BGI), normalized difference vegetation index (NDVI), and the normalized difference Noctiluca index (NDNI) proposed in this study; and a spectral-index-guided fusion (SIGF) module that adaptively integrates multi-scale features from the two branches using spatial-reduction cross-attention and a gated fusion mechanism. Experiments on a Sentinel-2 red tide dataset show that SIG-Net outperforms single-branch baselines, including U-Net, DeepLabV3+, and SegFormer, as well as naive multi-source fusion strategies. Ablation studies further confirm the contributions of the SIGF module, the gating mechanism, and the proposed NDNI to performance improvements. The proposed method provides an effective framework for integrating domain knowledge with deep learning for red tide remote sensing monitoring."
    - title: "A Decade of Optical Remote Sensing Applications in Marine Biodiversity and Benthic Habitat Monitoring: A Systematic Review"
      authors: "Laura Martín-García; Enrique Casas; Pedro A. Hernández-Leal; Andrea Z. Botelho; Manuel Arbelo"
      journal: "Remote Sensing"
      published: "2026-06-10"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/rs18121917"
      url: "https://doi.org/10.3390/rs18121917"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "ocean colour; bio-optics"
      tags_zh: "ocean colour; bio-optics"
      tags_en: "ocean colour; bio-optics"
      summary: "摘要：监测沿海和海洋生态系统的生物多样性对于支持保护战略、维持生态系统服务和履行多个层面的政策承诺至关重要，包括欧盟的《栖息地指令》、可持续发展目标 14（SDG 14，水下生物）和昆明-蒙特利尔全球生物多样性框架 (GBF)。然而，由于传统实地方法的空间、时间和后勤限制，许多底栖栖息地的绘图或监测仍然不充分。光学遥感（ORS）基于使用光学传感器从浅水环境中检索光谱信息，已成为绘制和监测这些生态系统的强大工具。本研究进行了系统综述，旨在全面综合 2014-2023 年期间水面 ORS 在海底生物多样性和栖息地监测方面的应用。总共分析了 179 项同行评审的研究，以确定时间趋势、地理模式、目标生态系统和方法工作流程。该审查考虑了包括卫星、机载、无人机（UAV）和现场光谱测量系统在内的观测平台，以及可靠的海底探测所需的关键预处理程序，例如大气校正、水柱校正和阳光去除，以及使用独立测量的验证。分析表明 ORS 应用迅速扩展，在地理上主要集中在热带和亚热带地区。 关注特定底栖群体的研究主要针对珊瑚礁和海草生态系统，尽管许多研究采用综合底栖栖息地分类，在栖息地层面纳入多个底栖组成部分。然而，仍然存在重大限制，包括不一致的预处理工作流程、有限的报告透明度以及几个生态重要类群（例如环节动物、软体动物、棘皮动物）的代表性不足。尽管存在这些挑战，ORS 已成为大规模、可重复的沿海监测的基石。通过分析方法实践、生态目标和地理偏差，本综述为提高 ORS 在底栖栖息地测绘、生物多样性监测和基于生态系统的管理中的稳健性、可扩展性和全球适用性提供了关键基础。"
      summary_zh: "摘要：监测沿海和海洋生态系统的生物多样性对于支持保护战略、维持生态系统服务和履行多个层面的政策承诺至关重要，包括欧盟的《栖息地指令》、可持续发展目标 14（SDG 14，水下生物）和昆明-蒙特利尔全球生物多样性框架 (GBF)。然而，由于传统实地方法的空间、时间和后勤限制，许多底栖栖息地的绘图或监测仍然不充分。光学遥感（ORS）基于使用光学传感器从浅水环境中检索光谱信息，已成为绘制和监测这些生态系统的强大工具。本研究进行了系统综述，旨在全面综合 2014-2023 年期间水面 ORS 在海底生物多样性和栖息地监测方面的应用。总共分析了 179 项同行评审的研究，以确定时间趋势、地理模式、目标生态系统和方法工作流程。该审查考虑了包括卫星、机载、无人机（UAV）和现场光谱测量系统在内的观测平台，以及可靠的海底探测所需的关键预处理程序，例如大气校正、水柱校正和阳光去除，以及使用独立测量的验证。分析表明 ORS 应用迅速扩展，在地理上主要集中在热带和亚热带地区。 关注特定底栖群体的研究主要针对珊瑚礁和海草生态系统，尽管许多研究采用综合底栖栖息地分类，在栖息地层面纳入多个底栖组成部分。然而，仍然存在重大限制，包括不一致的预处理工作流程、有限的报告透明度以及几个生态重要类群（例如环节动物、软体动物、棘皮动物）的代表性不足。尽管存在这些挑战，ORS 已成为大规模、可重复的沿海监测的基石。通过分析方法实践、生态目标和地理偏差，本综述为提高 ORS 在底栖栖息地测绘、生物多样性监测和基于生态系统的管理中的稳健性、可扩展性和全球适用性提供了关键基础。"
      summary_en: "Abstract: Monitoring biodiversity in coastal and marine ecosystems is essential for supporting conservation strategies, sustaining ecosystem services, and meeting policy commitments at multiple scales, including the European Union’s Habitats Directive, Sustainable Development Goal 14 (SDG 14, Life Below Water), and the Kunming–Montreal Global Biodiversity Framework (GBF). However, many benthic habitats remain insufficiently mapped or monitored due to the spatial, temporal, and logistical limitations of traditional field-based approaches. Optical Remote Sensing (ORS), based on the use of optical sensors to retrieve spectral information from shallow-water environments, has emerged as a powerful tool for mapping and monitoring these ecosystems. This study presents a systematic review aimed at providing a comprehensive synthesis of above-water ORS applications for benthic biodiversity and habitat monitoring over the period 2014–2023. A total of 179 peer-reviewed studies were analyzed to identify temporal trends, geographic patterns, target ecosystems, and methodological workflows. The review considered observation platforms including satellite, airborne, unmanned aerial vehicles (UAVs), and field spectrometry systems, together with key preprocessing procedures required for reliable benthic detection, such as atmospheric correction, water column correction, and sunglint removal, alongside validation using independent measurements. The analysis reveals a rapid expansion of ORS applications, with a strong geographic concentration in tropical and subtropical regions. Studies focusing on specific benthic groups predominantly target coral reefs and seagrass ecosystems, although many adopt integrative benthic habitat classifications that incorporate multiple benthic components at the habitat level. However, significant limitations persist, including inconsistent preprocessing workflows, limited reporting transparency, and the underrepresentation of several ecologically important taxa (e.g., annelids, mollusks, echinoderms). Despite these challenges, ORS has become a cornerstone of large-scale and repeatable coastal monitoring. By analyzing methodological practices, ecological targets, and geographic biases, this review provides a critical foundation for improving the robustness, scalability, and global applicability of ORS in benthic habitat mapping, biodiversity monitoring, and ecosystem-based management."
    - title: "Size-Fractionated Net Primary Production Distribution and Its Environmental Control in the East China Sea During Winter"
      authors: "Jiahong Cheng; Chenggang Liu; Yuming Cai; Hongchang Zhai; Wei Zhang; Minhui Su; Qiang Hao"
      journal: "Biology"
      published: "2026-06-09"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.3390/biology15120905"
      url: "https://doi.org/10.3390/biology15120905"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "phytoplankton; vertical structure"
      tags_zh: "phytoplankton; vertical structure"
      tags_en: "phytoplankton; vertical structure"
      summary: "摘要：浮游植物初级生产（PP）是海洋生态系统的基础。在冬季边缘海，PP的大小和大小结构不仅维持越冬浮游动物，而且决定次年幼鱼的生存和渔业资源。我们在东海陆架鱼类越冬场进行了两次巡航，调查了净初级生产力（NPP）的空间分布、规模结构和环境控制。冬季 NPP 相对于全年范围普遍偏低。大多数站点的养分浓度超过了潜在的限制阈值，而大多数站点的混合层平均光照（LE）低于光饱和阈值，表明光照不足主要与冬季生产力低下的亚饱和光照条件有关。在尺寸类别中，纳米尺寸部分占主导地位，其次是皮尺寸部分，而微米尺寸部分贡献最小；然而，二月份微型部分的相对贡献有所增加。星基NPP模型中广泛使用的两个关键参数PBopt（最佳叶绿素固碳率）和F（初级生产力垂直分布的无量纲光相关因子）的实测值均低于模型预测，且偏差幅度随水深和混合条件的不同而变化。这些发现完善了我们对冬季边缘海越冬地生物地球化学过程的理解。"
      summary_zh: "摘要：浮游植物初级生产（PP）是海洋生态系统的基础。在冬季边缘海，PP的大小和大小结构不仅维持越冬浮游动物，而且决定次年幼鱼的生存和渔业资源。我们在东海陆架鱼类越冬场进行了两次巡航，调查了净初级生产力（NPP）的空间分布、规模结构和环境控制。冬季 NPP 相对于全年范围普遍偏低。大多数站点的养分浓度超过了潜在的限制阈值，而大多数站点的混合层平均光照（LE）低于光饱和阈值，表明光照不足主要与冬季生产力低下的亚饱和光照条件有关。在尺寸类别中，纳米尺寸部分占主导地位，其次是皮尺寸部分，而微米尺寸部分贡献最小；然而，二月份微型部分的相对贡献有所增加。星基NPP模型中广泛使用的两个关键参数PBopt（最佳叶绿素固碳率）和F（初级生产力垂直分布的无量纲光相关因子）的实测值均低于模型预测，且偏差幅度随水深和混合条件的不同而变化。这些发现完善了我们对冬季边缘海越冬地生物地球化学过程的理解。"
      summary_en: "Abstract: Phytoplankton primary production (PP) underpins marine ecosystems. In winter marginal seas, the magnitude and size structure of PP not only sustain overwintering zooplankton but also shape larval fish survival and fishery resources in the following year. We conducted two cruises in the fish overwintering grounds of the East China Sea shelf to investigate the spatial distribution, size structure, and environmental controls of net primary production (NPP). Winter NPP was generally low relative to the annual range. Nutrient concentrations at most stations exceeded potential limitation thresholds, whereas the mixed-layer mean light exposure (LE) fell below the light-saturation threshold at most stations, indicating that insufficient light availability was primarily associated with sub-saturating light conditions of low winter productivity. Among size classes, the nano-sized fraction dominated NPP, followed by the pico-sized fraction, while the micro-sized fraction contributed least; however, the relative contribution of the micro-sized fraction increased in February. Measured values of two key parameters widely used in satellite-based NPP models—PBopt (optimal chlorophyll-specific carbon fixation rate) and F (a dimensionless light-related factor for the vertical distribution of primary production)—were both lower than model predictions, and the magnitude of deviation varied with water depth and mixing conditions. These findings refine our understanding of biogeochemical processes in overwintering grounds of winter marginal seas."
