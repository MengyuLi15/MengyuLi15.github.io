    - title: "Biochemical remodelling of phytoplankton cell composition under climate change"
      authors: "Shlomit Sharoni; Keisuke Inomura; Stephanie Dutkiewicz; Oliver Jahn; Zoe V. Finkel; Andrew Irwin; Mohammad M. Amirian; Erwan Monier; et al."
      journal: "Nature Climate Change"
      published: "2026-03-31"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.1038/s41558-026-02598-w"
      url: "https://www.nature.com/articles/s41558-026-02598-w"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "phytoplankton; stoichiometry; carbon pump"
      tags_zh: "phytoplankton; stoichiometry; carbon pump"
      tags_en: "phytoplankton; stoichiometry; carbon pump"
      summary: "这项研究把浮游植物细胞组成放到气候变化背景下重新审视，而不是只把叶绿素或生物量当作固定指标。它结合气候变化情景、浮游植物生理特征和细胞化学计量关系，分析碳、营养盐和色素配置如何随环境改变。研究重点是判断变暖和环境压力是否会改变细胞内部的元素分配，从而影响初级生产和碳固定效率。结果强调，浮游植物的生化重塑可能改变海洋碳泵中“单位生物量对应多少碳”的解释。它对用海色、BGC-Argo 或生态模型推断碳循环变化很有帮助。"
      summary_zh: "这项研究把浮游植物细胞组成放到气候变化背景下重新审视，而不是只把叶绿素或生物量当作固定指标。它结合气候变化情景、浮游植物生理特征和细胞化学计量关系，分析碳、营养盐和色素配置如何随环境改变。研究重点是判断变暖和环境压力是否会改变细胞内部的元素分配，从而影响初级生产和碳固定效率。结果强调，浮游植物的生化重塑可能改变海洋碳泵中“单位生物量对应多少碳”的解释。它对用海色、BGC-Argo 或生态模型推断碳循环变化很有帮助。"
      summary_en: "This study revisits phytoplankton cell composition under climate change rather than treating chlorophyll or biomass as fixed proxies. It combines climate-change context, phytoplankton physiological traits, and cellular stoichiometry to examine how carbon, nutrients, and pigments may be reallocated. The work asks whether warming and environmental stress can change the elemental make-up of cells and therefore alter primary production and carbon fixation. The result highlights biochemical remodelling as a pathway that can change how much carbon is represented by a given amount of phytoplankton biomass. It is useful for interpreting ocean-colour records, BGC-Argo proxies, and ecosystem-model estimates of carbon cycling."
    - title: "BGC-Argo float reveals shifts in nitrogen-carbon cycling in an oxygen-deficient zone"
      authors: "Mariana B. Bif; Colette Kelly; Mark A. Altabet; Annie Bourbonnais; Claire Elbon; Edgart Flores; Alanna Mnich; Josh Plant; et al."
      journal: "Communications Earth & Environment"
      published: "2026-04-06"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.1038/s43247-026-03410-5"
      url: "https://www.nature.com/articles/s43247-026-03410-5"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      tags_zh: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      tags_en: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      summary: "这项研究利用 BGC-Argo 浮标在氧亏区获得的剖面观测来追踪氮循环和碳循环的共同变化。数据的价值在于它能同时提供垂向结构和生物地球化学状态，而不是只看表层信号。研究分析了氧亏环境中氮相关过程与碳固定、转化或输出之间的联系。结果显示，氧亏区内部的氮-碳耦合会随水团和垂向条件发生变化。它对理解低氧海域的微生物碳过程、营养盐限制和 BGC-Argo 观测应用很有价值。"
      summary_zh: "这项研究利用 BGC-Argo 浮标在氧亏区获得的剖面观测来追踪氮循环和碳循环的共同变化。数据的价值在于它能同时提供垂向结构和生物地球化学状态，而不是只看表层信号。研究分析了氧亏环境中氮相关过程与碳固定、转化或输出之间的联系。结果显示，氧亏区内部的氮-碳耦合会随水团和垂向条件发生变化。它对理解低氧海域的微生物碳过程、营养盐限制和 BGC-Argo 观测应用很有价值。"
      summary_en: "This study uses BGC-Argo float profiles from an oxygen-deficient zone to follow linked changes in nitrogen and carbon cycling. The data are valuable because they resolve both vertical structure and biogeochemical state, instead of relying only on surface signals. The analysis connects nitrogen-related processes with carbon fixation, transformation, or export under low-oxygen conditions. The results show that nitrogen-carbon coupling inside oxygen-deficient waters can shift with water-mass and vertical conditions. It is useful for studying microbial carbon pathways, nutrient limitation, and BGC-Argo applications in low-oxygen regions."
    - title: "Global declines in net primary production in the ocean color era"
      authors: "Greg M. Silsbe; James Fox; Toby K. Westberry; Kimberly H. Halsey"
      journal: "Nature Communications"
      published: "2025-07-01"
      published_month: "2025-07"
      published_month_zh: "2025-07"
      doi: "10.1038/s41467-025-60906-y"
