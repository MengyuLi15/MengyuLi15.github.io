      summary: "摘要：极地海洋微生物碳泵（MCP）是全球碳封存和气候调节系统的关键组成部分。该研究通过对微生物生态、生物地球化学和环境适应过程进行综合研究，探讨了极地海洋MCP系统应对气候变化的调节和适应原理。我们关注北极和南极水域的微生物群落、它们在环境变化强迫下的生理/进化适应策略和碳转化能力。我们的研究表明，海洋极地微生物已经发展出复杂的策略来在如此寒冷的环境中生存，并通过冷冻保护剂的高表达、细胞膜和代谢途径的变化做出反应。研究表明，由于热条件、冰冻圈过程和碳酸盐化学的变化，人为全球变暖对 MCP 的效率产生巨大影响。值得注意的是，我们的比较研究表明，极地地区之间的反应是不同的，因为北极具有较高的代谢灵活性，而南极洲具有较高的冷适应能力。这些发现帮助我们获得有关极地碳储存系统的敏感性和对气候的潜在反馈的有价值的信息。"
      summary_zh: "摘要：极地海洋微生物碳泵（MCP）是全球碳封存和气候调节系统的关键组成部分。该研究通过对微生物生态、生物地球化学和环境适应过程进行综合研究，探讨了极地海洋MCP系统应对气候变化的调节和适应原理。我们关注北极和南极水域的微生物群落、它们在环境变化强迫下的生理/进化适应策略和碳转化能力。我们的研究表明，海洋极地微生物已经发展出复杂的策略来在如此寒冷的环境中生存，并通过冷冻保护剂的高表达、细胞膜和代谢途径的变化做出反应。研究表明，由于热条件、冰冻圈过程和碳酸盐化学的变化，人为全球变暖对 MCP 的效率产生巨大影响。值得注意的是，我们的比较研究表明，极地地区之间的反应是不同的，因为北极具有较高的代谢灵活性，而南极洲具有较高的冷适应能力。这些发现帮助我们获得有关极地碳储存系统的敏感性和对气候的潜在反馈的有价值的信息。"
      summary_en: "Abstract: The polar marine microbial carbon pump (MCP) is a key component in global carbon sequestration and climate regulation systems. The research addresses the regulatory and adaptive principles of the polar marine MCP systems in response to climate change by conducting an integrated research on the microbial ecological, biogeochemical and environmental adaptation processes. We are focusing on the microbial communities in arctic and antarctic waters, their physiologic/evolutionary adaptation strategies and carbon transformation abilities under environmental change forcing. Our research has demonstrated that marine polar microorganisms have developed sophisticated strategies to survive in such a cold environment with responses of high expression of cryoprotectants, changes of cell membrane and metabolic pathways. The research suggests that anthropogenic global warming has dramatic effects on the efficiency of MCP due to shifts of thermal conditions, cryospheric processes and carbonate chemistry. Notably, our comparative study revealed that the polar region responses are different between polar regions as the Arctic had high metabolic flexibility, while Antarctic had high cold-adapted Arctic. These findings help us get valuable information regarding the sensitivity of polar carbon storage systems and potential feedbacks to climate."
