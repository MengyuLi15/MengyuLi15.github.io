      summary_en: "Abstract: Organic nitrogen (ON) deposition from aerosols plays a crucial role in oceanic ecosystems; however, the influence of marine biogenic activity on atmospheric ON remains poorly understood. Here, we investigate the contribution of the marine biosphere to water-soluble ON (WSON) in coastal aerosols based on particulate matter samples collected in Bangkok, Thailand, from January 2016 to January 2017. Concentrations of WSON and water-soluble inorganic nitrogen (WSIN, including NO3- and NH4+) were analyzed and compared across days classified by air mass origin over land as marine-, mixed-, or continental-influenced. Air masses of marine origin showed significantly lower WSON and WSIN concentrations than those from mixed and continental origins. Nevertheless, WSON remained a substantial fraction of water-soluble total nitrogen (WSTN) across all air-mass categories, although the WSON/WSTN ratio alone did not uniquely distinguish marine from anthropogenic influence. Positive matrix factorization revealed that the contribution of sea spray aerosol (SSA)-associated WSON to total WSON increased markedly with oceanic influence, accounting for 3.8 % ± 6.4 %, 14 % ± 14 %, and 34 % ± 17 % under continental, mixed, and marine conditions, respectively. The corresponding contributions to WSTN were approximately 1.6 % ± 2.1 %, 7.3 % ± 7.6 %, and 13 % ± 8.2 %, with an overall mean of 7.8 % ± 8.2 % over the sampled annual cycle. Moreover, marine productivity, assessed via air mass exposure to chlorophyll a concentrations, exhibited a strong positive correlation with SSA-associated WSON (r=0.96, p"
    - title: "Effects of Nutrient Addition on Phytoplankton Growth in the Coastal Waters of Kagawa Prefecture, Eastern Seto Inland Sea, Japan"
      authors: "Theppitak Vipulakom; Lapassakorn Srisomros; Hitomi Yamaguchi"
      journal: "BIO Web of Conferences"
      published: "2026"
      published_month: "2026 (month not verified)"
      published_month_zh: "2026（月份未核准）"
      doi: "10.1051/bioconf/202623901004"
      url: "https://doi.org/10.1051/bioconf/202623901004"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "phytoplankton"
      tags_zh: "phytoplankton"
      tags_en: "phytoplankton"
      summary: "摘要：这项研究探讨了营养物添加对浮游植物生长的影响。在海洋生态系统中，营养物质是指溶解的无机氮（DIN）、磷（DIP）和溶解的二氧化硅（DSi）。这些营养物质通常直接限制浮游植物的生长，浮游植物是海洋生态系统中高级营养生物的主要初级生产者和基本食物来源。这项研究对濑户内海的浮游植物生长进行了营养添加实验，该地区目前由于海水质量迅速改善而面临贫营养化，这可能会影响浮游植物的物种组成并导致渔业产量下降。在富集实验中，对海水中的每种营养素进行了 48 小时的培养，并测量叶绿素 a 作为浮游植物生物量的指标。结果显示，仅在富氮（富含硝酸盐）的样品中浮游植物的生长有所增加，这表明与其他必需营养素相比，DIN 不足。这项研究表明氮是研究区域的限制性养分。"
      summary_zh: "摘要：这项研究探讨了营养物添加对浮游植物生长的影响。在海洋生态系统中，营养物质是指溶解的无机氮（DIN）、磷（DIP）和溶解的二氧化硅（DSi）。这些营养物质通常直接限制浮游植物的生长，浮游植物是海洋生态系统中高级营养生物的主要初级生产者和基本食物来源。这项研究对濑户内海的浮游植物生长进行了营养添加实验，该地区目前由于海水质量迅速改善而面临贫营养化，这可能会影响浮游植物的物种组成并导致渔业产量下降。在富集实验中，对海水中的每种营养素进行了 48 小时的培养，并测量叶绿素 a 作为浮游植物生物量的指标。结果显示，仅在富氮（富含硝酸盐）的样品中浮游植物的生长有所增加，这表明与其他必需营养素相比，DIN 不足。这项研究表明氮是研究区域的限制性养分。"
      summary_en: "Abstract: This research explores the effects of nutrient addition on phytoplankton growth. In marine ecosystems, nutrients refer to dissolved inorganic nitrogen (DIN), phosphorus (DIP) and dissolved silica (DSi). These nutrients often directly limit the growth of phytoplankton—the main primary producer and the fundamental food source for higher trophic organisms in marine ecosystems. This study conducted nutrient addition experiments on phytoplankton growth in the Seto Inland Sea, an area currently facing oligotrophication due to rapid seawater quality improvement, which may be affecting phytoplankton species composition and contributing to a decrease in fisheries yields. Seawater was incubated in enrichment experiments over 48 hours for each nutrient, with chlorophyll a measured as an indicator of phytoplankton biomass. Results showed increased phytoplankton growth only in nitrogen-enriched (nitrate-enriched) samples, indicating that DIN was insufficient when compared to the other essential nutrients. This research indicates nitrogen as the limiting nutrient in the studied area."
    - title: "Total Suspended Solids Dynamics in Tin Mining Exploitation Areas in Northeastern Coastal Waters of Bangka Island: A Remote Sensing Approach"
      authors: "Filialdi Nur Hidayat; Taryono Taryono; Fery Kurniawan"
      journal: "Coastal and Ocean Journal (COJ)"
      published: "2026-06-15"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.29244/coj.v10i1.71899"
      url: "https://doi.org/10.29244/coj.v10i1.71899"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：总悬浮固体 (TSS) 的动态是可以随时间观察的水质特征，特别是在水用于开采目的的地区，例如邦加岛东北沿海水域的锡矿区。本研究描述了 Landsat 8 图像（路径 123/行 061）覆盖的区域中发生的 TSS 动态。这很有趣，因为研究地点是一个锡矿场，其开采活动会对周边地区的总悬浮固体产生影响。本研究使用的方法是卫星图像的多光谱分析。使用的算法是由 Laili 等人开发的。结果表明，在10年的研究期间，2015年至2024年邦加岛东北海岸的总悬浮固体动态并未发生显着变化。总悬浮固体的年平均值在 18 之间。然而，锡矿区内的总悬浮固体水平 (19. 15 mg/L) 和锡矿区外的总悬浮固体水平 (18. 15 mg/L) 之间存在显着差异（T 检验的 p 值为 0. 00）。"
      summary_zh: "摘要：总悬浮固体 (TSS) 的动态是可以随时间观察的水质特征，特别是在水用于开采目的的地区，例如邦加岛东北沿海水域的锡矿区。本研究描述了 Landsat 8 图像（路径 123/行 061）覆盖的区域中发生的 TSS 动态。这很有趣，因为研究地点是一个锡矿场，其开采活动会对周边地区的总悬浮固体产生影响。本研究使用的方法是卫星图像的多光谱分析。使用的算法是由 Laili 等人开发的。结果表明，在10年的研究期间，2015年至2024年邦加岛东北海岸的总悬浮固体动态并未发生显着变化。总悬浮固体的年平均值在 18 之间。然而，锡矿区内的总悬浮固体水平 (19. 15 mg/L) 和锡矿区外的总悬浮固体水平 (18. 15 mg/L) 之间存在显着差异（T 检验的 p 值为 0. 00）。"
      summary_en: "Abstract: The dynamics of total Suspended Solids (TSS) are a characteristic of water quality that can be observed over time, especially in areas where water is used for extractive purposes, such as tin mining areas in Northeastern Coastal Waters of Bangka Island. This study describes the TSS dynamics that occurred in those areas which are covered by Landsat 8 Imagery (Path123/Row 061). This is interesting because the research location is a tin mining site whose exploitation activities have an impact on Total Suspended Solids in the surrounding area. The method used in this study was multispectral analysis of satellite imagery. The algorithm used was developed by Laili et al. (2015). The results show that during the 10-year study period, the dynamics of Total Suspended Solids on the Northeastern Coast of Bangka Island from 2015 to 2024 did not experience significant changes. The annual average values of Total Suspended Solids ranged from 18.48 mg/L to 18.74 mg/L. However, there is a significant difference (p-value of 0.00 on T-Test) between Total Suspended Solids levels within the tin mining area (19.15 mg/L) and those outside the tin mining area (18.64 mg/L)."
    - title: "Spatial–temporal analysis of land cover dynamics in the Southern Aral Sea region using remote sensing and GIS (2004–2024)"
      authors: "Yunus Karimov; Iroda Orifjonova; Ruza Ballieva; Keunimjay Allanazarov; Nurlan Khudayberganov; Shohista Abdurozokova"
      journal: "E3S Web of Conferences"
      published: "2026"
      published_month: "2026 (month not verified)"
      published_month_zh: "2026（月份未核准）"
      doi: "10.1051/e3sconf/202671907001"
      url: "https://doi.org/10.1051/e3sconf/202671907001"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：由于流入水量严重减少和蒸发过程加剧，南咸海地区在过去几十年中经历了深刻的环境转变。本研究的目的是利用遥感和GIS工具来研究过去20年来南咸海地区土地覆盖的时空变化。利用2004年至2024年获得的多时相Landsat ETM+和Landsat 8 OLI卫星照片评估了水体、植被、泥滩、纯沙和沙盐面等重要土地覆盖类型的变化。采用基于归一化植被指数（NDVI）和土壤调整植被指数（SAVI）的混合方法对土地覆盖进行分类。研究结果表明，湖泊表面积显着减少，而盐碱地和沙地覆盖面积迅速扩大，形成并加剧了咸库姆沙漠。根据定量研究，水覆盖区域每年显着减少，而盐碱地和沙地表面则成比例增加。通过相关分析，土地覆盖变化、湖泊萎缩和重要气候变量（尤其是风速和气温）之间存在很强的相关性。这些结果表明，土地覆盖动态对于加速南咸海地区沙尘暴和荒漠化过程的产生有多么重要。在干旱地区，所使用的遥感和基于地理信息系统的方法支持可持续的土地和生态系统管理，并为长期环境监测提供有效的框架。"
      summary_zh: "摘要：由于流入水量严重减少和蒸发过程加剧，南咸海地区在过去几十年中经历了深刻的环境转变。本研究的目的是利用遥感和GIS工具来研究过去20年来南咸海地区土地覆盖的时空变化。利用2004年至2024年获得的多时相Landsat ETM+和Landsat 8 OLI卫星照片评估了水体、植被、泥滩、纯沙和沙盐面等重要土地覆盖类型的变化。采用基于归一化植被指数（NDVI）和土壤调整植被指数（SAVI）的混合方法对土地覆盖进行分类。研究结果表明，湖泊表面积显着减少，而盐碱地和沙地覆盖面积迅速扩大，形成并加剧了咸库姆沙漠。根据定量研究，水覆盖区域每年显着减少，而盐碱地和沙地表面则成比例增加。通过相关分析，土地覆盖变化、湖泊萎缩和重要气候变量（尤其是风速和气温）之间存在很强的相关性。这些结果表明，土地覆盖动态对于加速南咸海地区沙尘暴和荒漠化过程的产生有多么重要。在干旱地区，所使用的遥感和基于地理信息系统的方法支持可持续的土地和生态系统管理，并为长期环境监测提供有效的框架。"
      summary_en: "Abstract: The Southern Aral Sea region has undergone profound environmental transformations over the past several decades due to severe reduction of inflowing water and intensified evaporation processes. The purpose of this study is to use remote sensing and GIS tools to examine the spatiotemporal changes in land cover in the Southern Aral Sea region during the past 20 years. Changes in important land cover types, such as water bodies, vegetation, mudflats, pure sand, and sandy salt surfaces, were evaluated using multi-temporal Landsat ETM+ and Landsat 8 OLI satellite photos obtained between 2004 and 2024. A hybrid method based on the Normalized Difference Vegetation Index (NDVI) and the Soil-Adjusted Vegetation Index (SAVI) was used to classify land cover. The findings show that the lake’s surface area has significantly decreased while saline and sandy land cover has rapidly expanded, creating and intensifying the Aral-Kum Desert. Water-covered regions significantly decreased annually, according to quantitative study, whereas saline and sandy surfaces increased proportionately. Strong correlations between land cover change, lake shrinkage, and important climate variables, especially wind speed and air temperature, are shown using correlation analysis. These results demonstrate how important land cover dynamics are in hastening the creation of dust storms and desertification processes in the Southern Aral Sea region. In dry areas, the used remote sensing and GIS-based method supports sustainable land and ecosystem management and offers an efficient framework for long-term environmental monitoring."
    - title: "Remote sensing for ecological status assessment of agricultural landscapes in the Surkhandarya Terrestrial Basin, Uzbekistan"
      authors: "Prinjon Khasanov; Yunus Karimov; Kuvondik Yarashev; Ismoiljon Mirzahmedov; Rasul Mamajonov"
      journal: "E3S Web of Conferences"
      published: "2026"
      published_month: "2026 (month not verified)"
      published_month_zh: "2026（月份未核准）"
      doi: "10.1051/e3sconf/202671902007"
      url: "https://doi.org/10.1051/e3sconf/202671902007"
      group: "其他相关期刊：按主题相关性补充"
      group_zh: "其他相关期刊：按主题相关性补充"
      group_en: "Other relevant journals: topical supplements"
      tags: "ocean colour"
      tags_zh: "ocean colour"
      tags_en: "ocean colour"
      summary: "摘要：在中亚，土地退化正在成为一个更大的问题，特别是在容易受到气候变化和不负责任的土地使用影响的农业地区。本研究利用遥感和基于 GIS 的技术评估了乌兹别克斯坦 Surkhandarya 陆地盆地过去 20 年（2000 年至 2020 年）的生态状况。通过分析 Landsat 8 OLI 和 Sentinel-2 MSI 的多时相卫星照片，确定了土地利用和土地覆盖 (LULC) 变化、植被退化和生态风险区。研究结果表明，天然草地和森林大部分被农田取代，干旱和裸露地区数量增加，加速了土地退化。 NDVI 数据的空间分析显示，植被健康状况持续恶化，特别是在北部和东部地区。根据 NDVI 数据的空间分析，植被健康状况逐渐下降，特别是在北部和东部地区。根据生态风险评估，流域东部和南部地区发现了高风险地区，森林砍伐和集约化农业增加了生态脆弱性。研究结果强调了可持续土地管理技术的至关重要性，例如造林、有效灌溉和土壤保持技术，以及利用遥感进行长期环境监测。"
      summary_zh: "摘要：在中亚，土地退化正在成为一个更大的问题，特别是在容易受到气候变化和不负责任的土地使用影响的农业地区。本研究利用遥感和基于 GIS 的技术评估了乌兹别克斯坦 Surkhandarya 陆地盆地过去 20 年（2000 年至 2020 年）的生态状况。通过分析 Landsat 8 OLI 和 Sentinel-2 MSI 的多时相卫星照片，确定了土地利用和土地覆盖 (LULC) 变化、植被退化和生态风险区。研究结果表明，天然草地和森林大部分被农田取代，干旱和裸露地区数量增加，加速了土地退化。 NDVI 数据的空间分析显示，植被健康状况持续恶化，特别是在北部和东部地区。根据 NDVI 数据的空间分析，植被健康状况逐渐下降，特别是在北部和东部地区。根据生态风险评估，流域东部和南部地区发现了高风险地区，森林砍伐和集约化农业增加了生态脆弱性。研究结果强调了可持续土地管理技术的至关重要性，例如造林、有效灌溉和土壤保持技术，以及利用遥感进行长期环境监测。"
      summary_en: "Abstract: In Central Asia, land degradation is becoming a bigger problem, particularly in agricultural areas that are susceptible to climate change and irresponsible land usage. This study evaluates the ecological state of the Surkhandarya Terrestrial Basin in Uzbekistan over the previous 20 years (2000–2020) using remote sensing and GIS-based techniques. Land use and land cover (LULC) changes, vegetation degradation, and ecological risk zones were identified by analyzing multitemporal satellite photos from Landsat 8 OLI and Sentinel-2 MSI. The findings indicate that natural grasslands and woods have been mostly replaced by agricultural land, and the number of dry and bare areas has grown, hastening land degradation. The NDVI data’s spatial analysis revealed a steady deterioration in the health of the vegetation, particularly in the northern and eastern The vegetation health gradually declined, particularly in the northern and eastern regions, according to a spatial analysis of the NDVI data. High-risk areas were found in the eastern and southern regions of the basin, where deforestation and intensified agriculture have raised ecological vulnerability, according to an ecological risk assessment. The results emphasize the critical necessity for sustainable land management techniques, such as afforestation, effective irrigation, and soil conservation techniques, as well as the use of remote sensing for long-term environmental monitoring."

