      tags: "phytoplankton groups; nutrients; carbon; dataset"
      tags_zh: "phytoplankton groups; nutrients; carbon; dataset"
      tags_en: "phytoplankton groups; nutrients; carbon; dataset"
      summary: "这篇数据论文整理多佛海峡 DYPHYRAD 航次中的高空间分辨率浮游植物监测资料。它覆盖从近岸到外海的梯度，并包含浮游植物群组、营养盐和相关碳循环信息。研究目标是把重复调查资料整理成可复用的数据集，支持对英吉利海峡生态变化的分析。结果提供了一个适合研究沿岸-外海差异和季节变化的观测基础。它对近岸生态监测、浮游植物功能群和区域碳循环研究很有帮助。"
      summary_zh: "这篇数据论文整理多佛海峡 DYPHYRAD 航次中的高空间分辨率浮游植物监测资料。它覆盖从近岸到外海的梯度，并包含浮游植物群组、营养盐和相关碳循环信息。研究目标是把重复调查资料整理成可复用的数据集，支持对英吉利海峡生态变化的分析。结果提供了一个适合研究沿岸-外海差异和季节变化的观测基础。它对近岸生态监测、浮游植物功能群和区域碳循环研究很有帮助。"
      summary_en: "This data paper compiles high-spatial-resolution phytoplankton monitoring from the DYPHYRAD surveys in the Strait of Dover. It covers coastal-to-offshore gradients and includes phytoplankton groups, nutrients, and carbon-relevant information. The goal is to turn repeated survey observations into a reusable dataset for analysing ecological change in the English Channel region. The result is an observational basis for studying coastal-offshore differences and seasonal variability. It is useful for coastal monitoring, phytoplankton functional-group studies, and regional carbon-cycle research."
    - title: "Estimating particulate organic matter flux from in-situ optics: A framework for correcting for suspended particles and incorporating depth-dependent degradation"
      authors: "Nasrollah Moradi; Lili Hufnagel; Simon Ramondenc; Clara M. Flintrop; Rainer Kiko; Tim Fischer; Helena Hauss; Arne Körtzinger; et al."
      journal: "Biogeosciences"
