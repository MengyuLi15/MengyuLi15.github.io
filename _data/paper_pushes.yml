      summary: "用细胞资源分配模型评估变暖下浮游植物蛋白、糖类和脂类组成变化。结论是高纬和极区蛋白比例可能下降、有机质质量改变；这会影响食物网营养质量和用固定化学计量估算碳输出的可靠性。"
      summary_zh: "用细胞资源分配模型评估变暖下浮游植物蛋白、糖类和脂类组成变化。结论是高纬和极区蛋白比例可能下降、有机质质量改变；这会影响食物网营养质量和用固定化学计量估算碳输出的可靠性。"
      summary_en: "This paper uses a cellular allocation model to assess how warming changes phytoplankton protein, carbohydrate and lipid composition. It suggests lower protein fractions in high-latitude and polar systems and changing organic matter quality, which matters for food webs and carbon-export stoichiometry."
    - title: "BGC-Argo float reveals shifts in nitrogen-carbon cycling in an oxygen-deficient zone"
      authors: "Mariana B. Bif; Colette Kelly; Mark A. Altabet; Annie Bourbonnais; Claire Elbon; Edgart Flores; Alanna Mnich; Josh Plant; et al."
      journal: "Communications Earth & Environment"
      published: "2026-04-06"
      published_month: "2026-04"
      published_month_zh: "2026-04"
      doi: "10.1038/s43247-026-03410-5"
      url: "https://www.nature.com/articles/s43247-026-03410-5"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      tags_zh: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      tags_en: "BGC-Argo; microbial carbon; nitrogen cycling; ODZ"
      summary: "用一支 BGC-Argo 浮标在东热带北太平洋低氧区做近三年剖面观测，联合氧、硝酸盐、亚硝酸盐、pH、叶绿素和 POC。结果显示 BGC-Argo 可用于诊断氮氧化还原过程与碳循环耦合，而不只是看 Chl-a 或 POC 代理量。"
      summary_zh: "用一支 BGC-Argo 浮标在东热带北太平洋低氧区做近三年剖面观测，联合氧、硝酸盐、亚硝酸盐、pH、叶绿素和 POC。结果显示 BGC-Argo 可用于诊断氮氧化还原过程与碳循环耦合，而不只是看 Chl-a 或 POC 代理量。"
      summary_en: "A nearly three-year BGC-Argo record from an oxygen-deficient zone combines oxygen, nitrate, nitrite, pH, chlorophyll and POC. The study shows that BGC-Argo can diagnose coupled nitrogen redox and carbon cycling processes, not only biomass proxies."
    - title: "Global declines in net primary production in the ocean color era"
      authors: "Greg M. Silsbe; James Fox; Toby K. Westberry; Kimberly H. Halsey"
      journal: "Nature Communications"
      published: "2025-07-01"
      published_month: "2025-07"
      published_month_zh: "2025-07"
      doi: "10.1038/s41467-025-60906-y"
      url: "https://www.nature.com/articles/s41467-025-60906-y"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "ocean colour; NPP; climate trend"
      tags_zh: "ocean colour; NPP; climate trend"
      tags_en: "ocean colour; NPP; climate trend"
      summary: "用 SeaWiFS 和 MODIS-Aqua 的 25 年海色记录重估全球 NPP 变化。主要结论是近一半海域 NPP 显著下降，集中在热带和副热带层化海区，机制指向营养盐限制增强，是海色监测 carbon pump 生产端变化的关键论文。"
      summary_zh: "用 SeaWiFS 和 MODIS-Aqua 的 25 年海色记录重估全球 NPP 变化。主要结论是近一半海域 NPP 显著下降，集中在热带和副热带层化海区，机制指向营养盐限制增强，是海色监测 carbon pump 生产端变化的关键论文。"
      summary_en: "Using 25 years of SeaWiFS and MODIS-Aqua ocean-colour records, this study finds significant NPP declines across nearly half of the ocean, especially in stratified tropical and subtropical waters. The likely mechanism is stronger nutrient limitation."
    - title: "Marine heatwaves modulate food webs and carbon transport processes"
      authors: "Mariana B. Bif; Colleen T. E. Kellogg; Yibin Huang; Julia Anstett; Sachia Traving; M. Angelica Peña; Steven J. Hallam; Kenneth S. Johnson"
      journal: "Nature Communications"
      published: "2025-10-06"
      published_month: "2025-10"
      published_month_zh: "2025-10"
      doi: "10.1038/s41467-025-63605-w"
      url: "https://www.nature.com/articles/s41467-025-63605-w"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "BGC-Argo; marine heatwaves; POC; microbial ecology"
      tags_zh: "BGC-Argo; marine heatwaves; POC; microbial ecology"
      tags_en: "BGC-Argo; marine heatwaves; POC; microbial ecology"
      summary: "把 Line P 附近 BGC-Argo、色素和 DNA metabarcoding 结合分析。结果显示 2015 和 2019 海洋热浪期间 POC 异常升高，但小颗粒在中层累积并缓慢再矿化，未必提高深海封存，反而可能降低碳泵效率。"
      summary_zh: "把 Line P 附近 BGC-Argo、色素和 DNA metabarcoding 结合分析。结果显示 2015 和 2019 海洋热浪期间 POC 异常升高，但小颗粒在中层累积并缓慢再矿化，未必提高深海封存，反而可能降低碳泵效率。"
      summary_en: "This study combines BGC-Argo, pigments and DNA metabarcoding near Line P. It finds anomalously high POC during the 2015 and 2019 marine heatwaves, but small particles accumulated and remineralized slowly at mid-depths, potentially reducing carbon-pump efficiency."
    - title: "Marine heatwaves are shaping the vertical structure of phytoplankton in the global ocean"
      authors: "Xueying Ma; Gengxin Chen"
      journal: "Communications Earth & Environment"
      published: "2025-08-29"
      published_month: "2025-08"
      published_month_zh: "2025-08"
      doi: "10.1038/s43247-025-02718-y"
      url: "https://www.nature.com/articles/s43247-025-02718-y"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "BGC-Argo; marine heatwaves; vertical chlorophyll; DCM"
      tags_zh: "BGC-Argo; marine heatwaves; vertical chlorophyll; DCM"
      tags_en: "BGC-Argo; marine heatwaves; vertical chlorophyll; DCM"
      summary: "利用 2008-2024 年全球 BGC-Argo 剖面研究 MHW 对浮游植物垂向结构的影响。结论是响应常在亚表层强于表层，可分为增强、减弱和亚表层反转等类型，深叶绿素极大层会被显著重塑。"
      summary_zh: "利用 2008-2024 年全球 BGC-Argo 剖面研究 MHW 对浮游植物垂向结构的影响。结论是响应常在亚表层强于表层，可分为增强、减弱和亚表层反转等类型，深叶绿素极大层会被显著重塑。"
      summary_en: "Using global BGC-Argo profiles from 2008 to 2024, this paper shows that marine heatwave impacts on chlorophyll are often stronger below the surface. It identifies intensified, weakened and subsurface-reversed responses and highlights DCM restructuring."
    - title: "The oceanic physical injection pump of organic carbon"
      authors: "Marco Bellacicco; Salvatore Marullo; Giorgio Dall’Olmo; Daniele Iudicone; Bruno Buongiorno Nardelli"
