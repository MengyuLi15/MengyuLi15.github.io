    - title: "Assessing Environmental Impacts on Coral Reef Ecosystems under Climate and Anthropogenic Pressures based on GEE workflow in the Northwestern Gulf of Suez, Egypt"
      authors: "Mohamed Ahmed Badawi Atalla; Dr. Mahmoud Sami"
      journal: "International Journal of Engineering and Geosciences"
      published: "2026-06-28"
      published_month: "2026-06"
      published_month_zh: "2026-06"
