      summary: "摘要：牛皮癣是一种慢性、免疫介导的炎症性皮肤病，其病因复杂，涉及遗传易感性和环境触发因素。越来越多的证据表明，肠道微生物组在调节系统免疫和皮肤稳态方面发挥着关键作用，这种关系被“肠-皮肤轴”所概括。然而，环境微生物暴露，特别是来自独特海洋生态系统的微生物暴露对该轴的潜在影响仍有待探索。我们假设，职业或居住地暴露于海洋环境会影响人体微生物组（皮肤和肠道），进而调节牛皮癣的风险和严重程度。本文介绍了海洋-肠-皮肤（OGS）队列研究的研究方案和基线特征，这是中国第一个致力于研究与海洋相关的皮肤病的前瞻性队列。 OGS队列研究于2023年1月在中国南方主要沿海城市珠海启动。目标人群包括 10,000 名 30-70 岁的成年人，分为高和低海洋暴露组。参与者接受全面的健康检查，包括皮肤病学评估（银屑病面积和严重程度指数 [PASI]、湿疹面积和严重程度指数 [EASI]、皮肤病生活质量指数 [DLQI] 和经皮失水量 [TEWL]）、收集粪便和皮肤拭子样本进行 16S rRNA 基因测序和鸟枪法宏基因组学、采血进行生物标志物分析，以及收集人口统计、生活方式、饮食、医疗情况的详细调查问卷历史和海洋暴露指标。参与者将在前 2 年每两年进行一次随访，此后每年进行一次，总共 5 年。 基线招募于 2025 年 12 月完成，五个研究阶段共招募了 10,245 名参与者。本文报告了该队列的基线人口统计学和临床​​特征。特应性皮炎 (AD) 2 年。该队列由 2512 名银屑病患者、2488 名 AD 患者和 2500 名健康对照组成，在基线时收集了全面的多组学数据。 OGS 队列研究具有独特的定位来质疑新颖的“海洋-肠道-皮肤”轴。通过将深度临床表型分析与多组学微生物组分析和严格的环境暴露评估相结合，该队列将产生强有力的证据，证明海洋环境如何通过调节人类微生物组间接影响皮肤健康。"
      summary_zh: "摘要：牛皮癣是一种慢性、免疫介导的炎症性皮肤病，其病因复杂，涉及遗传易感性和环境触发因素。越来越多的证据表明，肠道微生物组在调节系统免疫和皮肤稳态方面发挥着关键作用，这种关系被“肠-皮肤轴”所概括。然而，环境微生物暴露，特别是来自独特海洋生态系统的微生物暴露对该轴的潜在影响仍有待探索。我们假设，职业或居住地暴露于海洋环境会影响人体微生物组（皮肤和肠道），进而调节牛皮癣的风险和严重程度。本文介绍了海洋-肠-皮肤（OGS）队列研究的研究方案和基线特征，这是中国第一个致力于研究与海洋相关的皮肤病的前瞻性队列。 OGS队列研究于2023年1月在中国南方主要沿海城市珠海启动。目标人群包括 10,000 名 30-70 岁的成年人，分为高和低海洋暴露组。参与者接受全面的健康检查，包括皮肤病学评估（银屑病面积和严重程度指数 [PASI]、湿疹面积和严重程度指数 [EASI]、皮肤病生活质量指数 [DLQI] 和经皮失水量 [TEWL]）、收集粪便和皮肤拭子样本进行 16S rRNA 基因测序和鸟枪法宏基因组学、采血进行生物标志物分析，以及收集人口统计、生活方式、饮食、医疗情况的详细调查问卷历史和海洋暴露指标。参与者将在前 2 年每两年进行一次随访，此后每年进行一次，总共 5 年。 基线招募于 2025 年 12 月完成，五个研究阶段共招募了 10,245 名参与者。本文报告了该队列的基线人口统计学和临床​​特征。特应性皮炎 (AD) 2 年。该队列由 2512 名银屑病患者、2488 名 AD 患者和 2500 名健康对照组成，在基线时收集了全面的多组学数据。 OGS 队列研究具有独特的定位来质疑新颖的“海洋-肠道-皮肤”轴。通过将深度临床表型分析与多组学微生物组分析和严格的环境暴露评估相结合，该队列将产生强有力的证据，证明海洋环境如何通过调节人类微生物组间接影响皮肤健康。"
      summary_en: "Abstract: Psoriasis is a chronic, immune-mediated inflammatory skin disease with a complex etiology involving both genetic susceptibility and environmental triggers. Accumulating evidence points to a critical role for the gut microbiome in modulating systemic immunity and cutaneous homeostasis—a relationship encapsulated by the \"gut–skin axis\". However, the potential influence of environmental microbial exposures, particularly those originating from distinctive marine ecosystems, on this axis remains unexplored. We hypothesized that occupational or residential exposure to the marine environment shapes the human microbiome (both cutaneous and intestinal), which in turn modulates the risk and severity of psoriasis. This article presents the study protocol and baseline characteristics of the Ocean–Gut–Skin (OGS) Cohort Study, the first prospective cohort in China dedicated to investigating marine-associated dermatological disorders. The OGS Cohort Study was initiated in January 2023 in Zhuhai, a major coastal city in southern China. The target population comprises 10,000 adults aged 30–70 years, stratified into high and low marine exposure groups. Participants undergo comprehensive health examinations, including dermatological assessment (Psoriasis Area and Severity Index [PASI], Eczema Area and Severity Index [EASI], Dermatology Life Quality Index [DLQI], and transepidermal water loss [TEWL]), collection of stool and skin swab samples for 16S rRNA gene sequencing and shotgun metagenomics, blood sampling for biomarker profiling, and a detailed questionnaire capturing demographic, lifestyle, dietary, medical history, and marine exposure metrics. Participants will be followed biennially for the first 2 years and annually thereafter for a total of 5 years. Baseline recruitment was completed in December 2025, yielding a cohort of 10,245 participants across five study phases. This paper reports the baseline demographic and clinical characteristics of the cohort. The mean disease duration was 8.5 years for psoriasis and 6.2 years for atopic dermatitis (AD). The cohort comprises 2512 psoriasis patients, 2488 AD patients, and 2500 healthy controls, with comprehensive multi-omics data collected at baseline. Follow-up is ongoing. The OGS Cohort Study is uniquely positioned to interrogate the novel \"Ocean–Gut–Skin\" axis. By integrating deep clinical phenotyping with multi-omics microbiome analyses and rigorous environmental exposure assessment, this cohort will generate robust evidence on how the marine environment may indirectly influence cutaneous health through modulation of the human microbiome."
    - title: "Cross-dataset benchmarking of machine learning models for marine and atmospheric environmental prediction"
      authors: "Xuehua Zhou; Hanming Zhang; Tiantian Du; Quanbo Yuan; Huijuan Wang"
