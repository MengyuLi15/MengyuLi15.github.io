      summary: "摘要：植被覆盖的沿海湿地，特别是红树林、海草床和盐沼，是生物多样性丰富的生态系统，其蓝碳结果取决于生物群落、沉积物动态、水文连通性和景观环境。生物多样性保护和蓝碳管理通常通过单独的科学、监测和政策框架进行评估。本综述采用分阶段文献检索和主题综合来研究三种主要植被沿海湿地类型的生物多样性-蓝碳联系。它考虑了分类、遗传、功能和栖息地多样性如何影响生产力、沉积物稳定、营养交换、碳储量、碳埋藏和碳保留。它还评估了气候变化、栖息地破碎化、水文改变、污染和人为干扰如何削弱这些联系。 该综合比较了代表性的碳储量和埋藏率基线，检查了保护和恢复的协同作用和权衡，并扩大了对海草状况转变的讨论。实地调查、遥感、无人机、环境DNA和人工智能数据集成被置于分层监测框架内。该审查进一步制定了以生物多样性为中心的蓝碳管理的操作决策路径。当保护和恢复维持本地群落、水文交换、沉积物稳定性、栖息地复杂性、迁徙空间和长期管理能力时，就会产生持久的蓝碳效益。"
      summary_zh: "摘要：植被覆盖的沿海湿地，特别是红树林、海草床和盐沼，是生物多样性丰富的生态系统，其蓝碳结果取决于生物群落、沉积物动态、水文连通性和景观环境。生物多样性保护和蓝碳管理通常通过单独的科学、监测和政策框架进行评估。本综述采用分阶段文献检索和主题综合来研究三种主要植被沿海湿地类型的生物多样性-蓝碳联系。它考虑了分类、遗传、功能和栖息地多样性如何影响生产力、沉积物稳定、营养交换、碳储量、碳埋藏和碳保留。它还评估了气候变化、栖息地破碎化、水文改变、污染和人为干扰如何削弱这些联系。 该综合比较了代表性的碳储量和埋藏率基线，检查了保护和恢复的协同作用和权衡，并扩大了对海草状况转变的讨论。实地调查、遥感、无人机、环境DNA和人工智能数据集成被置于分层监测框架内。该审查进一步制定了以生物多样性为中心的蓝碳管理的操作决策路径。当保护和恢复维持本地群落、水文交换、沉积物稳定性、栖息地复杂性、迁徙空间和长期管理能力时，就会产生持久的蓝碳效益。"
      summary_en: "Abstract: Vegetated coastal wetlands, especially mangroves, seagrass beds, and salt marshes, are biodiversity-rich ecosystems whose blue carbon outcomes depend on living communities, sediment dynamics, hydrological connectivity, and landscape context. Biodiversity conservation and blue carbon management are often assessed through separate scientific, monitoring, and policy frameworks. This review uses a staged literature search and thematic synthesis to examine biodiversity–blue carbon linkages across the three major vegetated coastal wetland types. It considers how taxonomic, genetic, functional, and habitat diversity influence productivity, sediment stabilization, trophic exchange, carbon stocks, carbon burial, and carbon retention. It also evaluates how climate change, habitat fragmentation, hydrological alteration, pollution, and anthropogenic disturbance weaken these linkages. The synthesis compares representative carbon-stock and burial-rate baselines, examines conservation and restoration synergies and trade-offs, and expands the discussion of seagrass regime shifts. Field surveys, remote sensing, unmanned aerial vehicles, environmental DNA, and AI-enabled data integration are placed within a tiered monitoring framework. The review further develops an operational decision pathway for biodiversity-centered blue carbon management. Persistent blue carbon benefits arise where conservation and restoration maintain native communities, hydrological exchange, sediment stability, habitat complexity, migration space, and long-term stewardship capacity."

