    - title: "A Quality-Control Procedure for Bio-Optical Applications of Hyperspectral Radiometric Upwelling Radiance and Downwelling Irradiance Profiles Measured by BioGeoChemical-Argo Floats."
      authors: "Lou Andrès; Charlotte Begouen Demeaux; Emanuele Organelli; Giovanni La Forgia; Nils Haëntjens; Vincenzo Vellucci; Edouard Leymarie; Catherine Schmechtig; et al."
      journal: "Journal of Atmospheric and Oceanic Technology"
      published: "2026-06-12"
