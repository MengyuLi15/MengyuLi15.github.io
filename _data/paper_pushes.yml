      summary: "摘要：将叶绿素a浓度与光衰减和透光深度联系起来的表面生物光学关系被广泛应用于公海的海洋颜色应用中，但它们的全球性能仍然很少受到现有观测框架的限制。为了解决这一限制，我们根据案例 1 水域中配备多光谱辐射传感器和叶绿素 a 荧光计的生物地球化学-Argo (BGC-Argo) 浮标的全球分布数据集，对常用的表面生物光学关系进行了重新评估。我们表明，上 5 m 的平均表面叶绿素-a 浓度为各种辐射条件下第一光学深度内的叶绿素-a 提供了可靠的代理，支持其用作生物光学应用的一致表面变量。在此结果的基础上，评估了将表面叶绿素-a 与漫反射系数和透光深度联系起来的经验关系，发现其与已建立的全球经验模型大体一致，同时显示出案例 1 光学体系之间的明显差异。尽管全局改装模型解释了大部分总变异性，但系统偏差揭示了案例 1 水域内给定全局参数化的可转移性有限。事实上，特定于水类的参数化可以减少偏差，突出了在估计表面叶绿素-a 的光衰减和透光深度时考虑生物光学状态依赖性的重要性。这些结果为常用的表面生物光学模型提供了全球一致的、基于辐射测量的基准，并支持扩展的 BGC-Argo 阵列的进一步应用。"
      summary_zh: "摘要：将叶绿素a浓度与光衰减和透光深度联系起来的表面生物光学关系被广泛应用于公海的海洋颜色应用中，但它们的全球性能仍然很少受到现有观测框架的限制。为了解决这一限制，我们根据案例 1 水域中配备多光谱辐射传感器和叶绿素 a 荧光计的生物地球化学-Argo (BGC-Argo) 浮标的全球分布数据集，对常用的表面生物光学关系进行了重新评估。我们表明，上 5 m 的平均表面叶绿素-a 浓度为各种辐射条件下第一光学深度内的叶绿素-a 提供了可靠的代理，支持其用作生物光学应用的一致表面变量。在此结果的基础上，评估了将表面叶绿素-a 与漫反射系数和透光深度联系起来的经验关系，发现其与已建立的全球经验模型大体一致，同时显示出案例 1 光学体系之间的明显差异。尽管全局改装模型解释了大部分总变异性，但系统偏差揭示了案例 1 水域内给定全局参数化的可转移性有限。事实上，特定于水类的参数化可以减少偏差，突出了在估计表面叶绿素-a 的光衰减和透光深度时考虑生物光学状态依赖性的重要性。这些结果为常用的表面生物光学模型提供了全球一致的、基于辐射测量的基准，并支持扩展的 BGC-Argo 阵列的进一步应用。"
      summary_en: "Abstract: Surface bio-optical relationships linking chlorophyll-a concentration to light attenuation and euphotic depth are widely used in ocean color applications across the open ocean, yet their global performance remains poorly constrained by existing observational frameworks. To address this limitation, we present a re-assessment of commonly used surface bio-optical relationships based on a globally distributed dataset from Biogeochemical-Argo (BGC-Argo) floats equipped with multispectral radiometric sensors and chlorophyll-a fluorometers in Case 1 waters. We show that surface chlorophyll-a concentration averaged over the upper 5 m provides a robust proxy for chlorophyll-a within the first optical depth across a wide range of radiometric conditions, supporting its use as a consistent surface variable for bio-optical applications. Building on this result, empirical relationships linking surface chlorophyll-a to diffuse attenuation coefficients and euphotic depth are evaluated and found to be broadly consistent with established global empirical models, while showing clear differences across Case 1 optical regimes. Although globally refitted models explain much of the total variability, systematic biases reveal the limited transferability of given global parameterizations within Case 1 waters. Indeed, water-class-specific parameterizations reduce bias, highlighting the importance of accounting for bio-optical regime dependence when estimating light attenuation and euphotic depth from surface chlorophyll-a. These results provide a globally consistent, radiometry-based benchmark for commonly used surface bio-optical models and support further applications across the expanding BGC-Argo array."
    - title: "Warm Current Intensification Altered Phytoplankton Communities in the Yellow Sea: Insights from Sedimentary Ancient DNA Metabarcoding"
      authors: "Haoyuan Zhang; Yaping Wang; Huiwen Deng; Linxuan Li; Dongyan Liu; Meixun Zhao; Jun Gong"
