      summary: "摘要：美国西部野火活动的增加和降雨量的增加增加了火灾后泥石流灾害（PFDF）。美国地质调查局 (USGS) 采用 M1 模型来评估 PFDF 可能性，以盆地平均差异归一化燃烧比 (dNBR) 作为主要输入。 Thomas Fire 报告称 81% 的盆地存在非正态 dNBR 分布，降低了该方法捕获燃烧异质性的能力。在这里，我们修改 M1 模型以纳入替代的 dNBR 指标（中值、峰值频率和第一个四分位数），以更好地反映燃烧分布。我们比较多光谱卫星和高光谱飞机衍生的 dNBR 指标，以评估 PFDF 预测中的传感器类型和优化的 dNBR 指数波长。我们以加利福尼亚州蒙特西托市为案例研究，针对 Thomas Fire PFDF 库存进行验证，将启动分类为超过定义阈值 (50%–90%) 的概率。第一个四分位数是 50% 阈值 (OA = 61. 33%) 时最有效的指标，其次是峰值频率、中位数和平均值。高光谱图像对植被健康更敏感，报告的 dNBR 和 PFDF 风险比多光谱数据更高，但由于烟雾限制了盆地覆盖范围，性能仍然相似。 M1 模型的结构限制了较高降雨强度下的性能，误报在 24-32 毫米/小时时急剧上升，这可能是由于乘法降雨项所致。第一个四分位数解决了这种乘法效应，不应被解释为烧伤异质性或 PFDF 启动条件的更好指标。未来的工作应该平衡 M1 模型中的降雨强度，纳入更具空间代表性的输入，并从单波段指数转向利用高光谱维度的方法。"
      summary_zh: "摘要：美国西部野火活动的增加和降雨量的增加增加了火灾后泥石流灾害（PFDF）。美国地质调查局 (USGS) 采用 M1 模型来评估 PFDF 可能性，以盆地平均差异归一化燃烧比 (dNBR) 作为主要输入。 Thomas Fire 报告称 81% 的盆地存在非正态 dNBR 分布，降低了该方法捕获燃烧异质性的能力。在这里，我们修改 M1 模型以纳入替代的 dNBR 指标（中值、峰值频率和第一个四分位数），以更好地反映燃烧分布。我们比较多光谱卫星和高光谱飞机衍生的 dNBR 指标，以评估 PFDF 预测中的传感器类型和优化的 dNBR 指数波长。我们以加利福尼亚州蒙特西托市为案例研究，针对 Thomas Fire PFDF 库存进行验证，将启动分类为超过定义阈值 (50%–90%) 的概率。第一个四分位数是 50% 阈值 (OA = 61. 33%) 时最有效的指标，其次是峰值频率、中位数和平均值。高光谱图像对植被健康更敏感，报告的 dNBR 和 PFDF 风险比多光谱数据更高，但由于烟雾限制了盆地覆盖范围，性能仍然相似。 M1 模型的结构限制了较高降雨强度下的性能，误报在 24-32 毫米/小时时急剧上升，这可能是由于乘法降雨项所致。第一个四分位数解决了这种乘法效应，不应被解释为烧伤异质性或 PFDF 启动条件的更好指标。未来的工作应该平衡 M1 模型中的降雨强度，纳入更具空间代表性的输入，并从单波段指数转向利用高光谱维度的方法。"
      summary_en: "Abstract: Rising wildfire activity and stronger rainfall in the western US have increased Post-Fire Debris Flow hazards (PFDF). The United States Geological Survey (USGS) employs the M1 model to evaluate PFDF likelihood, with basin-averaged differenced Normalized Burn Ratio (dNBR) as a primary input. The Thomas Fire reports non-normal dNBR distributions in 81% of basins, reducing the means’ capacity to capture burn heterogeneity. Here, we modify the M1 model to incorporate alternative dNBR metrics (median, peak frequency, and first quartile) that better reflect the burn distribution. We compare multispectral satellite and hyperspectral aircraft-derived dNBR metrics to assess sensor type and optimized dNBR index wavelengths in PFDF prediction. We validate against a Thomas Fire PFDF inventory, classifying initiation as probabilities exceeding defined thresholds (50%–90%), using Montecito, California, as a case study. The first quartile was the most effective metric at a 50% threshold (OA = 61.33%), followed by peak frequency, median, and mean. Hyperspectral imagery was more sensitive to vegetation health, reporting higher dNBR and PFDF risk than multispectral data, but performance remained similar because smoke limited basin coverage. The M1 model’s structure limits performance at higher rainfall intensities, where false positives sharply rise at 24–32 mm/hr, likely due to the multiplicative rainfall term. The first quartile addresses this multiplicative effect and should not be interpreted as a better indicator of burn heterogeneity or PFDF initiation conditions. Future work should balance rainfall intensity in the M1 model, incorporate more spatially representative inputs, and shift from single-band indices to methods leveraging hyperspectral dimensionality."

