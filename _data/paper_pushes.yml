  papers:
    - title: "Diatoms vs dinoflagellates: a temporal network analysis of bloom impacts on phytoplankton diversity and community structure in French coastal waters"
      authors: "Jean-Yves Dias; Victor Pochic; Samuel Chaffron; Pierre Gernez"
      journal: "ISME Communications"
      published: "2026-06-19"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.1093/ismeco/ycag174"
      url: "https://doi.org/10.1093/ismeco/ycag174"
      group: "重点关注团队"
      group_zh: "重点关注团队"
      group_en: "Focused team"
      tags: "phytoplankton"
      tags_zh: "phytoplankton"
      tags_en: "phytoplankton"
      summary: "摘要：了解浮游植物群落对水华事件的反应至关重要，因为这些对生物地球化学循环、海洋食物网具有重大影响，但也可能对生态系统、经济和公共卫生有害。硅藻和甲藻是两种最常见的水华形成类，具有不同的生态和水华动态。利用对法国沿海水域的长期浮游植物监测调查 (REPHY) 的时间序列，并通过生态关联网络和多样性指标进行分析，我们研究了硅藻和甲藻的繁殖如何影响浮游植物群落内的多样性和群落结构。我们强调了不同的反应：硅藻水华期间物种丰富度增加，而甲藻水华期间物种丰富度减少。然而，两种水华类型均导致 Shannon 指数和 Pielou 指数下降。 两种开花类型之间的时间关联网络模块化和关联强度也受到不同的影响。然而，关联网络中的高级关联类型和组成保持稳定，表明它们的比例在生态系统功能和恢复力中发挥着重要作用。我们根据已知的生态和生物过程对这些发现提出了几种假设，这些假设仍有待在专门研究中进行单独测试。我们的工作强调了区分不同类型的水华和研究浮游植物之间相互作用的作用以更好地了解其动态的重要性。"
      summary_zh: "摘要：了解浮游植物群落对水华事件的反应至关重要，因为这些对生物地球化学循环、海洋食物网具有重大影响，但也可能对生态系统、经济和公共卫生有害。硅藻和甲藻是两种最常见的水华形成类，具有不同的生态和水华动态。利用对法国沿海水域的长期浮游植物监测调查 (REPHY) 的时间序列，并通过生态关联网络和多样性指标进行分析，我们研究了硅藻和甲藻的繁殖如何影响浮游植物群落内的多样性和群落结构。我们强调了不同的反应：硅藻水华期间物种丰富度增加，而甲藻水华期间物种丰富度减少。然而，两种水华类型均导致 Shannon 指数和 Pielou 指数下降。 两种开花类型之间的时间关联网络模块化和关联强度也受到不同的影响。然而，关联网络中的高级关联类型和组成保持稳定，表明它们的比例在生态系统功能和恢复力中发挥着重要作用。我们根据已知的生态和生物过程对这些发现提出了几种假设，这些假设仍有待在专门研究中进行单独测试。我们的工作强调了区分不同类型的水华和研究浮游植物之间相互作用的作用以更好地了解其动态的重要性。"
      summary_en: "Abstract: Understanding phytoplankton community responses to bloom events is essential as these have major implications for biogeochemical cycles, marine food webs, but can also be harmful to ecosystems, the economy, and public health. Diatoms and dinoflagellates are the two most common bloom-forming classes, with distinct ecologies and bloom dynamics. Using time series from a long-term phytoplankton monitoring survey (REPHY) of French coastal waters analysed with ecological association networks and diversity metrics, we investigated how blooms of diatoms and dinoflagellates affect diversity and community structure within phytoplankton communities. We highlight distinct responses: an increase in species richness during diatom blooms and a decrease during dinoflagellate blooms. However, both bloom types resulted in a decrease in Shannon and Pielou indices. Temporal association networks modularity and association strength were also differently impacted between both bloom types. However, high-level association types and composition in association networks remain stable, suggesting an important role of their proportions in ecosystem functioning and resilience. We propose several hypotheses for these findings based on known ecological and biological processes, that remain to be tested individually in dedicated studies. Our work underlines the importance of distinguishing the different types of blooms and studying the role of interactions between phytoplankton for a better understanding of their dynamics."
    - title: "Assessing the Effects of Mussel Aquaculture on Coastal Water Quality Using Sentinel-2 Imagery: An Installation-Based Approach in the Sea of Marmara"
