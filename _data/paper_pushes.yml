      summary: "摘要：气溶胶中的有机氮（ON）沉积在海洋生态系统中发挥着至关重要的作用；然而，海洋生物活动对大气ON的影响仍然知之甚少。在这里，我们根据 2016 年 1 月至 2017 年 1 月在泰国曼谷收集的颗粒物样本，研究了海洋生物圈对沿海气溶胶中水溶性 ON (WSON) 的贡献。对 WSON 和水溶性无机氮 (WSIN，包括 NO3- 和 NH4+) 的浓度进行了分析和比较，按陆地气团来源分类为海洋影响、混合影响或大陆影响。海洋气团的 WSON 和 WSIN 浓度显着低于混合气团和大陆气团。尽管如此，WSON 在所有气团类别中仍然占水溶性总氮 (WSTN) 的很大一部分，尽管 WSON/WSTN 比率本身并不能唯一区分海洋影响和人为影响。正矩阵分解表明，海洋喷雾气溶胶（SSA）相关的 WSON 对总 WSON 的贡献随着海洋影响而显着增加，在大陆、混合和海洋条件下分别占 3. 4 %、14 % ± 14 % 和 34 % ± 17 %。对 WSTN 的相应贡献约为 1。此外，通过空气质量暴露于叶绿素 a 浓度来评估的海洋生产力，与 SSA 相关的 WSON 表现出很强的正相关性（r=0."
