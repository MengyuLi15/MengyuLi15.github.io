      published_month_zh: "2025-08"
      doi: "10.1038/s41467-025-62363-z"
      url: "https://www.nature.com/articles/s41467-025-62363-z"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "carbon pump; POC/DOC; physical injection pump"
      tags_zh: "carbon pump; POC/DOC; physical injection pump"
      tags_en: "carbon pump; POC/DOC; physical injection pump"
      summary: "这项研究提出或量化海洋中有机碳的物理注入泵过程。它关注物理输运如何把 POC 或 DOC 从表层带入更深层，而不仅仅依赖颗粒沉降这一条路径。研究把环流、混合或亚中尺度输运与有机碳再分布联系起来。结果强调，物理注入可以成为生物碳泵之外的重要碳封存通道。它对解释 BGC-Argo 剖面中的碳信号、改进碳泵模型和评估海洋碳汇很有帮助。"
      summary_zh: "这项研究提出或量化海洋中有机碳的物理注入泵过程。它关注物理输运如何把 POC 或 DOC 从表层带入更深层，而不仅仅依赖颗粒沉降这一条路径。研究把环流、混合或亚中尺度输运与有机碳再分布联系起来。结果强调，物理注入可以成为生物碳泵之外的重要碳封存通道。它对解释 BGC-Argo 剖面中的碳信号、改进碳泵模型和评估海洋碳汇很有帮助。"
      summary_en: "This study develops or quantifies the physical injection pump of organic carbon in the ocean. It focuses on how physical transport can move POC or DOC from the surface into deeper layers, rather than relying only on gravitational particle sinking. The work connects circulation, mixing, or submesoscale transport with the redistribution of organic carbon. The results highlight physical injection as an important carbon-sequestration pathway alongside the biological carbon pump. It is useful for interpreting carbon signals in profiles, improving carbon-pump models, and assessing ocean carbon uptake."
    - title: "Antarctic krill vertical migrations modulate seasonal carbon export"
      authors: "A. J. R. Smith; S. Wotherspoon; L. Ratnarajah; G. R. Cutter; G. J. Macaulay; B. Hutton; R. King; S. Kawaguchi; et al."
      journal: "Science"
      published: "2025"
      published_month: "2025-01"
      published_month_zh: "2025-01"
      doi: "10.1126/science.adq5564"
      url: "https://www.science.org/doi/10.1126/science.adq5564"
      group: "Science 系列"
      group_zh: "Science 系列"
      group_en: "Science series"
      tags: "carbon export; vertical migration; Southern Ocean"
      tags_zh: "carbon export; vertical migration; Southern Ocean"
      tags_en: "carbon export; vertical migration; Southern Ocean"
      summary: "这项研究关注南大洋磷虾垂向迁移对季节性碳输出的调节作用。它把动物行为与生物碳泵联系起来，强调碳输出并不只由浮游植物和颗粒沉降决定。研究分析磷虾在昼夜或季节尺度上的上下迁移如何改变有机碳向深层输送。结果说明，磷虾迁移可以在特定季节增强或改变南大洋碳输出路径。它对南大洋生态碳泵、食物网-碳循环耦合和碳输出估算很有价值。"
      summary_zh: "这项研究关注南大洋磷虾垂向迁移对季节性碳输出的调节作用。它把动物行为与生物碳泵联系起来，强调碳输出并不只由浮游植物和颗粒沉降决定。研究分析磷虾在昼夜或季节尺度上的上下迁移如何改变有机碳向深层输送。结果说明，磷虾迁移可以在特定季节增强或改变南大洋碳输出路径。它对南大洋生态碳泵、食物网-碳循环耦合和碳输出估算很有价值。"
      summary_en: "This study examines how vertical migration by Antarctic krill modulates seasonal carbon export. It links animal behaviour with the biological carbon pump, showing that export is not controlled only by phytoplankton production and passive particle sinking. The analysis considers how krill movement through the water column changes the transfer of organic carbon to depth. The results indicate that krill migration can enhance or redirect Southern Ocean carbon export during particular seasons. It is valuable for studies of the Southern Ocean carbon pump, food-web coupling, and carbon-export estimation."
    - title: "Declining ocean greenness and phytoplankton blooms in low to mid-latitudes under a warming climate"
      authors: "Zhongkun Hong; Di Long; Kaiyue Shan; Jian-Min Zhang; R. Iestyn Woolway; Maofeng Liu; Michael E. Mann; Hongwei Fang"
      journal: "Science Advances"
      published: "2025-10-17"
      published_month: "2025-10"
      published_month_zh: "2025-10"
      doi: "10.1126/sciadv.adx4857"
      url: "https://www.science.org/doi/10.1126/sciadv.adx4857"
      group: "Science 系列"
      group_zh: "Science 系列"
      group_en: "Science series"
      tags: "ocean colour; phytoplankton blooms; warming"
      tags_zh: "ocean colour; phytoplankton blooms; warming"
      tags_en: "ocean colour; phytoplankton blooms; warming"
      summary: "这项研究利用长期海色记录分析低纬到中纬海洋绿度和浮游植物藻华变化。它把卫星观测中的颜色、叶绿素和藻华信号放到气候变暖背景下解释。研究重点是识别变暖海洋中表层浮游植物活动是否减弱，以及这种变化在哪些纬度带更明显。结果指向低中纬海域海洋绿度和藻华活动下降。它对评估海色趋势、生产力变化和未来生态系统响应很有参考价值。"
      summary_zh: "这项研究利用长期海色记录分析低纬到中纬海洋绿度和浮游植物藻华变化。它把卫星观测中的颜色、叶绿素和藻华信号放到气候变暖背景下解释。研究重点是识别变暖海洋中表层浮游植物活动是否减弱，以及这种变化在哪些纬度带更明显。结果指向低中纬海域海洋绿度和藻华活动下降。它对评估海色趋势、生产力变化和未来生态系统响应很有参考价值。"
      summary_en: "This study uses long-term ocean-colour records to analyse changes in ocean greenness and phytoplankton blooms from low to mid-latitudes. It interprets satellite colour, chlorophyll, and bloom signals in the context of a warming climate. The work asks whether surface phytoplankton activity is weakening and where that weakening is most evident. The results point to declining ocean greenness and bloom activity across low- to mid-latitude waters. It is useful for assessing ocean-colour trends, productivity change, and future ecosystem responses."
    - title: "Decoupled timescales of organic carbon and phosphorus recycling in the global ocean"
      authors: "Megan R. Sullivan; François W. Primeau; Hojong Seo; Judith Camps-Castellà; Keisuke Inomura; Adam C. Martiny"
      journal: "Proceedings of the National Academy of Sciences"
      published: "2026"
      published_month: "2026-02"
      published_month_zh: "2026-02"
      doi: "10.1073/pnas.2514991123"
      url: "https://www.pnas.org/doi/10.1073/pnas.2514991123"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "organic carbon; phosphorus recycling; microbial carbon"
      tags_zh: "organic carbon; phosphorus recycling; microbial carbon"
      tags_en: "organic carbon; phosphorus recycling; microbial carbon"
      summary: "这项研究比较全球海洋中有机碳和磷的再循环时间尺度。它关注的问题是碳和营养元素是否按相同速度循环，而不是简单假设固定化学计量关系。研究通过全球尺度的循环框架分析微生物再矿化、营养盐供应和有机物周转之间的差异。结果说明，有机碳和磷的再循环可以明显脱耦，从而改变系统对扰动或施肥的响应。它对理解微生物碳循环、营养盐限制和生物碳泵效率很重要。"
      summary_zh: "这项研究比较全球海洋中有机碳和磷的再循环时间尺度。它关注的问题是碳和营养元素是否按相同速度循环，而不是简单假设固定化学计量关系。研究通过全球尺度的循环框架分析微生物再矿化、营养盐供应和有机物周转之间的差异。结果说明，有机碳和磷的再循环可以明显脱耦，从而改变系统对扰动或施肥的响应。它对理解微生物碳循环、营养盐限制和生物碳泵效率很重要。"
      summary_en: "This study compares the recycling timescales of organic carbon and phosphorus in the global ocean. It asks whether carbon and nutrient elements cycle at the same pace, rather than assuming fixed stoichiometric behaviour. The analysis uses a global cycling framework to examine differences among microbial remineralization, nutrient supply, and organic-matter turnover. The results show that organic carbon and phosphorus recycling can be strongly decoupled, changing how the system responds to disturbance or fertilization. It is important for understanding microbial carbon cycling, nutrient limitation, and biological carbon-pump efficiency."
    - title: "Global warming drives a threefold increase in persistence and 1 °C rise in intensity of marine heatwaves"
      authors: "Marta Marcos; Angel Amores; Miguel Agulles; Jon Robson; Xiangbo Feng"
      journal: "Proceedings of the National Academy of Sciences"
      published: "2025"
      published_month: "2025-04"
      published_month_zh: "2025-04"
      doi: "10.1073/pnas.2413505122"
      url: "https://www.pnas.org/doi/10.1073/pnas.2413505122"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "marine heatwaves; warming; global trend"
      tags_zh: "marine heatwaves; warming; global trend"
      tags_en: "marine heatwaves; warming; global trend"
      summary: "这项研究量化全球变暖对海洋热浪持续性和强度的影响。它使用全球海表温度记录和反事实气候比较，区分自然变率与人为变暖的作用。研究分析如果没有全球变暖，观测到的海洋热浪会有多强、多持久。结果显示，全球变暖显著增加了海洋热浪的持续时间，并提高了热浪强度。它为评估热浪生态影响、垂向浮游植物响应和未来极端事件风险提供了物理背景。"
      summary_zh: "这项研究量化全球变暖对海洋热浪持续性和强度的影响。它使用全球海表温度记录和反事实气候比较，区分自然变率与人为变暖的作用。研究分析如果没有全球变暖，观测到的海洋热浪会有多强、多持久。结果显示，全球变暖显著增加了海洋热浪的持续时间，并提高了热浪强度。它为评估热浪生态影响、垂向浮游植物响应和未来极端事件风险提供了物理背景。"
      summary_en: "This study quantifies how global warming affects the persistence and intensity of marine heatwaves. It uses global sea-surface temperature records and counterfactual climate comparisons to separate natural variability from anthropogenic warming. The analysis asks how strong and persistent observed marine heatwaves would have been without global warming. The results show that warming substantially increases heatwave persistence and raises heatwave intensity. It provides physical context for ecological impacts, vertical phytoplankton responses, and future ocean extreme-event risk."
    - title: "Characterization of phytoplankton-excreted metabolites mediating carbon flux through the surface ocean"
      authors: "Yuting Zhu; Hanna S. Anderson; Eli Salcedo; Samuel E. Miller; Krista Longnecker; Melissa C. Kido Soule; Sheean T. Haley; Gretchen J. Swarr; et al."
      journal: "Proceedings of the National Academy of Sciences"
      published: "2026"
      published_month: "2026-03"
      published_month_zh: "2026-03"
      doi: "10.1073/pnas.2531765123"
      url: "https://www.pnas.org/doi/10.1073/pnas.2531765123"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "phytoplankton metabolites; dissolved organic matter; microbial loop"
      tags_zh: "phytoplankton metabolites; dissolved organic matter; microbial loop"
      tags_en: "phytoplankton metabolites; dissolved organic matter; microbial loop"
      summary: "这项研究分析浮游植物释放的代谢物如何影响表层海洋碳通量。它使用高分辨率有机分子分析和稳定同位素追踪来识别快速周转的溶解有机碳来源。研究关注这些低浓度、短寿命代谢物如何被微生物利用，并进入微生物环。结果把浮游植物初级生产和 labile DOC 的分子组成联系起来。它对理解 DOM、微生物碳泵和非颗粒碳通道很有帮助。"
      summary_zh: "这项研究分析浮游植物释放的代谢物如何影响表层海洋碳通量。它使用高分辨率有机分子分析和稳定同位素追踪来识别快速周转的溶解有机碳来源。研究关注这些低浓度、短寿命代谢物如何被微生物利用，并进入微生物环。结果把浮游植物初级生产和 labile DOC 的分子组成联系起来。它对理解 DOM、微生物碳泵和非颗粒碳通道很有帮助。"
      summary_en: "This study examines how metabolites released by phytoplankton mediate carbon flux through the surface ocean. It uses high-resolution molecular analysis and stable-isotope tracing to identify rapidly cycling sources of dissolved organic carbon. The work focuses on how low-concentration, short-lived metabolites are consumed by microbes and routed into the microbial loop. The results connect phytoplankton primary production with the molecular composition of labile DOC. It is useful for understanding DOM cycling, the microbial carbon pump, and non-particle carbon pathways."
    - title: "Hyperspectral retrieval of phytoplankton absorption and community composition from NASA’s PACE-OCI in estuarine–coastal waters using a hybrid framework combining mixture-of-experts and Variational Autoencoder"
      authors: "Xingyu Bai; Bingqing Liu; Jiang Li; Yuanheng Xiong; Eurico J. D'Sa; Melissa M. Baustian; Xiaodong Zhang; Brice K. Grunert; et al."
      journal: "Remote Sensing of Environment"
      published: "2026"
      published_month: "2026-05"
      published_month_zh: "2026-05"
      doi: "10.1016/j.rse.2026.115327"
