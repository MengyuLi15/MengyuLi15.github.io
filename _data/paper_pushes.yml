      summary: "摘要：气溶胶有机氮（AON）是公海大气氮沉降的重要组成部分。然而，尚不清楚有多少 AON 是外部来源的或从海洋内部回收的。在这里，我们使用新开发的气溶胶氮分析仪对西北太平洋上空的 AON 进行了量化，并在分子水平上研究了其化学性质。 AON占总悬浮颗粒物中总氮的14%~64%。在贫营养副热带环流和热带地区，AON 的贡献相当于无机氮（NO 3 - N+NH 4 + -N）。总共 57% 的 AON 是来自运输燃烧排放和老化污染物的外部输入。与回收的 AON 化合物相比，外部 AON 化合物具有较低的碳数和较高的氧化态。富含羧基的脂环族和脂肪族/肽类化合物是外部 AON 中的主要类别，它们可能被浮游植物用作氮源。"
      summary_zh: "摘要：气溶胶有机氮（AON）是公海大气氮沉降的重要组成部分。然而，尚不清楚有多少 AON 是外部来源的或从海洋内部回收的。在这里，我们使用新开发的气溶胶氮分析仪对西北太平洋上空的 AON 进行了量化，并在分子水平上研究了其化学性质。 AON占总悬浮颗粒物中总氮的14%~64%。在贫营养副热带环流和热带地区，AON 的贡献相当于无机氮（NO 3 - N+NH 4 + -N）。总共 57% 的 AON 是来自运输燃烧排放和老化污染物的外部输入。与回收的 AON 化合物相比，外部 AON 化合物具有较低的碳数和较高的氧化态。富含羧基的脂环族和脂肪族/肽类化合物是外部 AON 中的主要类别，它们可能被浮游植物用作氮源。"
      summary_en: "Abstract: Aerosol organic nitrogen (AON) is an important fraction of atmospheric N deposition over the open ocean. However, it is unclear how much of the AON is of external origin or internally recycled from the ocean. Here, we quantified AON over the Northwest Pacific Ocean using a newly developed Aerosol Nitrogen Analyzer and investigated its chemical nature on the molecular level. The AON accounted for 14%–64% of the total nitrogen in the total suspended particles. The contribution of AON was equal to inorganic N (NO 3 − ‐N+NH 4 + ‐N) over the oligotrophic subtropical gyre and tropical areas. A total of 57% of the AON was external input from transported combustion emissions and aged pollutants. External AON compounds were characterized by lower C number and higher oxidation state than the recycled ones. Carboxylic‐rich alicyclic and aliphatic/peptides‐like compounds were the dominant classes among the external AON, which could be potentially utilized by phytoplankton as a nitrogen source."
    - title: "Marine-derived water-soluble organic nitrogen in coastal air: influence of ocean productivity on atmospheric nitrogen cycling"
      authors: "Jiao Tang; Shujie Hu; Xiao Wang; Jiaqi Wang; Shaojun Lv; Xiaofei Geng; Guangcai Zhong; Yangzhi Mo; et al."
      journal: "Atmospheric Chemistry and Physics"
