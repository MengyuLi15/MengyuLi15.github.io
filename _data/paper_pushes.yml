    - title: "Air–Sea Interactions and Biogeochemical Responses to Medicane Daniel"
      authors: "Babita Jangir; Ehud Strobach"
      journal: "Biogeosciences"
      published: "2026-06-29"
      published_month: "2026-06"
      published_month_zh: "2026-06"
      doi: "10.5194/bg-23-4271-2026"
      url: "https://doi.org/10.5194/bg-23-4271-2026"
      group: "重点期刊：按影响力和相关性排序"
