      summary: "这项研究用机器学习从 VIIRS 顶层大气数据估计近岸水体叶绿素 a。它避开了复杂近岸水体中传统大气校正和经验算法容易累积误差的问题。研究训练模型把 TOA 卫星信号直接映射到叶绿素估计。结果提供了一条面向复杂近岸水体的替代反演路径。它对业务海色产品、近岸水质监测和藻华识别很有帮助。"
      summary_zh: "这项研究用机器学习从 VIIRS 顶层大气数据估计近岸水体叶绿素 a。它避开了复杂近岸水体中传统大气校正和经验算法容易累积误差的问题。研究训练模型把 TOA 卫星信号直接映射到叶绿素估计。结果提供了一条面向复杂近岸水体的替代反演路径。它对业务海色产品、近岸水质监测和藻华识别很有帮助。"
      summary_en: "This study uses machine learning to estimate coastal-water chlorophyll-a from top-of-atmosphere VIIRS satellite data. It addresses the difficulty that conventional atmospheric correction and empirical algorithms can accumulate errors in optically complex coastal waters. The model learns a direct mapping from TOA satellite signals to chlorophyll estimates. The result is an alternative retrieval pathway for challenging coastal environments. It is useful for operational ocean-colour products, coastal water-quality monitoring, and bloom detection."
    - title: "Performance Comparison of Multi-Task and Single-Task Learning in Ocean Color Retrieval: A Case Study of Hong Kong Coastal Waters"
      authors: "Chunlei Ma; Guang Zhang; Wenbo He; Jun Zhao; Zhou Peng; Xueming Zhu; Bin Ai"
      journal: "IEEE Transactions on Geoscience and Remote Sensing"
