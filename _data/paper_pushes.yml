      group_en: "Key journals: ordered by impact and relevance"
      tags: "carbon pump; vertical structure"
      tags_zh: "carbon pump; vertical structure"
      tags_en: "carbon pump; vertical structure"
      summary: "摘要：颗粒有机碳（POC）从表面到深海的垂直通量调节海洋碳吸收，对地球的碳循环产生影响。文献中争论哪种函数形式最能描述这种通量随深度的衰减。通量测量中发现的广泛分散性阻碍了这个问题的进展。提出了一个理论模型，该模型将这种散射视为关键信息而不是噪声。基于 POC 通量数据遵循对数正态分布的证据，该模型将垂直 POC 通量剖面预测为三个参数的函数：POC 输出通量的对数平均值和对数标准差，以及与先前函数形式一致的深度缩放项。 该模型捕获了在各个 POC 通量分布中观察到的大变异性，并说明大 POC 通量事件对 POC 的垂直转移有很大贡献。"
      summary_zh: "摘要：颗粒有机碳（POC）从表面到深海的垂直通量调节海洋碳吸收，对地球的碳循环产生影响。文献中争论哪种函数形式最能描述这种通量随深度的衰减。通量测量中发现的广泛分散性阻碍了这个问题的进展。提出了一个理论模型，该模型将这种散射视为关键信息而不是噪声。基于 POC 通量数据遵循对数正态分布的证据，该模型将垂直 POC 通量剖面预测为三个参数的函数：POC 输出通量的对数平均值和对数标准差，以及与先前函数形式一致的深度缩放项。 该模型捕获了在各个 POC 通量分布中观察到的大变异性，并说明大 POC 通量事件对 POC 的垂直转移有很大贡献。"
      summary_en: "Abstract: The vertical flux of particulate organic carbon (POC) from the surface to the deep ocean regulates the ocean carbon uptake, with implications for the Earth's carbon cycle. It is debated in the literature what functional form best describes the attenuation of this flux with depth. The wide scatter found in measurements of the flux has impeded progress on this question. A theoretical model is proposed, which treats this scatter as key information rather than noise. Based on the evidence that the POC flux data follow a lognormal distribution, the model predicts the vertical POC flux profile as a function of three parameters: log‐mean and log‐standard deviation of the POC export flux, and a depth scaling term consistent with previous functional forms. The model captures the large variability observed in individual POC flux profiles and illustrates that large POC flux events contribute substantially to the vertical transfer of POC."
    - title: "Distinct Vertical Structures of Global Eddy Heat and Salt Transports Revealed by Altimetry and Argo Observations"
      authors: "Xiangpeng Wang; Xiaoming Zhai; Helen L. Johnson; J. H. LaCasce; Qinbiao Ni; Yan Du"
      journal: "Geophysical Research Letters"
      published: "2026-05-28"
      published_month: "2026-05"
      published_month_zh: "2026-05"
      doi: "10.1029/2026gl122168"
      url: "https://doi.org/10.1029/2026gl122168"
      group: "重点期刊：按影响力和相关性排序"
      group_zh: "重点期刊：按影响力和相关性排序"
      group_en: "Key journals: ordered by impact and relevance"
      tags: "vertical structure"
      tags_zh: "vertical structure"
      tags_en: "vertical structure"
      summary: "摘要：中尺度涡流在海洋热量和盐分的重新分配中发挥着关键作用，但其全球三维（3D）传输结构仍然知之甚少。在这里，我们根据卫星高度计和 Argo 观测估计了 1,800 m 高层的全球经向涡热和盐传输，揭示了独特的垂直结构。涡流热传输随深度而反转，在海洋上部为极地方向，但在下方为赤道方向，导致强烈的垂直抵消和对总经向热传输的净贡献较弱。相比之下，涡流盐输送表现出明显的纬度依赖性，在低纬度地区弱向赤道方向，但在中纬度地区强烈向极地方向，其贡献了近一半的经向盐输送总量。 这些对比行为主要源于背景温度和盐度梯度的差异，与梯度下降的涡通量一致。我们的结果为涡热和盐传输的全球 3D 结构提供了新颖的观测见解，为评估海洋和气候模型提供了基准。"
      summary_zh: "摘要：中尺度涡流在海洋热量和盐分的重新分配中发挥着关键作用，但其全球三维（3D）传输结构仍然知之甚少。在这里，我们根据卫星高度计和 Argo 观测估计了 1,800 m 高层的全球经向涡热和盐传输，揭示了独特的垂直结构。涡流热传输随深度而反转，在海洋上部为极地方向，但在下方为赤道方向，导致强烈的垂直抵消和对总经向热传输的净贡献较弱。相比之下，涡流盐输送表现出明显的纬度依赖性，在低纬度地区弱向赤道方向，但在中纬度地区强烈向极地方向，其贡献了近一半的经向盐输送总量。 这些对比行为主要源于背景温度和盐度梯度的差异，与梯度下降的涡通量一致。我们的结果为涡热和盐传输的全球 3D 结构提供了新颖的观测见解，为评估海洋和气候模型提供了基准。"
      summary_en: "Abstract: Mesoscale eddies play a key role in redistributing oceanic heat and salt, yet their global three‐dimensional (3D) transport structures remain poorly understood. Here, we estimate global meridional eddy heat and salt transports in the upper 1,800 m from satellite altimeter and Argo observations, revealing distinct vertical structures. Eddy heat transport reverses with depth, being poleward in the upper ocean but equatorward below, resulting in strong vertical cancellation and a weak net contribution to total meridional heat transport. In contrast, eddy salt transport exhibits pronounced latitude dependence, weakly equatorward at low latitudes but strongly poleward at mid‐latitudes, where it contributes nearly half of the total meridional salt transport. These contrasting behaviors primarily arise from differences in background temperature and salinity gradients, consistent with down‐gradient eddy fluxes. Our results provide novel observational insights into the global 3D structures of eddy heat and salt transports, offering a benchmark for evaluating ocean and climate models."
    - title: "Pacific Decadal Oscillation Modulates an Interdecadal Trans‐Pacific Dry‐Wet Seesaw in East Asian and North American Semi‐Arid Regions"
      authors: "Shanshan Wang; Xinya Shu; Jianping Huang; Jinfei Sun; Fuxing Shi"
      journal: "Geophysical Research Letters"
