      tags: "PACE; ocean colour; backscattering; machine learning"
      tags_zh: "PACE; ocean colour; backscattering; machine learning"
      tags_en: "PACE; ocean colour; backscattering; machine learning"
      summary: "这项研究面向 PACE-OCI 高光谱海色数据，反演河口和近岸水体中的浮游植物吸收和群落组成。它结合 mixture-of-experts 与变分自编码器，处理近岸水体光学性质复杂、端元混合明显的问题。研究把高光谱遥感信号转化为与浮游植物功能和群落结构相关的生物光学变量。结果提供了一个适用于 PACE 近岸应用的混合机器学习框架。它对 PACE 产品开发、近岸水色反演和 BGC-Argo/现场资料交叉验证很有帮助。"
      summary_zh: "这项研究面向 PACE-OCI 高光谱海色数据，反演河口和近岸水体中的浮游植物吸收和群落组成。它结合 mixture-of-experts 与变分自编码器，处理近岸水体光学性质复杂、端元混合明显的问题。研究把高光谱遥感信号转化为与浮游植物功能和群落结构相关的生物光学变量。结果提供了一个适用于 PACE 近岸应用的混合机器学习框架。它对 PACE 产品开发、近岸水色反演和 BGC-Argo/现场资料交叉验证很有帮助。"
      summary_en: "This study uses PACE-OCI hyperspectral ocean-colour data to retrieve phytoplankton absorption and community composition in estuarine and coastal waters. It combines a mixture-of-experts approach with a variational autoencoder to handle optically complex coastal conditions and mixed water types. The work converts hyperspectral remote-sensing signals into bio-optical variables linked to phytoplankton function and community structure. The result is a hybrid machine-learning framework for coastal PACE applications. It is useful for PACE product development, coastal ocean-colour retrieval, and cross-validation with BGC-Argo or field data."
    - title: "Retrieval of global surface phytoplankton community structure using a minimal set of predictors"
      authors: "Xueyin Li; Shuguo Chen; Junwei Wang; Qing Zhu"
      journal: "Remote Sensing of Environment"
