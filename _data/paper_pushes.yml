      tags: "ocean lidar; pure water optics; bio-optic methods"
      tags_zh: "ocean lidar; pure water optics; bio-optic methods"
      tags_en: "ocean lidar; pure water optics; bio-optic methods"
      summary: "这项研究测量或分析纯水退偏振比的光谱依赖性。它关注的是海洋激光雷达和偏振光学反演中一个基础但关键的光学参数。研究比较不同波长下纯水退偏振行为，为后续从水体信号中分离颗粒和分子贡献提供基准。结果改进了对纯水背景散射和偏振特性的认识。它对海洋 lidar、生物光学反演和主动遥感算法很有帮助。"
      summary_zh: "这项研究测量或分析纯水退偏振比的光谱依赖性。它关注的是海洋激光雷达和偏振光学反演中一个基础但关键的光学参数。研究比较不同波长下纯水退偏振行为，为后续从水体信号中分离颗粒和分子贡献提供基准。结果改进了对纯水背景散射和偏振特性的认识。它对海洋 lidar、生物光学反演和主动遥感算法很有帮助。"
      summary_en: "This study measures or analyses the spectral dependence of the depolarization ratio of pure water. It focuses on a basic but important optical parameter for ocean lidar and polarization-based retrievals. The work compares pure-water depolarization across wavelengths, providing a reference for separating molecular and particle contributions in water-column signals. The results improve understanding of background scattering and polarization by pure water. It is useful for ocean lidar, bio-optical retrievals, and active remote-sensing algorithms."
    - title: "Spectral variability in particulate light backscattering in the sea: resolving fine-scale optical features and their biogeochemical significance"
      authors: "Michael G. Novak; Rüdiger Röttgers"
      journal: "Optics Express"
