      tags: "subsurface chlorophyll maximum; storm disturbance; vertical response"
      tags_zh: "subsurface chlorophyll maximum; storm disturbance; vertical response"
      tags_en: "subsurface chlorophyll maximum; storm disturbance; vertical response"
      summary: "这项研究分析 Hurricane Idalia 经过气旋涡和河羽分层环境时的次表层生物地球化学响应。它关注风暴扰动如何与既有涡旋结构、淡水羽状体和分层共同作用。研究利用剖面或现场观测解析次表层叶绿素、营养盐和相关变量的变化。结果说明，风暴影响不仅发生在表层，也会通过混合和水团结构改变次表层生态状态。它对研究极端天气、垂向混合和 SCM/DCM 响应很有价值。"
      summary_zh: "这项研究分析 Hurricane Idalia 经过气旋涡和河羽分层环境时的次表层生物地球化学响应。它关注风暴扰动如何与既有涡旋结构、淡水羽状体和分层共同作用。研究利用剖面或现场观测解析次表层叶绿素、营养盐和相关变量的变化。结果说明，风暴影响不仅发生在表层，也会通过混合和水团结构改变次表层生态状态。它对研究极端天气、垂向混合和 SCM/DCM 响应很有价值。"
      summary_en: "This study analyses the subsurface biogeochemical response to Hurricane Idalia within a cyclonic eddy and river-plume-stratified environment. It focuses on how storm disturbance interacts with pre-existing eddy structure, freshwater plumes, and stratification. The work uses profile or field observations to resolve changes in subsurface chlorophyll, nutrients, and related variables. The results show that storm impacts are not limited to the surface and can reshape subsurface ecological conditions through mixing and water-mass structure. It is valuable for studies of extreme weather, vertical mixing, and SCM or DCM responses."
    - title: "Spectral dependence of the depolarization ratio of pure water"
      authors: "Tikaram Neupane; P. Jeremy Werdell; Xiaodong Zhang"
