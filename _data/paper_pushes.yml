      url: "https://www.nature.com/articles/s41467-025-63605-w"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "BGC-Argo; marine heatwaves; POC; microbial ecology"
      tags_zh: "BGC-Argo; marine heatwaves; POC; microbial ecology"
      tags_en: "BGC-Argo; marine heatwaves; POC; microbial ecology"
      summary: "这项研究关注海洋热浪如何改变食物网结构和碳输送过程。它把极端变暖事件与 POC、微生物生态和可能的 BGC-Argo 观测联系起来，而不是只描述温度异常。研究分析热浪期间生态相互作用、颗粒形成和碳转运路径的变化。结果说明海洋热浪可能通过改变食物网和微生物过程来调节碳输出效率。它对研究极端事件下的碳泵响应和生态系统稳定性很有帮助。"
      summary_zh: "这项研究关注海洋热浪如何改变食物网结构和碳输送过程。它把极端变暖事件与 POC、微生物生态和可能的 BGC-Argo 观测联系起来，而不是只描述温度异常。研究分析热浪期间生态相互作用、颗粒形成和碳转运路径的变化。结果说明海洋热浪可能通过改变食物网和微生物过程来调节碳输出效率。它对研究极端事件下的碳泵响应和生态系统稳定性很有帮助。"
      summary_en: "This study examines how marine heatwaves alter food-web structure and carbon transport. It links extreme warming events with POC, microbial ecology, and potentially profile-based observations rather than describing temperature anomalies alone. The analysis considers how ecological interactions, particle formation, and carbon-transfer pathways change during heatwave conditions. The results show that marine heatwaves can regulate carbon-export efficiency through food-web and microbial pathways. It is useful for studying carbon-pump responses and ecosystem stability during ocean extremes."
    - title: "Marine heatwaves are shaping the vertical structure of phytoplankton in the global ocean"
      authors: "Xueying Ma; Gengxin Chen"
      journal: "Communications Earth & Environment"
      published: "2025-08-29"
      published_month: "2025-08"
      published_month_zh: "2025-08"
      doi: "10.1038/s43247-025-02718-y"
      url: "https://www.nature.com/articles/s43247-025-02718-y"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "BGC-Argo; marine heatwaves; vertical chlorophyll; DCM"
      tags_zh: "BGC-Argo; marine heatwaves; vertical chlorophyll; DCM"
      tags_en: "BGC-Argo; marine heatwaves; vertical chlorophyll; DCM"
      summary: "这项研究聚焦海洋热浪对全球浮游植物垂向结构的影响。它利用可解析垂向信息的观测资料，尤其适合与 BGC-Argo 叶绿素剖面和深叶绿素最大值研究相联系。研究比较热浪条件下表层、次表层和 DCM 附近浮游植物信号的变化。结果表明，海洋热浪不仅改变表层生态状态，也会重塑垂向叶绿素分布。它对理解热浪生态影响、浮游植物栖息层位变化和剖面观测解释很重要。"
      summary_zh: "这项研究聚焦海洋热浪对全球浮游植物垂向结构的影响。它利用可解析垂向信息的观测资料，尤其适合与 BGC-Argo 叶绿素剖面和深叶绿素最大值研究相联系。研究比较热浪条件下表层、次表层和 DCM 附近浮游植物信号的变化。结果表明，海洋热浪不仅改变表层生态状态，也会重塑垂向叶绿素分布。它对理解热浪生态影响、浮游植物栖息层位变化和剖面观测解释很重要。"
      summary_en: "This study focuses on how marine heatwaves reshape the vertical structure of phytoplankton in the global ocean. It relies on observations that can resolve depth-dependent chlorophyll patterns, making it especially relevant to BGC-Argo profiles and deep chlorophyll maximum studies. The analysis compares phytoplankton signals at the surface, subsurface, and around the DCM under heatwave conditions. The results show that marine heatwaves affect not only surface ecology but also the vertical distribution of chlorophyll. It is important for interpreting heatwave impacts, habitat-depth shifts, and profile-based phytoplankton observations."
    - title: "The oceanic physical injection pump of organic carbon"
      authors: "Marco Bellacicco; Salvatore Marullo; Giorgio Dall’Olmo; Daniele Iudicone; Bruno Buongiorno Nardelli"
      journal: "Nature Communications"
      published: "2025-08-02"
      published_month: "2025-08"
      published_month_zh: "2025-08"
      doi: "10.1038/s41467-025-62363-z"
      url: "https://www.nature.com/articles/s41467-025-62363-z"
      group: "Nature 系列"
      group_zh: "Nature 系列"
      group_en: "Nature series"
      tags: "carbon pump; POC/DOC; physical injection pump"
      tags_zh: "carbon pump; POC/DOC; physical injection pump"
      tags_en: "carbon pump; POC/DOC; physical injection pump"
      summary: "这项研究提出或量化海洋中有机碳的物理注入泵过程。它关注物理输运如何把 POC 或 DOC 从表层带入更深层，而不仅仅依赖颗粒沉降这一条路径。研究把环流、混合或亚中尺度输运与有机碳再分布联系起来。结果强调，物理注入可以成为生物碳泵之外的重要碳封存通道。它对解释 BGC-Argo 剖面中的碳信号、改进碳泵模型和评估海洋碳汇很有帮助。"
      summary_zh: "这项研究提出或量化海洋中有机碳的物理注入泵过程。它关注物理输运如何把 POC 或 DOC 从表层带入更深层，而不仅仅依赖颗粒沉降这一条路径。研究把环流、混合或亚中尺度输运与有机碳再分布联系起来。结果强调，物理注入可以成为生物碳泵之外的重要碳封存通道。它对解释 BGC-Argo 剖面中的碳信号、改进碳泵模型和评估海洋碳汇很有帮助。"
      summary_en: "This study develops or quantifies the physical injection pump of organic carbon in the ocean. It focuses on how physical transport can move POC or DOC from the surface into deeper layers, rather than relying only on gravitational particle sinking. The work connects circulation, mixing, or submesoscale transport with the redistribution of organic carbon. The results highlight physical injection as an important carbon-sequestration pathway alongside the biological carbon pump. It is useful for interpreting carbon signals in profiles, improving carbon-pump models, and assessing ocean carbon uptake."
    - title: "Antarctic krill vertical migrations modulate seasonal carbon export"
      authors: "A. J. R. Smith; S. Wotherspoon; L. Ratnarajah; G. R. Cutter; G. J. Macaulay; B. Hutton; R. King; S. Kawaguchi; et al."
      journal: "Science"
      published: "2025"
      published_month: "2025-01"
      published_month_zh: "2025-01"
      doi: "10.1126/science.adq5564"
      url: "https://www.science.org/doi/10.1126/science.adq5564"
      group: "Science 系列"
      group_zh: "Science 系列"
      group_en: "Science series"
      tags: "carbon export; vertical migration; Southern Ocean"
      tags_zh: "carbon export; vertical migration; Southern Ocean"
      tags_en: "carbon export; vertical migration; Southern Ocean"
      summary: "这项研究关注南大洋磷虾垂向迁移对季节性碳输出的调节作用。它把动物行为与生物碳泵联系起来，强调碳输出并不只由浮游植物和颗粒沉降决定。研究分析磷虾在昼夜或季节尺度上的上下迁移如何改变有机碳向深层输送。结果说明，磷虾迁移可以在特定季节增强或改变南大洋碳输出路径。它对南大洋生态碳泵、食物网-碳循环耦合和碳输出估算很有价值。"
      summary_zh: "这项研究关注南大洋磷虾垂向迁移对季节性碳输出的调节作用。它把动物行为与生物碳泵联系起来，强调碳输出并不只由浮游植物和颗粒沉降决定。研究分析磷虾在昼夜或季节尺度上的上下迁移如何改变有机碳向深层输送。结果说明，磷虾迁移可以在特定季节增强或改变南大洋碳输出路径。它对南大洋生态碳泵、食物网-碳循环耦合和碳输出估算很有价值。"
      summary_en: "This study examines how vertical migration by Antarctic krill modulates seasonal carbon export. It links animal behaviour with the biological carbon pump, showing that export is not controlled only by phytoplankton production and passive particle sinking. The analysis considers how krill movement through the water column changes the transfer of organic carbon to depth. The results indicate that krill migration can enhance or redirect Southern Ocean carbon export during particular seasons. It is valuable for studies of the Southern Ocean carbon pump, food-web coupling, and carbon-export estimation."
    - title: "Declining ocean greenness and phytoplankton blooms in low to mid-latitudes under a warming climate"
      authors: "Zhongkun Hong; Di Long; Kaiyue Shan; Jian-Min Zhang; R. Iestyn Woolway; Maofeng Liu; Michael E. Mann; Hongwei Fang"
      journal: "Science Advances"
      published: "2025-10-17"
      published_month: "2025-10"
      published_month_zh: "2025-10"
      doi: "10.1126/sciadv.adx4857"
      url: "https://www.science.org/doi/10.1126/sciadv.adx4857"
      group: "Science 系列"
      group_zh: "Science 系列"
      group_en: "Science series"
      tags: "ocean colour; phytoplankton blooms; warming"
      tags_zh: "ocean colour; phytoplankton blooms; warming"
      tags_en: "ocean colour; phytoplankton blooms; warming"
      summary: "这项研究利用长期海色记录分析低纬到中纬海洋绿度和浮游植物藻华变化。它把卫星观测中的颜色、叶绿素和藻华信号放到气候变暖背景下解释。研究重点是识别变暖海洋中表层浮游植物活动是否减弱，以及这种变化在哪些纬度带更明显。结果指向低中纬海域海洋绿度和藻华活动下降。它对评估海色趋势、生产力变化和未来生态系统响应很有参考价值。"
      summary_zh: "这项研究利用长期海色记录分析低纬到中纬海洋绿度和浮游植物藻华变化。它把卫星观测中的颜色、叶绿素和藻华信号放到气候变暖背景下解释。研究重点是识别变暖海洋中表层浮游植物活动是否减弱，以及这种变化在哪些纬度带更明显。结果指向低中纬海域海洋绿度和藻华活动下降。它对评估海色趋势、生产力变化和未来生态系统响应很有参考价值。"
      summary_en: "This study uses long-term ocean-colour records to analyse changes in ocean greenness and phytoplankton blooms from low to mid-latitudes. It interprets satellite colour, chlorophyll, and bloom signals in the context of a warming climate. The work asks whether surface phytoplankton activity is weakening and where that weakening is most evident. The results point to declining ocean greenness and bloom activity across low- to mid-latitude waters. It is useful for assessing ocean-colour trends, productivity change, and future ecosystem responses."
